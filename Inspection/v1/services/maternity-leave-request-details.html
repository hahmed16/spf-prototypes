<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل طلب إجازة الأمومة - نظام التفتيش</title>
  <link rel="stylesheet" href="../shared/style.css">
  <script src="../shared/config.js"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="../shared/components.js"></script>
  <script src="../shared/enhanced-components.js"></script>
  <style>
    .request-header{background:var(--primary);color:#fff;padding:20px 24px;border-radius:var(--rlg);margin-bottom:14px;box-shadow:var(--sh)}
    .request-header h1{margin:0 0 6px;font-size:20px;font-weight:700}
    .request-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
    .meta-item{background:rgba(255,255,255,.18);padding:4px 12px;border-radius:20px;font-size:12px}
    .meta-label{font-weight:600;margin-inline-end:4px}
    .info-section{margin-bottom:22px}
    .section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--primary)}
    .info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:18px}
    .info-card{background:var(--g50);padding:14px;border-radius:var(--rlg);border-inline-start:4px solid var(--primary)}
    .info-card h3{margin:0 0 8px;color:var(--primary);font-size:13px;font-weight:700}
    .info-card p{margin:4px 0;font-size:12.5px;color:var(--text2);line-height:1.5}
    .info-card .value{font-weight:600;color:var(--text)}
    .risk-assessment svg{width:40px;height:40px }
    .documents-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
    .document-item{background:var(--surface);padding:12px;border-radius:var(--rsm);border:1px solid var(--border);display:flex;align-items:center;gap:10px;transition:var(--tr)}
    .document-item:hover{border-color:var(--primary)}
    .document-icon{width:34px;height:34px;background:var(--primary);color:#fff;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .document-info h4{margin:0 0 3px;font-size:12.5px;color:var(--text);font-weight:600}
    .document-info p{margin:0;font-size:11px;color:var(--text3)}
    .action-buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .action-button{padding:10px 18px;border:none;border-radius:var(--rsm);font-size:13.5px;font-weight:600;cursor:pointer;transition:var(--tr)}
    .btn-approve{background:var(--success);color:#fff}
    .btn-reject{background:var(--danger);color:#fff}
    .btn-request-info{background:var(--warning);color:#212529}
    .btn-secondary{background:var(--border);color:var(--text)}
    .notes-section{background:var(--g50);padding:14px;border-radius:var(--rlg);margin-top:18px}
    .notes-section h3{margin:0 0 10px;font-size:13px;font-weight:700;color:var(--text)}
    .notes-textarea{width:100%;min-height:90px;padding:10px;border:1px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:inherit;resize:vertical;background:var(--surface)}
    .notes-textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(10,92,54,.1)}
    .rules-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);margin-bottom:14px;overflow:hidden;box-shadow:var(--sh)}
    .rules-header{background:linear-gradient(180deg,var(--primary-l) 0%,#f6fbf8 100%);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .rules-header h3{margin:0;font-size:13px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px}
    .rules-stats{display:flex;gap:10px;font-size:11px}
    .rule-stat{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;background:#fff;border:1px solid var(--border)}
    .rule-stat.passed{border-color:var(--success);color:var(--success)}
    .rule-stat.failed{border-color:var(--danger);color:var(--danger)}
    .rules-list{padding:0}
    .rule-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
    .rule-item:last-child{border-bottom:none}
    .rule-item:hover{background:var(--g50)}
    .rule-status{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
    .rule-status.passed{background:var(--success-l);color:var(--success)}
    .rule-status.failed{background:var(--danger-l);color:var(--danger)}
    .rule-status.pending{background:var(--warning-l);color:var(--warning)}
    .rule-status svg{width:13px;height:13px}
    .rule-content{flex:1;min-width:0}
    .rule-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.4}
    .rule-description{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:5px}
    .rule-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
    .rule-badge{padding:2px 7px;border-radius:10px;font-weight:600;font-size:10px}
    .rule-badge.critical{background:var(--danger-l);color:var(--danger)}
    .rule-badge.warning{background:var(--warning-l);color:var(--warning)}
    .rule-badge.info{background:var(--info-l);color:var(--info)}
    .violation-details{background:var(--danger-l);border:1px solid var(--danger);border-radius:var(--rsm);padding:8px 10px;margin-top:6px;font-size:11px}
    .violation-details h5{margin:0 0 3px;font-size:11px;font-weight:700;color:var(--danger)}
    .violation-details p{margin:0;line-height:1.4}
    .risk-assessment{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-h) 100%);color:#fff;padding:18px;border-radius:var(--rlg);margin-bottom:14px}
    .risk-assessment h3{margin:0 0 10px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
    .risk-level{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .risk-bar-container{flex:1;height:8px;background:rgba(255,255,255,.3);border-radius:999px;overflow:hidden}
    .risk-bar{height:100%;border-radius:999px}
    .risk-bar.high{background:var(--danger)}
    .risk-bar.medium{background:var(--warning)}
    .risk-bar.low{background:var(--success)}
    .risk-label{font-size:13px;font-weight:700;min-width:70px}
    .risk-recommendations{background:rgba(255,255,255,.15);border-radius:var(--rsm);padding:10px}
    .risk-recommendations h4{margin:0 0 6px;font-size:12px;font-weight:600}
    .risk-recommendations ul{margin:0;padding-inline-end:14px;font-size:11.5px;line-height:1.6}
    .risk-recommendations li{margin-bottom:3px}
    .tabs-container{background:var(--surface);border-radius:var(--rlg);box-shadow:var(--sh);overflow:hidden;margin-bottom:14px;border:1px solid var(--border)}
    .tabs-header{display:flex;background:var(--g50);border-bottom:1px solid var(--border);flex-wrap:wrap}
    .tab-button{flex:1;padding:13px 16px;border:none;background:none;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--text3);transition:var(--tr);position:relative;min-width:100px}
    .tab-button:hover{background:var(--border);color:var(--text2)}
    .tab-button.active{color:var(--primary);background:var(--surface)}
    .tab-button.active::after{content:'';position:absolute;bottom:0;inset-inline:0;height:3px;background:var(--primary);border-radius:2px 2px 0 0}
    .tab-content{padding:20px;display:none}
    .tab-content.active{display:block}
    .payment-history table,.creditors-table table{width:100%;border-collapse:collapse}
    .payment-history th,.creditors-table th{background:var(--primary);color:#fff;padding:12px;text-align:right;font-weight:600;font-size:13px}
    .payment-history td,.creditors-table td{padding:12px;border-bottom:1px solid var(--border);font-size:13px}
    .payment-history tr:hover,.creditors-table tr:hover{background:var(--g50)}
    .debt-summary,.case-summary{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-h) 100%);color:#fff;padding:20px;border-radius:var(--rlg);margin-bottom:20px}
    .debt-summary h3,.case-summary h3{margin:0 0 12px;font-size:16px}
    .debt-grid,.case-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    .debt-item,.case-item{background:rgba(255,255,255,.2);padding:12px;border-radius:8px}
    .debt-item .label,.case-item .label{font-size:12px;opacity:.85;margin-bottom:4px}
    .debt-item .value,.case-item .value{font-size:18px;font-weight:700}
    .analysis-section{background:var(--g50);padding:16px;border-radius:var(--rlg);margin-bottom:16px}
    .analysis-section h3{margin:0 0 12px;color:var(--text);font-size:15px}
    .risk-indicator{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .risk-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
    .risk-fill{height:100%;border-radius:4px}
    .risk-critical{background:var(--danger)}
    .risk-high{background:var(--danger)}
    .risk-medium{background:var(--warning)}
    .risk-low{background:var(--success)}
    .recommendation-box{background:var(--surface);padding:16px;border-radius:var(--rlg);border-inline-start:4px solid var(--success);margin-bottom:12px}
    .recommendation-box.warning{border-inline-start-color:var(--warning)}
    .recommendation-box.danger{border-inline-start-color:var(--danger)}
    .recommendation-box h4{margin:0 0 8px;color:var(--text)}
    .recommendation-box p{margin:0;color:var(--text2);font-size:13px;line-height:1.6}
    .asset-card{background:var(--g50);padding:16px;border-radius:var(--rlg);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border)}
    .asset-name{font-size:13px;font-weight:600;color:var(--text)}
    .asset-value{font-size:15px;font-weight:700;color:var(--primary)}
    .status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
    .status-active,.status-approved{background:var(--success-l);color:var(--success)}
    .status-pending,.status-under-review{background:var(--info-l);color:var(--info)}
    .status-rejected,.status-critical{background:var(--danger-l);color:var(--danger)}
    .status-high{background:#fff3cd;color:#856404}
    .status-medium{background:var(--info-l);color:var(--info)}
    .status-low{background:var(--success-l);color:var(--success)}
    .case-type-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
    .type-liquidation{background:var(--info-l);color:var(--info)}
    .type-bankruptcy{background:#fff3cd;color:#e65100}
    .timeline{position:relative;padding-inline-end:28px}
    .timeline::before{content:'';position:absolute;inset-inline-end:0;top:0;bottom:0;width:3px;background:var(--border)}
    .timeline-item{position:relative;margin-bottom:20px;padding-inline-end:22px}
    .timeline-item::before{content:'';position:absolute;inset-inline-end:-7px;top:5px;width:14px;height:14px;background:var(--primary);border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px var(--primary)}
    .timeline-item.completed::before{background:var(--success);box-shadow:0 0 0 2px var(--success)}
    .timeline-item.pending::before{background:var(--warning);box-shadow:0 0 0 2px var(--warning)}
    .timeline-item.critical::before{background:var(--danger);box-shadow:0 0 0 2px var(--danger)}
    .timeline-date{font-size:11.5px;color:var(--text3);margin-bottom:4px}
    .timeline-content{background:var(--surface);padding:12px;border-radius:var(--rsm);border-inline-start:3px solid var(--primary);box-shadow:var(--sh)}
    .timeline-content h4{margin:0 0 6px;color:var(--text);font-size:13px;font-weight:600}
    .timeline-content p{margin:0;color:var(--text2);font-size:12.5px;line-height:1.5}
    @media(max-width:768px){.request-header{padding:14px}.request-header h1{font-size:16px}.request-meta{flex-direction:column;gap:6px}.tabs-header{flex-direction:column}.info-grid{grid-template-columns:1fr}.action-buttons{flex-direction:column}.action-button{width:100%}.rules-stats{flex-direction:column;gap:4px}.rule-item{flex-direction:column}.rule-status{margin-top:0}}
  </style>
</head>
<body>
  <script>
    const pageContent = `
    <div class="details-container">
      <div class="request-header">
        <h1>طلب إجازة الأمومة #MLR-2025-0001</h1>
        <div class="request-meta">
          <div class="meta-item"><span class="meta-label">تاريخ الطلب:</span><span>25/01/2025</span></div>
          <div class="meta-item"><span class="meta-label">الحالة:</span><span class="status-badge status-under-review">قيد المراجعة</span></div>
          <div class="meta-item"><span class="meta-label">الموظف المسؤول:</span><span>أحمد محمد</span></div>
        </div>
      </div>

      <div class="tabs-container">
        <div class="tabs-header">
          <button class="tab-button active" onclick="switchTab('overview')">نظرة عامة</button>
          <button class="tab-button" onclick="switchTab('pregnancy')">معلومات الحمل</button>
          <button class="tab-button" onclick="switchTab('leave')">تفاصيل الإجازة</button>
          <button class="tab-button" onclick="switchTab('rules')">قواعد التحقق</button>
          <button class="tab-button" onclick="switchTab('decision')">القرار</button>
        </div>

        <div id="overview" class="tab-content active">
          <div class="info-section">
            <h2 class="section-title">معلومات الموظفة</h2>
            <div class="info-grid">
              <div class="info-card">
                <h3>البيانات الشخصية</h3>
                <p><span class="value">الاسم:</span> فاطمة بنت سالم الهنائي</p>
                <p><span class="value">رقم الهوية:</span> 28475912</p>
                <p><span class="value">الجنسية:</span> عمانية</p>
                <p><span class="value">تاريخ الميلاد:</span> 15/06/1992</p>
              </div>
              <div class="info-card">
                <h3>معلومات الوظيفة</h3>
                <p><span class="value">القسم:</span> الموارد البشرية</p>
                <p><span class="value">المسمى الوظيفي:</span> مسؤول توظيف</p>
                <p><span class="value">تاريخ التعيين:</span> 01/03/2020</p>
                <p><span class="value">سنوات الخبرة:</span> 5 سنوات</p>
              </div>
              <div class="info-card">
                <h3>حالة الطلب</h3>
                <p><span class="value">تاريخ التقديم:</span> 25/01/2025</p>
                <p><span class="value">تاريخ آخر تحديث:</span> 30/01/2025</p>
                <p><span class="value">المرحلة الحالية:</span> التحقق من القواعد</p>
                <p><span class="value">المدة المتبقية:</span> 3 أيام عمل</p>
              </div>
            </div>
          </div>

          <div class="info-section">
            <h2 class="section-title">الملخص التنفيذي</h2>
            <div class="analysis-section">
              <p>قدمت فاطمة بنت سالم الهنائي طلباً للحصول على إجازة أمومة مدتها 98 يوماً تبدأ من 01/03/2025. الموظفة تعمل في المؤسسة منذ 5 سنوات وتستوفي جميع شروط الأهلية لإجازة الأمومة وفقاً للائحة العمل. تم تقديم جميع المستندات الطبية المطلوبة وهي قيد المراجعة حالياً.</p>
            </div>
          </div>

          <div class="info-section">
            <h2 class="section-title">المستندات المرفقة</h2>
            <div class="documents-list">
              <div class="document-item"><div class="document-icon">📄</div><div class="document-info"><h4>شهادة طبية للحمل</h4><p>تم التحقق - صالح</p></div></div>
              <div class="document-item"><div class="document-icon">📄</div><div class="document-info"><h4>تقرير الحمل التفصيلي</h4><p>تم التحقق - صالح</p></div></div>
              <div class="document-item"><div class="document-icon">📄</div><div class="document-info"><h4>صورة الهوية الوطنية</h4><p>تم التحقق - صالح</p></div></div>
              <div class="document-item"><div class="document-icon">📄</div><div class="document-info"><h4>طلب الإجازة الرسمي</h4><p>تم التحقق - صالح</p></div></div>
            </div>
          </div>
        </div>

        <div id="pregnancy" class="tab-content">
          <div class="info-section">
            <h2 class="section-title">معلومات الحمل</h2>
            <div class="info-grid">
              <div class="info-card">
                <h3>تفاصيل الحمل</h3>
                <p><span class="value">تاريخ الولادة المتوقع:</span> 15/03/2025</p>
                <p><span class="value">مدة الحمل الحالية:</span> 32 أسبوع</p>
                <p><span class="value">نوع الحمل:</span> طبيعي</p>
                <p><span class="value">عدد الأجنة:</span> جنين واحد</p>
              </div>
              <div class="info-card">
                <h3>التاريخ الطبي</h3>
                <p><span class="value">تاريخ آخر فحص:</span> 20/01/2025</p>
                <p><span class="value">الطبيب المعالج:</span> د. محمد أحمد</p>
                <p><span class="value">المستشفى:</span> مستشفى مسقط</p>
                <p><span class="value">حالة الأم:</span> مستقرة</p>
              </div>
            </div>
          </div>
        </div>

        <div id="leave" class="tab-content">
          <div class="info-section">
            <h2 class="section-title">تفاصيل الإجازة</h2>
            <div class="info-grid">
              <div class="info-card">
                <h3>فترة الإجازة</h3>
                <p><span class="value">تاريخ البدء:</span> 01/03/2025</p>
                <p><span class="value">تاريخ الانتهاء:</span> 07/06/2025</p>
                <p><span class="value">مدة الإجازة:</span> 98 يوم</p>
                <p><span class="value">نوع الإجازة:</span> إجازة أمومة</p>
              </div>
              <div class="info-card">
                <h3>التعويض المالي</h3>
                <p><span class="value">الراتب الشهري:</span> 4,200 ريال</p>
                <p><span class="value">نسبة التعويض:</span> 100%</p>
                <p><span class="value">المبلغ الإجمالي:</span> 13,720 ريال</p>
                <p><span class="value">طريقة الصرف:</span> شهري</p>
              </div>
            </div>
          </div>
        </div>

        <div id="rules" class="tab-content">
          <div id="rules-content"></div>
        </div>

        <div id="decision" class="tab-content">
          <div class="info-section">
            <h2 class="section-title">اتخاذ القرار</h2>
            <div class="analysis-section">
              <p>بناءً على التحليل الشامل للطلب، يرجى اختيار القرار المناسب وتوثيق الأسباب.</p>
            </div>
          </div>

          <div class="info-section">
            <h2 class="section-title">خيارات القرار</h2>
            <div class="action-buttons">
              <button class="action-button btn-approve" onclick="submitDecision('approve')">✓ الموافقة على الطلب</button>
              <button class="action-button btn-request-info" onclick="submitDecision('request-info')">ℹ طلب معلومات إضافية</button>
              <button class="action-button btn-reject" onclick="submitDecision('reject')">✕ رفض الطلب</button>
              <button class="action-button btn-secondary" onclick="submitDecision('defer')">⏰ تأجيل القرار</button>
            </div>
          </div>

          <div class="info-section">
            <h2 class="section-title">ملاحظات القرار</h2>
            <div class="notes-section">
              <h3>أضف ملاحظاتك</h3>
              <textarea class="notes-textarea" placeholder="أدخل ملاحظاتك وأسباب القرار هنا..."></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>
    `;

    function switchTab(tabId) {
      const tabElement = document.getElementById(tabId);
      if (!tabElement) {
        console.error(`Tab element with id '${tabId}' not found`);
        return;
      }

      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(button => button.classList.remove('active'));
      tabElement.classList.add('active');

      // Find and activate the corresponding button
      const buttons = document.querySelectorAll('.tab-button');
      buttons.forEach(button => {
        if (button.getAttribute('onclick') && button.getAttribute('onclick').includes(`'${tabId}'`)) {
          button.classList.add('active');
        }
      });

      if (tabId === 'rules') loadRulesContent();
    }

    function loadRulesContent() {
      const rulesContent = document.getElementById('rules-content');
      if (rulesContent.innerHTML.trim() === '') {
        rulesContent.innerHTML = renderMaternityLeaveRequestDetails('monitoring-employee');
      }
    }

    function submitDecision(decision) {
      const notes = document.querySelector('.notes-textarea').value;
      alert(`تم إرسال القرار: ${decision}\nالملاحظات: ${notes}`);
    }

    document.addEventListener('DOMContentLoaded', function() {
      initLayout({
        role: 'monitoring-employee',
        activePage: 'maternity-leave-request-details',
        breadcrumb: [
          { label: 'الرئيسية', onclick: 'goHome()' },
          { label: 'طلبات إجازة الأمومة', onclick: "navigateTo('../services/maternity-leave-requests-list')" },
          { label: 'تفاصيل الطلب' }
        ]
      });
      renderContent(pageContent);
    });
  </script>
</body>
</html>
