<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة الطلبات — رئيس قسم التحقيق في إصابات العمل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'injury-head', activePage: 'allowances-list' });
setBreadcrumb([{ label: 'بدلات الانقطاع عن العمل' }, { label: 'قائمة الطلبات' }]);
let searchQuery = '';
let showAllStages = false;
document.addEventListener('DOMContentLoaded', render);
function render() {
  const filtered = getFilteredData({
    role: 'injury-head',
    data: WI_DATA.allowances.filter(r => r.type === 'إصابة عمل'),
    query: searchQuery,
    showAll: showAllStages
  });
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة طلبات صرف بدلات الانقطاع</h1><p>إصابات العمل — ${WI_DATA.allowances.filter(r=>r.type==='إصابة عمل').length} طلب إجمالي في النظام</p></div>
      <div class="pg-acts"><button class="btn btn-secondary btn-sm" onclick="window.location.href='../shared/medical-query.html'">${ICONS.medical} استعلام طبي</button></div>
    </div>
    ${renderUnifiedFilterBar({ onSearch: 'updateSearch', onToggleAll: 'toggleAll', isAllVisible: showAllStages })}
    <div class="card">
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم الطلب</th><th>المؤمن عليه</th><th>جهة العمل</th><th>الحالة</th><th>الموظف المسؤول</th><th>التاريخ</th><th></th></tr></thead>
            <tbody>
              ${filtered.length === 0
                ? `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text3)">لا توجد نتائج تطابق البحث أو المرحلة الحالية</td></tr>`
                : filtered.map(r=>`
              <tr style="${r.status==='بانتظار اعتماد رئيس قسم التحقيق في إصابات العمل'?'background:var(--primary-l)':''}">
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                <td>${r.insured?.name || r.applicant?.name}</td>
                <td style="font-size:11.5px">${(r.employer?.name||'—').substring(0,22)}...</td>
                <td>${statusBadge(r.status)}</td>
                <td style="font-size:11.5px">${r.assignedTo||'—'}</td>
                <td style="font-size:12px">${r.submitDate}</td>
                <td>
                  <button class="ibtn" onclick="window.location.href='allowances-details.html?id=${r.id}'">${ICONS.eye}</button>
                  <button class="ibtn" onclick="openAddNoteModal('${r.id}')">${ICONS.note}</button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  if (searchQuery) {
    const inp = document.getElementById('global-search-input');
    if (inp) { inp.value = searchQuery; inp.focus(); inp.setSelectionRange(searchQuery.length, searchQuery.length); }
  }
}
function updateSearch(val) { searchQuery = val; render(); }
function toggleAll() { showAllStages = !showAllStages; render(); }
</script>
</body>
</html>
