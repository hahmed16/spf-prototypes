<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقديم طلب بدلات — المفوض عن جهة العمل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/components.js"></script>
<script>
initLayout({ role: 'employer-delegate', activePage: 'allowances-list' });
setBreadcrumb([{ label: 'بدلات الانقطاع', page: 'allowances-list' }, { label: 'تقديم طلب لموظف' }]);

const u = WI_DATA.users.employer_delegate;
const employees = [
  { name: 'سالم بن ناصر الحارثي', civil: '9012345678', insurance: 'IN-20190045678', title: 'مهندس مدني' },
  { name: 'حمد بن سلطان العزري', civil: '9023456789', insurance: 'IN-20170056789', title: 'فني تشغيل' },
  { name: 'راشد بن محمد الجابري', civil: '9067890123', insurance: 'IN-20180090123', title: 'مدير فرع' },
];
let selectedEmployee = null;

document.addEventListener('DOMContentLoaded', () => {
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>تقديم طلب بدلات الانقطاع عن العمل لموظف</h1></div>
      <div class="pg-acts"><button class="btn btn-secondary" onclick="window.location.href='allowances-list.html'">${ICONS.arrow_left} رجوع</button></div>
    </div>

    <!-- بيانات جهة العمل / المفوض -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico tl">${ICONS.building}</div>بيانات جهة العمل والمفوض</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">اسم جهة العمل</label><div class="fro">${u.company}</div></div>
          <div class="fgrp"><label class="flbl">رقم السجل التجاري</label><div class="fro" style="font-family:monospace">${u.cr}</div></div>
          <div class="fgrp"><label class="flbl">اسم المفوض</label><div class="fro">${u.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني للمفوض</label><div class="fro" style="font-family:monospace">${u.civil}</div></div>
        </div>
      </div>
    </div>

    <!-- اختيار الموظف -->
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>اختيار الموظف المتضرر</h3></div>
      <div class="pb">
        <div class="fg fg-2" style="margin-bottom:14px">
          <div class="fgrp">
            <label class="flbl">بحث بالاسم أو الرقم المدني <span class="req">*</span></label>
            <div class="inp-btn">
              <input type="text" class="fc" id="emp-search" placeholder="ابحث عن الموظف...">
              <button class="btn btn-primary btn-sm" onclick="searchEmployee()">بحث</button>
            </div>
          </div>
        </div>
        <div id="emp-results">
          <div class="tbl-wrap">
            <table class="dtbl">
              <thead><tr><th>الاسم</th><th>الرقم المدني</th><th>الرقم التأميني</th><th>المسمى الوظيفي</th><th></th></tr></thead>
              <tbody>
                ${employees.map(e=>`
                <tr>
                  <td>${e.name}</td>
                  <td style="font-family:monospace">${e.civil}</td>
                  <td style="font-family:monospace">${e.insurance}</td>
                  <td>${e.title}</td>
                  <td><button class="btn btn-primary btn-xs" onclick="selectEmployee('${e.civil}')">اختيار</button></td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- بيانات الموظف المختار -->
    <div id="selected-emp-card" style="display:none">
      <div class="card card-ro">
        <div class="ph"><h3><div class="pico gr">${ICONS.check}</div>الموظف المختار</h3></div>
        <div class="pb" id="selected-emp-body"></div>
      </div>

      <!-- معلومات الطلب -->
      <div class="card">
        <div class="ph"><h3><div class="pico or">${ICONS.medical}</div>معلومات الطلب</h3></div>
        <div class="pb">
          <div class="fg fg-3">
            <div class="fgrp">
              <label class="flbl">نوع الطلب <span class="req">*</span></label>
              <select class="fc" id="req-type" onchange="onTypeChange()">
                <option value="">— اختر نوع الطلب —</option>
                <option value="إصابة عمل">إصابة عمل</option>
                <option value="مرض مهني">مرض مهني</option>
              </select>
            </div>
            <div class="fgrp" id="subtype-group" style="display:none">
              <label class="flbl">نوع الحالة <span class="req">*</span></label>
              <select class="fc" id="req-subtype"></select>
            </div>
            <div class="fgrp">
              <label class="flbl">تاريخ الواقعة أو الاشتباه بالمرض <span class="req">*</span></label>
              <input type="date" class="fc" id="incident-date">
            </div>
            <div class="fgrp">
              <label class="flbl">هل الطلب انتكاسة أو مضاعفة؟ <span class="req">*</span></label>
              <select class="fc" id="relapse" onchange="onRelapseChange()">
                <option value="لا">لا</option>
                <option value="انتكاسة">انتكاسة</option>
                <option value="مضاعفة">مضاعفة</option>
              </select>
            </div>
            <div class="fgrp" id="orig-req-group" style="display:none">
              <label class="flbl">رقم الطلب الأصلي <span class="req">*</span></label>
              <input type="text" class="fc" id="orig-req" placeholder="WI-YYYY-XXXXXX">
            </div>
            <div class="fgrp span-full">
              <label class="flbl">ملاحظات أولية من جهة العمل</label>
              <textarea class="fc" id="initial-notes" rows="3" placeholder="أي معلومات إضافية تودّ إضافتها بخصوص الحالة..."></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- بيانات الإصابة أو المرض -->
      <div class="card" id="injury-card" style="display:none">
        <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>بيانات الإصابة / المرض</h3></div>
        <div class="pb" id="injury-fields"></div>
      </div>

      <!-- المرفقات -->
      <div class="card">
        <div class="ph"><h3><div class="pico or">${ICONS.upload}</div>المرفقات</h3></div>
        <div class="pb">
          ${renderModernUploadComponent({ idPrefix: 'allowance-att' })}
          <div class="fhint mt8">الأنواع المقبولة: PDF, Word, صور, تسجيل صوتي, فيديو — الحجم الأقصى 20MB</div>
        </div>
      </div>

      <!-- الإرشادات -->
      <div class="card card-ro">
        <div class="ph"><h3><div class="pico gy">${ICONS.info}</div>الإرشادات والمستندات المطلوبة</h3></div>
        <div class="pb" id="instructions">
          <div class="alert alert-i">${ICONS.info}<span>اختر نوع الطلب لعرض المستندات المطلوبة.</span></div>
        </div>
      </div>

      <div style="display:flex;gap:10px;padding:16px 0">
        <button class="btn btn-primary btn-lg" onclick="submitRequest()">${ICONS.check} إرسال الطلب</button>
        <button class="btn btn-secondary btn-lg" onclick="saveDraft()">حفظ كمسودة</button>
        <button class="btn btn-ghost" onclick="window.location.href='allowances-list.html'">إلغاء</button>
      </div>
    </div>`;
});

function searchEmployee() {
  showToast('تم البحث — عرض جميع موظفي الجهة', 'i');
}

function selectEmployee(civil) {
  const e = employees.find(emp => emp.civil === civil);
  selectedEmployee = e;
  document.getElementById('selected-emp-card').style.display = '';
  document.getElementById('selected-emp-body').innerHTML = `
    <div class="fg fg-3">
      <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${e.name}</div></div>
      <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${e.civil}</div></div>
      <div class="fgrp"><label class="flbl">الرقم التأميني</label><div class="fro" style="font-family:monospace">${e.insurance}</div></div>
      <div class="fgrp"><label class="flbl">المسمى الوظيفي</label><div class="fro">${e.title}</div></div>
      <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge b-approved">نشط</span></div></div>
    </div>`;
  
  // No need to init attachments manually anymore
  
  document.getElementById('selected-emp-card').scrollIntoView({ behavior: 'smooth' });
}

function onTypeChange() {
  const requestType = document.getElementById('req-type').value;
  const subtypeGroup = document.getElementById('subtype-group');
  const subtypeEl = document.getElementById('req-subtype');
  const injuryCard = document.getElementById('injury-card');
  const injuryFields = document.getElementById('injury-fields');
  const instr = document.getElementById('instructions');

  if (!requestType) {
    subtypeGroup.style.display = 'none';
    injuryCard.style.display = 'none';
    return;
  }

  subtypeGroup.style.display = '';
  injuryCard.style.display = '';

  if (requestType === 'إصابة عمل') {
    subtypeEl.innerHTML = `<option>حادث طريق</option><option>إصابة في موقع العمل</option><option>إجهاد وإرهاق</option>`;
    injuryFields.innerHTML = `
      <div class="fg fg-2">
        <div class="fgrp span-full"><label class="flbl">وصف تفصيلي للواقعة من وجهة نظر جهة العمل <span class="req">*</span></label><textarea class="fc" rows="4" placeholder="يرجى وصف ما حدث وما تم اتخاذه من إجراءات..."></textarea></div>
        <div class="fgrp"><label class="flbl">مكان الواقعة <span class="req">*</span></label><input type="text" class="fc" placeholder="الموقع الدقيق للحادثة"></div>
        <div class="fgrp"><label class="flbl">الجزء المصاب من الجسم <span class="req">*</span></label>
          <select class="fc"><option>الرأس</option><option>الطرف العلوي الأيسر</option><option>الطرف العلوي الأيمن</option><option>الطرف السفلي الأيسر</option><option>الطرف السفلي الأيمن</option><option>الجذع / الضلوع</option><option>متعدد</option><option>أخرى</option></select>
        </div>
        <div class="fgrp"><label class="flbl">هل كانت هناك شهود؟</label>
          <select class="fc" id="wit-sel" onchange="document.getElementById('wit-table-container').style.display=this.value==='نعم'?'':'none'; if(this.value==='نعم' && document.getElementById('wit-tbody').children.length===0) addWitnessRow();"><option value="لا">لا</option><option value="نعم">نعم</option></select>
        </div>
        <div class="fgrp span-full" id="wit-table-container" style="display:none">
          <label class="flbl">بيانات الشهود</label>
          <div class="tbl-wrap">
            <table class="dtbl">
              <thead>
                <tr>
                  <th>الاسم الكامل <span class="req">*</span></th>
                  <th>الصفة / المنصب</th>
                  <th>رقم الهاتف</th>
                  <th style="width:50px"></th>
                </tr>
              </thead>
              <tbody id="wit-tbody"></tbody>
            </table>
          </div>
          <button type="button" class="btn btn-secondary btn-xs mt8" onclick="addWitnessRow()">${ICONS.plus} إضافة شاهد</button>
        </div>
      </div>`;
    instr.innerHTML = `
      <strong style="font-size:13px;display:block;margin-bottom:10px">المستندات المطلوبة (جهة العمل):</strong>
      <ul style="font-size:12.5px;color:var(--text2);padding-right:18px;line-height:2">
        <li>تقرير السلامة والصحة المهنية (إن وُجد)</li>
        <li>كشف الحضور والانصراف للموظف</li>
        <li>صور من موقع الحادثة</li>
        <li>إفادات الشهود المكتوبة</li>
      </ul>`;
  } else {
    subtypeEl.innerHTML = `<option>ربو مهني</option><option>تسمم بالرصاص</option><option>التهاب الجلد التماسي</option><option>فقدان السمع المهني</option><option>داء الغبار الرئوي</option><option>مرض مهني آخر</option>`;
    injuryFields.innerHTML = `
      <div class="fg fg-2">
        <div class="fgrp span-full"><label class="flbl">المواد أو العوامل المسببة للمرض في بيئة العمل</label><textarea class="fc" rows="3" placeholder="المواد الكيميائية، الغبار، الضوضاء، إلخ..."></textarea></div>
        <div class="fgrp"><label class="flbl">مدة تعرض الموظف لهذه العوامل</label><input type="text" class="fc" placeholder="مثال: سنتان"></div>
        <div class="fgrp"><label class="flbl">تاريخ علم جهة العمل بالحالة</label><input type="date" class="fc"></div>
        <div class="fgrp span-full"><label class="flbl">إجراءات السلامة المتخذة للموظف</label><textarea class="fc" rows="3" placeholder="هل تم توفير أدوات الوقاية؟ هل تم تغيير موقع العمل؟..."></textarea></div>
      </div>`;
    instr.innerHTML = `
      <strong style="font-size:13px;display:block;margin-bottom:10px">المستندات المطلوبة (مرض مهني):</strong>
      <ul style="font-size:12.5px;color:var(--text2);padding-right:18px;line-height:2">
        <li>كشف الفحوصات الطبية الدورية للموظف</li>
        <li>نتائج قياسات بيئة العمل</li>
        <li>قائمة بالمواد المستخدمة في موقع العمل</li>
      </ul>`;
  }
}

function onRelapseChange() {
  const v = document.getElementById('relapse').value;
  document.getElementById('orig-req-group').style.display = v !== 'لا' ? '' : 'none';
}

function addWitnessRow() {
  const tbody = document.getElementById('wit-tbody');
  const row = document.createElement('tr');
  row.innerHTML = `
    <td><input type="text" class="fc" placeholder="الاسم الكامل"></td>
    <td><input type="text" class="fc" placeholder="زميل عمل، مشرف، إلخ..."></td>
    <td><input type="tel" class="fc" placeholder="9xxxxxxx"></td>
    <td style="text-align:center"><button type="button" class="ibtn d" onclick="this.closest('tr').remove()" title="حذف">${ICONS.trash}</button></td>
  `;
  tbody.appendChild(row);
}


function saveDraft() {
  showToast('تم حفظ الطلب كمسودة', 'i');
  setTimeout(() => window.location.href = 'allowances-list.html', 1200);
}

function submitRequest() {
  if (!selectedEmployee) { showToast('يرجى اختيار الموظف أولاً', 'w'); return; }
  const type = document.getElementById('req-type').value;
  if (!type) { showToast('يرجى اختيار نوع الطلب وتعبئة البيانات', 'w'); return; }

  showToast('جارٍ تقديم الطلب من قبل جهة العمل...', 'i');
  setTimeout(() => {
    showToast('تم تقديم الطلب بنجاح — رقم الطلب: WI-2025-001351', 's', 5000);
    setTimeout(() => window.location.href = 'allowances-list.html', 2000);
  }, 1500);
}
</script>
</body>
</html>
