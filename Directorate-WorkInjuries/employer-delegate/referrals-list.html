<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>طلبات العرض على المؤسسات الصحية المرخصة — جهة العمل</title><link rel="stylesheet" href="../shared/style.css"></head>
<body>
<script src="../shared/config.js"></script><script src="../shared/data-users.js"></script><script src="../shared/data-allowances.js"></script><script src="../shared/data-disability.js"></script><script src="../shared/data-chronic.js"></script><script src="../shared/data-appeals.js"></script><script src="../shared/data-licensing.js"></script><script src="../shared/data-sessions.js"></script><script src="../shared/data-disability-retirement.js"></script><script src="../shared/data-referrals.js"></script><script src="../shared/data.js"></script><script src="../shared/layout.js"></script><script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'employer-delegate', activePage: 'referrals-list' });
setBreadcrumb([{ label: 'طلبات العرض على المؤسسات الصحية المرخصة' }]);
const u = WI_DATA.users.employer_delegate;
document.addEventListener('DOMContentLoaded', render);
function render() {
  const rows = WI_DATA.referrals.filter(r => r.applicant.civil === u.civil || r.employer.cr === u.cr);
  getContent().innerHTML = `<div class="pg-head"><div><h1>طلبات العرض على المؤسسات الصحية المرخصة</h1><p>${rows.length} طلب</p></div><div class="pg-acts"><button class="btn btn-primary" onclick="window.location.href='referrals-new.html'">${ICONS.plus} طلب جديد</button></div></div>
  <div class="card"><div class="pb-0"><div class="tbl-wrap"><table class="dtbl"><thead><tr><th>رقم الطلب</th><th>العامل</th><th>نوع الحالة</th><th>الحالة</th><th>الأيام المتبقية</th><th></th></tr></thead><tbody>
  ${rows.map(r => `<tr><td style="font-family:monospace;color:var(--primary);font-weight:700">${r.id}</td><td>${r.insured.name}</td><td>${r.referral.requestCategory || '—'}</td><td>${statusBadge(normalizeReferralStatus(r.status))}</td><td>${renderRemainingDaysBadge(r)}</td><td><button class="ibtn" onclick="window.location.href='referrals-details.html?id=${r.id}'">${ICONS.eye}</button></td></tr>`).join('') || '<tr><td colspan=\"6\" style=\"text-align:center;padding:32px;color:var(--text3)\">لا توجد طلبات</td></tr>'}
  </tbody></table></div></div></div>`;
}
function normalizeReferralStatus(status) {
  return String(status || '');
}
</script>
</body>
</html>
