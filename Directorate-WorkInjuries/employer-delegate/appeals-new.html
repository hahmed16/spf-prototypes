<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقديم تظلم — المفوض عن جهة العمل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/components.js"></script>
<script>
initLayout({ role: 'employer-delegate', activePage: 'appeals-list' });
setBreadcrumb([{label:'التظلمات',page:'appeals-list'},{label:'تقديم تظلم جديد'}]);
const params = new URLSearchParams(window.location.search);
const refId = params.get('ref');
const u = WI_DATA.users.employer_delegate;

document.addEventListener('DOMContentLoaded', () => {
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>تقديم طلب تظلم من قرار مؤسسة صحية مرخصة</h1></div>
      <div class="pg-acts"><button class="btn btn-secondary" onclick="window.location.href='appeals-list.html'">${ICONS.arrow_left} رجوع</button></div>
    </div>
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم التظلم</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">صفة مقدم التظلم</label><div class="fro">الشخص المفوض من جهة العمل</div></div>
          <div class="fgrp"><label class="flbl">اسم المفوض</label><div class="fro">${u.name}</div></div>
          <div class="fgrp"><label class="flbl">جهة العمل</label><div class="fro">${u.company}</div></div>
        </div>
        <div class="alert alert-i mt12">
          ${ICONS.info}<span>يُقدَّم هذا التظلم نيابةً عن أحد موظفي الجهة — يرجى تحديد الطلب والموظف المعني.</span>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="ph"><h3><div class="pico rd">${ICONS.search}</div>اختيار القرار المتظلم منه</h3></div>
      <div class="pb">
        <div class="inp-btn" style="margin-bottom:14px">
          <input type="text" class="fc" id="search-id" placeholder="أدخل رقم الطلب الأصلي" value="${refId||'WI-2024-000987'}">
          <button class="btn btn-primary btn-sm" onclick="showToast('تم العثور على الطلب','s');document.getElementById('appeal-form').style.display=''">بحث</button>
        </div>
        <div id="appeal-form" style="${refId?'':'display:none'}">
          <div class="alert alert-s" style="margin-bottom:14px">${ICONS.check}<span>الطلب WI-2024-000987 — مرفوض — ليلى بنت سيف الحوسنية</span></div>
          <div class="fg" style="gap:14px">
            <div class="fgrp">
              <label class="flbl">سبب التظلم <span class="req">*</span></label>
              <select class="fc"><option>القرار مخالف للأنظمة واللوائح</option><option>بيانات ناقصة</option><option>قرار غير مبرر</option><option>سبب آخر</option></select>
            </div>
            <div class="fgrp">
              <label class="flbl">تفاصيل سبب التظلم <span class="req">*</span></label>
              <textarea class="fc" rows="5" placeholder="اشرح سبب التظلم بالتفصيل..."></textarea>
            </div>
            <div class="fgrp">
              <label class="flbl">تاريخ العلم بالقرار</label>
              <div class="fro" id="knowledge-date-display">2024-11-20</div>
            </div>
            <div class="fgrp">
              <label class="flbl">المرفقات</label>
              ${renderModernUploadComponent({ idPrefix: 'appeal-att' })}
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:16px">
            <button class="btn btn-primary" onclick="showToast('تم تقديم التظلم بنجاح','s');setTimeout(()=>window.location.href='appeals-list.html',1500)">${ICONS.check} تقديم التظلم</button>
            <button class="btn btn-ghost" onclick="window.location.href='appeals-list.html'">إلغاء</button>
          </div>
        </div>
      </div>
    </div>`;
});
</script>
</body>
</html>
