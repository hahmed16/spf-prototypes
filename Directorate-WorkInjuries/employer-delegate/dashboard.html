<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة البيانات — المفوض عن جهة العمل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'employer-delegate', activePage: 'dashboard' });
setBreadcrumb([{ label: 'لوحة البيانات' }]);

document.addEventListener('DOMContentLoaded', () => {
  const u = WI_DATA.users.employer_delegate;
  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>مرحباً، ${u.name}</h1>
        <p>${u.company} — لوحة البيانات</p>
      </div>
    </div>
    <div class="stats-grid">
      <div class="scard p" onclick="window.location.href='allowances-list.html'">
        <div class="sc-lbl">إجمالي طلبات البدلات</div>
        <div class="sc-val">4</div>
        <div class="sc-sub">لجميع موظفي الجهة</div>
      </div>
      <div class="scard w" onclick="window.location.href='allowances-list.html'">
        <div class="sc-lbl">طلبات قيد المعالجة</div>
        <div class="sc-val">2</div>
        <div class="sc-sub">بانتظار قرار الصندوق</div>
      </div>
      <div class="scard s" onclick="window.location.href='allowances-list.html'">
        <div class="sc-lbl">طلبات معتمدة</div>
        <div class="sc-val">1</div>
        <div class="sc-sub">تم الصرف</div>
      </div>
      <div class="scard pu" onclick="window.location.href='appeals-list.html'">
        <div class="sc-lbl">التظلمات المقدمة</div>
        <div class="sc-val">1</div>
        <div class="sc-sub">قيد المراجعة</div>
      </div>
    </div>
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.list}</div>آخر الطلبات المقدمة للجهة</h3>
        <a href="allowances-list.html" style="font-size:12px;color:var(--primary)">عرض الكل</a>
      </div>
      <div class="pb-0">
        <table class="dtbl">
          <thead><tr><th>رقم الطلب</th><th>اسم الموظف</th><th>النوع</th><th>الحالة</th><th>التاريخ</th><th></th></tr></thead>
          <tbody>
            ${WI_DATA.allowances.slice(0,4).map(r=>`
            <tr>
              <td style="font-family:monospace;font-size:11.5px;color:var(--primary)">${r.id}</td>
              <td>${r.insured.name}</td>
              <td>${r.type}</td>
              <td>${statusBadge(r.status)}</td>
              <td style="font-size:11.5px">${r.submitDate}</td>
              <td><button class="ibtn" onclick="window.location.href='allowances-details.html?id=${r.id}'">${ICONS.eye}</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
});
</script>
</body>
</html>
