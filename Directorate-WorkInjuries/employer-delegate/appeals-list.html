<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة التظلمات — المفوض عن جهة العمل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/components.js"></script>
<script>
initLayout({ role: 'employer-delegate', activePage: 'appeals-list' });
setBreadcrumb([{ label: 'التظلمات' }, { label: 'قائمة التظلمات' }]);
document.addEventListener('DOMContentLoaded', () => {
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة التظلمات</h1><p>تظلمات جميع موظفي ${WI_DATA.users.employer_delegate.company}</p></div>
      <div class="pg-acts"><button class="btn btn-primary" onclick="window.location.href='appeals-new.html'">${ICONS.plus} تقديم تظلم جديد</button></div>
    </div>
    <div class="card">
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم التظلم</th><th>الطلب الأصلي</th><th>اسم الموظف</th><th>سبب التظلم</th><th>الحالة</th><th>تاريخ التقديم</th><th></th></tr></thead>
            <tbody>
              ${WI_DATA.appeals.map(a=>`
              <tr>
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${a.id}</td>
                <td style="font-family:monospace">${a.originalRequestId}</td>
                <td>${a.applicant.name}</td>
                <td>${a.appealReason}</td>
                <td>${statusBadge(a.status)}</td>
                <td>${a.submitDate}</td>
                <td><button class="ibtn" onclick="window.location.href='appeals-details.html?id=${a.id}'">${ICONS.eye}</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
});
</script>
</body>
</html>
