<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة طلبات البدلات — المفوض عن جهة العمل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/components.js"></script>
<script>
initLayout({ role: 'employer-delegate', activePage: 'allowances-list' });
setBreadcrumb([{ label: 'بدلات الانقطاع عن العمل' }, { label: 'قائمة الطلبات' }]);

const reqs = WI_DATA.allowances;
let activeTab = 'all';

document.addEventListener('DOMContentLoaded', render);

function render() {
  const filtered = activeTab === 'all' ? reqs : reqs.filter(r => {
    if (activeTab === 'pending') return !['معتمد','تم رفض الطلب','تم إغلاق الطلب'].includes(r.status);
    if (activeTab === 'approved') return r.status === 'معتمد';
    if (activeTab === 'rejected') return r.status === 'تم رفض الطلب';
    return true;
  });

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة طلبات بدلات الانقطاع عن العمل</h1>
        <p>جميع طلبات موظفي ${WI_DATA.users.employer_delegate.company}</p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-primary" onclick="window.location.href='allowances-new.html'">${ICONS.plus} تقديم طلب لموظف</button>
      </div>
    </div>
    <div class="card">
      <div class="ttabs">
        ${[
          {key:'all',label:'الكل',count:reqs.length},
          {key:'pending',label:'قيد المعالجة',count:reqs.filter(r=>!['معتمد','تم رفض الطلب','تم إغلاق الطلب'].includes(r.status)).length},
          {key:'approved',label:'معتمدة',count:reqs.filter(r=>r.status==='معتمد').length},
          {key:'rejected',label:'مرفوضة',count:reqs.filter(r=>r.status==='تم رفض الطلب').length},
        ].map(t=>`<div class="ttab ${activeTab===t.key?'act':''}" onclick="setTab('${t.key}')">${t.label} <span class="tc">${t.count}</span></div>`).join('')}
      </div>
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم الطلب</th><th>اسم الموظف</th><th>الرقم المدني</th><th>النوع</th><th>الحالة</th><th>تاريخ التقديم</th><th>آخر تحديث</th><th></th></tr></thead>
            <tbody>
              ${filtered.map(r=>`
              <tr>
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                <td>${r.insured.name}</td>
                <td style="font-family:monospace;font-size:11.5px">${r.insured.civil}</td>
                <td>${r.type}</td>
                <td>${statusBadge(r.status)}</td>
                <td style="font-size:12px">${r.submitDate}</td>
                <td style="font-size:12px;color:var(--text3)">${r.lastUpdate}</td>
                <td>
                  <button class="ibtn" onclick="window.location.href='allowances-details.html?id=${r.id}'">${ICONS.eye}</button>
                  ${r.status==='تم رفض الطلب'?`<button class="btn btn-warning btn-xs" onclick="window.location.href='appeals-new.html?ref=${r.id}'">تظلم</button>`:''}
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}
function setTab(t){ activeTab=t; render(); }
</script>
</body>
</html>
