<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعلامات التقاعد — رئيس قسم الإعاقة والأمراض المستديمة</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'disability-head', activePage: 'disability-retirement-list' });
setBreadcrumb([{ label: 'منفعة الإعاقة والأمراض المستديمة' }, { label: 'استعلامات التقاعد' }]);

let searchQuery = '';
let showAllStages = false;

document.addEventListener('DOMContentLoaded', render);

function render() {
  const reqs = WI_DATA.disabilityRetirement || [];
  const filtered = getFilteredData({ role: 'disability-head', data: reqs, query: searchQuery, showAll: showAllStages });
  const pending = filtered.filter(r => r.status.includes('بانتظار اعتماد رئيس القسم'));

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>استعلامات التقاعد</h1><p>${pending.length} استعلام بانتظار قرارك</p></div>
    </div>
    ${renderUnifiedFilterBar({ onSearch: 'updateSearch', onToggleAll: 'toggleAll', isAllVisible: showAllStages })}
    <div class="card">
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم الاستعلام</th><th>المستفيد</th><th>الرقم المدني</th><th>توصية الموظف</th><th>الحالة</th><th>الأيام المتبقية</th><th></th></tr></thead>
            <tbody>
              ${filtered.map(r => {
                const meta = deriveRequestSummaryMeta(r);
                return `
                <tr>
                  <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                  <td>${r.applicant.name}</td>
                  <td style="font-family:monospace">${r.applicant.civil}</td>
                  <td>${r.employeeRecommendation?.type || '—'}</td>
                  <td>${statusBadge(r.status)}</td>
                  <td><span class="sla-days ${getRemainingDaysClass(meta.remainingDays)}">${getRemainingDaysLabel(meta.remainingDays)}</span></td>
                  <td><button class="ibtn" onclick="window.location.href='disability-retirement-details.html?id=${r.id}'">${ICONS.eye}</button></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function updateSearch(val) { searchQuery = val; render(); }
function toggleAll() { showAllStages = !showAllStages; render(); }
</script>
</body>
</html>
