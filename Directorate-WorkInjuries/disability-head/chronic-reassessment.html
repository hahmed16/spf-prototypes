<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة التقييم الدوري — رئيس قسم الإعاقة</title>
<link rel="stylesheet" href="../shared/style.css"></head>
<body>
<script src="../shared/config.js"></script><script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script><script src="../shared/components.js"></script>
<script>
initLayout({ role: 'disability-head', activePage: 'chronic-reassessment' });
setBreadcrumb([{ label: 'منفعة الأمراض المستديمة' }, { label: 'إعادة التقييم الدوري' }]);
const sampleReassessments = [
  { id:'CHR-2024-000089', name:'خليل بن عبدالله الغافري', diagnosis:'داء السكري من النوع الأول', lastDate:'2024-07-01', nextDate:'2025-01-01', status:'مستحق الآن', compliance:'متأخر' },
  { id:'CHR-2024-000045', name:'سارة بنت حمود العلوية', diagnosis:'الفشل الكلوي المزمن', lastDate:'2024-09-15', nextDate:'2025-03-15', status:'قادم خلال 30 يوم', compliance:'في الموعد' },
];
document.addEventListener('DOMContentLoaded', () => {
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>إعادة التقييم والمتابعة الدورية</h1>
        <p>الحالات المستحقة لإعادة التقييم الدوري</p></div>
    </div>
    <div class="alert alert-w">${ICONS.warn}<span><strong>${sampleReassessments.filter(r=>r.compliance==='متأخر').length}</strong> حالة متأخرة عن موعد إعادة التقييم — يرجى المتابعة العاجلة.</span></div>
    <div class="card">
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم الطلب</th><th>المستفيد</th><th>التشخيص</th><th>آخر تقييم</th><th>التقييم القادم</th><th>حالة الالتزام</th><th></th></tr></thead>
            <tbody>
              ${sampleReassessments.map(r=>`
              <tr style="${r.compliance==='متأخر'?'background:var(--danger-l)':''}">
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                <td>${r.name}</td>
                <td>${r.diagnosis}</td>
                <td>${r.lastDate}</td>
                <td>${r.nextDate}</td>
                <td>
                  <span class="badge ${r.compliance==='متأخر'?'b-rejected':'b-phead'}">${r.status}</span>
                </td>
                <td>
                  <button class="btn btn-primary btn-xs" onclick="showToast('فتح تفاصيل الحالة','i')">مراجعة</button>
                  <button class="btn btn-secondary btn-xs" onclick="showToast('تم إرسال تذكير للمواطن','s')">تذكير</button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
});
</script></body></html>
