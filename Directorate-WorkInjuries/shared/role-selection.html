<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختيار الدور — نظام إدارة إصابات العمل</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      height: auto;
      overflow-x: hidden;
      overflow-y: auto;
      background:
        linear-gradient(180deg, rgba(10, 92, 54, .08) 0, rgba(244, 246, 249, 0) 310px),
        var(--bg);
    }

    .rp-page {
      min-height: 100vh;
      color: var(--text);
    }

    .rp-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 68px;
      padding: 12px 28px;
      background: rgba(255, 255, 255, .94);
      border-bottom: 1px solid rgba(221, 230, 225, .9);
      box-shadow: 0 10px 28px rgba(10, 92, 54, .08);
      backdrop-filter: blur(14px);
    }

    .rp-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .rp-logo {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #fff;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-h) 100%);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(10, 92, 54, .18);
    }

    .rp-logo svg {
      width: 24px;
      height: 24px
    }

    .rp-org {
      font-size: 15px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1.25
    }

    .rp-system {
      font-size: 11px;
      color: var(--text3);
      line-height: 1.4
    }

    .rp-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      transition: var(--tr);
      white-space: nowrap;
      cursor: pointer;
    }

    .rp-back:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: var(--primary-l);
    }

    .rp-back svg {
      width: 16px;
      height: 16px
    }

    #role-pg {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 28px 42px;
      background: transparent;
      overflow: visible;
    }

    .rp-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: center;
      margin-bottom: 32px;
      padding: 32px 36px;
      overflow: hidden;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .12) 0 1px, transparent 1px 20px),
        linear-gradient(135deg, #063e27 0%, #0a5c36 58%, #11724a 100%);
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 12px;
      box-shadow: 0 22px 50px rgba(10, 92, 54, .22);
      position: relative;
    }

    .rp-kicker {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
      color: #f4df9d;
      font-size: 12px;
      font-weight: 800;
    }

    .rp-kicker::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    .rp-hd-txt {
      margin: 0;
      text-align: right
    }

    .rp-hd-txt h1 {
      margin: 0 0 8px;
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.25
    }

    .rp-hd-txt p {
      max-width: 620px;
      color: rgba(255, 255, 255, .82);
      font-size: 14px;
      line-height: 1.8
    }

    .rp-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: flex-end;
    }

    .rp-stat {
      min-width: 105px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 10px;
      background: rgba(255, 255, 255, .1);
      text-align: center;
    }

    .rp-stat strong {
      display: block;
      font-size: 26px;
      line-height: 1;
      color: #fff
    }

    .rp-stat span {
      display: block;
      margin-top: 5px;
      color: rgba(255, 255, 255, .76);
      font-size: 12px;
      white-space: nowrap
    }

    .rcat {
      margin-bottom: 32px;
    }

    .rcat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .rcat-t {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      color: var(--text);
      font-size: 17px;
      font-weight: 900;
      line-height: 1.35;
    }

    .rcat-t::before {
      content: '';
      width: 4px;
      height: 20px;
      border-radius: 8px;
      background: var(--primary);
    }

    .rcat-count {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text3);
      background: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .rcards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .rcard {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 170px;
      padding: 20px;
      overflow: hidden;
      color: inherit;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(10, 92, 54, .04);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      cursor: pointer;
    }

    .rcard::after {
      content: '';
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: var(--primary);
      opacity: 0.8;
    }

    .rcard.external::after {
      background: var(--accent)
    }

    .rcard.internal::after {
      background: var(--primary)
    }

    .rcard:hover {
      transform: translateY(-5px);
      border-color: var(--primary-m);
      box-shadow: 0 20px 45px rgba(10, 92, 54, .12);
    }

    .rcard-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .rc-ico {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: var(--primary);
      background: var(--primary-l);
      border-radius: 10px;
    }

    .rcard.external .rc-ico {
      color: var(--accent);
      background: var(--accent-l)
    }

    .rc-ico svg {
      width: 24px;
      height: 24px
    }

    .rc-type-tag {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
    }

    .rc-type-tag.ext {
      color: #8b681e;
      background: var(--accent-l)
    }

    .rc-type-tag.int {
      color: var(--primary);
      background: var(--primary-l)
    }

    .rc-name {
      margin-bottom: 8px;
      color: var(--text);
      font-size: 16px;
      font-weight: 900;
      line-height: 1.4;
    }

    .rc-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
      padding-top: 18px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
    }

    .rcard.external .rc-foot {
      color: #8b681e
    }

    .rc-arrow {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--g100);
      color: inherit;
      transition: transform .22s ease, background .22s ease, color .22s ease;
    }

    .rcard:hover .rc-arrow {
      transform: translateX(-4px);
      background: currentColor;
      color: #fff;
    }

    .rc-arrow svg {
      width: 16px;
      height: 16px
    }

    @media (max-width: 1024px) {
      .rcards {
        grid-template-columns: repeat(2, minmax(0, 1fr))
      }
    }

    @media (max-width: 768px) {
      .rp-hero {
        grid-template-columns: 1fr;
        padding: 24px
      }

      .rp-summary {
        justify-content: flex-start
      }

      .rcards {
        grid-template-columns: 1fr
      }

      .rp-header {
        padding: 12px 18px
      }
    }
  </style>
</head>

<body>
  <div class="rp-page">
    <header class="rp-header">
      <div class="rp-brand">
        <div class="rp-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
        </div>
        <div>
          <div class="rp-org">صندوق الحماية الاجتماعية</div>
          <div class="rp-system">نظام مديرية اضابات العمل والأمراض المهنية والشؤون الطبية</div>
        </div>
      </div>
      <button class="rp-back" onclick="window.location.href='../index.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16,17 21,12 16,7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>تسجيل الخروج</span>
      </button>
    </header>

    <main id="role-pg">
      <section class="rp-hero">
        <div class="rp-hd-txt">
          <h1>اختيار الدور الوظيفي</h1>
          <p>مرحباً بك في نظام مديرية اضابات العمل والأمراض المهنية والشؤون الطبية. يرجى اختيار الدور المناسب للمتابعة
            أو تنفيذ العمليات المطلوبة حسب
            صلاحياتك.</p>
        </div>
        <div class="rp-summary">
          <div class="rp-stat"><strong id="total-roles">0</strong><span>دور وظيفي</span></div>
        </div>
      </section>

      <div id="roles-container"></div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="data.js"></script>
  <script>
    const roleIcons = {
      // Applicants
      'worker': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>',
      'employer-delegate': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9h.01"/><path d="M9 13h.01"/><path d="M9 17h.01"/></svg>',
      'hospital-delegate': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.66 0 3-1.34 3-3V7c0-1.66-1.34-3-3-3H5C3.34 4 2 5.34 2 7v4c0 1.66 1.34 3 3 3"/><path d="M14 14v7H5v-7"/><path d="M22 14v7h-5v-7"/><path d="M12 7v4"/><path d="M8 9h8"/></svg>',

      // Investigators
      'injury-investigator': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M11 8v6"/><path d="M8 11h6"/></svg>',
      'injury-head': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      'od-investigator': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.5-1 1-4c1.5 0 3 .5 4 4z"/><path d="m15 15-4 1c0 1.5.5 3 4 4s4-1 4-1l-1-4z"/></svg>',
      'od-head': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>',

      // Units
      'sickleave-employee': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="m9 16 2 2 4-4"/></svg>',
      'sickleave-head': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>',
      'disability-employee': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>',
      'disability-head': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>',
      'committees-employee': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      'committees-head': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>',
      'licensing-employee': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 18v-6"/><path d="m9 15 3 3 3-3"/></svg>',
      'licensing-head': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>',

      // Committees
      'licensed-institution': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M3 7v1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7H3l.5-4h17l.5 4Z"/><path d="M4 21V11"/><path d="M7 21v-4"/><path d="M12 21v-6"/><path d="M17 21v-2"/><path d="M20 21V11"/></svg>',
      'supervisory-committee': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>',
      'appeals-committee': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m14.5 12.5-5 5"/><path d="m6.5 4.5 5 5"/><circle cx="16" cy="7" r="5"/><circle cx="8" cy="15" r="5"/></svg>',

      // Rapporteurs
      'institution-rapporteur': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>',
      'appeals-rapporteur': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
      'supervisory-rapporteur': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>',
    };

    const categories = [
      { title: 'مقدمو الطلبات', roles: ['worker', 'employer-delegate', 'hospital-delegate'] },
      {
        title: 'أقسام صندوق الحماية الاجتماعية', roles: [
          'injury-investigator', 'injury-head', 'od-investigator', 'od-head',
          'sickleave-employee', 'sickleave-head', 'disability-employee', 'disability-head',
          'committees-employee', 'committees-head', 'licensing-employee', 'licensing-head'
        ]
      },
      { title: 'اللجان الطبية والمؤسسات', roles: ['licensed-institution', 'supervisory-committee', 'appeals-committee'] },
      { title: 'المقررون', roles: ['institution-rapporteur', 'appeals-rapporteur', 'supervisory-rapporteur'] }
    ];

    function renderRoleCards() {
      const container = document.getElementById('roles-container');
      let totalRolesCount = 0;

      container.innerHTML = categories.map(cat => {
        const rolesHtml = cat.roles.map(roleKey => {
          const r = WI_CONFIG.roles[roleKey];
          if (!r) return '';
          totalRolesCount++;

          const icon = roleIcons[roleKey] || '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>';
          const typeLabel = r.type === 'external' ? 'خارجي' : 'داخلي';
          const typeClass = r.type === 'external' ? 'ext' : 'int';

          return `
        <a class="rcard ${r.type}" onclick="enterRole('${roleKey}')">
          <div class="rcard-top">
            <div class="rc-ico" aria-hidden="true">${icon}</div>
            <span class="rc-type-tag ${typeClass}">${typeLabel}</span>
          </div>
          <div class="rc-name">${r.nameAr}</div>
          <div class="rc-foot">
            <span>تصفح النظام</span>
            <span class="rc-arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
            </span>
          </div>
        </a>`;
        }).join('');

        return `
      <section class="rcat">
        <div class="rcat-head">
          <h2 class="rcat-t">${cat.title}</h2>
          <span class="rcat-count">${cat.roles.length} أدوار</span>
        </div>
        <div class="rcards">${rolesHtml}</div>
      </section>`;
      }).join('');

      document.getElementById('total-roles').textContent = totalRolesCount;
    }

    function enterRole(roleKey) {
      const r = WI_CONFIG.roles[roleKey];
      if (!r) return;
      window.location.href = `../${r.folder}/dashboard.html`;
    }

    document.addEventListener('DOMContentLoaded', renderRoleCards);
  </script>
</body>

</html>
