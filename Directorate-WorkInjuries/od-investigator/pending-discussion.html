<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الطلبات المعلّقة للنقاش — موظف قسم التحقيق</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'od-investigator', activePage: 'pending-discussion' });
setBreadcrumb([{ label: 'الطلبات المعلّقة للنقاش' }]);

document.addEventListener('DOMContentLoaded', renderPage);

function renderPage() {
  const flagged = WI_DATA.allowances.filter(r => r.discussionFlagged);
  const nextMeeting = '2026-05-04';

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>الطلبات المعلّقة للنقاش</h1>
        <p>الطلبات التي تم تعليمها لمناقشتها في الاجتماع الأسبوعي</p>
      </div>
    </div>

    <div class="alert alert-i">
      ${ICONS.bell}
      <div>
        <strong>الاجتماع الأسبوعي القادم:</strong> ${formatDate(nextMeeting)} — يبقى الطلب في حالته الحالية حتى انعقاد الاجتماع ومناقشته.
      </div>
    </div>

    ${flagged.length === 0 ? `
    <div class="card">
      <div class="pb" style="text-align:center;padding:40px;color:var(--text3)">
        ${ICONS.bell}
        <div style="margin-top:12px;font-size:14px">لا توجد طلبات معلّقة للنقاش حالياً</div>
        <div style="font-size:12px;margin-top:6px">يمكنك تعليم أي طلب للنقاش من شاشة تفاصيله</div>
      </div>
    </div>` : `
    <div class="card">
      <div class="ph">
        <h3><div class="pico or">${ICONS.bell}</div>الطلبات المعلّقة</h3>
        <span style="font-size:12px;color:var(--text3)">${flagged.length} طلب</span>
      </div>
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead>
              <tr>
                <th>رقم الطلب</th>
                <th>المؤمن عليه</th>
                <th>النوع</th>
                <th>الحالة</th>
                <th>تاريخ التقديم</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${flagged.map(r => `
              <tr>
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">
                  <a href="allowances-details.html?id=${r.id}" style="color:inherit;text-decoration:none">${r.id}</a>
                </td>
                <td>${r.insured.name}</td>
                <td>${r.type}${r.subtype ? ` — ${r.subtype}` : ''}</td>
                <td>${statusBadge(r.status)}</td>
                <td>${formatDate(r.submitDate)}</td>
                <td>
                  <a href="allowances-details.html?id=${r.id}" class="btn btn-secondary btn-xs">عرض</a>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`}`;
}
</script>
</body>
</html>
