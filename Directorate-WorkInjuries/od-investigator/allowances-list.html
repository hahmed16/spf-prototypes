<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قائمة الطلبات — موظف قسم التحقيق في الأمراض المهنية</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>

<body>
  <script src="../shared/config.js"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="../shared/components.js"></script>
  <script>
    initLayout({ role: 'od-investigator', activePage: 'allowances-list' });
    setBreadcrumb([{ label: 'بدلات الانقطاع عن العمل' }, { label: 'قائمة الطلبات' }]);

    const me = WI_DATA.users.od_investigator.name;
    // موظف الأمراض المهنية يرى طلبات الأمراض المهنية + قيد التحقيق
    const reqs = WI_DATA.allowances.filter(r => r.type === 'مرض مهني' || r.assignedTo === me || r.checkedOutBy === me);
    let activeTab = 'all';

    document.addEventListener('DOMContentLoaded', render);

    function render() {
      const filtered = activeTab === 'all' ? reqs : reqs.filter(r => {
        if (activeTab === 'new') return r.status === 'تم تقديم الطلب — بانتظار تعيين المحقق المختص';
        if (activeTab === 'investigating') return r.status === 'قيد التحقيق — الأمراض المهنية';
        if (activeTab === 'mine') return r.checkedOutBy === me;
        return true;
      });

      getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة طلبات صرف بدلات الانقطاع</h1>
        <p>الأمراض المهنية — ${reqs.length} طلب</p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary btn-sm" onclick="window.location.href='../shared/medical-query.html'">${ICONS.medical} استعلام طبي</button>
        <button class="btn btn-primary" onclick="window.location.href='allowances-new.html'">${ICONS.plus} تقديم طلب (حالات خاصة)</button>
      </div>
    </div>

    <!-- فلاتر البحث -->
    <div class="filters">
      <div class="fgrid">
        <div class="fgrp"><label class="flbl">رقم الطلب</label><input type="text" class="fc" placeholder="WI-YYYY-XXXXXX"></div>
        <div class="fgrp"><label class="flbl">اسم المؤمن عليه</label><input type="text" class="fc" placeholder="الاسم..."></div>
        <div class="fgrp"><label class="flbl">الرقم المدني</label><input type="text" class="fc" placeholder="الرقم المدني"></div>
        <div class="fgrp"><label class="flbl">الحالة</label>
          <select class="fc">
            <option>جميع الحالات</option>
            <option>تم تقديم الطلب — بانتظار تعيين المحقق المختص</option>
            <option>قيد التحقيق — الأمراض المهنية</option>
            <option>بانتظار اعتماد رئيس قسم التحقيق في الأمراض المهنية</option>
          </select>
        </div>
        <div class="fgrp"><label class="flbl">تاريخ التقديم من</label><input type="date" class="fc"></div>
        <div class="fgrp"><label class="flbl">تاريخ التقديم إلى</label><input type="date" class="fc"></div>
      </div>
      <div class="facts">
        <button class="btn btn-primary btn-sm" onclick="showToast('تم تطبيق الفلاتر','i')">${ICONS.search} بحث</button>
        <button class="btn btn-secondary btn-sm" onclick="showToast('تم مسح الفلاتر','i')">مسح</button>
      </div>
    </div>

    <div class="card">
      <div class="ttabs">
        ${[
          { key: 'all', label: 'الكل', count: reqs.length },
          { key: 'new', label: 'جديدة — بانتظار الحجز', count: reqs.filter(r => r.status === 'تم تقديم الطلب — بانتظار تعيين المحقق المختص').length },
          { key: 'investigating', label: 'قيد التحقيق', count: reqs.filter(r => r.status === 'قيد التحقيق — الأمراض المهنية').length },
          { key: 'mine', label: 'محجوزة بواسطتي', count: reqs.filter(r => r.checkedOutBy === me).length },
        ].map(t => `<div class="ttab ${activeTab === t.key ? 'act' : ''}" onclick="setTab('${t.key}')">${t.label} <span class="tc">${t.count}</span></div>`).join('')}
      </div>
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead>
              <tr>
                <th>رقم الطلب</th>
                <th>المؤمن عليه</th>
                <th>جهة العمل</th>
                <th>الحالة</th>
                <th>تاريخ التقديم</th>
                <th>الحجز</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map(r => `
              <tr style="${r.checkedOutBy === me ? 'background:#f0fdf4' : ''}">
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                <td>${r.insured.name}</td>
                <td style="font-size:11.5px">${r.employer.name.substring(0, 25)}...</td>
                <td>${statusBadge(r.status)}</td>
                <td style="font-size:12px">${r.submitDate}</td>
                <td>
                  ${!r.checkedOutBy
            ? `<span class="badge b-avail">متاح</span>`
            : r.checkedOutBy === me
              ? `<span class="badge b-checkout">محجوز بواسطتي</span>`
              : `<span class="badge b-checkout" title="${r.checkedOutBy}">محجوز</span>`}
                </td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="ibtn" onclick="window.location.href='allowances-details.html?id=${r.id}'" title="عرض التفاصيل">${ICONS.eye}</button>
                    ${(r.status.includes('بانتظار تعيين') || r.status.includes('قيد التحقيق'))
            ? !r.checkedOutBy
              ? `<button class="ibtn" onclick="doCheckout('${r.id}')" title="Check-out — حجز الطلب للمعالجة">${ICONS.lock}</button>`
              : r.checkedOutBy === me
                ? `<button class="ibtn" onclick="doCheckin('${r.id}')" title="Check-in — إلغاء الحجز">${ICONS.unlock}</button>`
                : ''
            : ''}
                    <button class="ibtn" onclick="openAddNoteModal('${r.id}')" title="إضافة ملاحظة">${ICONS.note}</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
    }

    function setTab(t) { activeTab = t; render(); }

    function doCheckout(id) {
      const req = reqs.find(r => r.id === id);
      if (req) { req.checkedOutBy = me; }
      showToast(`تم حجز الطلب ${id} — Check-out`, 's');
      render();
    }

    function doCheckin(id) {
      const req = reqs.find(r => r.id === id);
      if (req) { req.checkedOutBy = null; }
      showToast(`تم تحرير الطلب ${id} — Check-in`, 'i');
      render();
    }
  </script>
</body>

</html>
