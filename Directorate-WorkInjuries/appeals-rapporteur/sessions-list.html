<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة الجلسات — مقرر لجنة التظلمات</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'appeals-rapporteur', activePage: 'sessions-list' });
setBreadcrumb([{ label: 'إدارة جلسات التظلمات' }, { label: 'قائمة الجلسات' }]);

const allSessions = [
  {
    id: 'APP-SES-2025-0023', date: '2025-02-05', time: '10:00',
    status: 'مجدولة', casesCount: WI_DATA.appeals.length, completedDecisions: 0,
    quorum: false, signedCount: 0, totalMembers: 3
  },
  {
    id: 'APP-SES-2025-0019', date: '2025-01-20', time: '09:00',
    status: 'مغلقة', casesCount: 2, completedDecisions: 2,
    quorum: true, signedCount: 3, totalMembers: 3
  }
];

let activeTab = 'all';
document.addEventListener('DOMContentLoaded', render);

function render() {
  const filtered = activeTab === 'all' ? allSessions
    : allSessions.filter(s => activeTab === 'scheduled' ? s.status === 'مجدولة' : s.status === 'مغلقة');

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة جلسات لجنة التظلمات</h1><p>${allSessions.length} جلسة</p></div>
      <div class="pg-acts">
        <button class="btn btn-primary" onclick="openNewSessionModal()">${ICONS.plus} إنشاء جلسة جديدة</button>
      </div>
    </div>
    ${renderUnifiedFilterBar({ onSearch: 'noopUnifiedSearch', onToggleAll: 'noopUnifiedToggleAll', isAllVisible: false })}

    <div class="card">
      <div class="ttabs">
        ${[
          { key:'all', label:'الكل', count:allSessions.length },
          { key:'scheduled', label:'مجدولة', count:allSessions.filter(s=>s.status==='مجدولة').length },
          { key:'closed', label:'مغلقة', count:allSessions.filter(s=>s.status==='مغلقة').length },
        ].map(t=>`<div class="ttab ${activeTab===t.key?'act':''}" onclick="setTab('${t.key}')">${t.label} <span class="tc">${t.count}</span></div>`).join('')}
      </div>
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم الجلسة</th><th>التاريخ والوقت</th><th>التظلمات</th><th>القرارات</th><th>النصاب</th><th>التوقيعات</th><th>الحالة</th><th></th></tr></thead>
            <tbody>
              ${filtered.map(s=>`
              <tr style="${s.status==='مجدولة'?'background:var(--primary-l)':''}">
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${s.id}</td>
                <td>${s.date} — ${s.time}</td>
                <td>${s.casesCount}</td>
                <td><span style="font-weight:700;color:${s.completedDecisions===s.casesCount?'var(--accent)':'var(--text2)'}">${s.completedDecisions}/${s.casesCount}</span></td>
                <td><span class="badge ${s.quorum?'b-approved':'b-returned'}">${s.quorum?'مكتمل':'غير مكتمل'}</span></td>
                <td>${s.signedCount}/${s.totalMembers}</td>
                <td><span class="badge ${s.status==='مجدولة'?'b-session':'b-approved'}">${s.status}</span></td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="btn btn-primary btn-xs" onclick="window.location.href='session-details.html?id=${s.id}'">إدارة الجلسة</button>
                    ${s.status==='مجدولة'?`<button class="ibtn" onclick="openReschedule('${s.id}')" title="تعديل الموعد">${ICONS.edit}</button>`:''}
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function setTab(t) { activeTab = t; render(); }

function openNewSessionModal() {
  openModal({
    title: 'إنشاء جلسة جديدة — لجنة التظلمات',
    size: 'md-lg',
    body: `
      <div class="fg" style="gap:14px">
        <div class="fg fg-2">
          <div class="fgrp"><label class="flbl">تاريخ الجلسة <span class="req">*</span></label><input type="date" class="fc"></div>
          <div class="fgrp"><label class="flbl">وقت الجلسة <span class="req">*</span></label><input type="time" class="fc" value="10:00"></div>
        </div>
        <div class="fgrp">
          <label class="flbl">التظلمات المدرجة</label>
          <div style="border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
            ${WI_DATA.appeals.map(a=>`
            <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border)">
              <input type="checkbox" checked>
              <span style="font-size:12.5px">
                <span style="font-family:monospace;color:var(--primary)">${a.id}</span> —
                ${a.applicant.name} — ${a.appealReason}
              </span>
            </div>`).join('')}
          </div>
        </div>
      </div>`,
    footer: `
      <button class="btn btn-primary" onclick="closeModal();showToast('تم إنشاء الجلسة وإرسال الدعوات لأعضاء لجنة التظلمات','s')">${ICONS.check} إنشاء الجلسة</button>
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>`
  });
}

function openReschedule(id) {
  openModal({
    title: `تعديل موعد الجلسة — ${id}`,
    body: `<div class="fg fg-2" style="gap:12px">
      <div class="fgrp"><label class="flbl">التاريخ الجديد</label><input type="date" class="fc"></div>
      <div class="fgrp"><label class="flbl">الوقت الجديد</label><input type="time" class="fc"></div>
      <div class="fgrp span-full"><label class="flbl">سبب التعديل</label><textarea class="fc" rows="2"></textarea></div>
    </div>`,
    footer: `<button class="btn btn-primary" onclick="closeModal();showToast('تم تعديل موعد الجلسة','s')">${ICONS.check} حفظ</button>
             <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>`
  });
}
</script>
</body>
</html>
