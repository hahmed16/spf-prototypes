<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدخال القرار النهائي — مقرر لجنة التظلمات</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>

<body>
  <script src="../shared/config.js"></script>
  <script src="../shared/data-users.js"></script>
  <script src="../shared/data-allowances.js"></script>
  <script src="../shared/data-disability.js"></script>
  <script src="../shared/data-chronic.js"></script>
  <script src="../shared/data-appeals.js"></script>
  <script src="../shared/data-licensing.js"></script>
  <script src="../shared/data-sessions.js"></script>
  <script src="../shared/data-disability-retirement.js"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="../shared/utils.js"></script>
  <script>
    initLayout({ role: 'appeals-rapporteur', activePage: 'sessions-list' });
    const params = new URLSearchParams(window.location.search);
    const appealId = params.get('appeal') || 'APP-2025-000067';
    const sessionId = params.get('session') || 'APP-SES-2025-0023';
    const appeal = WI_DATA.appeals.find(a => a.id === appealId) || WI_DATA.appeals[0];
    const origReq = WI_DATA.allowances.find(r => r.id === appeal?.originalRequestId);
    currentRequestId = appealId;
    setBreadcrumb([
      { label: 'إدارة الجلسات', page: 'sessions-list' },
      { label: `جلسة ${sessionId}`, page: `session-details.html?id=${sessionId}` },
      { label: `قرار ${appealId}` }
    ]);

    document.addEventListener('DOMContentLoaded', () => {
      const app = appeal.applicant || {};
      const dec = appeal.decision || {};
      const ins = origReq?.insured || {};
      const inj = origReq?.injury || {};
      const emp = origReq?.employer || {};
      const atts = origReq?.attachments || appeal.attachments || [];
      const notes = appeal.notes || [];
      const isWork = origReq?.type === 'إصابة عمل';

      const isSamePerson = app.civil && ins.civil && app.civil === ins.civil;

      const attHtml = atts.length === 0
        ? `<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد مرفقات</div>`
        : atts.map(att => { const ext = att.name?.split('.').pop()?.toLowerCase() || 'oth'; const icoMap = { pdf: 'pdf', doc: 'doc', docx: 'doc', jpg: 'img', jpeg: 'img', png: 'img', mp3: 'media', wav: 'media', mp4: 'media' }; const svgMap = { pdf: ICONS.file, doc: ICONS.file, img: ICONS.eye, media: ICONS.clock, oth: ICONS.file }; const ico = icoMap[ext] || 'oth'; return `<div class="att-row"><div class="att-ico ${ico}">${svgMap[ico] || ICONS.file}</div><div class="att-info"><div class="att-name">${att.name}</div><div class="att-meta">${att.type} · ${att.uploadedBy} (${att.role || ''}) · ${att.uploadDate}</div></div><div class="att-acts"><button class="ibtn" onclick="showToast('جارٍ تحميل الملف...','i')">${ICONS.download}</button></div></div>`; }).join('');

      getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>إدخال القرار النهائي للتظلم</h1>
        <p>جلسة: <strong style="font-family:monospace;color:var(--primary)">${sessionId}</strong> —
           تظلم: <strong style="font-family:monospace;color:var(--primary)">${appealId}</strong></p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary" onclick="window.history.back()">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <!-- ملخص التظلم -->
    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div class="req-summary-grid">
          <div><div class="flbl" style="margin-bottom:4px">رقم التظلم</div><div style="font-size:15px;font-weight:800;color:var(--primary);font-family:monospace">${appeal.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">حالة التظلم</div>${statusBadge(appeal.status)}</div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ التقديم</div><div style="font-size:12.5px">${formatDate(appeal.submitDate || appeal.createdDate)}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">مقدم التظلم</div><div style="font-size:12.5px;font-weight:600">${app.name || '—'}</div><div style="font-size:11px;color:var(--text3)">${app.role || ''}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث</div><div style="font-size:12px;color:var(--text2)">${appeal.lastUpdate || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث بواسطة</div><div style="font-size:12px;color:var(--text2)">${appeal.lastUpdatedBy || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">سبب التظلم</div><div style="font-size:12px">${appeal.appealReason || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">الطلب الأصلي</div><div style="font-size:12px;font-family:monospace;color:var(--primary)">${appeal.originalRequestId || '—'}</div></div>
        </div>
      </div>
    </div>

    <!-- بيانات مقدم التظلم -->
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم التظلم</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">صفة مقدم الطلب</label><div class="fro">${app.role || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${app.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${app.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(app.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${app.gender || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${app.nationality || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${normalizeDisplay(app.phone, '96890000000')}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${normalizeDisplay(app.email, 'noreply@spf-proto.om')}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء البطاقة الشخصية</label><div class="fro">${formatDate(app.civilExpiry)}</div></div>
        </div>
      </div>
    </div>

    ${!isSamePerson && ins.name ? `
    <!-- بيانات المؤمن عليه / المستفيد -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات المؤمن عليه / المستفيد</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-4">
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${ins.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${ins.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(ins.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${ins.gender || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${ins.nationality || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${normalizeDisplay(ins.phone || app.phone, '96890000000')}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${normalizeDisplay(ins.email || app.email, 'noreply@spf-proto.om')}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء البطاقة</label><div class="fro">${formatDate(ins.civilExpiry)}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${ins.insuranceStatus === 'نشط' ? 'b-approved' : 'b-rejected'}">${ins.insuranceStatus || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">${formatDate(ins.regDate)}</div></div>
        </div>
      </div>
    </div>` : ''}

    ${emp.name ? `
    <!-- بيانات جهة العمل -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico tl">${ICONS.building}</div>بيانات جهة العمل</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">اسم جهة العمل</label><div class="fro" style="font-weight:700">${emp.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم السجل التجاري</label><div class="fro" style="font-family:monospace">${emp.cr || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم المنشأة</label><div class="fro" style="font-family:monospace">${normalizeDisplay(emp.establishment)}</div></div>
          <div class="fgrp"><label class="flbl">المسمى الوظيفي</label><div class="fro">${emp.jobTitle || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الالتحاق بالعمل</label><div class="fro">${formatDate(emp.joinDate)}</div></div>
          <div class="fgrp"><label class="flbl">موقع العمل / الفرع</label><div class="fro">${emp.location || '—'}</div></div>
          <div class="fgrp"><label class="flbl">القطاع</label><div class="fro">${emp.sector || '—'}</div></div>
          <div class="fgrp"><label class="flbl">نوع جهة العمل</label><div class="fro">${emp.employerType || '—'}</div></div>
        </div>
      </div>
    </div>` : ''}

    <!-- القرار المتظلم منه -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico rd">${ICONS.warn}</div>القرار المتظلم منه</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">نوع القرار</label><div class="fro"><span class="badge b-rejected">${dec.type || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">الجهة مُصدِرة القرار</label><div class="fro">${dec.issuer || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ القرار</label><div class="fro">${dec.date || '—'}</div></div>
          <div class="fgrp span-full"><label class="flbl">مضمون القرار</label><div class="fro">${dec.details || '—'}</div></div>
        </div>
      </div>
    </div>

    <!-- أسباب وتفاصيل التظلم -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico or">${ICONS.note}</div>أسباب وتفاصيل التظلم</h3></div>
      <div class="pb">
        <div class="fgrp"><label class="flbl">سبب التظلم</label><div class="fro">${appeal.appealReason || '—'}</div></div>
        <div class="fgrp"><label class="flbl">تفاصيل سبب التظلم</label><div class="fro" style="min-height:50px;align-items:flex-start;padding-top:8px">${appeal.appealDetails || '—'}</div></div>
      </div>
    </div>

    ${origReq ? `
    <!-- بيانات الإصابة من الطلب الأصلي -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>بيانات ${isWork ? 'الإصابة' : 'المرض المهني'} (من الطلب الأصلي)</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">نوع الحالة</label><div class="fro">${normalizeDisplay(inj.caseType || inj.diagnosis)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الواقعة</label><div class="fro">${formatDate(inj.incidentDate || inj.firstSuspicion)}</div></div>
          ${isWork ? `<div class="fgrp"><label class="flbl">الجزء المصاب</label><div class="fro">${inj.bodyPart || '—'}</div></div>` : ''}
          <div class="fgrp span-full"><label class="flbl">وصف الحالة</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:10px">${normalizeDisplay(inj.description)}</div></div>
        </div>
      </div>
    </div>` : ''}

    <!-- المرفقات -->
    <div class="card">
      <div class="ph">
        <h3><div class="pico or">${ICONS.upload}</div>المرفقات <span style="font-size:11px;font-weight:400;color:var(--text3)">(${atts.length} مرفق)</span></h3>
      </div>
      <div class="pb">${attHtml}</div>
    </div>

    <!-- الملاحظات التشغيلية -->
    <div class="card op-notes-card collapsed" data-notes-init="0">
      <div class="ph op-notes-head" onclick="toggleOperationalNotes(this.closest('.op-notes-card'))">
        <h3><div class="pico gy">${ICONS.note}</div>الملاحظات التشغيلية <span style="font-size:11px;font-weight:400;color:var(--text3)">(لا تغيّر حالة الطلب)</span></h3>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="op-notes-chevron">${ICONS.arrow_left}</span>
          <button class="btn btn-secondary btn-xs" onclick="event.stopPropagation();openAddNoteModal(currentRequestId)">${ICONS.plus} إضافة ملاحظة</button>
        </div>
      </div>
      <div class="pb">
        ${notes.length === 0 ? '<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">لا توجد ملاحظات تشغيلية</div>' : notes.map(n => `<div class="note-item"><div class="note-av">${n.author?.charAt(0) || '؟'}</div><div class="note-c"><div class="note-hd"><span class="note-auth">${n.author}</span><span class="note-role">${n.role}</span><span class="note-time">${n.time}</span></div><div class="note-txt">${n.text}</div></div></div>`).join('')}
        <div style="margin-top:10px;display:flex;gap:8px">
          <textarea class="fc" id="quick-note-input" placeholder="أكتب ملاحظة سريعة..." rows="2" style="flex:1"></textarea>
          <button class="btn btn-secondary btn-sm" style="align-self:flex-end" onclick="quickAddNote()">حفظ</button>
        </div>
      </div>
    </div>

    <!-- نموذج القرار النهائي -->
    <div class="dp">
      <div class="ph"><h3><div class="pico pu">${ICONS.pen}</div>إدخال القرار النهائي للجنة التظلمات</h3></div>
      <div class="dp-body">
        <div class="alert alert-w" style="margin-bottom:0">
          ${ICONS.warn}
          <span>القرار النهائي لهذه اللجنة هو القرار الأخير في المسألة — يجب أن يكون مدعوماً بالأسباب القانونية والطبية الكافية.</span>
        </div>

        <div class="fgrp">
          <label class="flbl">نوع القرار النهائي <span class="req">*</span></label>
          <select class="fc" id="final-decision-type" onchange="onTypeChange()">
            <option value="">— اختر القرار النهائي —</option>
            <option value="تأييد القرار الأصلي">تأييد القرار الأصلي</option>
            <option value="تعديل القرار الأصلي">تعديل القرار الأصلي</option>
            <option value="إلغاء القرار الأصلي">إلغاء القرار الأصلي</option>
          </select>
        </div>

        <div id="modify-section" style="display:none">
          <div class="fgrp">
            <label class="flbl">وصف التعديل المقترح <span class="req">*</span></label>
            <textarea class="fc" rows="3" placeholder="ما الذي سيتم تعديله في القرار الأصلي..."></textarea>
          </div>
        </div>

        <div class="fgrp">
          <label class="flbl">مضمون القرار التفصيلي <span class="req">*</span></label>
          <textarea class="fc" id="decision-content" rows="6"
            placeholder="اكتب مضمون القرار بالتفصيل — الأسباب القانونية والطبية والإجراءات المترتبة..."></textarea>
        </div>

        <div class="fgrp">
          <label class="flbl">أثر القرار على الطلب الأصلي <span class="req">*</span></label>
          <textarea class="fc" id="decision-effect" rows="3"
            placeholder="ما هو أثر هذا القرار على الطلب الأصلي؟ ماذا سيحدث للطلب بعد صدور هذا القرار؟"></textarea>
        </div>

        <div class="fgrp">
          <label class="flbl">إرفاق ملف داعم <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          ${renderModernUploadComponent({ idPrefix: 'decision-att', subTitle: 'PDF, Word, صور — الحجم الأقصى 20 ميغابايت' })}
        </div>

        <div class="dp-acts">
          <button class="btn btn-accent btn-lg" onclick="saveFinalDecision()">${ICONS.check} اعتماد القرار النهائي</button>
          <button class="btn btn-secondary" onclick="showToast('تم حفظ المسودة','i')">حفظ كمسودة</button>
          <button class="btn btn-ghost" onclick="window.history.back()">إلغاء</button>
        </div>
      </div>
    </div>`;
    });

    function onTypeChange() {
      const type = document.getElementById('final-decision-type').value;
      document.getElementById('modify-section').style.display = type === 'تعديل القرار الأصلي' ? '' : 'none';
    }

    function saveFinalDecision() {
      const type = document.getElementById('final-decision-type').value;
      const content = document.getElementById('decision-content').value.trim();
      const effect = document.getElementById('decision-effect').value.trim();
      if (!type) { showToast('يرجى اختيار نوع القرار النهائي', 'w'); return; }
      if (!content) { showToast('يرجى كتابة مضمون القرار التفصيلي', 'w'); return; }
      if (!effect) { showToast('يرجى تحديد أثر القرار على الطلب الأصلي', 'w'); return; }

      confirmAction({
        title: 'تأكيد اعتماد القرار النهائي',
        msg: `هل أنت متأكد من اعتماد هذا القرار النهائي؟<br><br>
          <strong>القرار: ${type}</strong><br>
          <span style="font-size:12px;color:var(--text3)">هذا القرار نهائي وسيُبلَّغ به جميع الأطراف المعنية.</span>`,
        confirmLabel: 'نعم، اعتماد القرار النهائي',
        confirmClass: 'btn-accent',
        onConfirm: () => {
          showToast(`تم اعتماد القرار النهائي — ${type}`, 's', 5000);
          setTimeout(() => window.location.href = `session-details.html?id=${sessionId}`, 2000);
        }
      });
    }

    function quickAddNote() {
      const v = document.getElementById('quick-note-input')?.value?.trim();
      if (!v) { showToast('يرجى كتابة الملاحظة', 'w'); return; }
      showToast('تم حفظ الملاحظة', 's');
      document.getElementById('quick-note-input').value = '';
    }
    function toggleOperationalNotes(card) { card.classList.toggle('collapsed'); }
  </script>
</body>

</html>
