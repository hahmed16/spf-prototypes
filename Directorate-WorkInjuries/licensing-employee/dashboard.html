<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة البيانات — موظف قسم التراخيص والرقابة</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <script src="../shared/config.js"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="../shared/components.js"></script>
  <script>
    initLayout({ role: 'licensing-employee', activePage: 'dashboard' });
    setBreadcrumb([{ label: 'لوحة البيانات' }]);

    document.addEventListener('DOMContentLoaded', () => {
      const stats = WI_DATA.dashboardStats['licensing-employee'];
      const reqs = WI_DATA.licensing.filter(r => 
        ['تم تقديم طلب الترخيص / التجديد — بانتظار مراجعة موظف قسم التراخيص والرقابة', 'قيد المراجعة'].includes(r.status)
      );

      getContent().innerHTML = `
        <div class="pg-head">
          <div>
            <h1>لوحة البيانات</h1>
            <p>موظف قسم التراخيص والرقابة — ${WI_DATA.users.licensing_employee.name}</p>
          </div>
        </div>
        
        <div class="stats-grid">
          ${stats.map(s => `
          <div class="scard ${s.type}" onclick="window.location.href='licensing-list.html'">
            <div class="sc-lbl">${s.label}</div>
            <div class="sc-val">${s.value}</div>
          </div>`).join('')}
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="card">
            <div class="ph">
              <h3><div class="pico bl">${ICONS.list}</div>طلبات الترخيص الجديدة</h3>
              <a href="licensing-list.html" style="font-size:12px;color:var(--primary)">عرض الكل</a>
            </div>
            <div class="pb-0">
              <table class="dtbl">
                <thead><tr><th>رقم الطلب</th><th>المؤسسة</th><th>النوع</th><th></th></tr></thead>
                <tbody>
                  ${reqs.slice(0, 5).map(r => `
                  <tr>
                    <td style="font-family:monospace;font-size:11.5px;color:var(--primary)">${r.id}</td>
                    <td>${r.institution.name.substring(0, 20)}...</td>
                    <td><span class="badge b-direct">${r.requestType}</span></td>
                    <td>
                      <button class="btn btn-primary btn-xs" onclick="window.location.href='licensing-details.html?id=${r.id}'">مراجعة</button>
                    </td>
                  </tr>`).join('')}
                  ${!reqs.length ? `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text3)">لا توجد طلبات جديدة حالياً</td></tr>` : ''}
                </tbody>
              </table>
            </div>
          </div>
          
          <div class="card">
            <div class="ph"><h3><div class="pico w">${ICONS.warn}</div>تراخيص تنتهي قريباً</h3></div>
            <div class="pb">
              ${WI_DATA.licensing.filter(r => r.activeLicense).map(r => `
              <div style="padding:10px 12px;border:1px solid var(--warning-l);border-radius:var(--rsm);background:var(--warning-l);margin-bottom:8px">
                <div style="font-size:12.5px;font-weight:600">${r.institution.name}</div>
                <div style="font-size:11px;color:var(--text2)">ينتهي: ${r.activeLicense?.expiryDate} — رقم: ${r.activeLicense?.number}</div>
              </div>`).join('') || '<div style="font-size:12.5px;color:var(--text3);text-align:center;padding:20px">لا توجد تراخيص تنتهي قريباً</div>'}
            </div>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
