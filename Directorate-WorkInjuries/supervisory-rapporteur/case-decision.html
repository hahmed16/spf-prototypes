<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدخال قرار الترخيص — مقرر اللجنة الطبية الإشرافية</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'supervisory-rapporteur', activePage: 'sessions-list' });
const params = new URLSearchParams(window.location.search);
const reqId  = params.get('req')     || 'LIC-2025-000034';
const sessionId = params.get('session') || 'LIC-SES-2025-0012';
const req = WI_DATA.licensing.find(r=>r.id===reqId) || WI_DATA.licensing[0];
currentRequestId = reqId;
setBreadcrumb([
  {label:'إدارة الجلسات',page:'sessions-list'},
  {label:`جلسة ${sessionId}`,page:`session-details.html?id=${sessionId}`},
  {label:`قرار ${reqId}`}
]);

document.addEventListener('DOMContentLoaded', () => {
  const inst = req.institution || {};
  const docs = req.doctors || [];
  const confirmedCount = docs.filter(d=>d.confirmStatus==='تم التأكيد').length;

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>إدخال قرار اللجنة الطبية الإشرافية</h1>
        <p>جلسة: <strong style="font-family:monospace;color:var(--primary)">${sessionId}</strong> —
           طلب: <strong style="font-family:monospace;color:var(--primary)">${reqId}</strong></p></div>
      <div class="pg-acts">
        <button class="btn btn-secondary" onclick="window.history.back()">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <!-- ملخص طلب الترخيص -->
    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
          <div><div class="flbl" style="margin-bottom:4px">رقم الطلب</div><div style="font-family:monospace;font-weight:800;color:var(--primary)">${req.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">المؤسسة</div><div style="font-weight:600">${inst.name||'—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">نوع الطلب</div><span class="badge b-direct">${req.requestType}</span></div>
          <div><div class="flbl" style="margin-bottom:4px">الحالة</div>${statusBadge(req.status)}</div>
        </div>
      </div>
    </div>

    <!-- بيانات الطلب للاطلاع (قابلة للطي) -->
    <div style="border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;margin-bottom:16px">
      <div style="padding:10px 18px;background:var(--g100);border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between"
        onclick="toggleData()">
        <span style="font-size:13px;font-weight:700">عرض / إخفاء بيانات الطلب والأطباء للاطلاع</span>
        <span id="tog-icon">${ICONS.arrow_left}</span>
      </div>
      <div id="req-data" style="display:none">
        <!-- بيانات المؤسسة الصحية -->
        <div class="card card-ro" style="margin:0;border-radius:0;border-left:none;border-right:none">
          <div class="ph"><h3><div class="pico tl">${ICONS.building}</div>بيانات المؤسسة الصحية</h3></div>
          <div class="pb">
            <div class="fg fg-3">
              <div class="fgrp"><label class="flbl">اسم المؤسسة</label><div class="fro" style="font-weight:700">${inst.name||'—'}</div></div>
              <div class="fgrp"><label class="flbl">رقم السجل التجاري</label><div class="fro" style="font-family:monospace">${inst.cr||'—'}</div></div>
              <div class="fgrp"><label class="flbl">حالة السجل التجاري</label><div class="fro"><span class="badge ${inst.crStatus==='سارٍ'?'b-approved':'b-expired'}">${inst.crStatus||'—'}</span></div></div>
              <div class="fgrp"><label class="flbl">نوع المؤسسة</label><div class="fro">${inst.type||'—'}</div></div>
              <div class="fgrp"><label class="flbl">المحافظة</label><div class="fro">${inst.governorate||'—'}</div></div>
              <div class="fgrp"><label class="flbl">العنوان</label><div class="fro">${inst.address||'—'}</div></div>
            </div>
          </div>
        </div>

        <!-- الأطباء المرشحون -->
        <div class="card card-ro" style="margin:0;border-radius:0;border-left:none;border-right:none">
          <div class="ph">
            <h3><div class="pico bl">${ICONS.user}</div>الأطباء المرشحون للجنة</h3>
            <span style="font-size:12px;color:${confirmedCount===docs.length?'var(--accent)':'var(--warning)'}">
              ${confirmedCount} / ${docs.length} مؤكد
            </span>
          </div>
          <div class="pb-0">
            <div class="tbl-wrap">
              <table class="dtbl">
                <thead><tr><th>الاسم</th><th>الرقم المدني</th><th>التخصص</th><th>المنصب</th><th>التأكيد</th><th>الازدواجية</th></tr></thead>
                <tbody>${docs.map(d=>`<tr><td style="font-weight:600">${d.name}</td><td style="font-family:monospace;font-size:11.5px">${d.civil}</td><td>${d.specialty}</td><td>${d.role}</td><td><span class="badge ${d.confirmStatus==='تم التأكيد'?'b-approved':d.confirmStatus==='رفض'?'b-rejected':'b-phead'}">${d.confirmStatus}</span></td><td><span class="badge ${d.duplicateCheck==='لا يوجد تعارض'?'b-approved':'b-rejected'}">${d.duplicateCheck}</span></td></tr>`).join('')}</tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- التحقق من الاشتراطات -->
        <div class="card card-ro" style="margin:0;border-radius:0;border-left:none;border-right:none">
          <div class="ph"><h3><div class="pico ${req.verification?.minMet?'gr':'rd'}">${req.verification?.minMet?ICONS.check:ICONS.warn}</div>التحقق من اشتراطات الترخيص</h3></div>
          <div class="pb">
            <div class="fg fg-3">
              <div class="fgrp"><label class="flbl">إجمالي الأطباء</label><div class="fro"><strong>${req.verification?.totalDoctors||0}</strong></div></div>
              <div class="fgrp"><label class="flbl">المؤكدون</label><div class="fro"><strong style="color:${req.verification?.confirmedDoctors===req.verification?.totalDoctors?'var(--accent)':'var(--warning)'}">${req.verification?.confirmedDoctors||0}/${req.verification?.totalDoctors||0}</strong></div></div>
              <div class="fgrp"><label class="flbl">استيفاء الحد الأدنى</label><div class="fro"><span class="badge ${req.verification?.minMet?'b-approved':'b-returned'}">${req.verification?.minMet?'مستوفى':'غير مستوفى'}</span></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- نموذج قرار الترخيص -->
    <div class="dp">
      <div class="ph"><h3><div class="pico tl">${ICONS.shield}</div>إدخال قرار اللجنة الطبية الإشرافية على طلب الترخيص</h3></div>
      <div class="dp-body">
        <div class="fgrp">
          <label class="flbl">نوع القرار <span class="req">*</span></label>
          <select class="fc" id="lic-decision-type" onchange="onTypeChange()">
            <option value="">— اختر نوع القرار —</option>
            <option value="اعتماد الترخيص">اعتماد الترخيص</option>
            <option value="رفض">رفض الطلب</option>
            <option value="إعادة للاستيفاء">إعادة للاستيفاء</option>
          </select>
        </div>

        <div id="approve-section" style="display:none">
          <div class="alert alert-s" style="margin-bottom:0">
            ${ICONS.check}
            <span>سيتم إرسال قرار الاعتماد إلى <strong>رئيس قسم التراخيص والرقابة</strong> لإصدار الترخيص الرسمي.</span>
          </div>
        </div>

        <div id="reject-section" style="display:none">
          <div class="fgrp">
            <label class="flbl">أسباب الرفض <span class="req">*</span></label>
            <textarea class="fc" id="reject-reasons" rows="3" placeholder="اذكر الأسباب التفصيلية للرفض..."></textarea>
          </div>
        </div>

        <div id="return-section" style="display:none">
          <div class="fgrp">
            <label class="flbl">البيانات المطلوب استيفاؤها <span class="req">*</span></label>
            <textarea class="fc" id="return-items" rows="3" placeholder="حدد ما يجب على المفوض تقديمه أو تصحيحه..."></textarea>
          </div>
        </div>

        <div class="fgrp">
          <label class="flbl">ملاحظات اللجنة على الأطباء المرشحين</label>
          <textarea class="fc" id="doctors-notes" rows="3" placeholder="أي ملاحظات على مؤهلات أو تخصصات الأطباء المقدمين..."></textarea>
        </div>

        <div class="fgrp">
          <label class="flbl">الملاحظات العامة للجلسة</label>
          <textarea class="fc" id="general-notes" rows="3" placeholder="الملاحظات العامة والتوصيات..."></textarea>
        </div>

        <div class="fgrp">
          <label class="flbl">إرفاق ملف داعم <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          ${renderModernUploadComponent({ idPrefix: 'decision-att', subTitle: 'PDF, Word, صور — الحجم الأقصى 20 ميغابايت' })}
        </div>

        <div class="dp-acts">
          <button class="btn btn-accent btn-lg" onclick="saveDecision()">${ICONS.check} اعتماد القرار</button>
          <button class="btn btn-secondary" onclick="showToast('تم حفظ المسودة','i')">حفظ كمسودة</button>
          <button class="btn btn-ghost" onclick="window.history.back()">إلغاء</button>
        </div>
      </div>
    </div>`;
});

function toggleData(){
  const b=document.getElementById('req-data');
  const i=document.getElementById('tog-icon');
  b.style.display=b.style.display==='none'?'':'none';
  i.style.transform=b.style.display===''?'rotate(-90deg)':'';
}

function onTypeChange(){
  const t=document.getElementById('lic-decision-type').value;
  ['approve-section','reject-section','return-section'].forEach(id=>{ document.getElementById(id).style.display='none'; });
  if(t==='اعتماد الترخيص') document.getElementById('approve-section').style.display='';
  else if(t==='رفض') document.getElementById('reject-section').style.display='';
  else if(t==='إعادة للاستيفاء') document.getElementById('return-section').style.display='';
}

function saveDecision(){
  const type=document.getElementById('lic-decision-type').value;
  if(!type){showToast('يرجى اختيار نوع القرار','w');return;}
  confirmAction({
    title:'تأكيد اعتماد قرار الترخيص',
    msg:`اعتماد قرار <strong>${type}</strong> على طلب الترخيص ${reqId}؟<br>
         <span style="font-size:12px;color:var(--text3)">القرار نهائي وسيُرسَل لرئيس قسم التراخيص للتنفيذ.</span>`,
    confirmLabel:'نعم، اعتماد القرار',
    confirmClass:'btn-accent',
    onConfirm:()=>{
      showToast(`تم اعتماد قرار ${type} على الطلب ${reqId}`,'s',5000);
      setTimeout(()=>window.location.href=`session-details.html?id=${sessionId}`,2000);
    }
  });
}
</script>
</body>
</html>
