<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة البيانات — مقرر اللجنة الطبية الإشرافية</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'supervisory-rapporteur', activePage: 'dashboard' });
setBreadcrumb([{ label: 'لوحة البيانات' }]);

document.addEventListener('DOMContentLoaded', () => {
  const reqs = WI_DATA.licensing;
  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>لوحة البيانات</h1>
        <p>مقرر اللجنة الطبية الإشرافية — ${WI_DATA.users.supervisory_rapporteur.name}</p>
      </div>
    </div>

    <div class="alert alert-i">
      ${ICONS.info}
      <span>دور مقرر اللجنة الطبية الإشرافية: جدولة جلسات مراجعة طلبات الترخيص، إدخال قرارات اللجنة، متابعة التوقيعات، وإرسال القرارات إلى <strong>رئيس قسم التراخيص والرقابة</strong>.</span>
    </div>

    <div class="stats-grid">
      <div class="scard p" onclick="window.location.href='sessions-list.html'">
        <div class="sc-lbl">جلسات مجدولة</div>
        <div class="sc-val">2</div>
        <div class="sc-sub">هذا الشهر</div>
      </div>
      <div class="scard w" onclick="window.location.href='sessions-list.html'">
        <div class="sc-lbl">طلبات ترخيص بانتظار جلسة</div>
        <div class="sc-val">${reqs.filter(r=>r.status.includes('بانتظار جدولة')).length}</div>
        <div class="sc-sub">محالة من رئيس التراخيص</div>
      </div>
      <div class="scard d">
        <div class="sc-lbl">توقيعات معلّقة</div>
        <div class="sc-val">1</div>
        <div class="sc-sub">تحتاج متابعة</div>
      </div>
      <div class="scard s">
        <div class="sc-lbl">قرارات أُرسلت لرئيس التراخيص</div>
        <div class="sc-val">3</div>
        <div class="sc-sub">هذا الشهر</div>
      </div>
    </div>

    <div class="card">
      <div class="ph">
        <h3><div class="pico tl">${ICONS.list}</div>طلبات الترخيص المحالة للجنة</h3>
        <a href="sessions-list.html" style="font-size:12px;color:var(--primary)">عرض الجلسات</a>
      </div>
      <div class="pb-0">
        <table class="dtbl">
          <thead><tr><th>رقم الطلب</th><th>المؤسسة</th><th>نوع الطلب</th><th>الأطباء المؤكدون</th><th>الحالة</th><th></th></tr></thead>
          <tbody>
            ${reqs.map(r=>`
            <tr>
              <td style="font-family:monospace;color:var(--primary);font-weight:700">${r.id}</td>
              <td style="font-weight:600">${r.institution.name}</td>
              <td><span class="badge b-direct">${r.requestType}</span></td>
              <td>
                <span style="font-weight:700;color:${r.verification.confirmedDoctors===r.verification.totalDoctors?'var(--accent)':'var(--warning)'}">
                  ${r.verification.confirmedDoctors}/${r.verification.totalDoctors}
                </span>
              </td>
              <td>${statusBadge(r.status)}</td>
              <td><button class="ibtn" onclick="window.location.href='session-details.html?id=LIC-SES-2025-0012'">${ICONS.eye}</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
});
</script>
</body>
</html>
