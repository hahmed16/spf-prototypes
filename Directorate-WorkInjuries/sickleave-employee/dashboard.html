<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة البيانات — موظف قسم الإجازات المرضية</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <script src="../shared/config.js"></script>
  <script src="../shared/data-users.js"></script>
  <script src="../shared/data-allowances.js"></script>
  <script src="../shared/data-disability.js"></script>
  <script src="../shared/data-chronic.js"></script>
  <script src="../shared/data-appeals.js"></script>
  <script src="../shared/data-licensing.js"></script>
  <script src="../shared/data-sessions.js"></script>
  <script src="../shared/data-disability-retirement.js"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="../shared/utils.js"></script>
  <script>
    initLayout({ role: 'sickleave-employee', activePage: 'dashboard' });
    setBreadcrumb([{ label: 'لوحة البيانات' }]);

    document.addEventListener('DOMContentLoaded', () => {
      const stats = WI_DATA.dashboardStats['sickleave-employee'];
      const me = WI_DATA.users.sickleave_employee.name;
      
      const myReqs = WI_DATA.allowances.filter(r => 
        ['تم استلام الطلب — فني الإجازات المرضية', 'قيد المراجعة من موظف قسم الإجازات المرضية'].includes(r.status)
      );
      const checkedOut = WI_DATA.allowances.filter(r => r.checkedOutBy === me);

      getContent().innerHTML = `
        <div class="pg-head">
          <div>
            <h1>لوحة البيانات</h1>
            <p>موظف قسم الإجازات المرضية — ${me}</p>
          </div>
        </div>
        
        <div class="stats-grid">
          ${stats.map(s => `
          <div class="scard ${s.type}" onclick="window.location.href='allowances-list.html'">
            <div class="sc-lbl">${s.label}</div>
            <div class="sc-val">${s.value}</div>
          </div>`).join('')}
        </div>

        ${checkedOut.length ? `
        <div class="alert alert-i">
          ${ICONS.lock}
          <div><strong>الطلبات التي حجزتها حالياً:</strong> ${checkedOut.map(r => `<a href="allowances-details.html?id=${r.id}" style="color:var(--primary)">${r.id}</a>`).join(' ، ')}</div>
        </div>` : ''}

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="card">
            <div class="ph">
              <h3><div class="pico bl">${ICONS.list}</div>الطلبات الجديدة — بانتظار المراجعة</h3>
              <a href="allowances-list.html" style="font-size:12px;color:var(--primary)">عرض الكل</a>
            </div>
            <div class="pb-0">
              <table class="dtbl">
                <thead><tr><th>رقم الطلب</th><th>المؤمن عليه</th><th>الحالة</th><th></th></tr></thead>
                <tbody>
                  ${myReqs.slice(0, 5).map(r => `
                  <tr>
                    <td style="font-family:monospace;font-size:11.5px;color:var(--primary)">${r.id}</td>
                    <td>${r.insured.name}</td>
                    <td>${statusBadge(r.status)}</td>
                    <td>
                      ${!r.checkedOutBy
                        ? `<button class="btn btn-primary btn-xs" onclick="window.location.href='allowances-details.html?id=${r.id}'">مراجعة</button>`
                        : `<span style="font-size:11px;color:var(--warning)">محجوز</span>`}
                    </td>
                  </tr>`).join('')}
                  ${!myReqs.length ? `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text3)">لا توجد طلبات جديدة حالياً</td></tr>` : ''}
                </tbody>
              </table>
            </div>
          </div>
          
          <div class="card">
            <div class="ph"><h3><div class="pico or">${ICONS.bell}</div>التنبيهات والمهام</h3></div>
            <div class="pb">
              <div style="display:flex;flex-direction:column;gap:8px">
                <div style="padding:10px 12px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--g50)">
                  <p style="font-size:12.5px;font-weight:600">استعلام وزارة الصحة</p>
                  <p style="font-size:11px;color:var(--text3)">وصل رد لـ 3 طلبات من المستشفيات الحكومية</p>
                </div>
                <div style="padding:10px 12px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--g50)">
                  <p style="font-size:12.5px;font-weight:600">طلب WI-2025-001156</p>
                  <p style="font-size:11px;color:var(--text3)">تم تحديد موعد الجلسة في 28 يناير</p>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
