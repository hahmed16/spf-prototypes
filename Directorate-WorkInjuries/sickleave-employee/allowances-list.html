<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة الطلبات — موظف قسم الإجازات المرضية</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'sickleave-employee', activePage: 'allowances-list' });
setBreadcrumb([{ label: 'بدلات الانقطاع عن العمل' }, { label: 'قائمة الطلبات' }]);
const me = WI_DATA.users.sickleave_employee.name;
let searchQuery = '';
let showAllStages = false;
document.addEventListener('DOMContentLoaded', render);
function render() {
  const filtered = getFilteredData({
    role: 'sickleave-employee',
    data: WI_DATA.allowances,
    query: searchQuery,
    showAll: showAllStages
  });
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة طلبات صرف بدلات الانقطاع</h1><p>قسم الإجازات المرضية — ${WI_DATA.allowances.length} طلب إجمالي في النظام</p></div>
      <div class="pg-acts"><button class="btn btn-secondary btn-sm" onclick="window.location.href='../shared/medical-query.html'">${ICONS.medical} استعلام طبي</button></div>
    </div>
    ${renderUnifiedFilterBar({ onSearch: 'updateSearch', onToggleAll: 'toggleAll', isAllVisible: showAllStages })}
    <div class="card">
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم الطلب</th><th>مقدم الطلب</th><th>المؤمن عليه</th><th>النوع</th><th>الحالة</th><th>الفترات</th><th>تاريخ التقديم</th><th>الأيام المتبقية</th><th></th></tr></thead>
            <tbody>
              ${filtered.length === 0
                ? `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text3)">لا توجد نتائج تطابق البحث أو المرحلة الحالية</td></tr>`
                : filtered.map(r=> {
                  const meta = deriveRequestSummaryMeta(r);
                  const remainingDaysClass = getRemainingDaysClass(meta.remainingDays);
                  const remainingDaysLabel = getRemainingDaysLabel(meta.remainingDays);
                  return `
              <tr style="${r.checkedOutBy===me?'background:#f0fdf4':''}">
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                <td>${getSubmittedByName(r)}</td>
                <td>${r.insured?.name || r.applicant?.name}</td>
                <td>${r.type}</td>
                <td>${statusBadge(r.status)}</td>
                <td>${r.sickLeavePeriods?.length ? `<strong>${r.sickLeavePeriods.length}</strong> فترة` : '—'}</td>
                <td style="font-size:12px">${r.submitDate}</td>
                <td><span class="sla-days ${remainingDaysClass}">${remainingDaysLabel}</span></td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="ibtn" onclick="window.location.href='allowances-details.html?id=${r.id}'">${ICONS.eye}</button>
                    ${r.status.includes('قيد المراجعة من موظف')
                      ? !r.checkedOutBy
                        ? `<button class="ibtn" onclick="doCheckout('${r.id}')" title="حجز الطلب">${ICONS.lock}</button>`
                        : r.checkedOutBy===me
                          ? `<button class="ibtn" onclick="doCheckin('${r.id}')" title="تحرير الطلب">${ICONS.unlock}</button>`
                          : ''
                      : ''}
                    ${!r.suspended?`<button class="ibtn" onclick="doSuspend('${r.id}')" title="تعليق الطلب">${ICONS.pause}</button>`:`<button class="ibtn" onclick="doResume('${r.id}')" title="استئناف الطلب">${ICONS.play}</button>`}
                    <button class="ibtn" onclick="openAddNoteModal('${r.id}')">${ICONS.note}</button>
                  </div>
                </td>
              </tr>`;
                }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  if (searchQuery) {
    const inp = document.getElementById('global-search-input');
    if (inp) { inp.value = searchQuery; inp.focus(); inp.setSelectionRange(searchQuery.length, searchQuery.length); }
  }
}
function updateSearch(val) { searchQuery = val; render(); }
function toggleAll() { showAllStages = !showAllStages; render(); }
function doCheckout(id) { const r=WI_DATA.allowances.find(x=>x.id===id); if(r){r.checkedOutBy=me;} showToast(`تم حجز ${id}`,'s'); render(); }
function doCheckin(id) { const r=WI_DATA.allowances.find(x=>x.id===id); if(r){r.checkedOutBy=null;} showToast(`تم تحرير ${id}`,'i'); render(); }
function doSuspend(id){
  const reason=prompt('سبب التعليق:');
  if(reason){
    const notes=prompt('ملاحظات إضافية (اختياري):');
    const r=WI_DATA.allowances.find(x=>x.id===id);
    if(r){
      r.suspended=true;
      r.suspensionReason=reason;
      r.suspensionNotes=notes||'';
      r.suspendedBy=me;
      r.suspendedDate=new Date().toISOString().slice(0,10);
      r.timeline.push({
        action:'تعليق الطلب',
        actor:me,
        role:'موظف قسم الإجازات المرضية',
        time:new Date().toISOString().slice(0,16).replace('T',' '),
        fromStatus:r.status,
        toStatus:r.status,
        note:`تعليق: ${reason}${notes?` (${notes})`:''}`,
        type:'warning'
      });
      r.lastUpdate=new Date().toISOString().slice(0,16).replace('T',' ');
      r.lastUpdatedBy=me;
    }
    showToast(`تم تعليق ${id}`,'w');
    render();
  }
}
function doResume(id){
  const r=WI_DATA.allowances.find(x=>x.id===id);
  if(r){
    r.suspended=false;
    r.resumedBy=me;
    r.resumedDate=new Date().toISOString().slice(0,10);
    r.timeline.push({
      action:'استئناف الطلب',
      actor:me,
      role:'موظف قسم الإجازات المرضية',
      time:new Date().toISOString().slice(0,16).replace('T',' '),
      fromStatus:r.status,
      toStatus:r.status,
      note:'تم استئناف الطلب',
      type:'success'
    });
    r.lastUpdate=new Date().toISOString().slice(0,16).replace('T',' ');
    r.lastUpdatedBy=me;
  }
  showToast(`تم استئناف ${id}`,'s');
  render();
}
</script>
</body>
</html>
