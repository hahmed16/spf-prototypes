<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة البيانات — رئيس قسم الإجازات المرضية</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <script src="../shared/config.js"></script>
  <script src="../shared/data-users.js"></script>
  <script src="../shared/data-allowances.js"></script>
  <script src="../shared/data-disability.js"></script>
  <script src="../shared/data-chronic.js"></script>
  <script src="../shared/data-appeals.js"></script>
  <script src="../shared/data-licensing.js"></script>
  <script src="../shared/data-sessions.js"></script>
  <script src="../shared/data-disability-retirement.js"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="../shared/utils.js"></script>
  <script>
    initLayout({ role: 'sickleave-head', activePage: 'dashboard' });
    setBreadcrumb([{ label: 'لوحة البيانات' }]);

    document.addEventListener('DOMContentLoaded', () => {
      const stats = WI_DATA.dashboardStats['sickleave-head'];
      const me = WI_DATA.users.sickleave_head.name;
      
      const pending = WI_DATA.allowances.filter(r => 
        r.status === 'بانتظار اعتماد رئيس قسم الإجازات المرضية'
      );

      getContent().innerHTML = `
        <div class="pg-head">
          <div>
            <h1>لوحة البيانات</h1>
            <p>رئيس قسم الإجازات المرضية — ${me}</p>
          </div>
        </div>
        
        <div class="stats-grid">
          ${stats.map(s => `
          <div class="scard ${s.type}" onclick="window.location.href='allowances-list.html'">
            <div class="sc-lbl">${s.label}</div>
            <div class="sc-val">${s.value}</div>
          </div>`).join('')}
        </div>

        ${pending.length ? `
        <div class="alert alert-w">
          ${ICONS.warn}
          <div><strong>لديك ${pending.length} فترات إجازة بانتظار الاعتماد.</strong> <a href="allowances-list.html" style="color:var(--primary);margin-right:10px">عرض الطلبات ${ICONS.arrow_left}</a></div>
        </div>` : ''}

        <div class="card">
          <div class="ph">
            <h3><div class="pico bl">${ICONS.list}</div>الطلبات بانتظار الاعتماد</h3>
            <a href="allowances-list.html" style="font-size:12px;color:var(--primary)">عرض الكل</a>
          </div>
          <div class="pb-0">
            <table class="dtbl">
              <thead><tr><th>رقم الطلب</th><th>المؤمن عليه</th><th>الموظف المسؤول</th><th>تاريخ الرفع</th><th></th></tr></thead>
              <tbody>
                ${pending.slice(0, 5).map(r => `
                <tr>
                  <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                  <td>${r.insured.name}</td>
                  <td>${r.assignedTo || '—'}</td>
                  <td style="font-size:12px">${r.lastUpdate || r.submitDate}</td>
                  <td><button class="btn btn-primary btn-xs" onclick="window.location.href='allowances-details.html?id=${r.id}'">مراجعة واتخاذ قرار</button></td>
                </tr>`).join('')}
                ${!pending.length ? `<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text3)">لا توجد طلبات بانتظار الاعتماد حالياً</td></tr>` : ''}
              </tbody>
            </table>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
