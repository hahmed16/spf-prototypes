<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة الطلبات — موظف قسم التحقيق في إصابات العمل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/components.js"></script>
<script>
initLayout({ role: 'injury-investigator', activePage: 'allowances-list' });
setBreadcrumb([{ label: 'بدلات الانقطاع عن العمل' }, { label: 'قائمة الطلبات' }]);

const me = WI_DATA.users.injury_investigator.name;
let searchQuery = '';
let showAllStages = false;

document.addEventListener('DOMContentLoaded', render);

function render() {
  const filtered = getFilteredData({
    role: 'injury-investigator',
    data: WI_DATA.allowances,
    query: searchQuery,
    showAll: showAllStages
  });

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة طلبات صرف بدلات الانقطاع</h1>
        <p>إصابات العمل — ${WI_DATA.allowances.length} طلب إجمالي في النظام</p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary btn-sm" onclick="window.location.href='../shared/medical-query.html'">${ICONS.medical} استعلام طبي</button>
        <button class="btn btn-primary" onclick="window.location.href='allowances-new.html'">${ICONS.plus} تقديم طلب (حالات خاصة)</button>
      </div>
    </div>

    ${renderUnifiedFilterBar({
      onSearch: 'updateSearch',
      onToggleAll: 'toggleAll',
      isAllVisible: showAllStages
    })}

    <div class="card">
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead>
              <tr>
                <th>رقم الطلب</th>
                <th>المؤمن عليه</th>
                <th>جهة العمل</th>
                <th>الحالة</th>
                <th>تاريخ التقديم</th>
                <th>الحجز</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.length === 0 
                ? `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text3)">لا توجد نتائج تطابق البحث أو المرحلة الحالية</td></tr>`
                : filtered.map(r=>`
              <tr style="${r.checkedOutBy===me?'background:#f0fdf4':''}">
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                <td>${r.insured?.name || r.applicant?.name}</td>
                <td style="font-size:11.5px">${r.employer?.name?.substring(0,25) || '—'}...</td>
                <td>${statusBadge(r.status)}</td>
                <td style="font-size:12px">${r.submitDate}</td>
                <td>
                  ${!r.checkedOutBy
                    ? `<span class="badge b-avail">متاح</span>`
                    : r.checkedOutBy === me
                      ? `<span class="badge b-checkout">محجوز بواسطتي</span>`
                      : `<span class="badge b-checkout" title="${r.checkedOutBy}">محجوز</span>`}
                </td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="ibtn" onclick="window.location.href='allowances-details.html?id=${r.id}'" title="عرض التفاصيل">${ICONS.eye}</button>
                    ${(r.status.includes('بانتظار تعيين') || r.status.includes('قيد التحقيق'))
                      ? !r.checkedOutBy
                        ? `<button class="ibtn" onclick="doCheckout('${r.id}')" title="Check-out — حجز الطلب للمعالجة">${ICONS.lock}</button>`
                        : r.checkedOutBy === me
                          ? `<button class="ibtn" onclick="doCheckin('${r.id}')" title="Check-in — إلغاء الحجز">${ICONS.unlock}</button>`
                          : ''
                      : ''}
                    <button class="ibtn" onclick="openAddNoteModal('${r.id}')" title="إضافة ملاحظة">${ICONS.note}</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
    
    // Maintain focus on search input if it was active
    if (searchQuery) {
      const inp = document.getElementById('global-search-input');
      if (inp) {
        inp.value = searchQuery;
        inp.focus();
        inp.setSelectionRange(searchQuery.length, searchQuery.length);
      }
    }
}

function updateSearch(val) {
  searchQuery = val;
  render();
}

function toggleAll() {
  showAllStages = !showAllStages;
  render();
}

function doCheckout(id) {
  const req = WI_DATA.allowances.find(r=>r.id===id);
  if (req) { req.checkedOutBy = me; }
  showToast(`تم حجز الطلب ${id} — Check-out`, 's');
  render();
}

function doCheckin(id) {
  const req = WI_DATA.allowances.find(r=>r.id===id);
  if (req) { req.checkedOutBy = null; }
  showToast(`تم تحرير الطلب ${id} — Check-in`, 'i');
  render();
}
</script>
</body>
</html>
