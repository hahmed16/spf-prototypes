<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نموذج قرار اللجنة الطبية - نظام مديرية إصابات العمل</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-section="m4" data-page="4.F-case-decision.html" data-title="قرار اللجنة الطبية للحالة" data-crumbs="الرئيسية|العرض على المؤسسات الصحية المرخصة|تفاصيل الجلسة|قرار الحالة">
  <div id="topbar" class="app-topbar"></div>
  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main">
      <div class="crumbs" id="breadcrumbs"></div>
      <div class="page-head">
        <div>
          <h2 id="pageTitle">قرار اللجنة الطبية: سالم البلوشي (WI-2026-00142)</h2>
          <p>تسجيل التقرير الفني ونسبة العجز والقرار النهائي للجنة المكونة في مستشفى خولة.</p>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>بيانات إحالة الحالة</h3></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="field"><label>سبب العرض الحالي</label><select id="reasonSelector"><option value="1">تقييم نسبة عجز (إصابة عمل)</option><option value="2">تقدير العجز المهني</option><option value="3">إصابة في الطريق</option><option value="4">إعادة العرض (تحسن/انتكاس)</option></select></div>
            <div class="field"><label>تاريخ الواقعة الأصلية</label><input value="28/03/2026" readonly></div>
          </div>
        </div>
      </div>

      <div class="card" style="margin-top:18px">
        <div class="card-head"><h3>التقرير الطبي الفني والتشخيص</h3></div>
        <div class="card-body">
           <div class="field"><label>التشخيص النهائي للجنة</label><input placeholder="مثلاً: كسر مضاعف مع تهتك في الأربطة..."></div>
           <div class="field" style="margin-top:12px"><label>خلاصة الفحص السريري</label><textarea placeholder="وصف الحالة الوظيفية الحالية..."></textarea></div>
        </div>
      </div>

      <!-- Ratio Panel (Visible for Reason 1, 4) -->
      <div id="ratioPanel" class="card" style="margin-top:18px; background:#f0fdf4">
        <div class="card-head"><h3>تقييم نسبة العجز</h3></div>
        <div class="card-body">
           <div class="form-grid">
             <div class="field"><label>النسبة المقدرة (%)</label><input type="number" value="0"></div>
             <div class="field"><label>تاريخ ثبوت العجز</label><input type="date"></div>
             <div class="field" style="grid-column: 1 / -1"><label>تفسير النسبة (حسب جدول العجز)</label><textarea placeholder="الفقرة (أ) من الجدول رقم (2)..."></textarea></div>
           </div>
        </div>
      </div>

      <!-- Re-assessment Panel (Visible for Reason 4) -->
      <div id="reassessPanel" class="card" style="margin-top:18px; display:none; background:#fffbeb">
        <div class="card-head"><h3>بيانات إعادة العرض</h3></div>
        <div class="card-body">
           <div class="form-grid">
             <div class="field"><label>النسبة السابقة</label><input value="15%" readonly></div>
             <div class="field"><label>النسبة الجديدة</label><input value="25%"></div>
             <div class="field" style="grid-column: 1 / -1"><label>مبررات التعديل</label><textarea></textarea></div>
           </div>
        </div>
      </div>

      <div class="card" style="margin-top:24px; border: 2px solid var(--g1)">
         <div class="card-head"><h3>القرار النهائي</h3></div>
         <div class="card-body">
            <div class="form-grid">
               <div class="field"><label>توصية اللجنة</label><select><option>اعتماد عجز كلي</option><option>اعتماد عجز جزئي دائم</option><option>تأجيل لعدم استقرار الحالة</option><option>إعادة للتصحيح</option></select></div>
            </div>
            <div class="actions" style="margin-top:18px">
              <button class="btn primary" data-action="اعتماد القرار" data-message="تم حفظ قرار اللجنة بنجاح وتحويله لمرحلة التوقيع" data-redirect="4.E-session-detail.html">اعتماد القرار ورده للجلسة</button>
              <button class="btn secondary" data-action="تأجيل" data-message="تم تسجيل حالة التأجيل">تأجيل البت</button>
              <a class="btn secondary" href="4.E-session-detail.html">رجوع للمسودة</a>
            </div>
         </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
  <script>
    document.getElementById('reasonSelector')?.addEventListener('change', function() {
       const ratio = document.getElementById('ratioPanel');
       const reassess = document.getElementById('reassessPanel');
       if(this.value === '4') {
         ratio.style.display = 'none';
         reassess.style.display = 'block';
       } else {
         ratio.style.display = 'block';
         reassess.style.display = 'none';
       }
    });
  </script>
</body>
</html>
