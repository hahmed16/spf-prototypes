<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقديم تظلم جديد — العامل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'appeals-list' });
setBreadcrumb([{ label: 'التظلمات', page: 'appeals-list' }, { label: 'تقديم تظلم جديد' }]);

const params = new URLSearchParams(window.location.search);
const refId = params.get('ref');
const u = WI_DATA.users.worker;
let selectedRequest = null;
let selectedDecision = null;

document.addEventListener('DOMContentLoaded', () => {
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>تقديم طلب تظلم من قرار مؤسسة صحية مرخصة</h1></div>
      <div class="pg-acts"><button class="btn btn-secondary" onclick="window.location.href='appeals-list.html'">${ICONS.arrow_left} رجوع</button></div>
    </div>

    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم التظلم</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">صفة مقدم التظلم</label><div class="fro">العامل / المؤمن عليه / المواطن</div></div>
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${u.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${u.civil}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف (من النظام)</label><div class="fro">${u.phone}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني (من النظام)</label><div class="fro">${u.email}</div></div>
          <div class="fgrp"><label class="flbl">رقم التأمين</label><div class="fro" style="font-family:monospace">INS-NEW</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge b-approved">نشط</span></div></div>
          <div class="fgrp"><label class="flbl">نوع الاشتراك</label><div class="fro">إلزامي</div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">1 مارس 2019</div></div>
          <div class="fgrp"><label class="flbl">رقم هاتف إضافي 1</label><input type="tel" class="fc" placeholder="أدخل رقم هاتف إضافي"></div>
          <div class="fgrp"><label class="flbl">رقم هاتف إضافي 2</label><input type="tel" class="fc" placeholder="أدخل رقم هاتف إضافي آخر"></div>
          <div class="fgrp"><label class="flbl">بريد إلكتروني إضافي</label><input type="email" class="fc" placeholder="example@domain.com"></div>
          <div class="fgrp"><label class="flbl">المنطقة</label><div class="fro">${normalizeDisplay(u.region, 'محافظة مسقط')}</div></div>
          <div class="fgrp"><label class="flbl">الولاية</label><div class="fro">${normalizeDisplay(u.wilayat, 'بوشر')}</div></div>
          <div class="fgrp"><label class="flbl">الدولة</label><div class="fro">${normalizeDisplay(u.country, 'سلطنة عُمان')}</div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="ph"><h3><div class="pico rd">${ICONS.search}</div>اختيار القرار المتظلم منه</h3></div>
      <div class="pb">
        <div class="fg fg-2" style="margin-bottom:14px">
          <div class="fgrp">
            <label class="flbl">رقم الطلب أو القرار <span class="req">*</span></label>
            <div class="inp-btn">
              <input type="text" class="fc" id="search-req-id" placeholder="APP / REF / WI ..." value="${refId || ''}">
              <button class="btn btn-primary btn-sm" onclick="searchRequest()">بحث</button>
            </div>
          </div>
        </div>
        <div id="search-results"></div>
      </div>
    </div>

    <div class="card" id="appeal-form-card" style="display:none">
      <div class="ph"><h3><div class="pico or">${ICONS.note}</div>بيانات التظلم</h3></div>
      <div class="pb">
        <div class="fg" style="gap:14px">
          <div class="fgrp">
            <label class="flbl">سبب التظلم <span class="req">*</span></label>
            <select class="fc" id="appeal-reason">
              <option value="">— اختر السبب —</option>
              <option>القرار مخالف للأنظمة واللوائح</option>
              <option>بيانات ناقصة أو غير مكتملة</option>
              <option>قرار غير مبرر</option>
              <option>سبب آخر</option>
            </select>
          </div>
          <div class="fgrp">
            <label class="flbl">تفاصيل سبب التظلم <span class="req">*</span></label>
            <textarea class="fc" id="appeal-details" rows="5" placeholder="اشرح سبب تظلمك بالتفصيل..."></textarea>
          </div>
          <div class="fgrp">
            <label class="flbl">تاريخ العلم بالقرار</label>
            <div class="fro" id="knowledge-date-display"></div>
            <input type="hidden" id="knowledge-date">
          </div>
          <div class="fgrp">
            <label class="flbl">الملاحظات <span class="req">*</span></label>
            <textarea class="fc" id="appeal-notes" rows="3" placeholder="أدخل ملاحظاتك الداعمة للتظلم..."></textarea>
          </div>
        </div>
      </div>
    </div>

    <div class="card" id="appeal-attachments-card" style="display:none">
      <div class="ph"><h3><div class="pico or">${ICONS.upload}</div>المرفقات الداعمة</h3></div>
      <div class="pb">
        <div class="alert alert-i" style="margin-bottom:12px">${ICONS.info}<span>يرجى إرفاق المستندات الداعمة للتظلم.</span></div>
        ${renderModernUploadComponent({ idPrefix: 'appeal-att', subTitle: 'يمكنك إرفاق التقارير الطبية أو أي مستندات داعمة' })}
      </div>
    </div>

    <div id="appeal-submit-btns" style="display:none;gap:10px;padding:16px 0">
      <button class="btn btn-primary btn-lg" onclick="submitAppeal()">${ICONS.check} تقديم التظلم</button>
      <button class="btn btn-secondary btn-lg" onclick="showToast('تم الحفظ كمسودة','i')">حفظ كمسودة</button>
      <button class="btn btn-ghost" onclick="window.location.href='appeals-list.html'">إلغاء</button>
    </div>`;

  searchRequest();
});

function searchRequest() {
  const rawId = document.getElementById('search-req-id').value.trim() || refId || 'REF-2025-000121';
  const resultsEl = document.getElementById('search-results');

  selectedRequest = {
    id: rawId,
    type: 'طلب عرض على مؤسسة صحية مرخصة',
    status: 'تم إرسال قرار المؤسسة الصحية المرخصة',
    submitDate: '2025-01-25',
  };

  selectedDecision = {
    id: `DEC-${rawId}`,
    type: 'قرار مؤسسة صحية مرخصة',
    date: '2025-01-29',
    issuer: 'مؤسسة صحية مرخصة',
    details: 'قرار تجريبي لغرض العرض على الشاشة الحالية.',
    knowledgeDate: '2025-01-29',
  };

  resultsEl.innerHTML = `
    <div class="tbl-wrap">
      <table class="dtbl">
        <thead><tr><th>رقم الطلب</th><th>نوع الطلب</th><th>رقم القرار</th><th>جهة الإصدار</th><th>تاريخ القرار</th><th>الحالة</th><th></th></tr></thead>
        <tbody>
          <tr>
            <td style="font-family:monospace">${selectedRequest.id}</td>
            <td>${selectedRequest.type}</td>
            <td style="font-family:monospace">${selectedDecision.id}</td>
            <td>${selectedDecision.issuer}</td>
            <td>${selectedDecision.date}</td>
            <td>${statusBadge(selectedRequest.status)}</td>
            <td><button class="btn btn-primary btn-xs" onclick="selectDecision()">اختيار هذا القرار للتظلم</button></td>
          </tr>
        </tbody>
      </table>
    </div>`;
}

function selectDecision() {
  document.getElementById('appeal-form-card').style.display = '';
  document.getElementById('appeal-attachments-card').style.display = '';
  document.getElementById('appeal-submit-btns').style.display = 'flex';
  document.getElementById('appeal-form-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.getElementById('knowledge-date-display').textContent = selectedDecision.knowledgeDate;
  document.getElementById('knowledge-date').value = selectedDecision.knowledgeDate;
  showToast('تم اختيار القرار — يرجى استكمال بيانات التظلم', 'i');
}

function submitAppeal() {
  const reason = document.getElementById('appeal-reason').value;
  const details = document.getElementById('appeal-details').value.trim();
  const notes = document.getElementById('appeal-notes').value.trim();
  const date = document.getElementById('knowledge-date').value;
  const attachmentsCount = document.querySelectorAll('#appeal-att-list .dz-item').length;
  if (!reason) { showToast('يرجى اختيار سبب التظلم', 'w'); return; }
  if (!details) { showToast('يرجى كتابة تفاصيل سبب التظلم', 'w'); return; }
  if (!notes) { showToast('يرجى إدخال الملاحظات', 'w'); return; }
  if (!date) { showToast('يرجى تحديد تاريخ العلم بالقرار', 'w'); return; }
  if (!attachmentsCount) { showToast('يرجى إرفاق المستندات الداعمة للتظلم', 'w'); return; }

  showToast('جارٍ تقديم التظلم...', 'i');
  setTimeout(() => {
    showToast('تم تقديم التظلم بنجاح — رقم التظلم: APP-2025-000089', 's', 5000);
    setTimeout(() => window.location.href = 'appeals-list.html', 2000);
  }, 1500);
}
</script>
</body>
</html>
