<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقديم تظلم جديد — العامل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'appeals-list' });
setBreadcrumb([{ label: 'التظلمات', page: 'appeals-list' }, { label: 'تقديم تظلم جديد' }]);

const params = new URLSearchParams(window.location.search);
const refId = params.get('ref');
const u = WI_DATA.users.worker;
let selectedRequest = null;
let selectedDecision = null;

document.addEventListener('DOMContentLoaded', () => {
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>تقديم طلب تظلم من قرار مؤسسة صحية مرخصة</h1></div>
      <div class="pg-acts"><button class="btn btn-secondary" onclick="window.location.href='appeals-list.html'">${ICONS.arrow_left} رجوع</button></div>
    </div>

    <!-- بيانات مقدم التظلم -->
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم التظلم</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">صفة مقدم التظلم</label><div class="fro">العامل / المؤمن عليه / المواطن</div></div>
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${u.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${u.civil}</div></div>
        </div>
      </div>
    </div>

    <!-- اختيار القرار المتظلم منه -->
    <div class="card">
      <div class="ph"><h3><div class="pico rd">${ICONS.search}</div>اختيار القرار المتظلم منه</h3></div>
      <div class="pb">
        <div class="fg fg-2" style="margin-bottom:14px">
          <div class="fgrp">
            <label class="flbl">رقم الطلب الأصلي <span class="req">*</span></label>
            <div class="inp-btn">
              <input type="text" class="fc" id="search-req-id" placeholder="WI-YYYY-XXXXXX" value="${refId || ''}">
              <button class="btn btn-primary btn-sm" onclick="searchRequest()">بحث</button>
            </div>
          </div>
        </div>
        <div id="search-results"></div>
      </div>
    </div>

    <!-- بيانات التظلم -->
    <div class="card" id="appeal-form-card" style="display:none">
      <div class="ph"><h3><div class="pico or">${ICONS.note}</div>بيانات التظلم</h3></div>
      <div class="pb">
        <div class="fg" style="gap:14px">
          <div class="fgrp">
            <label class="flbl">سبب التظلم <span class="req">*</span></label>
            <select class="fc" id="appeal-reason">
              <option value="">— اختر السبب —</option>
              <option>القرار مخالف للأنظمة واللوائح</option>
              <option>بيانات ناقصة أو غير مكتملة</option>
              <option>قرار غير مبرر</option>
              <option>سبب آخر</option>
            </select>
          </div>
          <div class="fgrp">
            <label class="flbl">تفاصيل سبب التظلم <span class="req">*</span></label>
            <textarea class="fc" id="appeal-details" rows="5" placeholder="اشرح سبب تظلمك بالتفصيل — الوقائع والأسباب القانونية والمستندات الداعمة..."></textarea>
          </div>
          <div class="fgrp">
            <label class="flbl">تاريخ العلم بالقرار</label>
            <div class="fro" id="knowledge-date-display"></div>
            <input type="hidden" id="knowledge-date">
          </div>
          <div class="fgrp">
            <label class="flbl">ملاحظات إضافية</label>
            <textarea class="fc" rows="3" placeholder="أي معلومات إضافية..."></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- المرفقات -->
    <div class="card" id="appeal-attachments-card" style="display:none">
      <div class="ph"><h3><div class="pico or">${ICONS.upload}</div>المرفقات الداعمة</h3></div>
      <div class="pb">
        ${renderModernUploadComponent({ idPrefix: 'appeal-att', subTitle: 'يمكنك إرفاق التقارير الطبية، المراسلات، أو أي مستندات داعمة أخرى' })}
      </div>
    </div>

    <!-- الأزرار -->
    <div id="appeal-submit-btns" style="display:none;gap:10px;padding:16px 0">
      <button class="btn btn-primary btn-lg" onclick="submitAppeal()">${ICONS.check} تقديم التظلم</button>
      <button class="btn btn-secondary btn-lg" onclick="showToast('تم الحفظ كمسودة','i')">حفظ كمسودة</button>
      <button class="btn btn-ghost" onclick="window.location.href='appeals-list.html'">إلغاء</button>
    </div>`;

  if (refId) searchRequest();
});

function searchRequest() {
  const id = document.getElementById('search-req-id').value.trim() || refId;
  const req = WI_DATA.allowances.find(r => r.id === id);
  const resultsEl = document.getElementById('search-results');

  if (!req) {
    resultsEl.innerHTML = `<div class="alert alert-w">${ICONS.warn}<span>لم يتم العثور على طلب بهذا الرقم.</span></div>`;
    return;
  }

  const decision = req.status === 'تم رفض الطلب'
    ? { type: 'رفض', date: req.lastUpdate?.split(' ')[0], issuer: 'رئيس قسم التحقيق في إصابات العمل', details: 'تم رفض الطلب لعدم استيفاء شروط إصابة العمل.', knowledgeDate: req.lastUpdate?.split(' ')[0] }
    : null;

  if (!decision) {
    resultsEl.innerHTML = `<div class="alert alert-w">${ICONS.warn}<span>لا توجد قرارات قابلة للتظلم على هذا الطلب. يمكن تقديم التظلم فقط على الطلبات المرفوضة أو قرارات المؤسسات الصحية.</span></div>`;
    return;
  }

  selectedRequest = req;
  selectedDecision = decision;

  resultsEl.innerHTML = `
    <div class="alert alert-s" style="margin-bottom:12px">${ICONS.check}<span>تم العثور على الطلب. يرجى اختيار القرار المتظلم منه:</span></div>
    <div style="border:1px solid var(--border);border-radius:var(--r);padding:14px;background:var(--g50);margin-bottom:14px">
      <div class="fg fg-3" style="margin-bottom:10px">
        <div><div class="flbl" style="margin-bottom:3px">رقم الطلب</div><div style="font-family:monospace;font-weight:700;color:var(--primary)">${req.id}</div></div>
        <div><div class="flbl" style="margin-bottom:3px">نوع الطلب</div><div>${req.type}</div></div>
        <div><div class="flbl" style="margin-bottom:3px">حالة الطلب</div>${statusBadge(req.status)}</div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:12px">
        <div class="flbl" style="margin-bottom:8px">القرار المتاح للتظلم:</div>
        <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:#fff;border:1px solid var(--border);border-radius:var(--rsm)">
          <span class="badge b-rejected">${decision.type}</span>
          <span style="font-size:12px">${decision.issuer}</span>
          <span style="font-size:11px;color:var(--text3)">${decision.date}</span>
          <button class="btn btn-primary btn-xs" style="margin-right:auto" onclick="selectDecision()">اختيار هذا القرار للتظلم</button>
        </div>
      </div>
    </div>`;
}

function selectDecision() {
  document.getElementById('appeal-form-card').style.display = '';
  document.getElementById('appeal-attachments-card').style.display = '';
  document.getElementById('appeal-submit-btns').style.display = 'flex';
  document.getElementById('appeal-form-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.getElementById('knowledge-date-display').textContent = selectedDecision.knowledgeDate;
  document.getElementById('knowledge-date').value = selectedDecision.knowledgeDate;
  showToast('تم اختيار القرار — يرجى استكمال بيانات التظلم', 'i');
}

function submitAppeal() {
  const reason = document.getElementById('appeal-reason').value;
  const details = document.getElementById('appeal-details').value.trim();
  const date = document.getElementById('knowledge-date').value;
  if (!reason) { showToast('يرجى اختيار سبب التظلم', 'w'); return; }
  if (!details) { showToast('يرجى كتابة تفاصيل التظلم', 'w'); return; }
  if (!date) { showToast('يرجى تحديد تاريخ العلم بالقرار', 'w'); return; }

  showToast('جارٍ تقديم التظلم...', 'i');
  setTimeout(() => {
    showToast('تم تقديم التظلم بنجاح — رقم التظلم: APP-2025-000089', 's', 5000);
    setTimeout(() => window.location.href = 'appeals-list.html', 2000);
  }, 1500);
}
</script>
</body>
</html>
