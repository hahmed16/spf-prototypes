<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة طلبات بدلات الانقطاع — العامل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'allowances-list' });
setBreadcrumb([{ label: 'بدلات الانقطاع عن العمل', page: 'allowances-list' }, { label: 'قائمة الطلبات' }]);

let activeTab = 'all';
const u = WI_DATA.users.worker;
const myReqs = WI_DATA.allowances.filter(r =>
  r.applicant.civil === u.civil || r.insured.civil === u.civil
);

document.addEventListener('DOMContentLoaded', render);

function render() {
  const filtered = activeTab === 'all' ? myReqs : myReqs.filter(r => {
    if (activeTab === 'pending') return !['معتمد','تم رفض الطلب','تم إغلاق الطلب'].includes(r.status);
    if (activeTab === 'approved') return r.status === 'معتمد';
    if (activeTab === 'rejected') return r.status === 'تم رفض الطلب';
    if (activeTab === 'needsaction') return r.status === 'تم إعادة الطلب لاستيفاء البيانات';
    return true;
  });

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة طلبات بدلات الانقطاع عن العمل</h1><p>طلباتك المقدمة — ${myReqs.length} طلب إجمالاً</p></div>
      <div class="pg-acts">
        <button class="btn btn-primary" onclick="window.location.href='allowances-new.html'">
          ${ICONS.plus} تقديم طلب جديد
        </button>
      </div>
    </div>

    ${myReqs.some(r=>r.status==='تم إعادة الطلب لاستيفاء البيانات') ? `
    <div class="alert alert-w">
      ${ICONS.warn}
      <div>
        <strong>لديك طلب يحتاج استيفاء بيانات</strong> — يرجى مراجعته وإرسال البيانات المطلوبة في أقرب وقت.
      </div>
    </div>` : ''}

    <div class="card">
      <div class="ttabs">
        ${[
          { key: 'all', label: 'الكل', count: myReqs.length },
          { key: 'needsaction', label: 'يحتاج استيفاء', count: myReqs.filter(r=>r.status==='تم إعادة الطلب لاستيفاء البيانات').length },
          { key: 'pending', label: 'قيد المعالجة', count: myReqs.filter(r=>!['معتمد','تم رفض الطلب','تم إغلاق الطلب'].includes(r.status)).length },
          { key: 'approved', label: 'معتمدة', count: myReqs.filter(r=>r.status==='معتمد').length },
          { key: 'rejected', label: 'مرفوضة', count: myReqs.filter(r=>r.status==='تم رفض الطلب').length },
        ].map(t=>`
          <div class="ttab ${activeTab===t.key?'act':''}" onclick="setTab('${t.key}')">
            ${t.label} <span class="tc">${t.count}</span>
          </div>`).join('')}
      </div>
      <div class="pb-0">
        ${filtered.length === 0 ? `
        <div class="empty-st">
          ${ICONS.list}
          <h4>لا توجد طلبات</h4>
          <p>لم تقدم أي طلبات في هذه الفئة بعد</p>
        </div>` : `
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead>
              <tr>
                <th>رقم الطلب</th>
                <th>نوع الطلب</th>
                <th>الحالة</th>
                <th>تاريخ التقديم</th>
                <th>آخر تحديث</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map(r=>`
              <tr style="${r.status==='تم إعادة الطلب لاستيفاء البيانات'?'background:var(--warning-l)':''}">
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                <td>${r.type} — ${r.subtype||''}</td>
                <td>${statusBadge(r.status)}</td>
                <td style="font-size:12px">${r.submitDate}</td>
                <td style="font-size:12px;color:var(--text3)">${r.lastUpdate}</td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="ibtn" onclick="window.location.href='allowances-details.html?id=${r.id}'" title="عرض التفاصيل">${ICONS.eye}</button>
                    ${r.status==='مسودة'?`<button class="ibtn" onclick="window.location.href='allowances-new.html?id=${r.id}'" title="تعديل">${ICONS.edit}</button>`:''}
                    ${r.status==='تم رفض الطلب'?`<button class="btn btn-warning btn-xs" onclick="window.location.href='../worker/appeals-new.html?ref=${r.id}'">تظلم</button>`:''}
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`}
      </div>
    </div>`;
}

function setTab(tab) {
  activeTab = tab;
  render();
}
</script>
</body>
</html>
