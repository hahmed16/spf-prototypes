<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات منفعة الأمراض المستديمة — العامل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'chronic-list' });
setBreadcrumb([{ label: 'منفعة الأمراض المستديمة' }, { label: 'الطلبات المقدمة' }]);

document.addEventListener('DOMContentLoaded', () => {
  const pending = WI_DATA.chronicIncoming.filter((d) => d.hasRequest);

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>طلبات منفعة الأمراض المستديمة المقدمة</h1></div>
      <div class="pg-acts"><a href="chronic-incoming.html" class="btn btn-secondary btn-sm">${ICONS.inbox} التشخيصات الواردة</a></div>
    </div>

    ${renderUnifiedFilterBar({ onSearch: 'noopUnifiedSearch', onToggleAll: 'noopUnifiedToggleAll', isAllVisible: false })}

    <div class="card">
      <div class="pb-0">
        ${pending.length === 0 ? `
        <div class="empty-st">
          ${ICONS.medical}
          <h4>لا توجد طلبات مقدمة</h4>
          <p>لم يتم تقديم أي طلبات منفعة أمراض مستديمة بعد</p>
          <a href="chronic-incoming.html" class="btn btn-primary" style="margin-top:12px">عرض التشخيصات الواردة</a>
        </div>` : `
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم الطلب</th><th>مقدم الطلب</th><th>التشخيص</th><th>المستشفى</th><th>الحالة</th><th>تاريخ تقديم الطلب</th><th>تاريخ ورود التشخيص الطبي</th><th>الأيام المتبقية</th><th></th></tr></thead>
            <tbody>
              ${pending.map((d) => {
                const record = {
                  id: d.requestId,
                  status: d.requestStatus,
                  submitDate: d.requestSubmitDate || '2025-01-05',
                  lastUpdate: d.requestLastUpdate,
                  lastUpdatedBy: d.assignedTo,
                  expectedClosureDate: null,
                  slaDays: 10
                };
                const meta = deriveRequestSummaryMeta(record);
                return `
              <tr>
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${d.requestId}</td>
                <td>${getSubmittedByName(d)}</td>
                <td>${d.diagnosis}</td>
                <td>${d.hospital}</td>
                <td><span class="badge b-submitted">قيد المراجعة</span></td>
                <td>${formatDate(d.requestSubmitDate || '2025-01-05')}</td>
                <td>${formatDate((d.receivedMedicalDate || d.visitDateTime || d.provenDate || '').split(' ')[0])}</td>
                <td><span class="sla-days ${getRemainingDaysClass(meta.remainingDays)}">${getRemainingDaysLabel(meta.remainingDays)}</span></td>
                <td><button class="ibtn" onclick="window.location.href='chronic-details.html?id=${d.requestId}'">${ICONS.eye}</button></td>
              </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`}
      </div>
    </div>`;

  removeWorkerFilterFields(['الرقم المدني', 'رقم السجل التجاري']);
});

function removeWorkerFilterFields(labels) {
  document.querySelectorAll('.unified-filter-panel .fgrp').forEach((group) => {
    const label = group.querySelector('.flbl')?.textContent?.trim();
    if (labels.includes(label)) group.remove();
  });
}
</script>
</body>
</html>
