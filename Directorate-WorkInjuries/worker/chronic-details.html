<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل طلب الأمراض المستديمة — العامل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'chronic-list' });

const params = new URLSearchParams(window.location.search);
const requestId = params.get('id') || 'CHR-2025-000156';
const workerUser = WI_DATA.users?.worker || {};
const incomingRecord = (WI_DATA.chronicIncoming || []).find((item) => item.requestId === requestId)
  || (WI_DATA.chronicIncoming || []).find((item) => item.civil === workerUser.civil)
  || null;
let req = (WI_DATA.chronic || []).find((item) => item.id === requestId) || createWorkerChronicRequest(incomingRecord, requestId);
currentRequestId = req.id;

setBreadcrumb([{ label: 'الأمراض المستديمة', page: 'chronic-list' }, { label: 'تفاصيل الطلب' }]);

document.addEventListener('DOMContentLoaded', () => {
  const atts = req.attachments || [];
  const tl = req.timeline || [];
  const summary = getWorkerChronicSummary(req, incomingRecord);
  const workerActions = getWorkerChronicActions(req.status);

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>تفاصيل طلب منفعة الأمراض المستديمة</h1>
        <p>رقم الطلب: <strong style="font-family:monospace;color:var(--primary)">${req.id}</strong></p>
      </div>
      <div class="pg-acts"><button class="btn btn-secondary" onclick="window.location.href='chronic-list.html'">${ICONS.arrow_left} رجوع</button></div>
    </div>

    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div class="req-summary-grid">
          <div><div class="flbl" style="margin-bottom:4px">رقم الطلب</div><div style="font-size:15px;font-weight:800;color:var(--primary);font-family:monospace">${req.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">الحالة الحالية</div>${statusBadge(req.status)}</div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ التقديم</div><div style="font-size:12.5px">${formatDate(req.submitDate)}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث</div><div style="font-size:12px;color:var(--text2)">${normalizeDisplay(req.lastUpdate)}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">مرجع وزارة الصحة</div><div style="font-size:12px;font-family:monospace">${summary.uniqueRequestId}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">المؤسسة الصحية المعالجة</div><div style="font-size:12.5px">${summary.hospital}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ التشخيص الوارد</div><div style="font-size:12.5px">${summary.visitDateTime}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">المسار المتوقع</div><div style="font-size:12.5px">${summary.expectedPath}</div></div>
        </div>
      </div>
    </div>

    ${renderWorkerChronicWorkflow(req, summary)}

    <div class="card card-ro">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب / المؤمن عليه</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-4">
          <div class="fgrp"><label class="flbl">صفة مقدم الطلب</label><div class="fro">${req.applicant?.role || 'العامل / المؤمن عليه / المواطن'}</div></div>
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.applicant?.name || workerUser.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.applicant?.civil || workerUser.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف (من النظام)</label><div class="fro">${normalizeDisplay(req.applicant?.phone || workerUser.phone)}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني (من النظام)</label><div class="fro">${normalizeDisplay(req.applicant?.email || workerUser.email)}</div></div>
          <div class="fgrp"><label class="flbl">رقم هاتف إضافي 1</label><div class="fro">${normalizeDisplay(workerUser.phoneAlt1)}</div></div>
          <div class="fgrp"><label class="flbl">رقم هاتف إضافي 2</label><div class="fro">${normalizeDisplay(workerUser.phoneAlt2)}</div></div>
          <div class="fgrp"><label class="flbl">بريد إلكتروني إضافي</label><div class="fro">${normalizeDisplay(workerUser.emailAlt)}</div></div>
          <div class="fgrp"><label class="flbl">المحافظة</label><div class="fro">${normalizeDisplay(workerUser.region, 'محافظة مسقط')}</div></div>
          <div class="fgrp"><label class="flbl">الولاية</label><div class="fro">${normalizeDisplay(workerUser.wilayat, 'بوشر')}</div></div>
          <div class="fgrp"><label class="flbl">الدولة</label><div class="fro">${normalizeDisplay(workerUser.country, 'سلطنة عُمان')}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${req.insurance?.status === 'نشط' ? 'b-approved' : 'b-rejected'}">${normalizeDisplay(req.insurance?.status)}</span></div></div>
          <div class="fgrp"><label class="flbl">نوع التأمين</label><div class="fro">تأمين العاملين في القطاع الخاص</div></div>
          <div class="fgrp"><label class="flbl">نوع الاشتراك</label><div class="fro">${normalizeDisplay(req.insurance?.subType)}</div></div>
          <div class="fgrp"><label class="flbl">فئة النظام</label><div class="fro">داخل السلطنة - القطاع الخاص</div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">${formatDate(req.insurance?.regDate)}</div></div>
          <div class="fgrp"><label class="flbl">منافع أخرى مستحقة</label><div class="fro">${normalizeDisplay(req.insurance?.otherBenefits)}</div></div>
        </div>
      </div>
    </div>

    <div class="card card-ro">
      <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>ملخص التشخيص الوارد من وزارة الصحة</h3></div>
      <div class="pb">
        <div class="alert alert-i" style="margin-bottom:14px">${ICONS.info}<span>هذه البيانات مستلمة تلقائياً من وزارة الصحة للعرض فقط ولا يمكن تعديلها.</span></div>
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">المؤسسة الصحية المعالجة</label><div class="fro">${summary.hospital}</div></div>
          <div class="fgrp span-full"><label class="flbl">التشخيص الطبي (تقرير وصفي مثبت)</label><div class="fro medical-report">${summary.permanentDiseaseReport}</div></div>
          <div class="fgrp"><label class="flbl">المرض المزمن</label><div class="fro">${summary.chronicDisease}</div></div>
          <div class="fgrp"><label class="flbl">الجهاز المتأثر</label><div class="fro">${summary.affectedSystem}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ووقت الزيارة</label><div class="fro">${summary.visitDateTime}</div></div>
          ${summary.firstRequestRef !== '—' ? `<div class="fgrp"><label class="flbl">رقم أول طلب مرتبط</label><div class="fro" style="font-family:monospace">${summary.firstRequestRef}</div></div>` : ''}
          ${summary.overallCondition !== '—' ? `<div class="fgrp span-full"><label class="flbl">الحالة العامة</label><div class="fro">${summary.overallCondition}</div></div>` : ''}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="ph">
        <h3><div class="pico or">${ICONS.upload}</div>المرفقات <span style="font-size:11px;font-weight:400;color:var(--text3)">(${atts.length} مرفق)</span></h3>
        <button class="btn btn-secondary btn-xs" onclick="openAddAttachmentModal()">${ICONS.plus} إضافة مرفق</button>
      </div>
      <div class="pb">
        ${atts.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد مرفقات</div>' : atts.map((att) => {
          const ext = att.name?.split('.').pop()?.toLowerCase() || 'oth';
          const icoMap = { pdf: 'file', doc: 'file', docx: 'file', jpg: 'img', jpeg: 'img', png: 'img' };
          return `<div class="att-row"><div class="att-ico ${icoMap[ext] || 'oth'}">${ICONS.file}</div><div class="att-info"><div class="att-name">${att.name}</div><div class="att-meta">${att.type} · رفعه: ${att.uploadedBy} (${att.role}) · ${att.uploadDate} · ${att.size || ''}</div></div><div class="att-acts"><button class="ibtn" title="تحميل" onclick="showToast('جارٍ تحميل الملف...','i')">${ICONS.download}</button></div></div>`;
        }).join('')}
        <div style="margin-top:10px">
          ${renderModernUploadComponent({ idPrefix: 'gen-att', subTitle: 'PDF, Word, صور — الحجم الأقصى 20 ميغابايت' })}
        </div>
      </div>
    </div>

    ${workerActions.length > 0 ? `
    <div class="dp">
      <div class="ph"><h3><div class="pico bl">${ICONS.pen}</div>الإجراءات المتاحة لك</h3></div>
      <div class="dp-body">
        <div class="fgrp">
          <label class="flbl">ملاحظاتك <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          <textarea class="fc" id="decision-notes" placeholder="أكتب ملاحظاتك هنا..." rows="3"></textarea>
        </div>
        <div class="fgrp">
          <label class="flbl">إرفاق ملفات داعمة <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          ${renderModernUploadComponent({ idPrefix: 'decision-att', subTitle: 'يمكن رفع عدة ملفات دفعة واحدة' })}
        </div>
        <div class="dp-acts">
          ${workerActions.map((action) => `<button class="btn ${WI_CONFIG.actionStyles[action] || 'btn-secondary btn-sm'}" onclick="executeAction('${action}')">${action}</button>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <div class="card">
      <div class="ph"><h3><div class="pico gy">${ICONS.clock}</div>السجل الزمني الكامل للطلب</h3></div>
      <div class="pb">${renderTimelineList(tl, { hideActor: true, hidePhone: true })}</div>
    </div>`;
});

function createWorkerChronicRequest(incoming, fallbackId) {
  if (incoming) {
    return {
      id: incoming.requestId || fallbackId || 'CHR-2025-000156',
      status: incoming.requestStatus || 'تم تقديم الطلب — بانتظار مراجعة موظف قسم الإعاقة والأمراض المستديمة',
      submitDate: incoming.requestSubmitDate || incoming.provenDate || '2025-01-05',
      lastUpdate: incoming.requestLastUpdate || incoming.visitDateTime || '2025-01-05 14:00',
      lastUpdatedBy: incoming.assignedTo || null,
      expectedClosureDate: null,
      remainingDays: null,
      applicant: {
        name: incoming.applicantName || workerUser.name || '',
        civil: incoming.civil || workerUser.civil || '',
        phone: workerUser.phone || '',
        email: workerUser.email || '',
        role: 'العامل / المؤمن عليه / المواطن',
      },
      chronic: {
        chronicDisease: incoming.chronicDisease || incoming.diagnosis || '',
        diagnosisDate: incoming.provenDate || '',
        severity: incoming.severityIndex || '',
        treatment: '',
        medications: [],
        complications: '',
        lastAssessment: '',
        nextAssessment: '',
        path: incoming.expectedPath || 'مسار اللجان الطبية',
      },
      insurance: {
        status: 'نشط',
        regDate: '',
        subType: 'إلزامي',
        otherBenefits: 'لا يوجد',
      },
      attachments: [],
      notes: [],
      timeline: [
        { action: 'تم استلام التشخيص من وزارة الصحة', actor: 'وزارة الصحة', role: 'آلي', time: incoming.visitDateTime || '2025-01-01 08:00', fromStatus: '', toStatus: 'تم استلام التشخيص', note: '', type: 'default' },
        { action: 'تم تقديم الطلب', actor: incoming.applicantName || workerUser.name || 'المؤمن عليه', role: 'العامل', time: incoming.requestSubmitDate || '2025-01-05 14:00', fromStatus: 'تم استلام التشخيص', toStatus: incoming.requestStatus || 'تم تقديم الطلب', note: '', type: 'default' },
      ],
      assignedTo: incoming.assignedTo || '',
      checkedOutBy: '',
      referral: null,
      session: null,
      committeeDecision: null,
    };
  }

  return {
    id: fallbackId || 'CHR-2025-000156',
    status: 'تم تقديم الطلب — بانتظار مراجعة موظف قسم الإعاقة والأمراض المستديمة',
    submitDate: '2025-01-05',
    lastUpdate: '2025-01-05 14:00',
    lastUpdatedBy: null,
    expectedClosureDate: null,
    remainingDays: null,
    applicant: {
      name: workerUser.name || '—',
      civil: workerUser.civil || '—',
      phone: workerUser.phone || '—',
      email: workerUser.email || '—',
      role: 'العامل / المؤمن عليه / المواطن',
    },
    chronic: {
      chronicDisease: '—',
      diagnosisDate: '',
      severity: '',
      treatment: '',
      medications: [],
      complications: '',
      lastAssessment: '',
      nextAssessment: '',
      path: 'مسار اللجان الطبية',
    },
    insurance: {
      status: 'نشط',
      regDate: '',
      subType: 'إلزامي',
      otherBenefits: 'لا يوجد',
    },
    attachments: [],
    notes: [],
    timeline: [],
    assignedTo: '',
    checkedOutBy: '',
    referral: null,
    session: null,
    committeeDecision: null,
  };
}

function getWorkerChronicSummary(request, incoming) {
  return {
    hospital: normalizeDisplay(incoming?.hospital),
    permanentDiseaseReport: normalizeDisplay(incoming?.permanentDiseaseReport || buildWorkerPermanentDiseaseReport(request)),
    chronicDisease: normalizeDisplay(incoming?.chronicDisease || request.chronic?.chronicDisease),
    affectedSystem: normalizeDisplay(incoming?.affectedSystem),
    visitDateTime: normalizeDisplay(incoming?.visitDateTime || request.chronic?.diagnosisDate),
    firstRequestRef: normalizeDisplay(incoming?.firstRequestRef),
    overallCondition: normalizeDisplay(incoming?.overallCondition),
    uniqueRequestId: normalizeDisplay(incoming?.uniqueRequestId),
    expectedPath: normalizeDisplay(incoming?.expectedPath || request.chronic?.path),
  };
}

function buildWorkerPermanentDiseaseReport(request) {
  if (!request?.chronic?.chronicDisease) return '—';
  const lines = [
    `تم استلام تشخيص طبي مثبت بخصوص ${request.chronic.chronicDisease}.`,
    request.chronic.severity ? `مستوى الشدة الحالي: ${request.chronic.severity}.` : '',
    request.chronic.complications ? `المضاعفات أو الآثار المرتبطة بالحالة: ${request.chronic.complications}.` : '',
    request.chronic.treatment ? `الخطة العلاجية الحالية: ${request.chronic.treatment}.` : '',
  ].filter(Boolean);
  return lines.join('\n');
}

function renderWorkerChronicWorkflow(request, summary) {
  const current = getWorkerChronicStage(request, summary);
  const stages = [
    { key: 'submitted', name: 'تقديم الطلب', desc: 'قام المؤمن عليه بتقديم الطلب عبر البوابة.' },
    { key: 'disability-review', name: 'بحث الطلب فى قسم الاعاقة والامراض المستديمة', desc: 'الطلب قيد الدراسة الأولية لدى القسم المختص.' },
    { key: 'committees-review', name: 'بحث الطلب فى قسم اللجان الطبية', desc: 'الطلب قيد المراجعة والتحقق لدى قسم اللجان الطبية.' },
    { key: 'institution', name: 'العرض على المؤسسات الصحية المرخصة', desc: 'الطلب في مرحلة العرض أو الاستكمال مع المؤسسة الصحية المرخصة.' },
  ];
  const currentIndex = stages.findIndex((stage) => stage.key === current);

  return `
    <div class="card workflow-card">
      <div class="ph"><h3><div class="pico bl">${ICONS.chart}</div>مسار العمل المتوقع</h3></div>
      <div class="pb">
        <div class="workflow-strip">
          ${stages.map((stage, index) => {
            const isCurrent = stage.key === current;
            const isDone = currentIndex > index;
            return `
              <div class="workflow-stage ${isCurrent ? 'current' : ''} ${isDone ? 'done' : ''}">
                <div class="workflow-stage-dot">${isDone ? ICONS.check : index + 1}</div>
                <div class="workflow-stage-body">
                  <div class="workflow-stage-name">${stage.name}</div>
                  <div class="workflow-stage-desc">${stage.desc}</div>
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
}

function getWorkerChronicStage(request, summary) {
  const status = String(request?.status || '');
  const path = String(summary?.expectedPath || request?.chronic?.path || '');
  if (
    status.includes('المؤسسات الصحية المرخصة') ||
    status.includes('الصرف') ||
    status.includes('اعتماد') ||
    request?.referral ||
    request?.session ||
    request?.committeeDecision ||
    path.includes('المؤسسات')
  ) return 'institution';
  if (status.includes('اللجان الطبية')) return 'committees-review';
  if (status.includes('الإعاقة') || status.includes('الأمراض المستديمة')) return 'disability-review';
  return 'submitted';
}

function getWorkerChronicActions(status) {
  if (status === 'مسودة') return ['إرسال الطلب', 'حذف'];
  if (status === 'تم إعادة الطلب لاستيفاء البيانات') return ['استيفاء البيانات المطلوبة وإعادة الإرسال'];
  if (status === 'تم رفض الطلب') return ['تقديم تظلم'];
  return [];
}
</script>
</body>
</html>
