<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل طلب الأمراض المستديمة — العامل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'chronic-list' });
setBreadcrumb([{ label: 'الأمراض المستديمة', page: 'chronic-list' }, { label: 'تفاصيل الطلب' }]);

const params = new URLSearchParams(window.location.search);
const requestId = params.get('id') || 'CHR-2025-000156';
const incomingRecord = WI_DATA.chronicIncoming.find(d => d.requestId === requestId) || WI_DATA.chronicIncoming.find(d => d.hasRequest) || WI_DATA.chronicIncoming[0];
const currentWorker = WI_DATA.users.worker;
const currentEmployer = (currentWorker.employerHistory || []).find(e => e.current) || (currentWorker.employerHistory || [])[0];

const req = {
  id: requestId,
  status: 'تم تقديم الطلب — بانتظار مراجعة موظف قسم الإعاقة والأمراض المستديمة',
  submitDate: incomingRecord?.requestSubmitDate || '2025-01-05',
  lastUpdate: '2025-01-05 14:00',
  insured: {
    name: currentWorker.name,
    civil: currentWorker.civil,
    insurance: 'IN-20190045678',
    dob: '1985-06-15',
    gender: 'ذكر',
    nationality: 'عُماني',
    insuranceStatus: 'نشط',
    regDate: '2019-03-01',
    subType: 'إلزامي',
    phone: currentWorker.phone,
    email: currentWorker.email,
    region: currentWorker.region || 'مسقط',
    wilayat: currentWorker.wilayat || 'بوشر',
    country: currentWorker.country || 'سلطنة عُمان',
    civilExpiry: currentWorker.civilExpiry || ''
  },
  insurance: {
    status: 'نشط',
    subType: 'إلزامي',
    otherBenefits: 'لا يوجد',
    insuranceType: 'تأمين العاملين في القطاع الخاص',
    schemeCategory: 'داخل السلطنة - القطاع الخاص'
  },
  medical: {
    hospital: incomingRecord?.hospital || '—',
    doctor: incomingRecord?.doctor || '—',
    diagnosis: incomingRecord?.diagnosis || '—',
    detailedDiagnosis: incomingRecord?.detailedDiagnosis || incomingRecord?.diagnosis || '—',
    permanentDiseaseReport: incomingRecord?.permanentDiseaseReport || '',
    provenDate: incomingRecord?.provenDate || '',
    expectedPath: incomingRecord?.expectedPath || '—',
    severityDate: incomingRecord?.severityDate || '',
    uniqueRequestId: incomingRecord?.uniqueRequestId || incomingRecord?.refId || '',
    chronicDisease: incomingRecord?.chronicDisease || '',
    affectedSystem: incomingRecord?.affectedSystem || '',
    severityIndex: incomingRecord?.severityIndex || '',
    visitDateTime: incomingRecord?.visitDateTime || '',
    firstRequestRef: incomingRecord?.firstRequestRef || '',
    overallCondition: incomingRecord?.overallCondition || ''
  },
  attachments: [],
  notes: [],
  timeline: [
    { action: 'تم استلام التشخيص من المؤسسة الصحية المعالجة', actor: 'وزارة الصحة', role: 'آلي', time: '2024-11-22 08:00', fromStatus: '', toStatus: 'تم استلام التشخيص من المؤسسة الصحية المعالجة', note: '', type: 'default' },
    { action: 'تم تقديم الطلب من قِبل المؤمن عليه', actor: WI_DATA.users.worker.name, role: 'العامل', time: '2025-01-05 14:00', fromStatus: 'تم استلام التشخيص', toStatus: 'تم تقديم الطلب — بانتظار مراجعة موظف قسم الإعاقة والأمراض المستديمة', note: '', type: 'default' },
  ]
};
currentRequestId = req.id;

document.addEventListener('DOMContentLoaded', () => {
  const atts  = req.attachments || [];
  const notes = req.notes || [];
  const tl    = req.timeline || [];

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>تفاصيل طلب منفعة الأمراض المستديمة</h1>
        <p>رقم الطلب: <strong style="font-family:monospace;color:var(--primary)">${req.id}</strong></p>
      </div>
      <div class="pg-acts"><button class="btn btn-secondary" onclick="window.location.href='chronic-list.html'">${ICONS.arrow_left} رجوع</button></div>
    </div>

    <!-- ملخص الطلب -->
    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div class="req-summary-grid">
          <div><div class="flbl" style="margin-bottom:4px">رقم الطلب</div><div style="font-size:15px;font-weight:800;color:var(--primary);font-family:monospace">${req.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">الحالة الحالية</div>${statusBadge(req.status)}</div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ التقديم</div><div style="font-size:12.5px">${req.submitDate}</div></div>
        </div>
      </div>
    </div>

    <!-- بيانات المؤمن عليه -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات المؤمن عليه / المستفيد</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-4">
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.insured.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.insured.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(req.insured.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${req.insured.gender || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${req.insured.nationality || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${req.insured.insuranceStatus === 'نشط' ? 'b-approved' : 'b-rejected'}">${req.insured.insuranceStatus || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">${formatDate(req.insured.regDate)}</div></div>
          ${req.insured.subType ? `<div class="fgrp"><label class="flbl">نوع الاشتراك</label><div class="fro">${req.insured.subType}</div></div>` : ''}
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${normalizeDisplay(req.insured.phone, '96890000000')}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${normalizeDisplay(req.insured.email, 'noreply@spf-proto.om')}</div></div>
          <div class="fgrp"><label class="flbl">انتهاء البطاقة الشخصية</label><div class="fro">${formatDate(req.insured.civilExpiry)}</div></div>
          <div class="fgrp"><label class="flbl">المنطقة</label><div class="fro">${normalizeDisplay(req.insured.region, 'محافظة مسقط')}</div></div>
          <div class="fgrp"><label class="flbl">الولاية</label><div class="fro">${normalizeDisplay(req.insured.wilayat, 'بوشر')}</div></div>
          <div class="fgrp"><label class="flbl">الدولة</label><div class="fro">${normalizeDisplay(req.insured.country, 'سلطنة عُمان')}</div></div>
        </div>
      </div>
    </div>

    <!-- البيانات الطبية -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>البيانات الطبية <span style="font-size:10px;color:var(--text3)">(واردة من وزارة الصحة)</span></h3></div>
      <div class="pb">
        <div class="alert alert-i" style="margin-bottom:14px">${ICONS.info}<span>هذه البيانات مستلمة تلقائياً من منظومة وزارة الصحة ولا يمكنك تعديلها.</span></div>
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">رقم الطلب الفريد (وزارة الصحة)</label><div class="fro" style="font-family:monospace">${normalizeDisplay(req.medical.uniqueRequestId)}</div></div>
          <div class="fgrp"><label class="flbl">المؤسسة الصحية المعالجة</label><div class="fro" style="font-weight:600">${normalizeDisplay(req.medical.hospital)}</div></div>
          <div class="fgrp"><label class="flbl">الطبيب المعالج</label><div class="fro">${normalizeDisplay(req.medical.doctor)}</div></div>
          <div class="fgrp span-full"><label class="flbl">التشخيص الطبي (تقرير وصفي مثبت)</label><div class="fro medical-report">${normalizeDisplay(req.medical.permanentDiseaseReport || incomingRecord?.permanentDiseaseReport || buildPermanentDiseaseReport(req.medical))}</div></div>
          <div class="fgrp"><label class="flbl">المرض المزمن</label><div class="fro">${normalizeDisplay(req.medical.chronicDisease)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ثبوت المرض</label><div class="fro">${formatDate(req.medical.provenDate)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ شدة المرض</label><div class="fro">${formatDate(req.medical.severityDate)}</div></div>
          <div class="fgrp"><label class="flbl">الجهاز المتأثر</label><div class="fro">${normalizeDisplay(req.medical.affectedSystem)}</div></div>
          <div class="fgrp"><label class="flbl">مؤشر الشدة الطبي</label><div class="fro">${normalizeDisplay(req.medical.severityIndex)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ووقت الزيارة</label><div class="fro">${normalizeDisplay(req.medical.visitDateTime)}</div></div>
          ${req.medical.firstRequestRef ? `<div class="fgrp"><label class="flbl">رقم أول طلب مرتبط</label><div class="fro" style="font-family:monospace">${req.medical.firstRequestRef}</div></div>` : ''}
          ${req.medical.overallCondition ? `<div class="fgrp span-full"><label class="flbl">الحالة العامة</label><div class="fro">${req.medical.overallCondition}</div></div>` : ''}
        </div>
      </div>
    </div>

    <!-- بيانات التأمين -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico gr">${ICONS.shield}</div>بيانات التأمين</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge b-approved">${req.insurance.status}</span></div></div>
          <div class="fgrp"><label class="flbl">رقم التأمين</label><div class="fro" style="font-family:monospace">${normalizeDisplay(req.insured.insurance)}</div></div>
          ${req.insurance.subType ? `<div class="fgrp"><label class="flbl">نوع الاشتراك</label><div class="fro">${req.insurance.subType}</div></div>` : ''}
          <div class="fgrp"><label class="flbl">نوع التأمين</label><div class="fro">${normalizeDisplay(req.insurance.insuranceType)}</div></div>
          <div class="fgrp"><label class="flbl">فئة النظام</label><div class="fro">${normalizeDisplay(req.insurance.schemeCategory)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">${formatDate(req.insured.regDate)}</div></div>
          <div class="fgrp"><label class="flbl">بداية الخدمة لدى جهة العمل الحالية</label><div class="fro">${formatDate(currentEmployer?.joinDate)}</div></div>
          <div class="fgrp"><label class="flbl">جهة العمل الحالية</label><div class="fro">${normalizeDisplay(currentEmployer?.name)}</div></div>
          <div class="fgrp"><label class="flbl">السجل التجاري لجهة العمل الحالية</label><div class="fro" style="font-family:monospace">${normalizeDisplay(currentEmployer?.cr)}</div></div>
          <div class="fgrp"><label class="flbl">منافع أخرى</label><div class="fro">${req.insurance.otherBenefits}</div></div>
        </div>
      </div>
    </div>

    <!-- المرفقات -->
    <div class="card">
      <div class="ph">
        <h3><div class="pico or">${ICONS.upload}</div>المرفقات <span style="font-size:11px;font-weight:400;color:var(--text3)">(${atts.length} مرفق)</span></h3>
        <button class="btn btn-secondary btn-xs" onclick="openAddAttachmentModal()">${ICONS.plus} إضافة مرفق</button>
      </div>
      <div class="pb">
        ${atts.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد مرفقات</div>' : atts.map(att => {
          const ext = att.name?.split('.').pop()?.toLowerCase() || 'oth';
          const icoMap = { pdf: 'file', doc: 'file', docx: 'file', jpg: 'img', jpeg: 'img', png: 'img' };
          return `<div class="att-row"><div class="att-ico ${icoMap[ext] || 'oth'}">${ICONS.file}</div><div class="att-info"><div class="att-name">${att.name}</div><div class="att-meta">${att.type} · رفعه: ${att.uploadedBy} (${att.role}) · ${att.uploadDate} · ${att.size || ''}</div></div><div class="att-acts"><button class="ibtn" title="تحميل" onclick="showToast('جارٍ تحميل الملف...','i')">${ICONS.download}</button></div></div>`;
        }).join('')}
        <div style="margin-top:10px">
          ${renderModernUploadComponent({ idPrefix: 'gen-att', subTitle: 'PDF, Word, صور — الحجم الأقصى 20 ميغابايت' })}
        </div>
      </div>
    </div>

    <!-- الملاحظات التشغيلية -->
    <div class="card op-notes-card collapsed" data-notes-init="0">
      <div class="ph op-notes-head" onclick="toggleOperationalNotes(this.closest('.op-notes-card'))">
        <h3><div class="pico gy">${ICONS.note}</div>الملاحظات التشغيلية <span style="font-size:11px;font-weight:400;color:var(--text3)">(لا تغيّر حالة الطلب)</span></h3>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="op-notes-chevron">${ICONS.arrow_left}</span>
          <button class="btn btn-secondary btn-xs" onclick="event.stopPropagation();openAddNoteModal(currentRequestId)">${ICONS.plus} إضافة ملاحظة</button>
        </div>
      </div>
      <div class="pb">
        ${notes.length === 0 ? '<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">لا توجد ملاحظات تشغيلية</div>' : notes.map(n => `<div class="note-item"><div class="note-av">${n.author?.charAt(0) || '؟'}</div><div class="note-c"><div class="note-hd"><span class="note-auth">${n.author}</span><span class="note-role">${n.role}</span><span class="note-time">${n.time}</span></div><div class="note-txt">${n.text}</div></div></div>`).join('')}
        <div style="margin-top:10px;display:flex;gap:8px">
          <textarea class="fc" id="quick-note-input" placeholder="أكتب ملاحظة سريعة..." rows="2" style="flex:1"></textarea>
          <button class="btn btn-secondary btn-sm" style="align-self:flex-end" onclick="quickAddNote()">حفظ</button>
        </div>
      </div>
    </div>

    <!-- السجل الزمني -->
    <div class="card">
      <div class="ph"><h3><div class="pico gy">${ICONS.clock}</div>السجل الزمني الكامل للطلب</h3></div>
      <div class="pb">
        <div class="tl">
          ${tl.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد أحداث</div>' : tl.map(e => {
            const dc = e.type === 'success' ? 's' : e.type === 'danger' ? 'd' : e.type === 'warning' ? 'w' : '';
            const ic = e.type === 'success' ? ICONS.check : e.type === 'danger' ? ICONS.x : e.type === 'warning' ? ICONS.warn : ICONS.clock;
            return `<div class="tl-item"><div class="tl-dot ${dc}">${ic}</div><div class="tl-c"><div class="tl-hd"><span class="tl-act">${e.action}</span><span class="tl-time">${e.time}</span></div><div class="tl-meta"><span>${e.actor}</span><span style="color:var(--text3)">·</span><span>${e.role}</span></div>${e.toStatus ? `<div class="tl-states">${e.fromStatus ? `<span class="badge b-draft" style="font-size:10px">${e.fromStatus}</span><span>${ICONS.arrow_right}</span>` : ''}<span class="badge ${WI_CONFIG.statusBadges[e.toStatus] || 'b-draft'}" style="font-size:10px">${e.toStatus}</span></div>` : ''}${e.note ? `<div class="tl-note">${e.note}</div>` : ''}</div></div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
});
</script>
</body>
</html>
