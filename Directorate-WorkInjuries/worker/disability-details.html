<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل طلب منفعة الإعاقة — العامل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/workflow-stages.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'disability-list' });

const params = new URLSearchParams(window.location.search);
const reqId = params.get('id') || 'DIS-2024-000198';
const req = (WI_DATA.disability || []).find(r => r.id === reqId) || (WI_DATA.disability || [])[0];
currentRequestId = req.id;

setBreadcrumb([
  { label: 'منفعة الأشخاص ذوي الإعاقة', page: 'disability-list' },
  { label: `تفاصيل الطلب ${req.id}` }
]);

document.addEventListener('DOMContentLoaded', () => {
  let workerActions = [];
  if (req.status === 'مسودة') workerActions = ['إرسال الطلب', 'حذف'];
  else if (req.status === 'تم إعادة الطلب لاستيفاء البيانات') workerActions = ['استيفاء البيانات المطلوبة وإعادة الإرسال'];
  else if (req.status === 'تم رفض الطلب') workerActions = ['تقديم تظلم'];
  else if (req.status === 'تم إيقاف الصرف — بطاقة الإعاقة منتهية أو ملغاة') workerActions = ['تجديد البطاقة والتحقق من وزارة التنمية الاجتماعية ثم تحريك الطلب تلقائياً إلى قيد المراجعة'];

  const atts  = req.attachments || [];
  const tl    = req.timeline || [];
  const card  = req.card;
  const isCardExpired = card && new Date(card.expiryDate) < new Date();

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>تفاصيل طلب منفعة الأشخاص ذوي الإعاقة</h1>
        <p>رقم الطلب: <strong style="font-family:monospace;color:var(--primary)">${req.id}</strong></p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary" onclick="window.location.href='disability-list.html'">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <!-- ملخص الطلب -->
    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div class="req-summary-grid">
          <div><div class="flbl" style="margin-bottom:4px">رقم الطلب</div><div style="font-size:15px;font-weight:800;color:var(--primary);font-family:monospace">${req.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">الحالة الحالية</div>${statusBadge(req.status)}</div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ التقديم</div><div style="font-size:12.5px">${req.submitDate}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث</div><div style="font-size:12px;color:var(--text2)">${req.lastUpdate}</div></div>
        </div>
      </div>
    </div>

    ${renderWorkflowPath(req, 'disability')}
    ${renderInsuredSummaryCards(req.applicant?.civil, req.id)}
    ${renderApplicantProfileCard(req.applicant || {}, {
      title: 'بيانات مقدم الطلب / المستفيد',
      includeRole: true,
    })}

    ${card ? `${isCardExpired ? `<div class="alert alert-d" style="margin-bottom:12px">${ICONS.warn}<span>بطاقة الإعاقة منتهية الصلاحية — سيتوقف الصرف حتى يتم التجديد والتحقق من وزارة التنمية الاجتماعية.</span></div>` : ''}${renderWorkerDisabilityCardPanel(card)}` : ''}

    ${renderBenefitInsuranceCard(req.insurance || {}, {
      applicant: req.applicant || {},
      includeContact: true,
      otherBenefitsLabel: 'منافع أخرى',
    })}

    ${req.disbursement ? `
    <!-- بيانات الصرف الدوري -->
    <div class="card card-cum">
      <div class="ph"><h3><div class="pico gr">${ICONS.chart}</div>بيانات الصرف الدوري</h3><span class="stg-lbl">مرحلة الصرف</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">حالة الصرف</label><div class="fro"><span class="badge b-approved">${req.disbursement.status}</span></div></div>
          <div class="fgrp"><label class="flbl">يوم الصرف الشهري</label><div class="fro">اليوم <strong>${req.disbursement.monthlyDay}</strong> من كل شهر</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء الاستحقاق</label><div class="fro">${req.disbursement.expiryDate}</div></div>
          <div class="fgrp"><label class="flbl">آخر تحقق من وزارة التنمية</label><div class="fro tx3">${req.disbursement.lastCheck}</div></div>
        </div>
      </div>
    </div>` : ''}

    <!-- المرفقات -->
    <div class="card">
      <div class="ph">
        <h3><div class="pico or">${ICONS.upload}</div>المرفقات <span style="font-size:11px;font-weight:400;color:var(--text3)">(${atts.length} مرفق)</span></h3>
        <button class="btn btn-secondary btn-xs" onclick="openAddAttachmentModal()">${ICONS.plus} إضافة مرفق</button>
      </div>
      <div class="pb">
        ${atts.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد مرفقات</div>' : atts.map(att => {
          const ext = att.name?.split('.').pop()?.toLowerCase() || 'oth';
          const icoMap = { pdf: 'file', doc: 'file', docx: 'file', jpg: 'img', jpeg: 'img', png: 'img' };
          return `<div class="att-row"><div class="att-ico ${icoMap[ext] || 'oth'}">${ICONS.file}</div><div class="att-info"><div class="att-name">${att.name}</div><div class="att-meta">${att.type} · رفعه: ${att.uploadedBy} (${att.role}) · ${att.uploadDate} · ${att.size || ''}</div></div><div class="att-acts"><button class="ibtn" title="تحميل" onclick="showToast('جارٍ تحميل الملف...','i')">${ICONS.download}</button></div></div>`;
        }).join('')}
        <div style="margin-top:10px">
          ${renderModernUploadComponent({ idPrefix: 'gen-att', subTitle: 'PDF, Word, صور — الحجم الأقصى 20 ميغابايت' })}
        </div>
      </div>
    </div>

    ${workerActions.length > 0 ? `
    <!-- الإجراءات المتاحة للعامل -->
    <div class="dp">
      <div class="ph"><h3><div class="pico bl">${ICONS.pen}</div>الإجراءات المتاحة لك</h3></div>
      <div class="dp-body">
        <div class="fgrp">
          <label class="flbl">ملاحظاتك <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          <textarea class="fc" id="decision-notes" placeholder="أكتب ملاحظاتك هنا..." rows="3"></textarea>
        </div>
        <div class="fgrp">
          <label class="flbl">إرفاق ملفات داعمة <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          ${renderModernUploadComponent({ idPrefix: 'decision-att', subTitle: 'يمكن رفع عدة ملفات دفعة واحدة' })}
        </div>
        <div class="dp-acts">
          ${workerActions.map(a => `<button class="btn ${WI_CONFIG.actionStyles[a] || 'btn-secondary btn-sm'}" onclick="executeAction('${a}')">${a}</button>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <!-- السجل الزمني -->
    <div class="card">
      <div class="ph"><h3><div class="pico gy">${ICONS.clock}</div>السجل الزمني الكامل للطلب</h3></div>
      <div class="pb">
        ${renderTimelineList(tl, { hideActor: true, hidePhone: true })}
      </div>
    </div>`;
});

function renderWorkerDisabilityCardPanel(card) {
  const disabilities = Array.isArray(card?.disabilities) ? card.disabilities : [];
  const rows = disabilities.length ? disabilities.reduce((acc, item) => {
    const key = `${item.name || '—'}__${item.examinationDate || ''}`;
    const row = acc.get(key) || {
      name: item.name || '—',
      diagnosisDate: formatDate(item.examinationDate),
      mohDiagnosis: '—',
      mohLevel: '—',
      mosdDiagnosis: '—',
      mosdLevel: '—',
    };
    if (item.source === 'MOH') {
      row.mohDiagnosis = item.name || '—';
      row.mohLevel = item.level || '—';
    } else if (item.source === 'MOSD') {
      row.mosdDiagnosis = item.name || '—';
      row.mosdLevel = item.level || '—';
    }
    acc.set(key, row);
    return acc;
  }, new Map()) : new Map([['fallback', {
    name: card?.typeMOH || card?.typeSD || '—',
    diagnosisDate: formatDate(card?.provenDate),
    mohDiagnosis: card?.typeMOH || '—',
    mohLevel: '—',
    mosdDiagnosis: card?.typeSD || '—',
    mosdLevel: '—',
  }]]);

  return `
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico pu">${ICONS.shield}</div>بيانات بطاقة الإعاقة</h3><span style="font-size:11px;color:var(--text3)">وزارة التنمية الاجتماعية + وزارة الصحة</span></div>
      <div class="pb">
        <div class="fg fg-3" style="margin-bottom:14px">
          <div class="fgrp"><label class="flbl">حالة البطاقة</label><div class="fro"><span class="badge ${card.status === 'سارية' ? 'b-card-valid' : card.status === 'منتهية' ? 'b-card-expired' : 'b-card-cancelled'}">${card.status || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">رقم البطاقة</label><div class="fro" style="font-family:monospace">${card.number || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الإصدار</label><div class="fro">${formatDate(card.issueDate)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الانتهاء</label><div class="fro">${formatDate(card.expiryDate)}</div></div>
        </div>
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>نوع الإعاقة</th><th>تاريخ التشخيص الطبي</th><th>تشخيص وزارة الصحة</th><th>مستوى الإعاقة من وزارة الصحة</th><th>تشخيص وزارة التنمية الاجتماعية</th><th>مستوى الإعاقة من وزارة التنمية الاجتماعية</th></tr></thead>
            <tbody>
              ${Array.from(rows.values()).map((row) => `
                <tr>
                  <td>${row.name}</td>
                  <td>${row.diagnosisDate}</td>
                  <td>${row.mohDiagnosis}</td>
                  <td>${row.mohLevel}</td>
                  <td>${row.mosdDiagnosis}</td>
                  <td>${row.mosdLevel}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}
</script>
</body>
</html>
