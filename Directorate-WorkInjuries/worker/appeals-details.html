<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل التظلم — العامل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/workflow-stages.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'appeals-list' });

const params = new URLSearchParams(window.location.search);
const appId = params.get('id') || 'APP-2025-000067';
const appeal = WI_DATA.appeals.find(a => a.id === appId) || WI_DATA.appeals[0];
currentRequestId = appeal.id;

setBreadcrumb([{ label: 'التظلمات', page: 'appeals-list' }, { label: `تفاصيل التظلم ${appeal.id}` }]);

document.addEventListener('DOMContentLoaded', () => {
  let workerActions = [];
  if (appeal.status === 'مسودة') workerActions = ['إرسال التظلم', 'حذف'];
  else if (appeal.status === 'تم إعادة التظلم لاستيفاء البيانات') workerActions = ['استيفاء البيانات المطلوبة وإعادة الإرسال'];
  const isSamePerson = appeal.applicant?.civil && appeal.insured?.civil && appeal.applicant.civil === appeal.insured.civil;

  const origReq = WI_DATA.allowances.find(r => r.id === appeal.originalRequestId);
  const atts  = appeal.attachments || [];
  const tl    = appeal.timeline || [];

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>تفاصيل التظلم</h1>
        <p>رقم التظلم: <strong style="font-family:monospace;color:var(--primary)">${appeal.id}</strong></p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary" onclick="window.location.href='appeals-list.html'">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <!-- ملخص التظلم -->
    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div class="req-summary-grid">
          <div><div class="flbl" style="margin-bottom:4px">رقم التظلم</div><div style="font-size:15px;font-weight:800;color:var(--primary);font-family:monospace">${appeal.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">حالة الطلب</div>${statusBadge(appeal.status)}</div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ التقديم</div><div style="font-size:12.5px">${formatDate(appeal.submitDate)}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">مقدم الطلب</div><div style="font-size:12.5px;font-weight:600">${appeal.applicant?.name || appeal.applicant?.role || '—'}</div><div style="font-size:11px;color:var(--text3)">${appeal.applicant?.role || ''}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث</div><div style="font-size:12px;color:var(--text2)">${appeal.lastUpdate || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث بواسطة</div><div style="font-size:12px;color:var(--text2)">${appeal.lastUpdatedBy || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ الإغلاق المتوقع</div><div style="font-size:12px">${formatDate(appeal.expectedClosureDate) || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">الأيام المتبقية حتى الإغلاق</div><div style="font-size:12px;font-weight:600;color:${(appeal.remainingDays||0)<7?'var(--danger)':(appeal.remainingDays||0)<30?'var(--warning)':'var(--text2)'}">${appeal.remainingDays!=null?appeal.remainingDays+' يوم':'—'}</div></div>
        </div>
      </div>
    </div>

    ${renderWorkflowPath(appeal, 'appeals')}

    ${isSamePerson ? `
    <!-- بيانات المؤمن عليه / المستفيد (نفس الشخص) -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات المؤمن عليه / المستفيد</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">صفة مقدم الطلب</label><div class="fro">${appeal.applicant?.role || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${appeal.insured?.name || appeal.applicant?.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${appeal.insured?.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(appeal.insured?.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${appeal.insured?.gender || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${appeal.insured?.nationality || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${normalizeDisplay(appeal.applicant?.phone || appeal.insured?.phone, '96890000000')}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${normalizeDisplay(appeal.applicant?.email || appeal.insured?.email, 'noreply@spf-proto.om')}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء البطاقة الشخصية</label><div class="fro">${formatDate(appeal.insured?.civilExpiry || appeal.applicant?.civilExpiry)}</div></div>
          <div class="fgrp"><label class="flbl">المحافظة / الولاية</label><div class="fro">${normalizeDisplay(appeal.applicant?.region)}${appeal.applicant?.wilayat ? ' — ' + appeal.applicant?.wilayat : ''}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${appeal.insured?.insuranceStatus === 'نشط' ? 'b-approved' : 'b-rejected'}">${appeal.insured?.insuranceStatus || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">${formatDate(appeal.insured?.regDate)}</div></div>
        </div>
      </div>
    </div>` : `
    <!-- بيانات مقدم الطلب -->
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">صفة مقدم الطلب</label><div class="fro">${appeal.applicant.role || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${appeal.applicant.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${appeal.applicant.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${normalizeDisplay(appeal.applicant?.phone || appeal.insured?.phone, '96890000000')}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${normalizeDisplay(appeal.applicant?.email || appeal.insured?.email, 'noreply@spf-proto.om')}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء البطاقة الشخصية</label><div class="fro">${formatDate(appeal.applicant?.civilExpiry)}</div></div>
          <div class="fgrp"><label class="flbl">المحافظة / الولاية</label><div class="fro">${normalizeDisplay(appeal.applicant?.region)}${appeal.applicant?.wilayat ? ` — ${appeal.applicant?.wilayat}` : ''}</div></div>
          <div class="fgrp"><label class="flbl">الدولة</label><div class="fro">${normalizeDisplay(appeal.applicant?.country)}</div></div>
          ${appeal.applicant.employeeId ? `<div class="fgrp"><label class="flbl">الرقم الوظيفي</label><div class="fro">${appeal.applicant.employeeId}</div></div>` : ''}
        </div>
      </div>
    </div>

    <!-- بيانات المؤمن عليه -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات المؤمن عليه / المستفيد</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-4">
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${appeal.insured?.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${appeal.insured?.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(appeal.insured?.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${appeal.insured?.gender || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${appeal.insured?.nationality || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${normalizeDisplay(appeal.applicant?.phone || appeal.insured?.phone, '96890000000')}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${normalizeDisplay(appeal.applicant?.email || appeal.insured?.email, 'noreply@spf-proto.om')}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء البطاقة الشخصية</label><div class="fro">${formatDate(appeal.insured?.civilExpiry)}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${appeal.insured?.insuranceStatus === 'نشط' ? 'b-approved' : 'b-rejected'}">${appeal.insured?.insuranceStatus || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">${formatDate(appeal.insured?.regDate)}</div></div>
        </div>
      </div>
    </div>`}

    <!-- بيانات جهة العمل -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico tl">${ICONS.building}</div>بيانات جهة العمل</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">اسم جهة العمل</label><div class="fro" style="font-weight:700">${appeal.employer?.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم السجل التجاري</label><div class="fro" style="font-family:monospace">${appeal.employer?.cr || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم المنشأة</label><div class="fro" style="font-family:monospace">${normalizeDisplay(appeal.employer?.establishment)}</div></div>
          <div class="fgrp"><label class="flbl">المسمى الوظيفي</label><div class="fro">${appeal.employer?.jobTitle || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الالتحاق بالعمل</label><div class="fro">${formatDate(appeal.employer?.joinDate)}</div></div>
          <div class="fgrp"><label class="flbl">موقع العمل / الفرع</label><div class="fro">${appeal.employer?.location || '—'}</div></div>
          ${appeal.employer?.phone ? `<div class="fgrp"><label class="flbl">هاتف جهة العمل</label><div class="fro">${appeal.employer.phone}</div></div>` : ''}
          <div class="fgrp"><label class="flbl">القطاع</label><div class="fro">${appeal.employer?.sector || '—'}</div></div>
          <div class="fgrp"><label class="flbl">نوع جهة العمل</label><div class="fro">${appeal.employer?.employerType || '—'}</div></div>
          ${appeal.employer?.branch ? `<div class="fgrp"><label class="flbl">الفرع</label><div class="fro">${appeal.employer.branch.id} — ${appeal.employer.branch.name} — ${appeal.employer.branch.state}</div></div>` : ''}
        </div>
      </div>
    </div>

    <!-- ملخص الطلب الأصلي -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico bl">${ICONS.file}</div>ملخص الطلب الأصلي</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">رقم الطلب الأصلي</label><div class="fro" style="font-family:monospace"><a href="allowances-details.html?id=${appeal.originalRequestId}" style="color:var(--primary);font-weight:700">${appeal.originalRequestId}</a></div></div>
          <div class="fgrp"><label class="flbl">نوع الطلب</label><div class="fro">${appeal.originalRequestType}</div></div>
          <div class="fgrp"><label class="flbl">حالة الطلب الأصلي</label><div class="fro">${origReq ? statusBadge(origReq.status) : '—'}</div></div>
          ${origReq?.submitDate ? `<div class="fgrp"><label class="flbl">تاريخ تقديم الطلب الأصلي</label><div class="fro">${origReq.submitDate}</div></div>` : ''}
        </div>
      </div>
    </div>

    <!-- القرار المتظلم منه -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico rd">${ICONS.warn}</div>القرار المتظلم منه</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">نوع القرار</label><div class="fro"><span class="badge b-rejected">${appeal.decision.type}</span></div></div>
          <div class="fgrp"><label class="flbl">تاريخ القرار</label><div class="fro">${appeal.decision.date}</div></div>
          <div class="fgrp"><label class="flbl">الجهة مُصدِرة القرار</label><div class="fro">${appeal.decision.issuer}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ علمك بالقرار</label><div class="fro" style="font-weight:700;color:var(--danger)">${appeal.decision.knowledgeDate}</div></div>
          <div class="fgrp span-2"><label class="flbl">مضمون القرار</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:8px">${appeal.decision.details}</div></div>
        </div>
      </div>
    </div>

    <!-- بيانات التظلم -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico or">${ICONS.note}</div>بيانات التظلم</h3></div>
      <div class="pb">
        <div class="fg">
          <div class="fgrp"><label class="flbl">سبب التظلم</label><div class="fro">${appeal.appealReason}</div></div>
          <div class="fgrp"><label class="flbl">تفاصيل سبب التظلم</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:8px">${appeal.appealDetails}</div></div>
        </div>
      </div>
    </div>

    ${appeal.session ? `
    <!-- بيانات الجلسة -->
    <div class="card card-cum">
      <div class="ph"><h3><div class="pico tl">${ICONS.calendar}</div>بيانات الجلسة</h3><span class="stg-lbl">جلسة العرض</span></div>
      <div class="pb">
        <div class="alert alert-i" style="margin-bottom:14px">${ICONS.info}<span>هذه بيانات الجلسة الخاصة بطلبك للاطلاع فقط — يُحددها فريق لجنة التظلمات.</span></div>
        <div class="fg fg-3" style="margin-bottom:14px">
          <div class="fgrp"><label class="flbl">رقم الجلسة</label><div class="fro" style="font-family:monospace">${appeal.session.id || '—'}</div></div>
          <div class="fgrp"><label class="flbl">المؤسسة الصحية</label><div class="fro">${appeal.session.institution || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ووقت الجلسة</label><div class="fro">${appeal.session.date ? `${formatDate(appeal.session.date)}${appeal.session.time ? ` — ${appeal.session.time}` : ''}` : '—'}</div></div>
          <div class="fgrp"><label class="flbl">اكتمال النصاب</label><div class="fro"><span class="badge ${appeal.session.quorum ? 'b-approved' : 'b-returned'}">${appeal.session.quorum ? 'النصاب مكتمل' : 'النصاب غير مكتمل'}</span></div></div>
        </div>
        ${appeal.session.members?.length ? `
        <div class="flbl" style="margin-bottom:8px">أعضاء اللجنة</div>
        <div class="tbl-wrap"><table class="dtbl">
          <thead><tr><th>الاسم</th><th>التخصص</th><th>المنصب</th><th>حالة الحضور</th></tr></thead>
          <tbody>${appeal.session.members.map(m => `<tr><td>${m.name}</td><td>${m.specialty}</td><td>${m.role}</td><td><span class="badge ${m.attendance === 'حاضر' ? 'b-approved' : m.attendance === 'غائب' ? 'b-rejected' : 'b-phead'}">${m.attendance || 'مجدول'}</span></td></tr>`).join('')}</tbody>
        </table></div>` : ''}
      </div>
    </div>` : ''}

    ${appeal.finalDecision ? `
    <!-- القرار النهائي للجنة التظلمات -->
    <div class="card card-cum">
      <div class="ph"><h3><div class="pico gr">${ICONS.shield}</div>القرار النهائي — لجنة التظلمات</h3><span class="stg-lbl">قرار نهائي</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">نوع القرار النهائي</label><div class="fro"><span class="badge ${appeal.finalDecision.type === 'إلغاء القرار الأصلي' ? 'b-approved' : appeal.finalDecision.type === 'تأييد القرار الأصلي' ? 'b-rejected' : 'b-phead'}">${appeal.finalDecision.type || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">تاريخ القرار</label><div class="fro">${formatDate(appeal.finalDecision.date)}</div></div>
          <div class="fgrp"><label class="flbl">الأعضاء الموقعون</label><div class="fro">${appeal.finalDecision.signatories?.join('، ') || '—'}</div></div>
          <div class="fgrp span-full"><label class="flbl">مضمون القرار التفصيلي</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:10px">${appeal.finalDecision.content || '—'}</div></div>
          <div class="fgrp span-full"><label class="flbl">أثر القرار على الطلب الأصلي</label><div class="fro" style="font-weight:600">${appeal.finalDecision.effect || '—'}</div></div>
        </div>
      </div>
    </div>` : ''}

    <!-- المرفقات -->
    <div class="card">
      <div class="ph">
        <h3><div class="pico or">${ICONS.upload}</div>المرفقات <span style="font-size:11px;font-weight:400;color:var(--text3)">(${atts.length} مرفق)</span></h3>
        <button class="btn btn-secondary btn-xs" onclick="openAddAttachmentModal()">${ICONS.plus} إضافة مرفق</button>
      </div>
      <div class="pb">
        ${atts.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد مرفقات</div>' : atts.map(att => {
          const ext = att.name?.split('.').pop()?.toLowerCase() || 'oth';
          const icoMap = { pdf: 'file', doc: 'file', docx: 'file', jpg: 'img', jpeg: 'img', png: 'img' };
          return `<div class="att-row"><div class="att-ico ${icoMap[ext] || 'oth'}">${ICONS.file}</div><div class="att-info"><div class="att-name">${att.name}</div><div class="att-meta">${att.type} · رفعه: ${att.uploadedBy} (${att.role}) · ${att.uploadDate} · ${att.size || ''}</div></div><div class="att-acts"><button class="ibtn" title="تحميل" onclick="showToast('جارٍ تحميل الملف...','i')">${ICONS.download}</button></div></div>`;
        }).join('')}
        <div style="margin-top:10px">
          ${renderModernUploadComponent({ idPrefix: 'gen-att', subTitle: 'PDF, Word, صور — الحجم الأقصى 20 ميغابايت' })}
        </div>
      </div>
    </div>

    ${workerActions.length > 0 ? `
    <!-- الإجراءات المتاحة للعامل -->
    <div class="dp">
      <div class="ph"><h3><div class="pico bl">${ICONS.pen}</div>الإجراءات المتاحة لك</h3></div>
      <div class="dp-body">
        <div class="fgrp">
          <label class="flbl">ملاحظاتك <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          <textarea class="fc" id="decision-notes" placeholder="أكتب ملاحظاتك هنا..." rows="3"></textarea>
        </div>
        <div class="fgrp">
          <label class="flbl">إرفاق ملفات داعمة <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          ${renderModernUploadComponent({ idPrefix: 'decision-att', subTitle: 'يمكن رفع عدة ملفات دفعة واحدة' })}
        </div>
        <div class="dp-acts">
          ${workerActions.map(a => `<button class="btn ${WI_CONFIG.actionStyles[a] || 'btn-secondary btn-sm'}" onclick="executeAction('${a}')">${a}</button>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <!-- السجل الزمني -->
    <div class="card">
      <div class="ph"><h3><div class="pico gy">${ICONS.clock}</div>السجل الزمني الكامل للتظلم</h3></div>
      <div class="pb">${renderTimelineList(tl, { hideActor: true, hidePhone: true })}</div>
    </div>`;
});
</script>
</body>
</html>
