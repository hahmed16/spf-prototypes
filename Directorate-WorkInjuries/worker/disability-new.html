<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقديم طلب منفعة الإعاقة — العامل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'disability-list' });
setBreadcrumb([{ label: 'منفعة الأشخاص ذوي الإعاقة', page: 'disability-list' }, { label: 'تقديم طلب جديد' }]);

const u = WI_DATA.users.worker;
const card = WI_DATA.disability[0].card;
const isExpired = card.status !== 'سارية';

document.addEventListener('DOMContentLoaded', () => {
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>تقديم طلب منفعة الأشخاص ذوي الإعاقة</h1></div>
      <div class="pg-acts"><button class="btn btn-secondary" onclick="window.location.href='disability-list.html'">${ICONS.arrow_left} رجوع</button></div>
    </div>

    <!-- الإرشادات -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico gy">${ICONS.info}</div>ضوابط الاستحقاق والتعليمات</h3></div>
      <div class="pb">
        <ul style="font-size:12.5px;color:var(--text2);padding-right:18px;line-height:2.2">
          <li>يجب أن تمتلك بطاقة إعاقة سارية صادرة من وزارة التنمية الاجتماعية</li>
        </ul>
      </div>
    </div>

    <!-- بيانات المستفيد -->
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${u.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${u.civil}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف <span class="req">*</span></label><input type="tel" class="fc" value="${u.phone}"></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><input type="email" class="fc" value="${u.email}"></div>
        </div>
      </div>
    </div>

    <!-- بيانات بطاقة الإعاقة -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico pu">${ICONS.shield}</div>بيانات بطاقة الإعاقة</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً من وزارة التنمية الاجتماعية</span></div>
      <div class="pb">
        ${isExpired ? `<div class="alert alert-d" style="margin-bottom:14px">${ICONS.warn}<span><strong>تنبيه:</strong> بطاقة الإعاقة منتهية الصلاحية. لا يمكن تقديم الطلب حتى يتم تجديد البطاقة.</span></div>` : ''}
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">رقم البطاقة</label><div class="fro" style="font-family:monospace">${card.number}</div></div>
          <div class="fgrp"><label class="flbl">حالة البطاقة</label><div class="fro"><span class="badge ${card.status==='سارية'?'b-card-valid':'b-card-expired'}">${card.status}</span></div></div>
          <div class="fgrp"><label class="flbl">تاريخ الانتهاء</label><div class="fro" style="${isExpired?'color:var(--danger);font-weight:700':''}">${card.expiryDate}</div></div>
          <div class="fgrp"><label class="flbl">طبيعة الإعاقة (وزارة التنمية)</label><div class="fro">${card.typeSD}</div></div>
          <div class="fgrp"><label class="flbl">طبيعة الإعاقة (وزارة الصحة)</label><div class="fro">${card.typeMOH}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ثبوت الإعاقة</label><div class="fro">${card.provenDate}</div></div>
        </div>
      </div>
    </div>

    <!-- بيانات التأمين -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico gr">${ICONS.shield}</div>بيانات التأمين</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge b-approved">نشط</span></div></div>
          <div class="fgrp"><label class="flbl">نوع الاشتراك</label><div class="fro">إلزامي</div></div>
          <div class="fgrp"><label class="flbl">منافع أخرى مستحقة</label><div class="fro">لا يوجد</div></div>
        </div>
      </div>
    </div>

    <!-- المرفقات -->
    <div class="card">
      <div class="ph"><h3><div class="pico or">${ICONS.upload}</div>المرفقات</h3></div>
      <div class="pb">
        ${renderModernUploadComponent({ idPrefix: 'disability-att' })}
      </div>
    </div>

    <!-- الأزرار -->
    <div style="display:flex;gap:10px;padding:16px 0">
      <button class="btn btn-primary btn-lg" ${isExpired?'disabled style="opacity:.5;cursor:not-allowed"':''} onclick="submitDisabilityRequest()">
        ${ICONS.check} إرسال الطلب
      </button>
      <button class="btn btn-secondary btn-lg" onclick="showToast('تم حفظ الطلب كمسودة','i');setTimeout(()=>window.location.href='disability-list.html',1200)">
        حفظ كمسودة
      </button>
      <button class="btn btn-ghost" onclick="window.location.href='disability-list.html'">إلغاء</button>
    </div>`;
});

function submitDisabilityRequest() {
  showToast('جارٍ تقديم الطلب...', 'i');
  setTimeout(() => {
    showToast('تم تقديم طلب منفعة الإعاقة بنجاح — رقم الطلب: DIS-2025-000250', 's', 5000);
    setTimeout(() => window.location.href = 'disability-list.html', 2000);
  }, 1500);
}

</script>
</body>
</html>
