<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التشخيصات الواردة — الأمراض المستديمة</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'chronic-incoming' });
setBreadcrumb([{ label: 'منفعة الأمراض المستديمة' }, { label: 'التشخيصات الواردة' }]);

document.addEventListener('DOMContentLoaded', () => {
  const incoming = WI_DATA.chronicIncoming;

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>تشخيصات الأمراض المستديمة الواردة</h1>
        <p>التشخيصات الطبية الواردة إلكترونياً من وزارة الصحة — يمكنك التقديم على تشخيص واحد فقط</p>
      </div>
    </div>

    <div class="alert alert-i">
      ${ICONS.info}
      <div>
        عند تشخيصك بمرض مستديم من مستشفى حكومي، يُرسَل التشخيص إلكترونياً لهذا النظام. يمكنك الاطلاع على تفاصيله وتقديم طلب الاستفادة من المنفعة أو الإقرار بعدم رغبتك في الاستمرار.
      </div>
    </div>

    ${renderUnifiedFilterBar({ onSearch: 'noopUnifiedSearch', onToggleAll: 'noopUnifiedToggleAll', isAllVisible: false })}

    <div class="card">
      <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>التشخيصات الواردة (${incoming.length})</h3></div>
      <div class="pb-0">
        ${incoming.map(d => `
        <div style="padding:16px 18px;border-bottom:1px solid var(--border);${!d.hasRequest?'background:var(--primary-l)':''};display:flex;gap:14px;align-items:flex-start">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:13px;font-weight:700;color:var(--text)">${d.diagnosis}</span>
              ${d.hasRequest
                ? `<span class="badge b-submitted" style="font-size:10px">تم تقديم طلب</span>`
                : `<span class="badge b-returned" style="font-size:10px">بانتظار إجراءك</span>`}
            </div>
            <div class="m-row">
              <span class="m-item">${ICONS.building} ${d.hospital}</span>
              <span class="m-item">${ICONS.user} ${d.doctor}</span>
              <span class="m-item">${ICONS.calendar} تاريخ الثبوت: ${d.provenDate}</span>
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            ${d.hasRequest
              ? `<a href="chronic-details.html?id=${d.requestId}" class="btn btn-secondary btn-sm">${ICONS.eye} عرض الطلب</a>`
              : `<button class="btn btn-primary btn-sm" onclick="window.location.href='chronic-new.html?ref=${d.refId}'">${ICONS.plus} تقديم طلب</button>
                 <button class="btn btn-danger btn-sm" onclick="confirmDecline('${d.refId}')">عدم الرغبة فى الاستفادة من المنفعة</button>`}
          </div>
        </div>`).join('')}
      </div>
    </div>

    <div style="margin-top:16px">
      <a href="chronic-list.html" style="color:var(--primary);font-size:12.5px">عرض الطلبات المقدمة بالفعل ←</a>
    </div>`;
});

function confirmDecline(refId) {
  confirmAction({
    title: 'تأكيد عدم الرغبة في الاستفادة',
    msg: 'هل أنت متأكد من إقرارك بعدم الرغبة في الاستفادة من هذا التشخيص؟ لا يمكن التراجع عن هذا القرار.',
    confirmLabel: 'نعم، أقر بعدم الرغبة في الاستمرار',
    confirmClass: 'btn-danger',
    onConfirm: () => showToast('تم تسجيل إقرارك بعدم الرغبة في الاستفادة', 'i')
  });
}
</script>
</body>
</html>
