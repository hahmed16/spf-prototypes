<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقديم طلب منفعة الأمراض المستديمة — العامل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'chronic-incoming' });
setBreadcrumb([{ label: 'الأمراض المستديمة', page: 'chronic-incoming' }, { label: 'تقديم طلب جديد' }]);

const params = new URLSearchParams(window.location.search);
const refId = params.get('ref');
const incoming = refId ? WI_DATA.chronicIncoming.find(d => d.refId === refId) : WI_DATA.chronicIncoming[0];
const u = WI_DATA.users.worker;

document.addEventListener('DOMContentLoaded', () => {
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>تقديم طلب منفعة الأمراض المستديمة</h1></div>
      <div class="pg-acts"><button class="btn btn-secondary" onclick="window.location.href='chronic-incoming.html'">${ICONS.arrow_left} رجوع</button></div>
    </div>

    <!-- ملخص التشخيص الوارد -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>ملخص التشخيص الوارد من وزارة الصحة</h3></div>
      <div class="pb">
        <div class="alert alert-i" style="margin-bottom:14px">${ICONS.info}<span>هذه البيانات مستلمة تلقائياً من وزارة الصحة للعرض فقط ولا يمكن تعديلها.</span></div>
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">رقم الطلب الفريد (وزارة الصحة)</label><div class="fro" style="font-family:monospace">${normalizeDisplay(incoming?.uniqueRequestId || incoming?.refId)}</div></div>
          <div class="fgrp"><label class="flbl">المؤسسة الصحية المعالجة</label><div class="fro">${incoming?.hospital || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الطبيب المعالج</label><div class="fro">${incoming?.doctor || '—'}</div></div>
          <div class="fgrp span-full"><label class="flbl">التشخيص الطبي (تقرير وصفي مثبت)</label><div class="fro medical-report">${normalizeDisplay(incoming?.permanentDiseaseReport || buildPermanentDiseaseReport(incoming))}</div></div>
          <div class="fgrp"><label class="flbl">المرض المزمن</label><div class="fro">${normalizeDisplay(incoming?.chronicDisease)}</div></div>
          <div class="fgrp"><label class="flbl">الجهاز المتأثر</label><div class="fro">${normalizeDisplay(incoming?.affectedSystem)}</div></div>
          <div class="fgrp"><label class="flbl">مؤشر الشدة الطبي</label><div class="fro">${normalizeDisplay(incoming?.severityIndex)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ثبوت المرض</label><div class="fro">${formatDate(incoming?.provenDate)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ شدة المرض</label><div class="fro">${formatDate(incoming?.severityDate)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ووقت الزيارة</label><div class="fro">${normalizeDisplay(incoming?.visitDateTime)}</div></div>
          ${incoming?.firstRequestRef ? `<div class="fgrp"><label class="flbl">رقم أول طلب مرتبط</label><div class="fro" style="font-family:monospace">${incoming.firstRequestRef}</div></div>` : ''}
          ${incoming?.overallCondition ? `<div class="fgrp span-full"><label class="flbl">الحالة العامة</label><div class="fro">${incoming.overallCondition}</div></div>` : ''}
        </div>
      </div>
    </div>

    <!-- بيانات المستفيد -->
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">صفة مقدم الطلب</label><div class="fro">العامل / المؤمن عليه / المواطن</div></div>
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${u.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${u.civil}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف (من النظام)</label><div class="fro">${u.phone}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني (من النظام)</label><div class="fro">${u.email}</div></div>
          <div class="fgrp"><label class="flbl">رقم هاتف إضافي 1</label><input type="tel" class="fc" placeholder="أدخل رقم هاتف إضافي"></div>
          <div class="fgrp"><label class="flbl">رقم هاتف إضافي 2</label><input type="tel" class="fc" placeholder="أدخل رقم هاتف إضافي آخر"></div>
          <div class="fgrp"><label class="flbl">بريد إلكتروني إضافي</label><input type="email" class="fc" placeholder="example@domain.com"></div>
          <div class="fgrp"><label class="flbl">المنطقة</label><div class="fro">${normalizeDisplay(u.region, 'محافظة مسقط')}</div></div>
          <div class="fgrp"><label class="flbl">الولاية</label><div class="fro">${normalizeDisplay(u.wilayat, 'بوشر')}</div></div>
          <div class="fgrp"><label class="flbl">الدولة</label><div class="fro">${normalizeDisplay(u.country, 'سلطنة عُمان')}</div></div>
        </div>
      </div>
    </div>

    <!-- المرفقات -->
    <div class="card">
      <div class="ph"><h3><div class="pico or">${ICONS.upload}</div>المرفقات الداعمة</h3></div>
      <div class="pb">
        ${renderModernUploadComponent({ idPrefix: 'chronic-att', subTitle: 'يرجى إرفاق التقارير الطبية ونتائج الفحوصات' })}
      </div>
    </div>

    <!-- ملاحظات مقدم الطلب -->
    <div class="card">
      <div class="ph"><h3><div class="pico gy">${ICONS.note}</div>ملاحظات إضافية</h3></div>
      <div class="pb">
        <div class="fgrp">
          <label class="flbl">ملاحظاتك الإضافية (اختياري)</label>
          <textarea class="fc" rows="4" placeholder="أي معلومات إضافية تودّ مشاركتها مع الموظف المختص..."></textarea>
        </div>
      </div>
    </div>

    <!-- الأزرار -->
    <div style="display:flex;gap:10px;padding:16px 0">
      <button class="btn btn-primary btn-lg" onclick="submitChronicRequest()">${ICONS.check} إرسال الطلب</button>
      <button class="btn btn-secondary btn-lg" onclick="showToast('تم الحفظ كمسودة','i')">حفظ كمسودة</button>
      <button class="btn btn-ghost" style="color:var(--danger)" onclick="confirmDecline()">الإقرار بعدم الرغبة في الاستمرار</button>
    </div>`;
});

function submitChronicRequest() {
  showToast('جارٍ تقديم الطلب...', 'i');
  setTimeout(() => {
    showToast('تم تقديم الطلب بنجاح — رقم الطلب: CHR-2025-000178', 's', 5000);
    setTimeout(() => window.location.href = 'chronic-incoming.html', 2000);
  }, 1500);
}

function confirmDecline() {
  confirmAction({
    title: 'إقرار عدم الرغبة في الاستمرار',
    msg: 'هل أنت متأكد من إقرارك بعدم الرغبة في الاستفادة من هذا التشخيص؟',
    confirmLabel: 'نعم، أقر بعدم الرغبة',
    confirmClass: 'btn-danger',
    onConfirm: () => {
      showToast('تم تسجيل إقرارك', 'i');
      setTimeout(() => window.location.href = 'chronic-incoming.html', 1500);
    }
  });
}
</script>
</body>
</html>
