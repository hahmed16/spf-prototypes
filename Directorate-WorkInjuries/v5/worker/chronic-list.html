<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات الأمراض المستديمة — العامل</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/components.js"></script>
<script>
initLayout({ role: 'worker', activePage: 'chronic-list' });
setBreadcrumb([{ label: 'منفعة الأمراض المستديمة' }, { label: 'طلباتي المقدمة' }]);

document.addEventListener('DOMContentLoaded', () => {
  const pending = WI_DATA.chronicIncoming.filter(d => d.hasRequest);

  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>طلبات منفعة الأمراض المستديمة المقدمة</h1></div>
      <div class="pg-acts"><a href="chronic-incoming.html" class="btn btn-secondary btn-sm">${ICONS.inbox} التشخيصات الواردة</a></div>
    </div>

    <div class="card">
      <div class="pb-0">
        ${pending.length === 0 ? `
        <div class="empty-st">
          ${ICONS.medical}
          <h4>لا توجد طلبات مقدمة</h4>
          <p>لم تقدم أي طلبات منفعة أمراض مستديمة بعد</p>
          <a href="chronic-incoming.html" class="btn btn-primary" style="margin-top:12px">عرض التشخيصات الواردة</a>
        </div>` : `
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم الطلب</th><th>التشخيص</th><th>المستشفى</th><th>المسار</th><th>الحالة</th><th></th></tr></thead>
            <tbody>
              ${pending.map(d=>`
              <tr>
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${d.requestId}</td>
                <td>${d.diagnosis}</td>
                <td>${d.hospital}</td>
                <td><span class="badge ${d.expectedPath==='مسار مباشر'?'b-direct':'b-commpath'}">${d.expectedPath}</span></td>
                <td><span class="badge b-submitted">قيد المراجعة</span></td>
                <td><button class="ibtn" onclick="window.location.href='chronic-details.html?id=${d.requestId}'">${ICONS.eye}</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`}
      </div>
    </div>`;
});
</script>
</body>
</html>
