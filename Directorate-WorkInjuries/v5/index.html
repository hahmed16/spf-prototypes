<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة إصابات العمل — صندوق الحماية الاجتماعية</title>
<link rel="stylesheet" href="shared/style.css">
<style>
  body { overflow: auto; }
  .login-status { text-align: center; margin-top: 16px; min-height: 20px; }
  .login-status.error { color: var(--danger); font-size: 12.5px; }
  .login-status.success { color: var(--accent); font-size: 12.5px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-left: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="login-pg">
  <div class="lcard">

    <!-- Logo -->
    <div class="l-logo">
      <div class="l-logo-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <div class="l-sys">صندوق الحماية الاجتماعية</div>
        <div class="l-sub">سلطنة عُمان</div>
      </div>
    </div>

    <hr class="l-div">

    <div class="l-title">نظام إدارة إصابات العمل</div>
    <div class="l-desc">
      نظام إدارة إصابات العمل والأمراض المهنية والشؤون الطبية<br>
      مديرية إصابات العمل والأمراض المهنية
    </div>

    <!-- Login Buttons -->
    <button class="lbtn pki" onclick="startLogin('pki')">
      <div class="lbtn-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div>
        <div class="lbtn-lbl">تسجيل الدخول عبر PKI</div>
        <div class="lbtn-dsc">بطاقة الهوية الرقمية الوطنية</div>
      </div>
    </button>

    <button class="lbtn mob" onclick="startLogin('mobile')">
      <div class="lbtn-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
          <line x1="12" y1="18" x2="12.01" y2="18"/>
        </svg>
      </div>
      <div>
        <div class="lbtn-lbl">تسجيل الدخول عبر Mobile PKI</div>
        <div class="lbtn-dsc">تطبيق الهوية الرقمية على الجوال</div>
      </div>
    </button>

    <div class="login-status" id="login-status"></div>

    <div class="l-foot">
      نظام حكومي آمن — جميع العمليات مسجّلة ومراقَبة<br>
      للدعم الفني: <strong>support@spf.gov.om</strong>
    </div>

  </div>
</div>

<script>
function startLogin(type) {
  const statusEl = document.getElementById('login-status');
  const label = type === 'pki' ? 'PKI' : 'Mobile PKI';
  statusEl.className = 'login-status';
  statusEl.innerHTML = `<span class="spinner"></span> جارٍ التحقق عبر ${label}...`;

  setTimeout(() => {
    statusEl.innerHTML = `<span class="spinner"></span> تم التحقق من الهوية — جارٍ تحميل صلاحياتك...`;
    setTimeout(() => {
      statusEl.className = 'login-status success';
      statusEl.innerHTML = `✓ تم تسجيل الدخول بنجاح — جارٍ التوجيه...`;
      setTimeout(() => {
        window.location.href = 'shared/role-selection.html';
      }, 800);
    }, 1000);
  }, 1500);
}
</script>
</body>
</html>
