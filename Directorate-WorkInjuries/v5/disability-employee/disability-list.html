<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة طلبات منفعة الإعاقة — موظف قسم الإعاقة</title>
<link rel="stylesheet" href="../shared/style.css"></head>
<body>
<script src="../shared/config.js"></script><script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script><script src="../shared/components.js"></script>
<script>
initLayout({ role: 'disability-employee', activePage: 'disability-list' });
setBreadcrumb([{ label: 'منفعة الإعاقة' }, { label: 'قائمة الطلبات' }]);
const me = WI_DATA.users.disability_employee.name;
const reqs = WI_DATA.disability;
let activeTab = 'all';
document.addEventListener('DOMContentLoaded', render);
function render() {
  const filtered = activeTab==='all' ? reqs : reqs.filter(r=>{
    if(activeTab==='pending') return r.status.includes('بانتظار مراجعة');
    if(activeTab==='head') return r.status.includes('بانتظار اعتماد رئيس');
    if(activeTab==='approved') return r.status.includes('اعتماد');
    return true;
  });
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة طلبات منفعة الأشخاص ذوي الإعاقة</h1><p>${reqs.length} طلب</p></div>
      <div class="pg-acts"><button class="btn btn-secondary btn-sm" onclick="window.location.href='disability-card-query.html'">${ICONS.search} استعلام بطاقة الإعاقة</button></div>
    </div>
    <div class="filters">
      <div class="fgrid">
        <div class="fgrp"><label class="flbl">رقم الطلب</label><input type="text" class="fc" placeholder="DIS-YYYY-XXXXXX"></div>
        <div class="fgrp"><label class="flbl">الرقم المدني</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">اسم المستفيد</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">حالة البطاقة</label><select class="fc"><option>الكل</option><option>سارية</option><option>منتهية</option><option>ملغاة</option></select></div>
        <div class="fgrp"><label class="flbl">حالة الطلب</label><select class="fc"><option>جميع الحالات</option>${reqs.map(r=>`<option>${r.status}</option>`).join('')}</select></div>
      </div>
      <div class="facts"><button class="btn btn-primary btn-sm">${ICONS.search} بحث</button><button class="btn btn-secondary btn-sm">مسح</button></div>
    </div>
    <div class="card">
      <div class="ttabs">
        ${[{key:'all',label:'الكل',count:reqs.length},
          {key:'pending',label:'قيد المراجعة',count:reqs.filter(r=>r.status.includes('بانتظار مراجعة')).length},
          {key:'head',label:'بانتظار رئيس القسم',count:reqs.filter(r=>r.status.includes('بانتظار اعتماد رئيس')).length},
          {key:'approved',label:'معتمدة',count:reqs.filter(r=>r.status.includes('اعتماد')).length},
        ].map(t=>`<div class="ttab ${activeTab===t.key?'act':''}" onclick="setTab('${t.key}')">${t.label} <span class="tc">${t.count}</span></div>`).join('')}
      </div>
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم الطلب</th><th>المستفيد</th><th>الرقم المدني</th><th>رقم بطاقة الإعاقة</th><th>حالة البطاقة</th><th>حالة الطلب</th><th>التاريخ</th><th>الحجز</th><th></th></tr></thead>
            <tbody>
              ${filtered.map(r=>`
              <tr style="${r.checkedOutBy===me?'background:#f0fdf4':''}">
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                <td>${r.applicant.name}</td>
                <td style="font-family:monospace;font-size:11.5px">${r.applicant.civil}</td>
                <td style="font-family:monospace;font-size:11.5px">${r.card.number}</td>
                <td><span class="badge ${r.card.status==='سارية'?'b-card-valid':r.card.status==='منتهية'?'b-card-expired':'b-card-cancelled'}">${r.card.status}</span></td>
                <td>${statusBadge(r.status)}</td>
                <td style="font-size:12px">${r.submitDate}</td>
                <td>${!r.checkedOutBy?`<span class="badge b-avail">متاح</span>`:r.checkedOutBy===me?`<span class="badge b-checkout">محجوز بواسطتي</span>`:`<span class="badge b-checkout">محجوز</span>`}</td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="ibtn" onclick="window.location.href='disability-details.html?id=${r.id}'">${ICONS.eye}</button>
                    ${!r.checkedOutBy?`<button class="ibtn" onclick="doCheckout('${r.id}')">${ICONS.lock}</button>`:r.checkedOutBy===me?`<button class="ibtn" onclick="doCheckin('${r.id}')">${ICONS.unlock}</button>`:''}
                    <button class="ibtn" onclick="openAddNoteModal('${r.id}')">${ICONS.note}</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}
function setTab(t){ activeTab=t; render(); }
function doCheckout(id){ const r=reqs.find(x=>x.id===id); if(r)r.checkedOutBy=me; showToast(`تم حجز ${id}`,'s'); render(); }
function doCheckin(id){ const r=reqs.find(x=>x.id===id); if(r)r.checkedOutBy=null; showToast(`تم تحرير ${id}`,'i'); render(); }
</script></body></html>
