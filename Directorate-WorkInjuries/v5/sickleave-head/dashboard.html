<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة البيانات — رئيس قسم الإجازات المرضية</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/components.js"></script>
<script>
initLayout({ role: 'sickleave-head', activePage: 'dashboard' });
setBreadcrumb([{ label: 'لوحة البيانات' }]);
document.addEventListener('DOMContentLoaded', () => {
  const stats = WI_DATA.dashboardStats['sickleave-head'];
  const myReqs = WI_DATA.allowances.filter(r => r.status === 'قيد المراجعة من رئيس قسم الإجازات المرضية');
  getContent().innerHTML = `
    <div class="pg-head"><div><h1>لوحة البيانات</h1><p>رئيس قسم الإجازات المرضية — ${WI_DATA.users.sickleave_head.name}</p></div></div>
    <div class="stats-grid">
      ${stats.map(s=>`<div class="scard ${s.type}" onclick="window.location.href='allowances-list.html'"><div class="sc-lbl">${s.label}</div><div class="sc-val">${s.value}</div></div>`).join('')}
    </div>
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.list}</div>الطلبات الواردة من قسم التحقيق</h3>
        <a href="allowances-list.html" style="font-size:12px;color:var(--primary)">عرض الكل</a>
      </div>
      <div class="pb-0">
        <table class="dtbl">
          <thead><tr><th>رقم الطلب</th><th>المؤمن عليه</th><th>نوع الطلب</th><th>الحالة</th><th>الحجز</th><th></th></tr></thead>
          <tbody>
            ${WI_DATA.allowances.slice(0,5).map(r=>`
            <tr>
              <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
              <td>${r.insured.name}</td>
              <td>${r.type}</td>
              <td>${statusBadge(r.status)}</td>
              <td>${r.checkedOutBy?`<span class="badge b-checkout" title="${r.checkedOutBy}">محجوز</span>`:`<span class="badge b-avail">متاح</span>`}</td>
              <td><button class="ibtn" onclick="window.location.href='allowances-details.html?id=${r.id}'">${ICONS.eye}</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
});
</script>
</body>
</html>
