<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقديم طلب ترخيص — المفوض عن المستشفى</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/components.js"></script>
<script>
initLayout({ role: 'hospital-delegate', activePage: 'licensing-list' });

const params = new URLSearchParams(window.location.search);
const requestType = params.get('type') || 'جديد';

setBreadcrumb([
  { label: 'الترخيص والتجديد', page: 'licensing-list' },
  { label: requestType === 'تجديد' ? 'تقديم طلب تجديد' : 'تقديم طلب ترخيص جديد' }
]);

const u = WI_DATA.users.hospital_delegate;
let doctors = [
  { id: 'd1', name: 'د. خالد بن سالم الهاشمي',  civil: '9011122233', specialty: 'جراحة العظام',         role: 'رئيس',       confirmStatus: 'بانتظار التأكيد', duplicateResult: null },
  { id: 'd2', name: 'د. ريم بنت أحمد المعولية',  civil: '9022233344', specialty: 'الطب الباطني',        role: 'نائب رئيس', confirmStatus: 'بانتظار التأكيد', duplicateResult: null },
  { id: 'd3', name: 'د. حسن بن علي السيابي',     civil: '9033344455', specialty: 'طب الأمراض المهنية', role: 'عضو',        confirmStatus: 'بانتظار التأكيد', duplicateResult: null },
  { id: 'd4', name: 'د. سمية بنت سيف الشهرية',  civil: '9044455566', specialty: 'إعادة التأهيل',       role: 'عضو',        confirmStatus: 'بانتظار التأكيد', duplicateResult: null },
];

document.addEventListener('DOMContentLoaded', renderPage);

function renderPage() {
  const confirmedCount = doctors.filter(d => d.confirmStatus === 'تم التأكيد').length;
  const duplicatesFound = doctors.filter(d => d.duplicateResult === 'يوجد تعارض').length;

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>${requestType === 'تجديد' ? 'تقديم طلب تجديد الترخيص' : 'تقديم طلب ترخيص جديد'}</h1>
        <p>يرجى استيفاء جميع البيانات والحصول على تأكيد الأطباء قبل الإرسال</p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary" onclick="window.location.href='licensing-list.html'">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <!-- ① بيانات المفوض -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>① بيانات المفوض</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">اسم المفوض</label><div class="fro">${u.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${u.civil}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${u.email}</div></div>
        </div>
      </div>
    </div>

    <!-- ② بيانات المؤسسة -->
    <div class="card">
      <div class="ph"><h3><div class="pico tl">${ICONS.building}</div>② بيانات المؤسسة الصحية</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp">
            <label class="flbl">اسم المؤسسة الصحية <span class="req">*</span></label>
            <input type="text" class="fc" value="مستشفى الأمل التخصصي">
          </div>
          <div class="fgrp">
            <label class="flbl">رقم السجل التجاري <span class="req">*</span></label>
            <div class="inp-btn">
              <input type="text" class="fc" id="cr-input" value="7890123">
              <button class="btn btn-secondary btn-sm" onclick="verifyCR()">تحقق</button>
            </div>
            <div class="fhint" id="cr-status"></div>
          </div>
          <div class="fgrp">
            <label class="flbl">نوع المؤسسة <span class="req">*</span></label>
            <select class="fc">
              <option>مستشفى خاص</option>
              <option>عيادة متخصصة</option>
              <option>مركز طبي</option>
              <option>مستشفى حكومي</option>
            </select>
          </div>
          <div class="fgrp">
            <label class="flbl">المحافظة / الولاية <span class="req">*</span></label>
            <select class="fc">
              <option>مسقط — ولاية السيب</option>
              <option>مسقط — ولاية بوشر</option>
              <option>مسقط — ولاية مطرح</option>
              <option>الداخلية — نزوى</option>
              <option>شمال الباطنة — صحار</option>
              <option>أخرى</option>
            </select>
          </div>
          <div class="fgrp">
            <label class="flbl">رقم الهاتف <span class="req">*</span></label>
            <input type="tel" class="fc" value="96824567890">
          </div>
          <div class="fgrp">
            <label class="flbl">البريد الإلكتروني للمؤسسة</label>
            <input type="email" class="fc" value="info@amal-hospital.om">
          </div>
          <div class="fgrp span-full">
            <label class="flbl">العنوان التفصيلي <span class="req">*</span></label>
            <input type="text" class="fc" value="طريق السيب — مسقط">
          </div>
        </div>
        ${requestType === 'تجديد' ? `
        <div class="fg fg-2 mt12">
          <div class="fgrp">
            <label class="flbl">رقم الترخيص الحالي <span class="req">*</span></label>
            <input type="text" class="fc" value="${WI_DATA.licensing[1].activeLicense?.number || ''}" readonly style="background:var(--g50)">
          </div>
          <div class="fgrp">
            <label class="flbl">تاريخ انتهاء الترخيص الحالي</label>
            <input type="text" class="fc" value="${WI_DATA.licensing[1].activeLicense?.expiryDate || ''}" readonly style="background:var(--g50)">
          </div>
        </div>` : ''}
      </div>
    </div>

    <!-- ③ الأطباء المرشحون -->
    <div class="card">
      <div class="ph">
        <h3><div class="pico bl">${ICONS.user}</div>③ الأطباء المرشحون للجنة الطبية</h3>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:12px;color:${confirmedCount>=3?'var(--accent)':'var(--warning)'}">${confirmedCount} / ${doctors.length} مؤكدون</span>
          <button class="btn btn-secondary btn-xs" onclick="openAddDoctorModal()">${ICONS.plus} إضافة طبيب</button>
        </div>
      </div>
      <div class="pb">
        <div class="alert alert-i" style="margin-bottom:14px">
          ${ICONS.info}
          <span>الحد الأدنى المطلوب <strong>4 أطباء</strong> — يجب أن يُؤكد جميعهم المشاركة. سيتم التحقق تلقائياً من عدم الازدواجية مع مؤسسات أخرى.</span>
        </div>
        ${duplicatesFound > 0 ? `
        <div class="alert alert-d" style="margin-bottom:14px">
          ${ICONS.warn}
          <span><strong>تحذير:</strong> ${duplicatesFound} طبيب/أطباء مرشحون لديهم تعارض مع مؤسسات أخرى — يرجى استبدالهم.</span>
        </div>` : ''}
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead>
              <tr>
                <th>اسم الطبيب</th>
                <th>الرقم المدني</th>
                <th>التخصص</th>
                <th>المنصب في اللجنة</th>
                <th>حالة التأكيد</th>
                <th>فحص الازدواجية</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody>
              ${doctors.map(d => `
              <tr style="${d.duplicateResult==='يوجد تعارض'?'background:var(--danger-l)':''}">
                <td style="font-weight:600">${d.name}</td>
                <td style="font-family:monospace;font-size:11.5px">${d.civil}</td>
                <td>${d.specialty}</td>
                <td>
                  <select class="fc" style="padding:4px 8px;font-size:12px;width:130px"
                    onchange="updateDoctorRole('${d.id}',this.value)">
                    <option ${d.role==='رئيس'?'selected':''}>رئيس</option>
                    <option ${d.role==='نائب رئيس'?'selected':''}>نائب رئيس</option>
                    <option ${d.role==='عضو'?'selected':''}>عضو</option>
                  </select>
                </td>
                <td>
                  <span class="badge ${d.confirmStatus==='تم التأكيد'?'b-approved':d.confirmStatus==='رفض'?'b-rejected':'b-phead'}">
                    ${d.confirmStatus}
                  </span>
                </td>
                <td>
                  ${d.duplicateResult === null ? `
                  <button class="btn btn-secondary btn-xs" onclick="checkDuplicate('${d.id}')">
                    ${ICONS.search} فحص
                  </button>` : `
                  <span class="badge ${d.duplicateResult==='لا يوجد تعارض'?'b-approved':'b-rejected'}">
                    ${d.duplicateResult}
                  </span>`}
                </td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="ibtn" onclick="sendConfirmRequest('${d.id}')" title="إرسال طلب التأكيد">${ICONS.bell}</button>
                    <button class="ibtn d" onclick="removeDoctor('${d.id}')" title="حذف">${ICONS.trash}</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div class="facts mt12">
          <button class="btn btn-secondary btn-sm" onclick="checkAllDuplicates()">
            ${ICONS.search} فحص الازدواجية لجميع الأطباء
          </button>
          <button class="btn btn-secondary btn-sm" onclick="sendAllConfirmRequests()">
            ${ICONS.bell} إرسال طلب التأكيد للجميع
          </button>
        </div>
      </div>
    </div>

    <!-- ④ المرفقات -->
    <div class="card">
      <div class="ph"><h3><div class="pico or">${ICONS.upload}</div>④ المرفقات المطلوبة</h3></div>
      <div class="pb">
        <div class="fg fg-2">
          ${[
            'السجل التجاري للمؤسسة',
            'شهادة اعتماد وزارة الصحة',
            'هيكل اللجنة الطبية',
            'مؤهلات الأطباء المرشحين',
          ].map((type, i) => `
          <div class="fgrp">
            <label class="flbl">${type} <span class="req">*</span></label>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="file" class="fc" id="att-${i}" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
              <span style="font-size:11px;color:var(--text3);white-space:nowrap">PDF, Word, صور</span>
            </div>
          </div>`).join('')}
          <div class="fgrp span-full">
            <label class="flbl">مستندات إضافية (اختياري)</label>
            <input type="file" class="fc" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.mp3,.wav,.mp4" multiple>
          </div>
        </div>
        <div class="fhint mt8">الحجم الأقصى لكل ملف 20 ميغابايت — الأنواع المقبولة: PDF, Word, صور, تسجيل صوتي, فيديو</div>
      </div>
    </div>

    <!-- ⑤ ملاحظات إضافية -->
    <div class="card">
      <div class="ph"><h3><div class="pico gy">${ICONS.note}</div>⑤ ملاحظات إضافية</h3></div>
      <div class="pb">
        <div class="fgrp">
          <label class="flbl">ملاحظاتك (اختياري)</label>
          <textarea class="fc" rows="3" placeholder="أي معلومات إضافية تودّ إضافتها للطلب..."></textarea>
        </div>
      </div>
    </div>

    <!-- الأزرار -->
    <div style="display:flex;gap:10px;padding:16px 0;flex-wrap:wrap">
      <button class="btn btn-primary btn-lg" onclick="submitLicenseRequest()">
        ${ICONS.check} إرسال الطلب
      </button>
      <button class="btn btn-secondary btn-lg" onclick="saveDraft()">
        ${ICONS.edit} حفظ كمسودة
      </button>
      <button class="btn btn-ghost" onclick="window.location.href='licensing-list.html'">إلغاء</button>
    </div>`;
}

function verifyCR() {
  const status = document.getElementById('cr-status');
  status.innerHTML = `<span style="color:var(--text3)">${ICONS.clock} جارٍ التحقق...</span>`;
  setTimeout(() => {
    status.innerHTML = `<span style="color:var(--accent)">✓ السجل التجاري سارٍ — ينتهي 2026-12-31</span>`;
  }, 1000);
}

function updateDoctorRole(id, role) {
  const d = doctors.find(x => x.id === id);
  if (d) d.role = role;
}

function checkDuplicate(id) {
  const d = doctors.find(x => x.id === id);
  if (!d) return;
  showToast(`جارٍ فحص الازدواجية للدكتور ${d.name}...`, 'i');
  setTimeout(() => {
    d.duplicateResult = 'لا يوجد تعارض';
    showToast(`لا يوجد تعارض — الدكتور ${d.name}`, 's');
    renderPage();
  }, 1200);
}

function checkAllDuplicates() {
  showToast('جارٍ فحص الازدواجية لجميع الأطباء...', 'i');
  setTimeout(() => {
    doctors.forEach(d => { d.duplicateResult = 'لا يوجد تعارض'; });
    showToast('تم فحص جميع الأطباء — لا يوجد تعارض', 's');
    renderPage();
  }, 1500);
}

function sendConfirmRequest(id) {
  const d = doctors.find(x => x.id === id);
  if (!d) return;
  showToast(`تم إرسال طلب التأكيد إلى الدكتور ${d.name}`, 'i');
  setTimeout(() => {
    d.confirmStatus = 'تم التأكيد';
    showToast(`تم تأكيد الدكتور ${d.name}`, 's');
    renderPage();
  }, 1500);
}

function sendAllConfirmRequests() {
  showToast('جارٍ إرسال طلبات التأكيد لجميع الأطباء...', 'i');
  setTimeout(() => {
    doctors.forEach(d => { d.confirmStatus = 'تم التأكيد'; });
    showToast('تم تأكيد جميع الأطباء بنجاح', 's');
    renderPage();
  }, 2000);
}

function removeDoctor(id) {
  confirmAction({
    title: 'تأكيد حذف الطبيب',
    msg: 'هل أنت متأكد من حذف هذا الطبيب من قائمة المرشحين؟',
    confirmLabel: 'نعم، حذف',
    confirmClass: 'btn-danger',
    onConfirm: () => {
      doctors = doctors.filter(d => d.id !== id);
      showToast('تم حذف الطبيب', 'w');
      renderPage();
    }
  });
}

function openAddDoctorModal() {
  openModal({
    title: 'إضافة طبيب مرشح',
    body: `
      <div class="fg fg-2" style="gap:14px">
        <div class="fgrp">
          <label class="flbl">الرقم المدني للطبيب <span class="req">*</span></label>
          <div class="inp-btn">
            <input type="text" class="fc" id="new-doc-civil" placeholder="10 أرقام" maxlength="10">
            <button class="btn btn-primary btn-sm" onclick="lookupDoctor()">استعلام</button>
          </div>
        </div>
        <div class="fgrp" id="doc-lookup-result"></div>
        <div class="fgrp">
          <label class="flbl">اسم الطبيب <span class="req">*</span></label>
          <input type="text" class="fc" id="new-doc-name" placeholder="الاسم الكامل">
        </div>
        <div class="fgrp">
          <label class="flbl">التخصص <span class="req">*</span></label>
          <input type="text" class="fc" id="new-doc-spec" placeholder="مثال: جراحة العظام">
        </div>
        <div class="fgrp">
          <label class="flbl">المنصب في اللجنة</label>
          <select class="fc" id="new-doc-role">
            <option>عضو</option><option>نائب رئيس</option><option>رئيس</option>
          </select>
        </div>
      </div>`,
    footer: `
      <button class="btn btn-primary" onclick="addDoctor()">${ICONS.check} إضافة الطبيب</button>
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>`
  });
}

function lookupDoctor() {
  const civil = document.getElementById('new-doc-civil').value.trim();
  if (!civil) { showToast('يرجى إدخال الرقم المدني','w'); return; }
  const el = document.getElementById('doc-lookup-result');
  el.innerHTML = `<div class="loading">${ICONS.clock} جارٍ الاستعلام...</div>`;
  setTimeout(() => {
    el.innerHTML = `<div class="alert alert-s" style="margin-bottom:0">${ICONS.check}<span>تم العثور على الطبيب في سجلات وزارة الصحة</span></div>`;
    document.getElementById('new-doc-name').value = 'د. سعيد بن محمد الهنائي';
  }, 1000);
}

function addDoctor() {
  const name = document.getElementById('new-doc-name')?.value.trim();
  const civil = document.getElementById('new-doc-civil')?.value.trim();
  const spec = document.getElementById('new-doc-spec')?.value.trim();
  const role = document.getElementById('new-doc-role')?.value;
  if (!name || !civil || !spec) { showToast('يرجى استيفاء جميع الحقول الإلزامية','w'); return; }
  doctors.push({ id: 'd'+Date.now(), name, civil, specialty: spec, role, confirmStatus: 'بانتظار التأكيد', duplicateResult: null });
  closeModal();
  showToast(`تم إضافة الطبيب ${name}`,'s');
  renderPage();
}

function saveDraft() {
  showToast('تم حفظ الطلب كمسودة', 'i');
  setTimeout(() => window.location.href = 'licensing-list.html', 1200);
}

function submitLicenseRequest() {
  const confirmedCount = doctors.filter(d => d.confirmStatus === 'تم التأكيد').length;
  const duplicatesFound = doctors.filter(d => d.duplicateResult === 'يوجد تعارض').length;

  if (confirmedCount < 3) {
    showToast(`يجب تأكيد ${3 - confirmedCount} طبيب/أطباء إضافيين على الأقل قبل الإرسال`, 'w');
    return;
  }
  if (duplicatesFound > 0) {
    showToast('يوجد أطباء لديهم تعارض — يرجى استبدالهم قبل الإرسال', 'd');
    return;
  }
  showToast('جارٍ تقديم الطلب...', 'i');
  setTimeout(() => {
    const newId = requestType === 'تجديد' ? 'LIC-2025-000040' : 'LIC-2025-000041';
    showToast(`تم تقديم الطلب بنجاح — رقم الطلب: ${newId}`, 's', 5000);
    setTimeout(() => window.location.href = 'licensing-list.html', 2000);
  }, 1500);
}
</script>
</body>
</html>
