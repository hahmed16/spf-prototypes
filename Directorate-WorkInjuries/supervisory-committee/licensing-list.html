<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة طلبات الترخيص — اللجنة الطبية الإشرافية</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'supervisory-committee', activePage: 'licensing-list' });
setBreadcrumb([{ label: 'التراخيص' }, { label: 'قائمة الطلبات المحالة' }]);

const reqs = WI_DATA.licensing;
let activeTab = 'all';

document.addEventListener('DOMContentLoaded', render);

function render() {
  const filtered = activeTab === 'all' ? reqs : reqs.filter(r => {
    if (activeTab === 'pending') return r.status.includes('بانتظار جدولة');
    if (activeTab === 'session') return r.status.includes('تم جدولة جلسة');
    if (activeTab === 'decided') return r.status.includes('تم اتخاذ القرار') || r.status.includes('اعتماد');
    return true;
  });

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>طلبات الترخيص المحالة إلى اللجنة الطبية الإشرافية</h1>
        <p>${reqs.length} طلب محال</p>
      </div>
    </div>

    ${renderUnifiedFilterBar({ onSearch: 'noopUnifiedSearch', onToggleAll: 'noopUnifiedToggleAll', isAllVisible: false })}
    <div class="filters" style="display:none">
      <div class="fgrid">
        <div class="fgrp"><label class="flbl">اسم المؤسسة</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">رقم الطلب</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">نوع الطلب</label>
          <select class="fc"><option>الكل</option><option>جديد</option><option>تجديد</option></select>
        </div>
        <div class="fgrp"><label class="flbl">الحالة</label>
          <select class="fc"><option>الكل</option>${reqs.map(r=>`<option>${r.status}</option>`).join('')}</select>
        </div>
      </div>
      <div class="facts">
        <button class="btn btn-primary btn-sm">${ICONS.search} بحث</button>
        <button class="btn btn-secondary btn-sm">مسح</button>
      </div>
    </div>

    <div class="card">
      <div class="ttabs">
        ${[
          { key: 'all', label: 'الكل', count: reqs.length },
          { key: 'pending', label: 'بانتظار جلسة', count: reqs.filter(r=>r.status.includes('بانتظار جدولة')).length },
          { key: 'session', label: 'جلسة مجدولة', count: reqs.filter(r=>r.status.includes('تم جدولة جلسة')).length },
          { key: 'decided', label: 'صدر قرار', count: reqs.filter(r=>r.status.includes('تم اتخاذ القرار')||r.status.includes('اعتماد')).length },
        ].map(t => `<div class="ttab ${activeTab===t.key?'act':''}" onclick="setTab('${t.key}')">${t.label} <span class="tc">${t.count}</span></div>`).join('')}
      </div>
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead>
              <tr>
                <th>رقم الطلب</th>
                <th>مقدم الطلب</th>
                <th>المؤسسة الصحية</th>
                <th>نوع الطلب</th>
                <th>الأطباء المقدمون</th>
                <th>الأطباء المؤكدون</th>
                <th>الحالة</th>
                <th>تاريخ التقديم</th>
                <th>الأيام المتبقية</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map(r => {
                const meta = deriveRequestSummaryMeta(r);
                const remainingDaysClass = getRemainingDaysClass(meta.remainingDays);
                const remainingDaysLabel = getRemainingDaysLabel(meta.remainingDays);
                return `
              <tr>
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                <td>${getSubmittedByName(r)}</td>
                <td style="font-weight:600">${r.institution.name}</td>
                <td><span class="badge b-direct">${r.requestType}</span></td>
                <td>${r.verification.totalDoctors}</td>
                <td>
                  <span style="font-weight:700;color:${r.verification.confirmedDoctors===r.verification.totalDoctors?'var(--accent)':'var(--warning)'}">
                    ${r.verification.confirmedDoctors} / ${r.verification.totalDoctors}
                  </span>
                </td>
                <td>${statusBadge(r.status)}</td>
                <td style="font-size:12px">${r.submitDate}</td>
                <td><span class="sla-days ${remainingDaysClass}">${remainingDaysLabel}</span></td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="ibtn" onclick="window.location.href='licensing-details.html?id=${r.id}'">${ICONS.eye}</button>
                    <button class="ibtn" onclick="window.location.href='institution-file.html?id=${r.id}'" title="ملف المؤسسة">${ICONS.file}</button>
                    ${!r.suspended?`<button class="ibtn" onclick="doSuspend('${r.id}')" title="تعليق الطلب">${ICONS.pause}</button>`:`<button class="ibtn" onclick="doResume('${r.id}')" title="استئناف الطلب">${ICONS.play}</button>`}
                  </div>
                </td>
              </tr>`;
                }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}
function setTab(t) { activeTab = t; render(); }
function doSuspend(id){
  const reason=prompt('سبب التعليق:');
  if(reason){
    const notes=prompt('ملاحظات إضافية (اختياري):');
    const r=reqs.find(x=>x.id===id);
    if(r){
      r.suspended=true;
      r.suspensionReason=reason;
      r.suspensionNotes=notes||'';
      r.suspendedBy='اللجنة الطبية الإشرافية';
      r.suspendedDate=new Date().toISOString().slice(0,10);
      r.timeline.push({
        action:'تعليق الطلب',
        actor:'اللجنة الطبية الإشرافية',
        role:'لجنة',
        time:new Date().toISOString().slice(0,16).replace('T',' '),
        fromStatus:r.status,
        toStatus:r.status,
        note:`تعليق: ${reason}${notes?` (${notes})`:''}`,
        type:'warning'
      });
      r.lastUpdate=new Date().toISOString().slice(0,16).replace('T',' ');
      r.lastUpdatedBy='اللجنة الطبية الإشرافية';
    }
    showToast(`تم تعليق ${id}`,'w');
    render();
  }
}
function doResume(id){
  const r=reqs.find(x=>x.id===id);
  if(r){
    r.suspended=false;
    r.resumedBy='اللجنة الطبية الإشرافية';
    r.resumedDate=new Date().toISOString().slice(0,10);
    r.timeline.push({
      action:'استئناف الطلب',
      actor:'اللجنة الطبية الإشرافية',
      role:'لجنة',
      time:new Date().toISOString().slice(0,16).replace('T',' '),
      fromStatus:r.status,
      toStatus:r.status,
      note:'تم استئناف الطلب',
      type:'success'
    });
    r.lastUpdate=new Date().toISOString().slice(0,16).replace('T',' ');
    r.lastUpdatedBy='اللجنة الطبية الإشرافية';
  }
  showToast(`تم استئناف ${id}`,'s');
  render();
}
</script>
</body>
</html>
