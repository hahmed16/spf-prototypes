<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة البيانات — اللجنة الطبية الإشرافية</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'supervisory-committee', activePage: 'dashboard' });
setBreadcrumb([{ label: 'لوحة البيانات' }]);

document.addEventListener('DOMContentLoaded', () => {
  const reqs = WI_DATA.licensing;
  const pending = reqs.filter(r =>
    r.status === 'تم إحالة الطلب إلى اللجنة الطبية الإشرافية — بانتظار جدولة جلسة' ||
    r.status === 'تم جدولة جلسة اللجنة الطبية الإشرافية'
  );

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>لوحة البيانات</h1>
        <p>اللجنة الطبية الإشرافية — مراجعة طلبات الترخيص والتجديد</p>
      </div>
    </div>

    <div class="alert alert-i">
      ${ICONS.info}
      <span>دور اللجنة الطبية الإشرافية: مراجعة طلبات الترخيص المحالة، حضور الجلسات، والتوقيع الإلكتروني على القرارات.</span>
    </div>

    <div class="stats-grid">
      <div class="scard p" onclick="window.location.href='licensing-list.html'">
        <div class="sc-lbl">إجمالي طلبات الترخيص المحالة</div>
        <div class="sc-val">${reqs.length}</div>
        <div class="sc-sub">للمراجعة</div>
      </div>
      <div class="scard w" onclick="window.location.href='licensing-list.html'">
        <div class="sc-lbl">بانتظار جلسة</div>
        <div class="sc-val">${pending.length}</div>
        <div class="sc-sub">بانتظار الجدولة أو الجلسة</div>
      </div>
      <div class="scard s" onclick="window.location.href='licensing-list.html'">
        <div class="sc-lbl">تم اتخاذ القرار هذا الشهر</div>
        <div class="sc-val">3</div>
        <div class="sc-sub">قرارات مكتملة</div>
      </div>
      <div class="scard d">
        <div class="sc-lbl">توقيعات معلّقة</div>
        <div class="sc-val">2</div>
        <div class="sc-sub">تحتاج توقيعك الإلكتروني</div>
      </div>
    </div>

    <div class="card">
      <div class="ph">
        <h3><div class="pico bl">${ICONS.list}</div>طلبات الترخيص المحالة للجنة</h3>
        <a href="licensing-list.html" style="font-size:12px;color:var(--primary)">عرض الكل</a>
      </div>
      <div class="pb-0">
        <table class="dtbl">
          <thead>
            <tr>
              <th>رقم الطلب</th>
              <th>المؤسسة الصحية</th>
              <th>نوع الطلب</th>
              <th>الأطباء المؤكدون</th>
              <th>الحالة</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${reqs.map(r => `
            <tr>
              <td style="font-family:monospace;color:var(--primary);font-weight:700">${r.id}</td>
              <td style="font-weight:600">${r.institution.name}</td>
              <td><span class="badge b-direct">${r.requestType}</span></td>
              <td>
                <span style="font-weight:700;color:${r.verification.confirmedDoctors===r.verification.totalDoctors?'var(--accent)':'var(--warning)'}">
                  ${r.verification.confirmedDoctors} / ${r.verification.totalDoctors}
                </span>
              </td>
              <td>${statusBadge(r.status)}</td>
              <td><button class="ibtn" onclick="window.location.href='licensing-details.html?id=${r.id}'">${ICONS.eye}</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
});
</script>
</body>
</html>
