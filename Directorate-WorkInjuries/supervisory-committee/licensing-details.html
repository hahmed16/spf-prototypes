<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل طلب الترخيص — اللجنة الطبية الإشرافية</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/components.js"></script>
<script>
initLayout({ role: 'supervisory-committee', activePage: 'licensing-list' });
const params = new URLSearchParams(window.location.search);
const req = WI_DATA.licensing.find(r => r.id === params.get('id')) || WI_DATA.licensing[1];
currentRequestId = req.id;
setBreadcrumb([{ label: 'الترخيص', page: 'licensing-list' }, { label: `تفاصيل ${req.id}` }]);

// حالة التوقيع لهذه اللجنة
let mySigned = false;

document.addEventListener('DOMContentLoaded', renderPage);

function renderPage() {
  const hasDecision = req.committeeDecision !== null;
  const canSign = hasDecision && !mySigned;

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>تفاصيل طلب ${req.requestType === 'جديد' ? 'الترخيص' : 'التجديد'}</h1>
        <p>رقم الطلب: <strong style="font-family:monospace;color:var(--primary)">${req.id}</strong></p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary" onclick="window.location.href='licensing-list.html'">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <div class="alert alert-i">
      ${ICONS.info}
      <span>اللجنة الطبية الإشرافية تطّلع على الطلب ثم تحضر الجلسة وتُدخل القرار عبر المقرر، ثم توقّع إلكترونياً على القرار النهائي.</span>
    </div>

    <!-- ملخص -->
    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
          <div><div class="flbl" style="margin-bottom:4px">رقم الطلب</div><div style="font-size:15px;font-weight:800;color:var(--primary);font-family:monospace">${req.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">نوع الطلب</div><span class="badge b-direct">${req.requestType}</span></div>
          <div><div class="flbl" style="margin-bottom:4px">الحالة</div>${statusBadge(req.status)}</div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ التقديم</div><div>${req.submitDate}</div></div>
        </div>
      </div>
    </div>

    ${renderInstitutionPanel(req.institution)}
    ${renderDoctorsPanel(req.doctors, false)}

    <!-- التحقق من الاشتراطات -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico ${req.verification.minMet?'gr':'rd'}">${req.verification.minMet?ICONS.check:ICONS.warn}</div>التحقق من اشتراطات الترخيص</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">إجمالي الأطباء</label><div class="fro"><strong>${req.verification.totalDoctors}</strong></div></div>
          <div class="fgrp"><label class="flbl">المؤكدون</label>
            <div class="fro"><strong style="color:${req.verification.confirmedDoctors===req.verification.totalDoctors?'var(--accent)':'var(--warning)'}">${req.verification.confirmedDoctors} / ${req.verification.totalDoctors}</strong></div>
          </div>
          <div class="fgrp"><label class="flbl">استيفاء الحد الأدنى</label>
            <div class="fro"><span class="badge ${req.verification.minMet?'b-approved':'b-returned'}">${req.verification.minMet?'مستوفى':'غير مستوفى'}</span></div>
          </div>
        </div>
      </div>
    </div>

    ${req.session ? renderSessionPanel(req.session) : ''}
    ${req.committeeDecision ? renderCommitteeDecisionPanel(req.committeeDecision, 'قرار اللجنة الطبية الإشرافية') : ''}
    ${req.activeLicense ? renderActiveLicensePanel(req.activeLicense) : ''}
    ${renderAttachmentsPanel(req.attachments, false)}
    ${renderOperationalNotes(req.notes, false)}

    <!-- التوقيع الإلكتروني -->
    ${hasDecision ? `
    <div class="card" style="border:2px solid ${mySigned?'var(--accent)':'var(--primary)'}">
      <div class="ph" style="background:${mySigned?'var(--accent-l)':'var(--primary-l)'}">
        <h3 style="color:${mySigned?'var(--accent)':'var(--primary)'}">
          <div class="pico ${mySigned?'gr':'bl'}">${mySigned?ICONS.check:ICONS.pen}</div>
          التوقيع الإلكتروني على قرار اللجنة
        </h3>
      </div>
      <div class="pb">
        ${mySigned ? `
        <div class="alert alert-s">${ICONS.check}<span>تم تسجيل توقيعك الإلكتروني بنجاح على قرار هذه الجلسة.</span></div>
        ` : `
        <div class="alert alert-w" style="margin-bottom:16px">
          ${ICONS.warn}
          <span>يرجى مراجعة قرار اللجنة أعلاه بعناية قبل التوقيع. التوقيع الإلكتروني نهائي ولا يمكن التراجع عنه.</span>
        </div>
        <div class="fgrp" style="margin-bottom:16px">
          <label class="flbl">القرار المراد التوقيع عليه</label>
          <div class="fro"><span class="badge ${req.committeeDecision.type==='اعتماد الترخيص'?'b-approved':'b-rejected'}">${req.committeeDecision.type}</span></div>
        </div>
        <button class="btn btn-accent btn-lg" onclick="doElectronicSign()">
          ${ICONS.pen} توقيع إلكتروني على قرار الجلسة
        </button>`}
      </div>
    </div>` : `
    <div class="alert alert-i">
      ${ICONS.info}
      <span>لم يُدخَل قرار الجلسة بعد — يقوم المقرر بإدخال القرار ثم يُتاح لك التوقيع.</span>
    </div>`}

    ${renderTimeline(req.timeline)}`;
}

function doElectronicSign() {
  confirmAction({
    title: 'تأكيد التوقيع الإلكتروني',
    msg: `هل أنت متأكد من توقيعك الإلكتروني على قرار اللجنة الطبية الإشرافية للطلب <strong>${req.id}</strong>؟<br>
          <span style="font-size:12px;color:var(--text3)">التوقيع نهائي ولا يمكن التراجع عنه.</span>`,
    confirmLabel: 'نعم، توقيع إلكتروني',
    confirmClass: 'btn-accent',
    onConfirm: () => {
      mySigned = true;
      showToast('تم تسجيل توقيعك الإلكتروني بنجاح', 's');
      renderPage();
    }
  });
}
</script>
</body>
</html>
