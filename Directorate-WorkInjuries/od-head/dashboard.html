<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة البيانات — رئيس قسم التحقيق في الأمراض المهنية</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <script src="../shared/config.js"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="../shared/components.js"></script>
  <script>
    initLayout({ role: 'od-head', activePage: 'dashboard' });
    setBreadcrumb([{ label: 'لوحة البيانات' }]);
    
    document.addEventListener('DOMContentLoaded', () => {
      const stats = WI_DATA.dashboardStats['od-head'];
      // Filter for OD requests pending head approval
      const pending = WI_DATA.allowances.filter(r => 
        r.type === 'مرض مهني' && 
        r.status === 'بانتظار اعتماد رئيس قسم التحقيق في الأمراض المهنية'
      );

      getContent().innerHTML = `
        <div class="pg-head">
          <div>
            <h1>لوحة البيانات</h1>
            <p>رئيس قسم التحقيق في الأمراض المهنية — ${WI_DATA.users.od_head.name}</p>
          </div>
        </div>

        <div class="stats-grid">
          ${stats.map(s => `
          <div class="scard ${s.type}" onclick="window.location.href='allowances-list.html'">
            <div class="sc-lbl">${s.label}</div>
            <div class="sc-val">${s.value}</div>
          </div>`).join('')}
        </div>

        ${pending.length ? `
        <div class="alert alert-w">
          ${ICONS.warn}
          <div><strong>${pending.length} طلب بانتظار اعتمادك</strong> — <a href="allowances-list.html" style="color:var(--primary)">عرض الطلبات</a></div>
        </div>` : ''}

        <div class="card">
          <div class="ph">
            <h3><div class="pico bl">${ICONS.list}</div>الطلبات بانتظار الاعتماد</h3>
            <a href="allowances-list.html" style="font-size:12px;color:var(--primary)">عرض الكل</a>
          </div>
          <div class="pb-0">
            <table class="dtbl">
              <thead><tr><th>رقم الطلب</th><th>المؤمن عليه</th><th>توصية الموظف</th><th>تاريخ التقديم</th><th></th></tr></thead>
              <tbody>
                ${pending.slice(0, 5).map(r => `
                <tr>
                  <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                  <td>${r.insured.name}</td>
                  <td><span class="badge ${r.investigation?.employeeRecommendation === 'موافقة' ? 'b-approved' : 'b-rejected'}">${r.investigation?.employeeRecommendation || 'قيد المراجعة'}</span></td>
                  <td style="font-size:12px">${r.submitDate}</td>
                  <td><button class="btn btn-primary btn-xs" onclick="window.location.href='allowances-details.html?id=${r.id}'">مراجعة واتخاذ قرار</button></td>
                </tr>`).join('')}
                ${!pending.length ? `<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text3)">لا توجد طلبات بانتظار الاعتماد حالياً</td></tr>` : ''}
              </tbody>
            </table>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
