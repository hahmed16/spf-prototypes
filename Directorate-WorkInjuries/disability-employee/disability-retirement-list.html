<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعلامات التقاعد — موظف قسم الإعاقة والأمراض المستديمة</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'disability-employee', activePage: 'disability-retirement-list' });
setBreadcrumb([{ label: 'منفعة الإعاقة والأمراض المستديمة' }, { label: 'استعلامات التقاعد' }]);

const me = WI_DATA.users.disability_employee.name;
let searchQuery = '';
let showAllStages = false;

document.addEventListener('DOMContentLoaded', render);

function render() {
  const retirementInquiries = WI_DATA.disabilityRetirement || [];
  const filtered = getFilteredData({
    role: 'disability-employee',
    data: retirementInquiries,
    query: searchQuery,
    showAll: showAllStages
  });

  const myQueue = filtered.filter(r => r.status.includes('بانتظار مراجعة موظف'));

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>استعلامات تقاعد الأشخاص ذوي الإعاقة</h1>
        <p>${retirementInquiries.length} استعلام إجمالي — ${myQueue.length} بانتظار مراجعة الموظف</p>
      </div>
    </div>

    <div class="alert alert-i">
      ${ICONS.info}
      <div>ترد هذه الاستعلامات من نظام المستحقات. دور الموظف هو مراجعة البيانات ورفع توصية لرئيس القسم لاعتماد القرار النهائي.</div>
    </div>

    ${renderUnifiedFilterBar({ onSearch: 'updateSearch', onToggleAll: 'toggleAll', isAllVisible: showAllStages })}

    <div class="card">
      <div class="pb-0">
        ${filtered.length === 0 ? `
        <div class="empty-st">
          ${ICONS.file}
          <h4>لا توجد استعلامات تقاعد</h4>
          <p>لم يتم استلام أي استعلامات حالياً</p>
        </div>` : `
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead>
              <tr>
                <th>رقم الاستعلام</th>
                <th>اسم المستفيد</th>
                <th>الرقم المدني</th>
                <th>جهة العمل الحالية</th>
                <th>المسمى الأخير</th>
                <th>المنفعة الحالية</th>
                <th>تاريخ التقاعد المطلوب</th>
                <th>توصية الموظف</th>
                <th>الحالة</th>
                <th>الأيام المتبقية</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map(r => {
                const meta = deriveRequestSummaryMeta(r);
                const remainingDaysClass = getRemainingDaysClass(meta.remainingDays);
                const remainingDaysLabel = getRemainingDaysLabel(meta.remainingDays);
                const employeeRec = r.employeeRecommendation?.type || '—';
                const benefitText = r.activeBenefit?.isDisbursed
                  ? `قائمة — ${r.activeBenefit.lastDepositedMonth || '—'}`
                  : (r.activeBenefit?.currentStatus || 'لا توجد');
                return `
                <tr style="${r.checkedOutBy === me ? 'background:#f0fdf4' : ''}">
                  <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                  <td>${r.applicant.name}</td>
                  <td style="font-family:monospace;font-size:11.5px">${r.applicant.civil}</td>
                  <td>${r.currentEmployer || '—'}</td>
                  <td>${r.lastJobTitle || '—'}</td>
                  <td>${benefitText}</td>
                  <td>${formatDate(r.retirementDate)}</td>
                  <td><span class="badge ${employeeRec === 'معتمد' ? 'b-approved' : employeeRec === 'مرفوض' ? 'b-returned' : 'b-secondary'}">${employeeRec}</span></td>
                  <td><div style="display:flex;align-items:center;gap:6px">${statusBadge(r.status)}${r.suspended ? `<span class="badge b-returned">معلّق</span>` : ''}</div></td>
                  <td><span class="sla-days ${remainingDaysClass}">${remainingDaysLabel}</span></td>
                  <td>
                    <div style="display:flex;gap:4px">
                      <button class="ibtn" onclick="window.location.href='disability-retirement-details.html?id=${r.id}'">${ICONS.eye}</button>
                      ${r.status.includes('بانتظار مراجعة موظف')
                        ? !r.checkedOutBy
                          ? `<button class="ibtn" onclick="doCheckout('${r.id}')" title="حجز">${ICONS.lock}</button>`
                          : r.checkedOutBy === me
                            ? `<button class="ibtn" onclick="doCheckin('${r.id}')" title="تحرير">${ICONS.unlock}</button>`
                            : ''
                        : ''}
                    </div>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`}
      </div>
    </div>`;
}

function updateSearch(val) { searchQuery = val; render(); }
function toggleAll() { showAllStages = !showAllStages; render(); }

function doCheckout(id) {
  const r = WI_DATA.disabilityRetirement.find(x => x.id === id);
  if (r) {
    r.checkedOutBy = me;
    r.lastUpdate = new Date().toISOString().slice(0, 16).replace('T', ' ');
    r.lastUpdatedBy = me;
    r.timeline.push({
      action: 'حجز الاستعلام',
      actor: me,
      role: 'موظف قسم الإعاقة والأمراض المستديمة',
      time: r.lastUpdate,
      fromStatus: r.status,
      toStatus: r.status,
      note: 'تم حجز الاستعلام للمراجعة',
      type: 'info',
      phone: getCurrentUserPhone()
    });
  }
  showToast(`تم حجز ${id}`, 's');
  render();
}

function doCheckin(id) {
  const r = WI_DATA.disabilityRetirement.find(x => x.id === id);
  if (r) {
    r.checkedOutBy = null;
    r.lastUpdate = new Date().toISOString().slice(0, 16).replace('T', ' ');
    r.lastUpdatedBy = me;
    r.timeline.push({
      action: 'تحرير الاستعلام',
      actor: me,
      role: 'موظف قسم الإعاقة والأمراض المستديمة',
      time: r.lastUpdate,
      fromStatus: r.status,
      toStatus: r.status,
      note: 'تم تحرير الاستعلام',
      type: 'info',
      phone: getCurrentUserPhone()
    });
  }
  showToast(`تم تحرير ${id}`, 'i');
  render();
}
</script>
</body>
</html>
