<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل إعادة التقييم — موظف قسم الإعاقة</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'disability-employee', activePage: 'chronic-reassessment' });
const params = new URLSearchParams(window.location.search);
const id = params.get('id') || 'CHR-2024-000089';
setBreadcrumb([{ label: 'منفعة الأمراض المستديمة', page: 'chronic-reassessment' }, { label: `تفاصيل ${id}` }]);

const incoming = WI_DATA.chronicIncoming.find(x => x.requestId === 'CHR-2025-000156') || WI_DATA.chronicIncoming[1];
const req = {
  id,
  status: 'قيد المراجعة — إعادة تقييم الأمراض المستديمة',
  applicant: { name: incoming.applicantName || '—', civil: incoming.civil || '—', role: 'المواطن', phone: '96890000000', email: 'noreply@spf-proto.om' },
  insured: { name: incoming.applicantName || '—', civil: incoming.civil || '—', dob: '1981-02-10', gender: 'ذكر', nationality: 'عُماني', insuranceStatus: 'نشط', regDate: '2018-01-01' },
  medical: { ...incoming },
  reassessment: {
    lastDate: '2024-07-01',
    nextDate: '2025-01-01',
    results: 'استمرار الحالة المرضية مع حاجة لمتابعة علاجية دورية.'
  },
  timeline: [
    { action: 'تم استلام ملف إعادة التقييم', actor: 'النظام', role: 'آلي', time: '2025-01-02 09:00', fromStatus: '', toStatus: 'قيد المراجعة — إعادة تقييم الأمراض المستديمة', note: '', type: 'default' }
  ]
};

document.addEventListener('DOMContentLoaded', () => {
  const med = req.medical;
  const tl = req.timeline || [];

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>تفاصيل إعادة تقييم الأمراض المستديمة</h1>
        <p>رقم الطلب: <strong style="font-family:monospace;color:var(--primary)">${req.id}</strong></p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary" onclick="window.location.href='chronic-reassessment.html'">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <!-- بيانات مقدم الطلب -->
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">صفة مقدم الطلب</label><div class="fro">${req.applicant.role || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.applicant.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.applicant.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${normalizeDisplay(((typeof req !== 'undefined' && (req?.applicant?.phone || req?.insured?.phone)) || (typeof appeal !== 'undefined' && appeal?.applicant?.phone) || (typeof app !== 'undefined' && app?.phone) || (typeof dlg !== 'undefined' && dlg?.phone) || (typeof u !== 'undefined' && u?.phone)), '96890000000')}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${normalizeDisplay(((typeof req !== 'undefined' && (req?.applicant?.email || req?.insured?.email)) || (typeof appeal !== 'undefined' && appeal?.applicant?.email) || (typeof app !== 'undefined' && app?.email) || (typeof dlg !== 'undefined' && dlg?.email) || (typeof u !== 'undefined' && u?.email)), 'noreply@spf-proto.om')}</div></div>
        </div>
      </div>
    </div>

    <!-- بيانات المؤمن عليه -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات المؤمن عليه</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-4">
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.insured.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.insured.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(req.insured.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${req.insured.gender || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${req.insured.nationality || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${req.insured.insuranceStatus === 'نشط' ? 'b-approved' : 'b-rejected'}">${req.insured.insuranceStatus || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل</label><div class="fro">${formatDate(req.insured.regDate)}</div></div>
        </div>
      </div>
    </div>

    <!-- البيانات الطبية (وزارة الصحة) -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>البيانات الطبية <span style="font-size:10px;color:var(--text3)">(واردة من وزارة الصحة)</span></h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">رقم الطلب الفريد (وزارة الصحة)</label><div class="fro" style="font-family:monospace">${normalizeDisplay(med.uniqueRequestId || med.refId || med.mohRef)}</div></div>
          <div class="fgrp"><label class="flbl">المؤسسة الصحية المعالجة</label><div class="fro">${normalizeDisplay(med.hospital)}</div></div>
          <div class="fgrp"><label class="flbl">الطبيب المعالج</label><div class="fro">${normalizeDisplay(med.doctor)}</div></div>
          <div class="fgrp span-full"><label class="flbl">التشخيص الطبي (تقرير وصفي مثبت)</label><div class="fro medical-report">${normalizeDisplay(med.permanentDiseaseReport || buildPermanentDiseaseReport(med))}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ثبوت المرض</label><div class="fro">${formatDate(med.provenDate)}</div></div>
          <div class="fgrp"><label class="flbl">المرض المستديم</label><div class="fro">${normalizeDisplay(med.chronicDisease || med.diagnosis)}</div></div>
          <div class="fgrp"><label class="flbl">الجهاز المتأثر</label><div class="fro">${normalizeDisplay(med.affectedSystem)}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المرجعي للطلب الأول</label><div class="fro" style="font-family:monospace">${normalizeDisplay(med.firstRequestRef)}</div></div>
          <div class="fgrp"><label class="flbl">الحالة العامة (إعادة التقييم)</label><div class="fro">${normalizeDisplay(med.overallCondition)}</div></div>
        </div>
      </div>
    </div>

    <!-- بيانات إعادة التقييم الدوري -->
    <div class="card card-cum">
      <div class="ph"><h3><div class="pico or">${ICONS.refresh}</div>بيانات إعادة التقييم الدوري</h3><span class="stg-lbl">إعادة التقييم</span></div>
      <div class="pb">
        <div class="fg fg-2">
          <div class="fgrp"><label class="flbl">تاريخ آخر تقييم</label><div class="fro">${formatDate(req.reassessment.lastDate)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ إعادة التقييم القادم</label><div class="fro">${formatDate(req.reassessment.nextDate)}</div></div>
          <div class="fgrp span-full"><label class="flbl">نتائج إعادة التقييم (من وزارة الصحة)</label><div class="fro">${req.reassessment.results || 'لم تصل النتائج بعد'}</div></div>
        </div>
      </div>
    </div>

    <!-- اتخاذ القرار -->
    <div class="dp">
      <div class="ph"><h3><div class="pico bl">${ICONS.pen}</div>اتخاذ القرار</h3></div>
      <div class="dp-body">
        <div class="fgrp">
          <label class="flbl">الملاحظات</label>
          <textarea class="fc" rows="3" placeholder="أكتب ملاحظاتك..."></textarea>
        </div>
        <div class="fgrp">
          <label class="flbl">إرفاق ملف داعم <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          ${renderModernUploadComponent({ idPrefix: 'decision-att', subTitle: 'PDF, Word, صور — الحجم الأقصى 20 ميغابايت' })}
        </div>
        <div class="dp-acts">
          <button class="btn btn-primary" onclick="takeDecision('head')">${ICONS.arrow_left} توجيه لرئيس القسم</button>
          <button class="btn btn-secondary" onclick="takeDecision('comm')">توجيه لقسم اللجان الطبية</button>
          <button class="btn btn-warning" onclick="takeDecision('complete')">طلب استيفاء بيانات من المواطن</button>
          <button class="btn btn-danger" onclick="takeDecision('reject')">رفض</button>
        </div>
      </div>
    </div>

    <!-- السجل الزمني -->
    <div class="card">
      <div class="ph"><h3><div class="pico gy">${ICONS.clock}</div>السجل الزمني الكامل للطلب</h3></div>
      <div class="pb">
        <div class="tl">
          ${tl.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد أحداث</div>' : tl.map(e => {
            const dc = e.type === 'success' ? 's' : e.type === 'danger' ? 'd' : e.type === 'warning' ? 'w' : '';
            const ic = e.type === 'success' ? ICONS.check : e.type === 'danger' ? ICONS.x : e.type === 'warning' ? ICONS.warn : ICONS.clock;
            return `<div class="tl-item"><div class="tl-dot ${dc}">${ic}</div><div class="tl-c"><div class="tl-hd"><span class="tl-act">${e.action}</span><span class="tl-time">${e.time}</span></div><div class="tl-meta"><span>${e.actor}</span><span style="color:var(--text3)">·</span><span>${e.role}</span></div>${e.toStatus ? `<div class="tl-states">${e.fromStatus ? `<span class="badge b-draft" style="font-size:10px">${e.fromStatus}</span><span>${ICONS.arrow_right}</span>` : ''}<span class="badge ${WI_CONFIG.statusBadges[e.toStatus] || 'b-draft'}" style="font-size:10px">${e.toStatus}</span></div>` : ''}${e.note ? `<div class="tl-note">${e.note}</div>` : ''}</div></div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
});

function takeDecision(mode) {
  const msg = { head: 'تم توجيه الحالة إلى رئيس القسم', comm: 'تم توجيه الحالة إلى قسم اللجان الطبية', complete: 'تم طلب استيفاء بيانات من المواطن', reject: 'تم رفض الطلب' }[mode];
  showToast(msg, mode === 'reject' ? 'd' : 's');
  setTimeout(() => window.location.href = 'chronic-reassessment.html', 1200);
}
</script>
</body>
</html>
