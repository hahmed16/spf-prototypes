<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل طلب منفعة الإعاقة — موظف قسم الإعاقة</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>

<body>
  <script src="../shared/config.js"></script>
  <script src="../shared/data-users.js"></script>
  <script src="../shared/data-allowances.js"></script>
  <script src="../shared/data-disability.js"></script>
  <script src="../shared/data-chronic.js"></script>
  <script src="../shared/data-appeals.js"></script>
  <script src="../shared/data-licensing.js"></script>
  <script src="../shared/data-sessions.js"></script>
  <script src="../shared/data-disability-retirement.js"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/workflow-stages.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="../shared/utils.js"></script>
  <script>
    initLayout({ role: 'disability-employee', activePage: 'disability-list' });
    const params = new URLSearchParams(window.location.search);
    const req = (WI_DATA.disability || []).find(r => r.id === params.get('id')) || (WI_DATA.disability || [])[0];
    currentRequestId = req.id;
    const me = WI_DATA.users?.disability_employee?.name || 'مستخدم غير معروف';
    const isCheckedOutByMe = req.checkedOutBy === me;
    setBreadcrumb([{ label: 'منفعة الإعاقة', page: 'disability-list' }, { label: `تفاصيل ${req.id}` }]);

    document.addEventListener('DOMContentLoaded', () => {
      const statusPending = 'تم تقديم طلب منفعة الأشخاص ذوي الإعاقة — بانتظار مراجعة موظف قسم الإعاقة والأمراض المستديمة';
      const canAct = (req.status === statusPending || req.status === 'قيد المراجعة — قسم الإعاقة' || req.status === 'تم إعادة الطلب لاستيفاء البيانات') && isCheckedOutByMe;

      const card = req.card || null;
      const isExpired = card && new Date(card.expiryDate) < new Date();
      const atts = req.attachments || [];
      const notes = req.notes || [];
      const tl = req.timeline || [];
      const applicantPhonePrimary = normalizeDisplay(req?.applicant?.phone || req?.insured?.phone, '96890000000');
      const applicantPhone1 = normalizeDisplay(req?.applicant?.phoneAlt1 || req?.applicant?.additionalPhone1 || req?.applicant?.phone1, applicantPhonePrimary);
      const applicantPhone2 = normalizeDisplay(req?.applicant?.phoneAlt2 || req?.applicant?.additionalPhone2 || req?.applicant?.phone2, '96891111222');
      const applicantEmail = normalizeDisplay(req?.applicant?.email || req?.insured?.email, 'noreply@spf-proto.om');

      getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>تفاصيل طلب منفعة الأشخاص ذوي الإعاقة</h1>
        <p>رقم الطلب: <strong style="font-family:monospace;color:var(--primary)">${req.id}</strong></p>
      </div>
      <div class="pg-acts">
        ${req.status === statusPending && !req.checkedOutBy
          ? `<button class="btn btn-primary" onclick="doCheckout()">${ICONS.lock} حجز الطلب</button>`
          : isCheckedOutByMe
            ? `<button class="btn btn-secondary" onclick="doCheckin()">${ICONS.unlock} تحرير الطلب</button>`
            : req.checkedOutBy
              ? `<span style="font-size:12px;color:var(--warning);padding:8px 14px;border:1px solid var(--warning-l);border-radius:var(--rsm);background:var(--warning-l)">${ICONS.lock} محجوز: ${req.checkedOutBy}</span>`
              : ''}
        <button class="btn btn-secondary" onclick="window.location.href='disability-list.html'">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <!-- ملخص الطلب -->
    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div class="req-summary-grid">
          <div><div class="flbl" style="margin-bottom:4px">رقم الطلب</div><div style="font-size:15px;font-weight:800;color:var(--primary);font-family:monospace">${req.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">حالة الطلب</div>${statusBadge(req.status)}</div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ التقديم</div><div style="font-size:12.5px">${formatDate(req.submitDate)}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">مقدم الطلب</div><div style="font-size:12.5px;font-weight:600">${req.applicant?.name || '—'}</div><div style="font-size:11px;color:var(--text3)">${req.applicant?.role || ''}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث</div><div style="font-size:12px;color:var(--text2)">${req.lastUpdate || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث بواسطة</div><div style="font-size:12px;color:var(--text2)">${req.lastUpdatedBy || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ الإغلاق المتوقع</div><div style="font-size:12px">${formatDate(req.expectedClosureDate) || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">الأيام المتبقية حتى الإغلاق</div><div style="font-size:12px;font-weight:600;color:${(req.remainingDays || 0) < 7 ? 'var(--danger)' : (req.remainingDays || 0) < 30 ? 'var(--warning)' : 'var(--text2)'}">${req.remainingDays != null ? req.remainingDays + ' يوم' : '—'}</div></div>
        </div>
      </div>
    </div>

    ${renderWorkflowPath(req, 'disability')}
    ${renderInsuredSummaryCards(req.applicant?.civil, req.id)}
    ${renderApplicantProfileCard({
      ...req.applicant,
      phone: applicantPhonePrimary,
      phone1: applicantPhone1,
      phone2: applicantPhone2,
      email: applicantEmail,
    }, {
      title: 'بيانات مقدم الطلب / المستفيد',
      includeRole: true,
      includeExtraPhones: true,
      includeLocation: true,
      includeCountry: true,
      includeCivilExpiry: true,
    })}

    <!-- بيانات بطاقة الإعاقة -->
    ${card ? `${isExpired ? `<div class="alert alert-d" style="margin-bottom:12px">${ICONS.warn}<span>بطاقة الإعاقة منتهية الصلاحية — لا يمكن الصرف حتى يتم تجديدها</span></div>` : ''}${renderDisabilityCardPanel(card)}` : ''}

    ${renderBenefitInsuranceCard(req.insurance || {}, {
      applicant: { phone: applicantPhonePrimary, email: applicantEmail },
      includeContact: true,
      otherBenefitsLabel: 'منافع أخرى نشطة',
    })}

    ${req.disbursement ? `
    <!-- بيانات الصرف -->
    <div class="card card-cum">
      <div class="ph"><h3><div class="pico gr">${ICONS.chart}</div>بيانات الصرف</h3><span class="stg-lbl">معتمد</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">حالة الصرف</label><div class="fro"><span class="badge b-approved">${req.disbursement.status || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">يوم الصرف الشهري</label><div class="fro">اليوم ${req.disbursement.monthlyDay || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء الاستحقاق</label><div class="fro">${req.disbursement.expiryDate || '—'}</div></div>
          <div class="fgrp"><label class="flbl">آخر تحقق تلقائي</label><div class="fro" style="color:var(--text3)">${req.disbursement.lastCheck || '—'}</div></div>
        </div>
      </div>
    </div>` : ''}

    <!-- المرفقات -->
    <div class="card">
      <div class="ph">
        <h3><div class="pico or">${ICONS.upload}</div>المرفقات <span style="font-size:11px;font-weight:400;color:var(--text3)">(${atts.length} مرفق)</span></h3>
      </div>
      <div class="pb">
        ${atts.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد مرفقات</div>' : atts.map(att => {
                const ext = att.name?.split('.').pop()?.toLowerCase() || 'oth';
                const icoMap = { pdf: 'file', doc: 'file', docx: 'file', jpg: 'img', jpeg: 'img', png: 'img' };
                return `<div class="att-row"><div class="att-ico ${icoMap[ext] || 'oth'}">${ICONS.file}</div><div class="att-info"><div class="att-name">${att.name}</div><div class="att-meta">${att.type} · رفعه: ${att.uploadedBy} (${att.role}) · ${att.uploadDate} · ${att.size || ''}</div></div><div class="att-acts"><button class="ibtn" title="تحميل" onclick="showToast('جارٍ تحميل الملف...','i')">${ICONS.download}</button></div></div>`;
              }).join('')}
      </div>
    </div>

    <!-- الملاحظات التشغيلية -->
    <div class="card op-notes-card collapsed" data-notes-init="0">
      <div class="ph op-notes-head" onclick="toggleOperationalNotes(this.closest('.op-notes-card'))">
        <h3><div class="pico gy">${ICONS.note}</div>الملاحظات التشغيلية <span style="font-size:11px;font-weight:400;color:var(--text3)">(لا تغيّر حالة الطلب)</span></h3>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="op-notes-chevron">${ICONS.arrow_left}</span>
          <button class="btn btn-secondary btn-xs" onclick="event.stopPropagation();openAddNoteModal(currentRequestId)">${ICONS.plus} إضافة ملاحظة</button>
        </div>
      </div>
      <div class="pb">
        ${notes.length === 0 ? '<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">لا توجد ملاحظات تشغيلية</div>' : notes.map(n => `<div class="note-item"><div class="note-av">${n.author?.charAt(0) || '؟'}</div><div class="note-c"><div class="note-hd"><span class="note-auth">${n.author}</span><span class="note-role">${n.role}</span><span class="note-time">${n.time}</span></div><div class="note-txt">${n.text}</div></div></div>`).join('')}
        <div style="margin-top:10px;display:flex;gap:8px">
          <textarea class="fc" id="quick-note-input" placeholder="أكتب ملاحظة سريعة..." rows="2" style="flex:1"></textarea>
          <button class="btn btn-secondary btn-sm" style="align-self:flex-end" onclick="quickAddNote()">حفظ</button>
        </div>
      </div>
    </div>

    ${canAct ? `
    <!-- اتخاذ القرار -->
    <div class="dp">
      <div class="ph"><h3><div class="pico bl">${ICONS.pen}</div>اتخاذ القرار</h3></div>
      <div class="dp-body">
        <div class="fgrp">
          <label class="flbl">الملاحظات والتوصية</label>
          <textarea class="fc" rows="3" placeholder="أكتب ملاحظاتك وتوصيتك..."></textarea>
        </div>
        <div class="fgrp">
          <label class="flbl">إرفاق ملف داعم <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          ${renderModernUploadComponent({ idPrefix: 'decision-att', subTitle: 'PDF, Word, صور — الحجم الأقصى 20 ميغابايت' })}
        </div>
        <div class="dp-acts">
          <button class="btn btn-primary" onclick="employeeDecision('رفع')">${ICONS.arrow_left} توجيه إلى رئيس القسم</button>
          <button class="btn btn-warning" onclick="employeeDecision('استيفاء')">طلب استيفاء بيانات</button>
          <button class="btn btn-danger" onclick="employeeDecision('رفض')">${ICONS.x} رفض</button>
        </div>
      </div>
    </div>` : ''}

    <!-- السجل الزمني -->
    <div class="card">
      <div class="ph"><h3><div class="pico gy">${ICONS.clock}</div>السجل الزمني الكامل للطلب</h3></div>
      <div class="pb">${renderTimelineList(tl)}</div>
    </div>`;
    });

    function employeeDecision(type) {
      const msgs = {
        رفع: 'تم توجيه الطلب لرئيس القسم',
        استيفاء: 'تم إعادة الطلب لمقدمه لاستيفاء البيانات',
        رفض: 'تم رفض الطلب',
      };
      showToast(msgs[type] || 'تم تنفيذ الإجراء', type === 'رفض' ? 'd' : 's');
      setTimeout(() => window.location.href = 'disability-list.html', 1500);
    }
  </script>
</body>

</html>
