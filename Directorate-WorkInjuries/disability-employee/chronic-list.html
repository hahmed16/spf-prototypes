<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة طلبات الأمراض المستديمة — موظف قسم الإعاقة</title>
<link rel="stylesheet" href="../shared/style.css"></head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'disability-employee', activePage: 'chronic-list' });
setBreadcrumb([{ label: 'منفعة الأمراض المستديمة' }, { label: 'قائمة الطلبات' }]);
const me = WI_DATA.users?.disability_employee?.name || 'Unknown User';
let searchQuery = '';
let showAllStages = false;
document.addEventListener('DOMContentLoaded', render);
function render() {
  const reqs = getFilteredData({
    role: 'disability-employee',
    data: (WI_DATA.chronicIncoming || []).filter(d => d.hasRequest),
    query: searchQuery,
    showAll: showAllStages
  });
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة طلبات منفعة الأمراض المستديمة</h1><p>${reqs.length} طلب مقدم</p></div>
    </div>
    ${renderUnifiedFilterBar({ onSearch: 'updateSearch', onToggleAll: 'toggleAll', isAllVisible: showAllStages })}
    <div class="filters" style="display:none">
      <div class="fgrid">
        <div class="fgrp"><label class="flbl">رقم الطلب</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">الرقم المدني</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">التشخيص</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">الحالة</label><select class="fc"><option>جميع الحالات</option></select></div>
      </div>
      <div class="facts"><button class="btn btn-primary btn-sm">${ICONS.search} بحث</button><button class="btn btn-secondary btn-sm">مسح</button></div>
    </div>
    <div class="card">
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم الطلب</th><th>مقدم الطلب</th><th>المستفيد</th><th>التشخيص</th><th>الحالة</th><th>تاريخ التقديم</th><th>الأيام المتبقية</th><th></th></tr></thead>
            <tbody>
              ${reqs.map(d=> {
                const record = {
                  id: d.requestId,
                  status: d.requestStatus,
                  submitDate: d.requestSubmitDate || d.provenDate,
                  lastUpdate: d.requestLastUpdate,
                  lastUpdatedBy: d.assignedTo,
                  expectedClosureDate: null,
                  slaDays: 10
                };
                const meta = deriveRequestSummaryMeta(record);
                const remainingDaysClass = getRemainingDaysClass(meta.remainingDays);
                const remainingDaysLabel = getRemainingDaysLabel(meta.remainingDays);
                return `
              <tr>
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${d.requestId}</td>
                <td>${getSubmittedByName(d)}</td>
                <td>${d.applicantName}</td>
                <td>${d.diagnosis}</td>
                <td>${statusBadge(d.requestStatus || '—')}</td>
                <td>${formatDate(d.requestSubmitDate || d.provenDate)}</td>
                <td><span class="sla-days ${remainingDaysClass}">${remainingDaysLabel}</span></td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="ibtn" onclick="window.location.href='chronic-details.html?id=${d.requestId}'">${ICONS.eye}</button>
                    ${!d.suspended?`<button class="ibtn" onclick="doSuspend('${d.requestId}')" title="تعليق الطلب">${ICONS.pause}</button>`:`<button class="ibtn" onclick="doResume('${d.requestId}')" title="استئناف الطلب">${ICONS.play}</button>`}
                    <button class="ibtn" onclick="openAddNoteModal('${d.requestId}')">${ICONS.note}</button>
                  </div>
                </td>
              </tr>`;
                }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}
function updateSearch(val) { searchQuery = val; render(); }
function toggleAll() { showAllStages = !showAllStages; render(); }
function doSuspend(id){
  const reason=prompt('سبب التعليق:');
  if(reason){
    const notes=prompt('ملاحظات إضافية (اختياري):');
    const d=(WI_DATA.chronicIncoming || []).find(x=>x.requestId===id);
    if(d){
      d.suspended=true;
      d.suspensionReason=reason;
      d.suspensionNotes=notes||'';
      d.suspendedBy=me;
      d.suspendedDate=new Date().toISOString().slice(0,10);
      d.timeline.push({
        action:'تعليق الطلب',
        actor:me,
        role:'موظف قسم الإعاقة',
        time:new Date().toISOString().slice(0,16).replace('T',' '),
        fromStatus:d.requestStatus,
        toStatus:d.requestStatus,
        note:`تعليق: ${reason}${notes?` (${notes})`:''}`,
        type:'warning'
      });
      d.requestLastUpdate=new Date().toISOString().slice(0,16).replace('T',' ');
    }
    showToast(`تم تعليق ${id}`,'w');
    render();
  }
}
function doResume(id){
  const d=WI_DATA.chronicIncoming.find(x=>x.requestId===id);
  if(d){
    d.suspended=false;
    d.resumedBy=me;
    d.resumedDate=new Date().toISOString().slice(0,10);
    d.timeline.push({
      action:'استئناف الطلب',
      actor:me,
      role:'موظف قسم الإعاقة',
      time:new Date().toISOString().slice(0,16).replace('T',' '),
      fromStatus:d.requestStatus,
      toStatus:d.requestStatus,
      note:'تم استئناف الطلب',
      type:'success'
    });
    d.requestLastUpdate=new Date().toISOString().slice(0,16).replace('T',' ');
  }
  showToast(`تم استئناف ${id}`,'s');
  render();
}
</script></body></html>
