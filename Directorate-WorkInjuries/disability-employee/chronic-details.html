<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل طلب الأمراض المستديمة — موظف قسم الإعاقة</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>

<body>
  <script src="../shared/config.js"></script>
  <script src="../shared/data-users.js"></script>
  <script src="../shared/data-allowances.js"></script>
  <script src="../shared/data-disability.js"></script>
  <script src="../shared/data-chronic.js"></script>
  <script src="../shared/data-appeals.js"></script>
  <script src="../shared/data-licensing.js"></script>
  <script src="../shared/data-sessions.js"></script>
  <script src="../shared/data-disability-retirement.js"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/workflow-stages.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="../shared/utils.js"></script>
  <script>
    initLayout({ role: 'disability-employee', activePage: 'chronic-list' });
    const params = new URLSearchParams(window.location.search);
    const requestedId = params.get('id') || 'CHR-2025-000156';
    const me = WI_DATA.users.disability_employee.name;

    const refData = WI_DATA.chronicIncoming.find(d => d.requestId === requestedId)
      || WI_DATA.chronicIncoming.find(d => d.hasRequest)
      || WI_DATA.chronicIncoming[0];

    currentRequestId = refData?.requestId || requestedId;
    setBreadcrumb([{ label: 'الأمراض المستديمة', page: 'chronic-list' }, { label: `تفاصيل ${currentRequestId}` }]);

    const req = {
      id: currentRequestId,
      status: refData?.requestStatus || 'تم تقديم الطلب — بانتظار مراجعة موظف قسم الإعاقة والأمراض المستديمة',
      submitDate: refData?.requestSubmitDate || refData?.provenDate || '2025-01-05',
      lastUpdate: refData?.requestLastUpdate || '2025-01-05 14:00',
      assignedTo: refData?.assignedTo || 'نورة بنت سالم الزدجالية',
      checkedOutBy: refData?.checkedOutBy || 'نورة بنت سالم الزدجالية',
      applicant: {
        role: refData?.applicantRole || 'العامل / المؤمن عليه / المواطن',
        name: refData?.applicantName || '—',
        civil: refData?.civil || '—',
        phone: refData?.applicantPhone || '96890000000',
        phone1: refData?.applicantPhone1 || refData?.applicantPhone || '96890000000',
        phone2: refData?.applicantPhone2 || '96891111222',
        email: refData?.applicantEmail || 'noreply@spf-proto.om',
        region: refData?.applicantRegion || 'محافظة مسقط',
        wilayat: refData?.applicantWilayat || 'بوشر',
        country: refData?.applicantCountry || 'سلطنة عُمان',
        civilExpiry: refData?.applicantCivilExpiry || '2030-12-31',
      },
      insured: {
        name: refData?.applicantName || '—',
        civil: refData?.civil || '—',
        insurance: refData?.insuranceNo || 'IN-20180090123',
        dob: refData?.insuredDob || '1975-03-10',
        gender: refData?.insuredGender || 'ذكر',
        nationality: refData?.insuredNationality || 'عُماني',
        insuranceStatus: refData?.insuranceStatus || 'نشط',
        regDate: refData?.insuranceRegDate || '2018-01-01',
        subType: refData?.insuranceSubType || 'إلزامي',
      },
      insurance: {
        status: refData?.insuranceStatus || 'نشط',
        subType: refData?.insuranceSubType || 'إلزامي',
        insuranceType: refData?.insuranceType || 'تأمين العاملين في القطاع الخاص',

        otherBenefits: refData?.otherBenefits || 'لا يوجد',
      },
      employer: {
        name: refData?.employerName || '—',
        cr: refData?.employerCr || '—',
        joinDate: refData?.employerJoinDate || null,
      },
      medical: {
        uniqueRequestId: refData?.uniqueRequestId,
        hospital: refData?.hospital || '—',
        doctor: refData?.doctor || '—',
        diagnosis: refData?.diagnosis || '—',
        detailedDiagnosis: refData?.detailedDiagnosis,
        permanentDiseaseReport: refData?.permanentDiseaseReport,
        visitDateTime: refData?.visitDateTime,
        provenDate: refData?.provenDate || '—',
        severityDate: refData?.severityDate,
        chronicDisease: refData?.chronicDisease,
        affectedSystem: refData?.affectedSystem,
        severityIndex: refData?.severityIndex,
        path: refData?.path,
        firstRequestRef: refData?.firstRequestRef,
        overallCondition: refData?.overallCondition,

        { action: 'تم تقديم الطلب من قِبل المؤمن عليه', actor: refData?.applicantName || '—', role: 'العامل', time: refData?.requestLastUpdate || '2025-01-05 14:00', fromStatus: 'تم استلام التشخيص', toStatus: refData?.requestStatus || 'تم تقديم الطلب — بانتظار مراجعة موظف قسم الإعاقة والأمراض المستديمة', note: '', type: 'default' },
      ]
    };

    document.addEventListener('DOMContentLoaded', () => {
      const statusPending = 'تم تقديم الطلب — بانتظار مراجعة موظف قسم الإعاقة والأمراض المستديمة';
      const canAct = req.status === statusPending && (req.checkedOutBy === me || !req.checkedOutBy);
      const isSamePerson = req.applicant?.civil && req.insured?.civil && req.applicant.civil === req.insured.civil;

      const med = req.medical;
      const atts = req.attachments || [];
      const notes = req.notes || [];
      const tl = req.timeline || [];

      getContent().innerHTML = `

      <div>
        <h1>تفاصيل طلب منفعة الأمراض المستديمة</h1>
        <p>رقم الطلب: <strong style="font-family:monospace;color:var(--primary)">${req.id}</strong></p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary" onclick="window.location.href='chronic-list.html'">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div class="req-summary-grid">
          <div><div class="flbl" style="margin-bottom:4px">رقم الطلب</div><div style="font-size:15px;font-weight:800;color:var(--primary);font-family:monospace">${req.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">حالة الطلب</div>${statusBadge(req.status)}</div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ التقديم</div><div style="font-size:12.5px">${formatDate(req.submitDate)}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">مقدم الطلب</div><div style="font-size:12.5px;font-weight:600">${req.applicant.name}</div><div style="font-size:11px;color:var(--text3)">${req.applicant.role}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث</div><div style="font-size:12px;color:var(--text2)">${req.lastUpdate || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">المسند إليه</div><div style="font-size:12px;color:var(--text2)">${normalizeDisplay(req.assignedTo)}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">الحجز الحالي</div><div style="font-size:12px;font-weight:600">${normalizeDisplay(req.checkedOutBy)}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ الإغلاق المتوقع</div><div style="font-size:12px">${formatDate(req.expectedClosureDate) || '—'}</div></div>
        </div>
      </div>
    </div>

    ${renderWorkflowPath(req, 'chronic')}

    ${isSamePerson ? `
    <!-- بيانات المؤمن عليه / المستفيد (نفس الشخص) -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات المؤمن عليه / المستفيد</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">صفة مقدم الطلب</label><div class="fro">${req.applicant.role}</div></div>
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.insured.name || req.applicant.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.insured.civil}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(req.insured.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${req.insured.gender}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${req.insured.nationality}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${req.applicant.phone}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${req.applicant.email}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء البطاقة الشخصية</label><div class="fro">${formatDate(req.applicant.civilExpiry)}</div></div>
          <div class="fgrp"><label class="flbl">المحافظة / الولاية</label><div class="fro">${req.applicant.region} — ${req.applicant.wilayat}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${req.insured.insuranceStatus === 'نشط' ? 'b-approved' : 'b-rejected'}">${req.insured.insuranceStatus}</span></div></div>
          <div class="fgrp"><label class="flbl">نوع الاشتراك</label><div class="fro">${req.insured.subType}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">${formatDate(req.insured.regDate)}</div></div>
        </div>
      </div>
    </div>` : `
    <!-- بيانات مقدم الطلب -->
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">صفة مقدم الطلب</label><div class="fro">${req.applicant.role}</div></div>
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.applicant.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.applicant.civil}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${req.applicant.phone}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${req.applicant.email}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء البطاقة الشخصية</label><div class="fro">${formatDate(req.applicant.civilExpiry)}</div></div>
          <div class="fgrp"><label class="flbl">المحافظة / الولاية</label><div class="fro">${req.applicant.region} — ${req.applicant.wilayat}</div></div>
          <div class="fgrp"><label class="flbl">الدولة</label><div class="fro">${req.applicant.country}</div></div>
        </div>
      </div>
    </div>

    <!-- بيانات المؤمن عليه -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات المؤمن عليه / المستفيد</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-4">
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.insured.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.insured.civil}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(req.insured.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${req.insured.gender}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${req.insured.nationality}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${req.applicant.phone}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${req.applicant.email}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء البطاقة الشخصية</label><div class="fro">${formatDate(req.applicant.civilExpiry)}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${req.insured.insuranceStatus === 'نشط' ? 'b-approved' : 'b-rejected'}">${req.insured.insuranceStatus}</span></div></div>
          <div class="fgrp"><label class="flbl">نوع الاشتراك</label><div class="fro">${req.insured.subType}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">${formatDate(req.insured.regDate)}</div></div>
        </div>
      </div>
    </div>`}

    <!-- بيانات جهة العمل -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico tl">${ICONS.building}</div>بيانات جهة العمل</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">اسم جهة العمل</label><div class="fro" style="font-weight:700">${req.employer?.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم السجل التجاري</label><div class="fro" style="font-family:monospace">${req.employer?.cr || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم المنشأة</label><div class="fro" style="font-family:monospace">${normalizeDisplay(req.employer?.establishment)}</div></div>
          <div class="fgrp"><label class="flbl">المسمى الوظيفي</label><div class="fro">${req.employer?.jobTitle || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الالتحاق بالعمل</label><div class="fro">${formatDate(req.employer?.joinDate)}</div></div>
          <div class="fgrp"><label class="flbl">موقع العمل / الفرع</label><div class="fro">${req.employer?.location || '—'}</div></div>
          ${req.employer?.phone ? `<div class="fgrp"><label class="flbl">هاتف جهة العمل</label><div class="fro">${req.employer.phone}</div></div>` : ''}
          <div class="fgrp"><label class="flbl">القطاع</label><div class="fro">${req.employer?.sector || '—'}</div></div>
          <div class="fgrp"><label class="flbl">نوع جهة العمل</label><div class="fro">${req.employer?.employerType || '—'}</div></div>
          ${req.employer?.branch ? `<div class="fgrp"><label class="flbl">الفرع</label><div class="fro">${req.employer.branch.id} — ${req.employer.branch.name} — ${req.employer.branch.state}</div></div>` : ''}
        </div>
      </div>
    </div>
        </div>
      </div>
    </div>

    <div class="card card-ro">
      <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>البيانات الطبية <span style="font-size:10px;color:var(--text3)">(واردة من وزارة الصحة)</span></h3><span style="font-size:11px;background:#ede9fe;color:#7c3aed;padding:1px 7px;border-radius:10px;font-weight:600">للمستخدمين الداخليين فقط</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">رقم الطلب الفريد (وزارة الصحة)</label><div class="fro" style="font-family:monospace">${normalizeDisplay(med.uniqueRequestId || med.refId || med.mohRef)}</div></div>
          <div class="fgrp"><label class="flbl">المؤسسة الصحية المعالجة</label><div class="fro">${normalizeDisplay(med.hospital)}</div></div>
          <div class="fgrp"><label class="flbl">الطبيب المعالج</label><div class="fro">${normalizeDisplay(med.doctor)}</div></div>
          <div class="fgrp span-full"><label class="flbl">التشخيص الطبي (تقرير وصفي مثبت)</label><div class="fro medical-report">${normalizeDisplay(med.permanentDiseaseReport || buildPermanentDiseaseReport(med))}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ووقت زيارة المؤسسة الصحية</label><div class="fro">${normalizeDisplay(med.visitDateTime)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ثبوت المرض</label><div class="fro">${formatDate(med.provenDate)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ شدة المرض</label><div class="fro">${formatDate(med.severityDate)}</div></div>
          <div class="fgrp"><label class="flbl">المسار</label><div class="fro">${normalizeDisplay(med.path)}</div></div>
          <div class="fgrp"><label class="flbl">المرض المستديم</label><div class="fro">${normalizeDisplay(med.chronicDisease || med.diagnosis)}</div></div>
          <div class="fgrp"><label class="flbl">الجهاز المتأثر</label><div class="fro">${normalizeDisplay(med.affectedSystem)}</div></div>
          <div class="fgrp span-full"><label class="flbl">Medical Severity Index and Treatment Burden</label><div class="fro">${normalizeDisplay(med.severityIndex)}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المرجعي للطلب الأول (إعادة التقييم)</label><div class="fro" style="font-family:monospace">${normalizeDisplay(med.firstRequestRef)}</div></div>
          <div class="fgrp"><label class="flbl">الحالة العامة (إعادة التقييم)</label><div class="fro">${normalizeDisplay(med.overallCondition)}</div></div>
        </div>
      </div>
    </div>

    <div class="card card-ro">
      <div class="ph"><h3><div class="pico gr">${ICONS.shield}</div>بيانات التأمين</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${req.insurance.status === 'نشط' ? 'b-approved' : 'b-rejected'}">${req.insurance.status}</span></div></div>
          <div class="fgrp"><label class="flbl">رقم التأمين</label><div class="fro" style="font-family:monospace">${normalizeDisplay(req.insured.insurance)}</div></div>
          <div class="fgrp"><label class="flbl">نوع الاشتراك</label><div class="fro">${normalizeDisplay(req.insurance.subType)}</div></div>
          <div class="fgrp"><label class="flbl">نوع التأمين</label><div class="fro">${normalizeDisplay(req.insurance.insuranceType)}</div></div>
          <div class="fgrp"><label class="flbl">فئة النظام</label><div class="fro">${normalizeDisplay(req.insurance.schemeCategory)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">${formatDate(req.insured.regDate)}</div></div>
          <div class="fgrp"><label class="flbl">بداية الخدمة لدى جهة العمل الحالية</label><div class="fro">${formatDate(req.employer.joinDate)}</div></div>
          <div class="fgrp"><label class="flbl">جهة العمل الحالية</label><div class="fro">${normalizeDisplay(req.employer.name)}</div></div>
          <div class="fgrp"><label class="flbl">السجل التجاري لجهة العمل الحالية</label><div class="fro" style="font-family:monospace">${normalizeDisplay(req.employer.cr)}</div></div>
          <div class="fgrp"><label class="flbl">منافع أخرى نشطة</label><div class="fro">${normalizeDisplay(req.insurance.otherBenefits)}</div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="ph">
        <h3><div class="pico or">${ICONS.upload}</div>المرفقات <span style="font-size:11px;font-weight:400;color:var(--text3)">(${atts.length} مرفق)</span></h3>
      </div>
      <div class="pb">
        ${atts.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد مرفقات</div>' : atts.map(att => {
        const ext = att.name?.split('.').pop()?.toLowerCase() || 'oth';
        const icoMap = { pdf: 'file', doc: 'file', docx: 'file', jpg: 'img', jpeg: 'img', png: 'img' };
        return `<div class="att-row"><div class="att-ico ${icoMap[ext] || 'oth'}">${ICONS.file}</div><div class="att-info"><div class="att-name">${att.name}</div><div class="att-meta">${att.type} · رفعه: ${att.uploadedBy} (${att.role}) · ${att.uploadDate} · ${att.size || ''}</div></div><div class="att-acts"><button class="ibtn" title="تحميل" onclick="showToast('جارٍ تحميل الملف...','i')">${ICONS.download}</button></div></div>`;
      }).join('')}
      </div>
    </div>

    <div class="card op-notes-card collapsed" data-notes-init="0">
      <div class="ph op-notes-head" onclick="toggleOperationalNotes(this.closest('.op-notes-card'))">
        <h3><div class="pico gy">${ICONS.note}</div>الملاحظات التشغيلية <span style="font-size:11px;font-weight:400;color:var(--text3)">(لا تغيّر حالة الطلب)</span></h3>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="op-notes-chevron">${ICONS.arrow_left}</span>
          <button class="btn btn-secondary btn-xs" onclick="event.stopPropagation();openAddNoteModal(currentRequestId)">${ICONS.plus} إضافة ملاحظة</button>
        </div>
      </div>
      <div class="pb">
        ${notes.length === 0 ? '<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">لا توجد ملاحظات تشغيلية</div>' : notes.map(n => `<div class="note-item"><div class="note-av">${n.author?.charAt(0) || '؟'}</div><div class="note-c"><div class="note-hd"><span class="note-auth">${n.author}</span><span class="note-role">${n.role}</span><span class="note-time">${n.time}</span></div><div class="note-txt">${n.text}</div></div></div>`).join('')}
        <div style="margin-top:10px;display:flex;gap:8px">
          <textarea class="fc" id="quick-note-input" placeholder="أكتب ملاحظة سريعة..." rows="2" style="flex:1"></textarea>
          <button class="btn btn-secondary btn-sm" style="align-self:flex-end" onclick="quickAddNote()">حفظ</button>
        </div>
      </div>
    </div>

    ${canAct ? `
    <div class="dp">
      <div class="ph"><h3><div class="pico bl">${ICONS.pen}</div>اتخاذ القرار</h3></div>
      <div class="dp-body">
        <div class="fgrp">
          <label class="flbl">الملاحظات والتوصية</label>
          <textarea class="fc" rows="3" placeholder="أكتب ملاحظاتك وتوصيتك..."></textarea>
        </div>
        <div class="fgrp">
          <label class="flbl">إرفاق ملف داعم <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          ${renderModernUploadComponent({ idPrefix: 'decision-att', subTitle: 'PDF, Word, صور — الحجم الأقصى 20 ميغابايت' })}
        </div>
        <div class="dp-acts">
          <button class="btn btn-primary" onclick="chronicDecision('رئيس')">${ICONS.arrow_left} توجيه لرئيس القسم</button>
          <button class="btn btn-warning" onclick="chronicDecision('استيفاء')">طلب استيفاء بيانات من المواطن</button>
          <button class="btn btn-danger" onclick="chronicDecision('رفض')">رفض</button>
        </div>
      </div>
    </div>` : ''}

    <div class="card">
      <div class="ph"><h3><div class="pico gy">${ICONS.clock}</div>السجل الزمني الكامل للطلب</h3></div>
      <div class="pb">${renderTimelineList(tl)}</div>
    </div>`;
    });

    function chronicDecision(type) {
      const msgs = { رئيس: 'تم توجيه الطلب لرئيس القسم', استيفاء: 'تم إعادة الطلب للمواطن لاستيفاء البيانات', رفض: 'تم رفض الطلب' };
      showToast(msgs[type], type === 'رفض' ? 'w' : 's');
      setTimeout(() => window.location.href = 'chronic-list.html', 1500);
    }
  </script>
</body>

</html>
