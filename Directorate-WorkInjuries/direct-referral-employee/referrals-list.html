<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>طلبات العرض المباشر — موظف طلبات العرض المباشر</title><link rel="stylesheet" href="../shared/style.css"></head>
<body>
<script src="../shared/config.js"></script><script src="../shared/data-users.js"></script><script src="../shared/data-allowances.js"></script><script src="../shared/data-disability.js"></script><script src="../shared/data-chronic.js"></script><script src="../shared/data-appeals.js"></script><script src="../shared/data-licensing.js"></script><script src="../shared/data-sessions.js"></script><script src="../shared/data-disability-retirement.js"></script><script src="../shared/data-referrals.js"></script><script src="../shared/data.js"></script><script src="../shared/layout.js"></script><script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'direct-referral-employee', activePage: 'referrals-list' });
setBreadcrumb([{ label: 'طلبات العرض المباشر' }]);
const me = WI_DATA.users.direct_referral_employee.name;
let searchQuery = '';
let showAllStages = false;
let requestTypeFilter = 'all';

// Request type options for filtering
const requestTypeOptions = [
  { value: 'إصابة عمل', label: 'إصابة عمل' },
  { value: 'مرض مهني', label: 'مرض مهني' },
  { value: 'عرض مباشر', label: 'عرض مباشر' }
];

document.addEventListener('DOMContentLoaded', render);

function handleRequestTypeFilterChange(value) {
  requestTypeFilter = value;
  render();
}

function render() {
  const rows = getFilteredRows();
  getContent().innerHTML = `<div class="pg-head"><div><h1>طلبات العرض المباشر الواردة</h1><p>${rows.length} طلب</p></div></div>
  ${renderUnifiedFilterBar({
    onSearch: 'updateSearch',
    onToggleAll: 'toggleAll',
    isAllVisible: showAllStages,
    includeRequestTypeFilter: true,
    requestTypeOptions: requestTypeOptions
  })}
  <div class="card"><div class="pb-0"><div class="tbl-wrap"><table class="dtbl"><thead><tr><th>رقم الطلب</th><th>قناة التقديم</th><th>المستفيد</th><th>نوع الحالة</th><th>الحالة</th><th>الأيام المتبقية</th><th>الحجز</th><th></th></tr></thead><tbody>
  ${rows.map(r => {
    const meta = deriveRequestSummaryMeta(r);
    return `<tr>
      <td style="font-family:monospace;color:var(--primary);font-weight:700">${r.id}</td>
      <td>${r.sourceChannel}</td>
      <td>${r.insured.name}</td>
      <td>${r.referral.requestCategory || r.requestType || '—'}</td>
      <td><div style="display:flex;align-items:center;gap:6px">${statusBadge(r.status)}${r.suspended ? `<span class="badge b-returned">معلّق</span>` : ''}</div></td>
      <td><span class="sla-days ${getRemainingDaysClass(meta?.remainingDays)}">${getRemainingDaysLabel(meta?.remainingDays)}</span></td>
      <td>${r.checkedOutBy || 'غير محجوز'}</td>
      <td><div style="display:flex;gap:4px"><button class="ibtn" onclick="window.location.href='referrals-details.html?id=${r.id}'">${ICONS.eye}</button>${!r.checkedOutBy ? `<button class="ibtn" onclick="doCheckout('${r.id}')">${ICONS.lock}</button>` : r.checkedOutBy===me ? `<button class="ibtn" onclick="doCheckin('${r.id}')">${ICONS.unlock}</button>`:''}${!r.suspended ? `<button class="ibtn" onclick="suspendOwn('${r.id}')" title="تعليق">${ICONS.pause}</button>` : `<button class="ibtn" onclick="resumeOwn('${r.id}')" title="استئناف">${ICONS.play}</button>`}</div></td>
    </tr>`;
  }).join('')}
  </tbody></table></div></div></div>`;
  if (searchQuery) {
    const inp = document.getElementById('global-search-input');
    if (inp) { inp.value = searchQuery; inp.focus(); inp.setSelectionRange(searchQuery.length, searchQuery.length); }
  }
  // Restore request type filter selection
  if (requestTypeFilter && requestTypeFilter !== 'all') {
    const select = document.getElementById('request-type-filter');
    if (select) select.value = requestTypeFilter;
  }
}
function updateSearch(val) { searchQuery = val; render(); }
function toggleAll() { showAllStages = !showAllStages; render(); }
function getFilteredRows() {
  const rows = getFilteredData({
    role: 'direct-referral-employee',
    data: WI_DATA.referrals,
    query: searchQuery,
    showAll: showAllStages,
    requestTypeFilter: ''
  });
  return rows.filter((r) => {
    if (requestTypeFilter === 'all') return true;
    const typeText = `${r.requestType || ''} ${r.referral?.requestCategory || ''}`.toLowerCase();
    return typeText.includes(requestTypeFilter.toLowerCase());
  });
}
function doCheckout(id) {
  const r = WI_DATA.referrals.find(x=>x.id===id);
  if(r){
    r.checkedOutBy=me;
    r.status='قيد مراجعة موظف طلبات العرض المباشر';
    r.timeline.push({ action:'حجز الطلب', actor:me, role:'موظف طلبات العرض المباشر', time:new Date().toISOString().slice(0,16).replace('T',' '), fromStatus:'تم تقديم طلب العرض المباشر — بانتظار مراجعة موظف طلبات العرض المباشر', toStatus:r.status, note:'تم حجز الطلب للمراجعة', type:'info', phone:getCurrentUserPhone() });
  }
  render();
}
function doCheckin(id) {
  const r = WI_DATA.referrals.find(x=>x.id===id);
  if(r){
    r.checkedOutBy='';
    r.status='تم تقديم طلب العرض المباشر — بانتظار مراجعة موظف طلبات العرض المباشر';
    r.timeline.push({ action:'تحرير الطلب', actor:me, role:'موظف طلبات العرض المباشر', time:new Date().toISOString().slice(0,16).replace('T',' '), fromStatus:'قيد مراجعة موظف طلبات العرض المباشر', toStatus:r.status, note:'تم تحرير الطلب', type:'info', phone:getCurrentUserPhone() });
  }
  render();
}
function suspendOwn(id) {
  const r = WI_DATA.referrals.find((item) => item.id === id);
  if (r) suspendRecord(r, { roleLabel: 'موظف طلبات العرض المباشر' });
}
function resumeOwn(id) {
  const r = WI_DATA.referrals.find((item) => item.id === id);
  if (r) resumeRecord(r, { roleLabel: 'موظف طلبات العرض المباشر', resumeStatus: 'قيد مراجعة موظف طلبات العرض المباشر' });
}

// Make the filter handler available globally
window.handleRequestTypeFilterChange = handleRequestTypeFilterChange;
</script>
</body>
</html>
