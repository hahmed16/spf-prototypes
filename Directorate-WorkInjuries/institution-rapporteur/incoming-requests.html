<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الطلبات الواردة — مقرر المؤسسة الصحية المرخصة</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'institution-rapporteur', activePage: 'sessions-list' });
setBreadcrumb([{ label: 'إدارة الجلسات', page: 'sessions-list' }, { label: 'الطلبات الواردة' }]);

const incoming = WI_DATA.allowances
  .filter(r => r.status.includes('المؤسسة الصحية المرخصة') || r.status.includes('إحالة'))
  .sort((a, b) => new Date(a.submitDate) - new Date(b.submitDate));

document.addEventListener('DOMContentLoaded', () => {
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>جميع الطلبات الواردة إلى المؤسسة الصحية المرخصة</h1><p>${incoming.length} طلب مرتبة من الأقدم إلى الأحدث</p></div>
      <div class="pg-acts"><button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">${ICONS.arrow_left} رجوع</button></div>
    </div>
    <div class="card">
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم الطلب</th><th>المؤمن عليه</th><th>تاريخ التقديم</th><th>حالة الجلسة</th><th>الحالة الحالية</th><th></th></tr></thead>
            <tbody>
              ${incoming.map(r => `
                <tr>
                  <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                  <td>${r.insured?.name || '—'}</td>
                  <td>${r.submitDate || '—'}</td>
                  <td>${r.session ? `<span class="badge b-session">مدرج في ${r.session}</span>` : `<span class="badge b-phead">غير مدرج بجلسة</span>`}</td>
                  <td>${statusBadge(r.status)}</td>
                  <td>
                    <button class="btn btn-secondary btn-xs" onclick="assignSession('${r.id}')">إدراج في جلسة</button>
                    <button class="btn btn-primary btn-xs" onclick="window.location.href='case-decision.html?req=${r.id}&session=${WI_DATA.sessions[0]?.id || ''}'">عرض التفاصيل</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
});

function assignSession(id) {
  openModal({
    title: `إدراج الطلب ${id} إلى جلسة`,
    body: `
      <div class="fgrp">
        <label class="flbl">اختيار الجلسة</label>
        <select class="fc" id="target-session">
          ${WI_DATA.sessions.map(s => `<option value="${s.id}">${s.id} — ${s.date} ${s.time}</option>`).join('')}
        </select>
      </div>`,
    footer: `
      <button class="btn btn-primary" onclick="closeModal();showToast('تم إدراج الطلب في الجلسة المحددة','s')">${ICONS.check} حفظ</button>
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>`
  });
}
</script>
</body>
</html>
