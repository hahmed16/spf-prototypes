<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة البيانات — مقرر المؤسسة الصحية المرخصة</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/components.js"></script>
<script>
initLayout({ role: 'institution-rapporteur', activePage: 'dashboard' });
setBreadcrumb([{ label: 'لوحة البيانات' }]);

document.addEventListener('DOMContentLoaded', () => {
  const stats = WI_DATA.dashboardStats['institution-rapporteur'];
  const sessions = WI_DATA.sessions;

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>لوحة البيانات</h1>
        <p>مقرر المؤسسة الصحية المرخصة — ${WI_DATA.users.institution_rapporteur.name}</p>
      </div>
    </div>

    <div class="stats-grid">
      ${stats.map(s=>`
      <div class="scard ${s.type}" onclick="window.location.href='sessions-list.html'">
        <div class="sc-lbl">${s.label}</div>
        <div class="sc-val">${s.value}</div>
      </div>`).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="ph">
          <h3><div class="pico bl">${ICONS.calendar}</div>الجلسات القادمة</h3>
          <a href="sessions-list.html" style="font-size:12px;color:var(--primary)">عرض الكل</a>
        </div>
        <div class="pb-0">
          <table class="dtbl">
            <thead><tr><th>رقم الجلسة</th><th>التاريخ</th><th>الحالات</th><th>النصاب</th><th></th></tr></thead>
            <tbody>
              ${sessions.map(s=>`
              <tr>
                <td style="font-family:monospace;color:var(--primary);font-weight:700">${s.id}</td>
                <td>${s.date}</td>
                <td>${s.casesCount}</td>
                <td><span class="badge ${s.quorum?'b-approved':'b-returned'}">${s.quorum?'مكتمل':'غير مكتمل'}</span></td>
                <td><button class="ibtn" onclick="window.location.href='session-details.html?id=${s.id}'">${ICONS.eye}</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="ph"><h3><div class="pico or">${ICONS.bell}</div>مهامي العاجلة</h3></div>
        <div class="pb">
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="padding:10px 12px;border:1px solid var(--warning-l);background:var(--warning-l);border-radius:var(--rsm)">
              <p style="font-size:12.5px;font-weight:600">4 حالات بانتظار إدخال القرار</p>
              <p style="font-size:11px;color:var(--text3)">في الجلسة ${sessions[0]?.id}</p>
            </div>
            <div style="padding:10px 12px;border:1px solid var(--border);background:var(--g50);border-radius:var(--rsm)">
              <p style="font-size:12.5px;font-weight:600">2 جلسات تحتاج جدولة</p>
              <p style="font-size:11px;color:var(--text3)">طلبات وردت من رئيس قسم اللجان الطبية</p>
            </div>
            <div style="padding:10px 12px;border:1px solid var(--border);background:var(--g50);border-radius:var(--rsm)">
              <p style="font-size:12.5px;font-weight:600">التوقيعات مكتملة — جلسة SES-2025-0098</p>
              <p style="font-size:11px;color:var(--text3)">جاهز للإرسال للجهة المعنية</p>
            </div>
          </div>
        </div>
      </div>
    </div>`;
});
</script>
</body>
</html>
