<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدخال قرار الحالة — مقرر المؤسسة الصحية المرخصة</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'institution-rapporteur', activePage: 'sessions-list' });
const params = new URLSearchParams(window.location.search);
const reqId = params.get('req') || 'WI-2025-001156';
const sessionId = params.get('session') || 'SES-2025-0112';
const req = WI_DATA.allowances.find(r=>r.id===reqId) || WI_DATA.allowances[2];
currentRequestId = req.id;
setBreadcrumb([
  {label:'إدارة الجلسات',page:'sessions-list'},
  {label:`جلسة ${sessionId}`,page:`session-details.html?id=${sessionId}`},
  {label:`قرار ${reqId}`}
]);

document.addEventListener('DOMContentLoaded', () => {
  const app  = req.applicant  || {};
  const ins  = req.insured    || {};
  const emp  = req.employer   || {};
  const inj  = req.injury     || {};
  const inv  = req.investigation;
  const pds  = req.sickLeavePeriods || [];
  const atts = req.attachments || [];
  const isWork = req.type === 'إصابة عمل';
  const totalDays = pds.reduce((s,p)=>s+(p.days||0),0);

  const attHtml = atts.length===0
    ?`<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد مرفقات</div>`
    :atts.map(att=>{const ext=att.name?.split('.').pop()?.toLowerCase()||'oth';const icoMap={pdf:'pdf',doc:'doc',docx:'doc',jpg:'img',jpeg:'img',png:'img',mp3:'media',wav:'media',mp4:'media'};const svgMap={pdf:ICONS.file,doc:ICONS.file,img:ICONS.eye,media:ICONS.clock,oth:ICONS.file};const ico=icoMap[ext]||'oth';return `<div class="att-row"><div class="att-ico ${ico}">${svgMap[ico]||ICONS.file}</div><div class="att-info"><div class="att-name">${att.name}</div><div class="att-meta">${att.type} · ${att.uploadedBy} · ${att.uploadDate}</div></div><div class="att-acts"><button class="ibtn" onclick="showToast('جارٍ تحميل الملف...','i')">${ICONS.download}</button></div></div>`;}).join('');

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>إدخال قرار الحالة</h1>
        <p>جلسة: <strong style="font-family:monospace;color:var(--primary)">${sessionId}</strong> — طلب: <strong style="font-family:monospace;color:var(--primary)">${reqId}</strong></p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary" onclick="window.history.back()">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <!-- ملخص الحالة المعروضة -->
    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div class="flbl" style="margin-bottom:8px">ملخص الحالة المعروضة</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
          <div><div class="flbl" style="margin-bottom:4px">رقم الطلب</div><div style="font-family:monospace;font-weight:700;color:var(--primary)">${req.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">المؤمن عليه</div><div style="font-weight:600">${ins.name||'—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">نوع الطلب</div><div>${req.type}${req.subtype?` — ${req.subtype}`:''}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">الحالة</div>${statusBadge(req.status)}</div>
        </div>
      </div>
    </div>

    <!-- كامل بيانات الحالة للاطلاع (قابلة للطي) -->
    <div style="border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;margin-bottom:16px">
      <div style="padding:10px 18px;background:var(--g100);border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between"
        onclick="toggleCaseData()">
        <span style="font-size:13px;font-weight:700">عرض / إخفاء كامل بيانات الحالة للاطلاع</span>
        <span id="toggle-icon">${ICONS.arrow_left}</span>
      </div>
      <div id="case-data-body" style="display:none;padding:0">

        <!-- بيانات مقدم الطلب -->
        <div class="card" style="margin:0;border-radius:0;border-left:none;border-right:none">
          <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب</h3></div>
          <div class="pb">
            <div class="fg fg-3">
              <div class="fgrp"><label class="flbl">صفة مقدم الطلب</label><div class="fro">${app.role||'—'}</div></div>
              <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${app.name||'—'}</div></div>
              <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${app.civil||'—'}</div></div>
              <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${normalizeDisplay(((typeof req !== 'undefined' && (req?.applicant?.phone || req?.insured?.phone)) || (typeof appeal !== 'undefined' && appeal?.applicant?.phone) || (typeof app !== 'undefined' && app?.phone) || (typeof dlg !== 'undefined' && dlg?.phone) || (typeof u !== 'undefined' && u?.phone)), '96890000000')}</div></div>
              <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${normalizeDisplay(((typeof req !== 'undefined' && (req?.applicant?.email || req?.insured?.email)) || (typeof appeal !== 'undefined' && appeal?.applicant?.email) || (typeof app !== 'undefined' && app?.email) || (typeof dlg !== 'undefined' && dlg?.email) || (typeof u !== 'undefined' && u?.email)), 'noreply@spf-proto.om')}</div></div>
            </div>
          </div>
        </div>

        <!-- بيانات المؤمن عليه -->
        <div class="card card-ro" style="margin:0;border-radius:0;border-left:none;border-right:none">
          <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات المؤمن عليه / المستفيد</h3></div>
          <div class="pb">
            <div class="fg fg-4">
              <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${ins.name||'—'}</div></div>
              <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${ins.civil||'—'}</div></div>
              <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(ins.dob)}</div></div>
              <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${ins.gender||'—'}</div></div>
              <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${ins.nationality||'—'}</div></div>
              <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${ins.insuranceStatus==='نشط'?'b-approved':'b-rejected'}">${ins.insuranceStatus||'—'}</span></div></div>
            </div>
          </div>
        </div>

        <!-- بيانات جهة العمل -->
        <div class="card card-ro" style="margin:0;border-radius:0;border-left:none;border-right:none">
          <div class="ph"><h3><div class="pico tl">${ICONS.building}</div>بيانات جهة العمل</h3></div>
          <div class="pb">
            <div class="fg fg-3">
              <div class="fgrp"><label class="flbl">اسم جهة العمل</label><div class="fro">${emp.name||'—'}</div></div>
              <div class="fgrp"><label class="flbl">رقم السجل التجاري</label><div class="fro" style="font-family:monospace">${emp.cr||'—'}</div></div>
              <div class="fgrp"><label class="flbl">المسمى الوظيفي</label><div class="fro">${emp.jobTitle||'—'}</div></div>
              <div class="fgrp"><label class="flbl">تاريخ الالتحاق بالعمل</label><div class="fro">${formatDate(emp.joinDate)}</div></div>
              <div class="fgrp"><label class="flbl">موقع العمل / الفرع</label><div class="fro">${emp.location||'—'}</div></div>
            </div>
          </div>
        </div>

        <!-- بيانات الإصابة أو المرض -->
        <div class="card card-ro" style="margin:0;border-radius:0;border-left:none;border-right:none">
          <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>بيانات ${isWork?'الإصابة':'المرض المهني'}</h3></div>
          <div class="pb">
            <div class="fg fg-3">
              <div class="fgrp"><label class="flbl">نوع الحالة</label><div class="fro">${normalizeDisplay(inj.caseType||inj.diagnosis)}</div></div>
              <div class="fgrp"><label class="flbl">تاريخ الواقعة / الاشتباه</label><div class="fro">${formatDate(inj.incidentDate||inj.firstSuspicion)}</div></div>
              ${isWork?`
              <div class="fgrp"><label class="flbl">الجزء المصاب</label><div class="fro">${inj.bodyPart||'—'}</div></div>
              <div class="fgrp span-full"><label class="flbl">مكان الواقعة</label><div class="fro">${inj.location||'—'}</div></div>
              <div class="fgrp span-full"><label class="flbl">وصف تفصيلي للواقعة</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:10px">${inj.description||'—'}</div></div>
              ${inj.witnesses==='نعم'?`<div class="fgrp"><label class="flbl">الشهود</label><div class="fro">${inj.witnessNames||'—'}</div></div>`:''}`:`
              <div class="fgrp span-full"><label class="flbl">المواد / العوامل المسببة</label><div class="fro">${inj.chemicalAgents||'—'}</div></div>
              <div class="fgrp"><label class="flbl">مدة التعرض المهني</label><div class="fro">${inj.exposureDuration||'—'}</div></div>
              <div class="fgrp span-full"><label class="flbl">وصف بيئة العمل</label><div class="fro">${normalizeDisplay(inj.workEnvironment)}</div></div>
              <div class="fgrp span-full"><label class="flbl">الوصف التفصيلي للحالة</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:10px">${normalizeDisplay(inj.description)}</div></div>`}
            </div>
          </div>
        </div>

        ${inv?`
        <!-- تقرير التحقيق -->
        <div class="card card-cum" style="margin:0;border-radius:0;border-left:none;border-right:none">
          <div class="ph"><h3><div class="pico pu">${ICONS.search}</div>تقرير التحقيق</h3><span class="stg-lbl">مرحلة التحقيق</span></div>
          <div class="pb">
            <div class="fg" style="gap:14px">
              <div class="fgrp"><label class="flbl">ملخص التحقيق</label><div class="fro" style="min-height:70px;align-items:flex-start;padding-top:10px">${inv.summary||'—'}</div></div>
              <div class="fgrp"><label class="flbl">نتائج التحقق من البيانات</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:10px">${inv.findings||'—'}</div></div>
              <div class="fgrp span-full"><label class="flbl">محضر التحقيق / الإفادات</label><div class="fro" style="min-height:70px;align-items:flex-start;padding-top:10px">${inv.record||'—'}</div></div>
              <div class="fg fg-3">
                <div class="fgrp"><label class="flbl">توصية الموظف</label><div class="fro">${inv.employeeRecommendation?`<span class="badge ${inv.employeeRecommendation==='موافقة'?'b-approved':'b-rejected'}">${inv.employeeRecommendation}</span>`:'—'}</div></div>
                <div class="fgrp span-2"><label class="flbl">ملاحظات الموظف</label><div class="fro">${inv.employeeNotes||'—'}</div></div>
              </div>
              ${inv.headNotes||inv.headDecision?`
              <div style="border-top:1px dashed var(--border);padding-top:14px;margin-top:4px">
                <div class="flbl" style="margin-bottom:10px;font-size:11px;color:var(--primary)">— ملاحظات واعتماد رئيس القسم —</div>
                <div class="fg fg-2">
                  <div class="fgrp"><label class="flbl">قرار رئيس القسم</label><div class="fro">${inv.headDecision?`<span class="badge ${inv.headDecision.includes('اعتماد')?'b-approved':inv.headDecision.includes('رفض')?'b-rejected':'b-phead'}">${inv.headDecision}</span>`:'—'}</div></div>
                  <div class="fgrp"><label class="flbl">ملاحظات رئيس القسم</label><div class="fro">${inv.headNotes||'—'}</div></div>
                </div>
              </div>`:''}
            </div>
          </div>
        </div>`:'' }

        <!-- فترات الإجازات المرضية -->
        <div class="card card-cum" style="margin:0;border-radius:0;border-left:none;border-right:none">
          <div class="ph">
            <h3><div class="pico gr">${ICONS.calendar}</div>فترات الإجازات المرضية</h3>
            <span style="font-size:12px;color:var(--text3)">الإجمالي: <strong>${totalDays}</strong> يوم</span>
          </div>
          <div class="pb-0">
            <div class="tbl-wrap">
              ${pds.length===0?`<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد فترات إجازة مسجلة</div>`:`
              <table class="dtbl">
                <thead><tr><th>#</th><th>من تاريخ</th><th>إلى تاريخ</th><th>عدد الأيام</th><th>الحالة</th><th>أضافها</th></tr></thead>
                <tbody>${pds.map((p,i)=>`<tr><td>${i+1}</td><td>${formatDate(p.from)}</td><td>${formatDate(p.to)}</td><td><strong>${p.days}</strong> يوم</td><td><span class="badge ${p.status==='معتمدة'?'b-approved':p.status==='مرفوضة'?'b-rejected':'b-phead'}">${p.status}</span></td><td>${p.addedBy||'—'}</td></tr>`).join('')}</tbody>
                <tfoot><tr><td colspan="3" style="font-weight:700;text-align:right;padding:8px 14px">الإجمالي</td><td colspan="3" style="font-weight:700;padding:8px 14px">${totalDays} يوم</td></tr></tfoot>
              </table>`}
            </div>
          </div>
        </div>

        <!-- المرفقات -->
        <div class="card" style="margin:0;border-radius:0;border-left:none;border-right:none">
          <div class="ph"><h3><div class="pico or">${ICONS.upload}</div>المرفقات <span style="font-size:11px;font-weight:400;color:var(--text3)">(${atts.length} مرفق)</span></h3></div>
          <div class="pb">${attHtml}</div>
        </div>

      </div>
    </div>

    <!-- نموذج إدخال القرار -->
    <div class="dp">
      <div class="ph"><h3><div class="pico bl">${ICONS.pen}</div>إدخال قرار الجلسة</h3></div>
      <div class="dp-body">
        <div class="fgrp">
          <label class="flbl">نوع القرار <span class="req">*</span></label>
          <select class="fc" id="decision-type" onchange="onDecisionTypeChange()">
            <option value="">— اختر نوع القرار —</option>
            <option value="موافقة">موافقة</option>
            <option value="رفض">رفض</option>
            <option value="تأجيل">تأجيل</option>
            <option value="إعادة للتصحيح">إعادة للتصحيح</option>
          </select>
        </div>

        <div id="approval-section" style="display:none">
          <div class="fg fg-2" style="gap:14px">
            <div class="fgrp"><label class="flbl">فترة الإجازة الموصى بها — من</label><input type="date" class="fc" id="leave-from"></div>
            <div class="fgrp"><label class="flbl">فترة الإجازة الموصى بها — إلى</label><input type="date" class="fc" id="leave-to"></div>
            <div class="fgrp"><label class="flbl">نسبة العجز (إن انطبقت) %</label><input type="number" class="fc" id="disability-pct" min="0" max="100" placeholder="0"></div>
            <div class="fgrp"><label class="flbl">نوع العجز</label><select class="fc" id="disability-type"><option>—</option><option>مؤقت</option><option>دائم جزئي</option><option>دائم كلي</option></select></div>
          </div>
        </div>

        <div id="rejection-section" style="display:none">
          <div class="fgrp">
            <label class="flbl">سبب الرفض الطبي <span class="req">*</span></label>
            <textarea class="fc" id="rejection-reason" rows="3" placeholder="اذكر الأسباب الطبية التي تستند إليها في الرفض..."></textarea>
          </div>
        </div>

        <div class="fgrp">
          <label class="flbl">الملاحظات الطبية التفصيلية</label>
          <textarea class="fc" id="medical-notes" rows="5" placeholder="مضمون القرار التفصيلي، الملاحظات الطبية، التوصيات..."></textarea>
        </div>

        <div class="fgrp">
          <label class="flbl">إرفاق ملف داعم <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          ${renderModernUploadComponent({ idPrefix: 'decision-att', subTitle: 'PDF, Word, صور — الحجم الأقصى 20 ميغابايت' })}
        </div>

        <div class="dp-acts">
          <button class="btn btn-accent btn-lg" onclick="saveDecision()">${ICONS.check} اعتماد القرار</button>
          <button class="btn btn-secondary" onclick="saveDraft()">حفظ كمسودة</button>
          <button class="btn btn-warning" onclick="postponeCase()">تأجيل البت</button>
          <button class="btn btn-ghost" onclick="window.history.back()">إلغاء</button>
        </div>
      </div>
    </div>`;
});

function toggleCaseData() {
  const body = document.getElementById('case-data-body');
  const icon = document.getElementById('toggle-icon');
  if (body.style.display === 'none') {
    body.style.display = '';
    icon.style.transform = 'rotate(-90deg)';
  } else {
    body.style.display = 'none';
    icon.style.transform = '';
  }
}

function onDecisionTypeChange() {
  const type = document.getElementById('decision-type').value;
  document.getElementById('approval-section').style.display = type === 'موافقة' ? '' : 'none';
  document.getElementById('rejection-section').style.display = type === 'رفض' ? '' : 'none';
}

function saveDecision() {
  const type = document.getElementById('decision-type').value;
  if (!type) { showToast('يرجى اختيار نوع القرار', 'w'); return; }
  const notes = document.getElementById('medical-notes').value.trim();
  if (!notes) { showToast('يرجى إدخال الملاحظات الطبية التفصيلية', 'w'); return; }
  confirmAction({
    title: 'تأكيد اعتماد القرار',
    msg: `هل أنت متأكد من اعتماد القرار التالي على الطلب ${reqId}؟<br><br>
          <strong>نوع القرار: ${type}</strong><br>
          <span style="font-size:12px;color:var(--text3)">بعد الاعتماد لن يتاح التعديل إلا عبر المقرر.</span>`,
    confirmLabel: 'نعم، اعتماد القرار',
    confirmClass: 'btn-accent',
    onConfirm: () => {
      showToast(`تم اعتماد قرار ${type} على الطلب ${reqId} بنجاح`, 's');
      setTimeout(() => window.location.href = `session-details.html?id=${sessionId}`, 1500);
    }
  });
}

function saveDraft() { showToast('تم حفظ مسودة القرار', 'i'); }

function postponeCase() {
  confirmAction({
    title: 'تأجيل البت في الحالة',
    msg: `هل تريد تأجيل البت في الطلب ${reqId} لجلسة لاحقة؟`,
    confirmLabel: 'نعم، تأجيل',
    confirmClass: 'btn-warning',
    onConfirm: () => {
      showToast('تم تأجيل البت في الحالة لجلسة لاحقة', 'w');
      setTimeout(() => window.location.href = `session-details.html?id=${sessionId}`, 1500);
    }
  });
}
</script>
</body>
</html>
