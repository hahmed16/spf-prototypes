<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة البيانات — لجنة التظلمات</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/components.js"></script>
<script>
initLayout({ role: 'appeals-committee', activePage: 'dashboard' });
setBreadcrumb([{ label: 'لوحة البيانات' }]);

document.addEventListener('DOMContentLoaded', () => {
  const appeals = WI_DATA.appeals;
  const pendingSign = 2;

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>لوحة البيانات</h1>
        <p>لجنة التظلمات — مراجعة التظلمات المحالة وإصدار القرارات النهائية</p>
      </div>
    </div>

    ${pendingSign > 0 ? `
    <div class="alert alert-w">
      ${ICONS.warn}
      <div>
        <strong>يوجد ${pendingSign} قرار بانتظار توقيعك الإلكتروني</strong>
      </div>
      <button class="btn btn-warning btn-sm" style="flex-shrink:0;margin-right:auto"
        onclick="window.location.href='sessions-list.html'">عرض الجلسات</button>
    </div>` : ''}

    <div class="stats-grid">
      <div class="scard p" onclick="window.location.href='sessions-list.html'">
        <div class="sc-lbl">التظلمات المحالة للجنة</div>
        <div class="sc-val">${appeals.length}</div>
        <div class="sc-sub">للمراجعة والبت</div>
      </div>
      <div class="scard w">
        <div class="sc-lbl">جلسات مجدولة</div>
        <div class="sc-val">2</div>
        <div class="sc-sub">هذا الشهر</div>
      </div>
      <div class="scard d">
        <div class="sc-lbl">توقيعات معلّقة</div>
        <div class="sc-val">${pendingSign}</div>
        <div class="sc-sub">تحتاج توقيعك الإلكتروني</div>
      </div>
      <div class="scard s">
        <div class="sc-lbl">قرارات صدرت هذا الشهر</div>
        <div class="sc-val">5</div>
        <div class="sc-sub">قرارات نهائية</div>
      </div>
    </div>

    <div class="card">
      <div class="ph">
        <h3><div class="pico pu">${ICONS.list}</div>التظلمات المحالة</h3>
        <a href="sessions-list.html" style="font-size:12px;color:var(--primary)">عرض الجلسات</a>
      </div>
      <div class="pb-0">
        <table class="dtbl">
          <thead>
            <tr>
              <th>رقم التظلم</th>
              <th>الطلب الأصلي</th>
              <th>مقدم التظلم</th>
              <th>سبب التظلم</th>
              <th>الحالة</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${appeals.map(a => `
            <tr>
              <td style="font-family:monospace;font-weight:700;color:var(--primary)">${a.id}</td>
              <td style="font-family:monospace;font-size:11.5px">${a.originalRequestId}</td>
              <td>${a.applicant.name}</td>
              <td style="font-size:12px">${a.appealReason}</td>
              <td>${statusBadge(a.status)}</td>
              <td>
                <button class="ibtn" onclick="window.location.href='sessions-list.html'"
                  title="عرض في الجلسة">${ICONS.calendar}</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
});
</script>
</body>
</html>
