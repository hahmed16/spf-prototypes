<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة البيانات — رئيس قسم التراخيص والرقابة</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <script src="../shared/config.js"></script>
  <script src="../shared/data-users.js"></script>
  <script src="../shared/data-allowances.js"></script>
  <script src="../shared/data-disability.js"></script>
  <script src="../shared/data-chronic.js"></script>
  <script src="../shared/data-appeals.js"></script>
  <script src="../shared/data-licensing.js"></script>
  <script src="../shared/data-sessions.js"></script>
  <script src="../shared/data-disability-retirement.js"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="../shared/utils.js"></script>
  <script>
    initLayout({ role: 'licensing-head', activePage: 'dashboard' });
    setBreadcrumb([{ label: 'لوحة البيانات' }]);

    document.addEventListener('DOMContentLoaded', () => {
      const stats = WI_DATA.dashboardStats['licensing-head'];
      const pending = WI_DATA.licensing.filter(r => 
        ['تم اتخاذ القرار من اللجنة الطبية الإشرافية', 'بانتظار اعتماد رئيس القسم'].includes(r.status)
      );

      getContent().innerHTML = `
        <div class="pg-head">
          <div>
            <h1>لوحة البيانات</h1>
            <p>رئيس قسم التراخيص والرقابة — ${WI_DATA.users.licensing_head.name}</p>
          </div>
        </div>
        
        <div class="stats-grid">
          ${stats.map(s => `
          <div class="scard ${s.type}" onclick="window.location.href='licensing-list.html'">
            <div class="sc-lbl">${s.label}</div>
            <div class="sc-val">${s.value}</div>
          </div>`).join('')}
        </div>

        ${pending.length ? `
        <div class="alert alert-w">
          ${ICONS.warn}
          <div><strong>لديك ${pending.length} طلبات جاهزة للاعتماد النهائي وإصدار الترخيص.</strong> <a href="licensing-list.html" style="color:var(--primary);margin-right:10px">عرض القائمة ${ICONS.arrow_left}</a></div>
        </div>` : ''}

        <div class="card">
          <div class="ph">
            <h3><div class="pico bl">${ICONS.list}</div>الطلبات بانتظار الاعتماد النهائي</h3>
            <a href="licensing-list.html" style="font-size:12px;color:var(--primary)">عرض الكل</a>
          </div>
          <div class="pb-0">
            <table class="dtbl">
              <thead><tr><th>رقم الطلب</th><th>المؤسسة</th><th>قرار اللجنة</th><th>تاريخ القرار</th><th></th></tr></thead>
              <tbody>
                ${pending.slice(0, 5).map(r => `
                <tr>
                  <td style="font-family:monospace;font-size:11.5px;color:var(--primary)">${r.id}</td>
                  <td>${r.institution.name}</td>
                  <td><span class="badge b-approved">${r.committeeDecision?.type || 'موافقة'}</span></td>
                  <td style="font-size:11.5px">${r.committeeDecision?.date || '—'}</td>
                  <td>
                    <button class="btn btn-primary btn-xs" onclick="window.location.href='licensing-details.html?id=${r.id}'">اعتماد وإصدار</button>
                  </td>
                </tr>`).join('')}
                ${!pending.length ? `<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text3)">لا توجد طلبات بانتظار الاعتماد حالياً</td></tr>` : ''}
              </tbody>
            </table>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
