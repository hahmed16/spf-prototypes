<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة الطلبات والمؤسسات — رئيس قسم التراخيص والرقابة</title>
<link rel="stylesheet" href="../shared/style.css"></head>
<body>
<script src="../shared/config.js"></script><script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script><script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'licensing-head', activePage: 'licensing-list' });
setBreadcrumb([{ label: 'التراخيص والرقابة' }, { label: 'قائمة الطلبات والمؤسسات' }]);
const reqs = WI_DATA.licensing;
let activeTab = 'all';
let searchQuery = '';
let showAllStages = false;
document.addEventListener('DOMContentLoaded', render);
function render() {
  const scoped = getFilteredData({ role: 'licensing-head', data: reqs, query: searchQuery, showAll: showAllStages });
  const filtered = activeTab==='all' ? scoped : scoped.filter(r=>{
    if(activeTab==='new') return r.requestType==='جديد' && !r.status.includes('اعتماد');
    if(activeTab==='renew') return r.requestType==='تجديد';
    if(activeTab==='active') return r.status.includes('اعتماد');
    if(activeTab==='pending') return r.status.includes('بانتظار اعتماد رئيس');
    return true;
  });
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة طلبات الترخيص والمؤسسات الصحية</h1><p>${reqs.length} طلب / مؤسسة</p></div>
    </div>
    ${renderUnifiedFilterBar({ onSearch: 'updateSearch', onToggleAll: 'toggleAll', isAllVisible: showAllStages })}
    <div class="filters" style="display:none">
      <div class="fgrid">
        <div class="fgrp"><label class="flbl">اسم المؤسسة</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">رقم الطلب</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">نوع الطلب</label><select class="fc"><option>الكل</option><option>جديد</option><option>تجديد</option></select></div>
        <div class="fgrp"><label class="flbl">حالة الطلب</label><select class="fc"><option>جميع الحالات</option>${reqs.map(r=>`<option>${r.status}</option>`).join('')}</select></div>
        <div class="fgrp"><label class="flbl">انتهاء الترخيص من</label><input type="date" class="fc"></div>
        <div class="fgrp"><label class="flbl">انتهاء الترخيص إلى</label><input type="date" class="fc"></div>
      </div>
      <div class="facts"><button class="btn btn-primary btn-sm">${ICONS.search} بحث</button><button class="btn btn-secondary btn-sm">مسح</button></div>
    </div>
    <div class="card">
      <div class="ttabs">
        ${[
          {key:'all',label:'الكل',count:reqs.length},
          {key:'pending',label:'بانتظار اعتمادي',count:reqs.filter(r=>r.status.includes('بانتظار اعتماد رئيس')).length},
          {key:'new',label:'طلبات جديدة',count:reqs.filter(r=>r.requestType==='جديد').length},
          {key:'renew',label:'طلبات تجديد',count:reqs.filter(r=>r.requestType==='تجديد').length},
          {key:'active',label:'مؤسسات نشطة',count:reqs.filter(r=>r.status.includes('اعتماد')).length},
        ].map(t=>`<div class="ttab ${activeTab===t.key?'act':''}" onclick="setTab('${t.key}')">${t.label} <span class="tc">${t.count}</span></div>`).join('')}
      </div>
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead>
              <tr>
                <th>رقم الطلب</th>
                <th>مقدم الطلب</th>
                <th>اسم المؤسسة</th>
                <th>نوع الطلب</th>
                <th>حالة الطلب</th>
                <th>حالة الترخيص</th>
                <th>تاريخ الانتهاء</th>
                <th>تاريخ التقديم</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map(r=>`
              <tr>
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                <td>${getSubmittedByName(r)}</td>
                <td style="font-weight:600">${r.institution.name}</td>
                <td><span class="badge b-direct">${r.requestType}</span></td>
                <td>${statusBadge(r.status)}</td>
                <td>${r.activeLicense?`<span class="badge b-active">نشط</span>`:r.status.includes('رفض')?`<span class="badge b-rejected">مرفوض</span>`:`<span class="badge b-phead">معلق</span>`}</td>
                <td style="font-size:12px">${r.activeLicense?.expiryDate||'—'}</td>
                <td style="font-size:12px">${r.submitDate}</td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="ibtn" onclick="window.location.href='licensing-details.html?id=${r.id}'">${ICONS.eye}</button>
                    <button class="ibtn" onclick="window.location.href='institution-file.html?id=${r.id}'" title="ملف المؤسسة">${ICONS.file}</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}
function setTab(t){ activeTab=t; render(); }
function updateSearch(val) { searchQuery = val; render(); }
function toggleAll() { showAllStages = !showAllStages; render(); }
</script></body></html>
