<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة التظلمات — موظف قسم اللجان الطبية</title>
<link rel="stylesheet" href="../shared/style.css"></head>
<body>
<script src="../shared/config.js"></script><script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script><script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'committees-employee', activePage: 'appeals-list' });
setBreadcrumb([{ label: 'التظلمات' }, { label: 'قائمة التظلمات' }]);
const me = WI_DATA.users.committees_employee.name;
let searchQuery = '';
let showAllStages = false;
document.addEventListener('DOMContentLoaded', render);
function render() {
  const appeals = getFilteredData({
    role: 'committees-employee',
    data: WI_DATA.appeals,
    query: searchQuery,
    showAll: showAllStages
  });
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قائمة التظلمات من قرارات المؤسسات الصحية</h1>
        <p>${appeals.length} تظلم</p></div>
      <div class="pg-acts">
        <button class="btn btn-primary" onclick="window.location.href='appeals-new.html'">${ICONS.plus} تقديم تظلم (بإسم الصندوق)</button>
      </div>
    </div>
    <div class="alert alert-i">${ICONS.info}
      <span>موظف قسم اللجان الطبية يمكنه تقديم التظلم <strong>بإسم الصندوق</strong> باعتباره طرفاً أصيلاً في قرارات المؤسسات الصحية المرخصة.</span>
    </div>
    ${renderUnifiedFilterBar({ onSearch: 'updateSearch', onToggleAll: 'toggleAll', isAllVisible: showAllStages })}
    <div class="filters" style="display:none">
      <div class="fgrid">
        <div class="fgrp"><label class="flbl">رقم التظلم</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">رقم الطلب الأصلي</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">الحالة</label><select class="fc"><option>الكل</option>${appeals.map(a=>`<option>${a.status}</option>`).join('')}</select></div>
      </div>
      <div class="facts"><button class="btn btn-primary btn-sm">${ICONS.search} بحث</button><button class="btn btn-secondary btn-sm">مسح</button></div>
    </div>
    <div class="card">
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم التظلم</th><th>الطلب الأصلي</th><th>مقدم التظلم</th><th>سبب التظلم</th><th>الحالة</th><th>تاريخ التقديم</th><th></th></tr></thead>
            <tbody>
              ${appeals.map(a=>`
              <tr style="${a.checkedOutBy===me?'background:#f0fdf4':''}">
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${a.id}</td>
                <td style="font-family:monospace">${a.originalRequestId}</td>
                <td>${a.applicant.name}<br><span style="font-size:10.5px;color:var(--text3)">${a.applicant.role}</span></td>
                <td>${a.appealReason}</td>
                <td>${statusBadge(a.status)}</td>
                <td style="font-size:12px">${a.submitDate}</td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="ibtn" onclick="window.location.href='appeals-details.html?id=${a.id}'">${ICONS.eye}</button>
                    ${a.status.includes('بانتظار مراجعة موظف')
                      ? !a.checkedOutBy
                        ? `<button class="ibtn" onclick="doCheckout('${a.id}')">${ICONS.lock}</button>`
                        : a.checkedOutBy===me
                          ? `<button class="ibtn" onclick="doCheckin('${a.id}')">${ICONS.unlock}</button>`
                          : ''
                      : ''}
                    <button class="ibtn" onclick="openAddNoteModal('${a.id}')">${ICONS.note}</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  if (searchQuery) {
    const inp = document.getElementById('global-search-input');
    if (inp) { inp.value = searchQuery; inp.focus(); inp.setSelectionRange(searchQuery.length, searchQuery.length); }
  }
}
function updateSearch(val) { searchQuery = val; render(); }
function toggleAll() { showAllStages = !showAllStages; render(); }
function doCheckout(id){ const a=WI_DATA.appeals.find(x=>x.id===id); if(a)a.checkedOutBy=me; showToast(`تم حجز ${id}`,'s'); location.reload(); }
function doCheckin(id){ const a=WI_DATA.appeals.find(x=>x.id===id); if(a)a.checkedOutBy=null; showToast(`تم تحرير ${id}`,'i'); location.reload(); }
</script></body></html>
