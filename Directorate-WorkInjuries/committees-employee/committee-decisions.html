<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قرارات اللجان الطبية — موظف قسم اللجان الطبية</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data-referrals.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'committees-employee', activePage: 'committee-decisions' });
setBreadcrumb([{ label: 'اللجان الطبية' }, { label: 'قرارات اللجان' }]);

let activeTab = 'all';
let searchQuery = '';
let requestTypeFilter = 'all';
let decisionTypeFilter = 'all';
let dateFromFilter = '';
let dateToFilter = '';

document.addEventListener('DOMContentLoaded', () => {
  if (!enforceRoleAccess(['committees-employee', 'committees-head'], {
    title: 'صلاحية غير متاحة',
    message: 'شاشة قرارات اللجان الطبية مخصصة لموظف قسم اللجان الطبية ورئيس القسم فقط.'
  })) return;
  render();
});

function render() {
  const decisions = getCommitteeDecisionsData();
  const filtered = filterDecisions(decisions);
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>قرارات اللجان الطبية</h1><p>${decisions.length} قرار مرتبط باللجان</p></div>
    </div>
    ${renderUnifiedFilterBar({ onSearch: 'updateSearch', onToggleAll: 'noopUnifiedToggleAll', isAllVisible: false })}
    <div class="card">
      <div class="pb">
        <div class="fg fg-4">
          <div class="fgrp"><label class="flbl">نوع الطلب</label>
            <select class="fc" onchange="setRequestTypeFilter(this.value)">
              <option value="all">الكل</option>
              <option value="ترخيص" ${requestTypeFilter === 'ترخيص' ? 'selected' : ''}>ترخيص</option>
              <option value="عرض مباشر" ${requestTypeFilter === 'عرض مباشر' ? 'selected' : ''}>عرض مباشر</option>
              <option value="إصابة عمل" ${requestTypeFilter === 'إصابة عمل' ? 'selected' : ''}>إصابة عمل</option>
              <option value="مرض مهني" ${requestTypeFilter === 'مرض مهني' ? 'selected' : ''}>مرض مهني</option>
              <option value="أمراض مستديمة" ${requestTypeFilter === 'أمراض مستديمة' ? 'selected' : ''}>أمراض مستديمة</option>
            </select>
          </div>
          <div class="fgrp"><label class="flbl">نوع القرار</label>
            <select class="fc" onchange="setDecisionTypeFilter(this.value)">
              <option value="all">الكل</option>
              <option value="موافقة" ${decisionTypeFilter === 'موافقة' ? 'selected' : ''}>موافقة</option>
              <option value="رفض" ${decisionTypeFilter === 'رفض' ? 'selected' : ''}>رفض</option>
              <option value="اعتماد" ${decisionTypeFilter === 'اعتماد' ? 'selected' : ''}>اعتماد</option>
            </select>
          </div>
          <div class="fgrp"><label class="flbl">من تاريخ</label><input type="date" class="fc" value="${dateFromFilter}" onchange="setDateFromFilter(this.value)"></div>
          <div class="fgrp"><label class="flbl">إلى تاريخ</label><input type="date" class="fc" value="${dateToFilter}" onchange="setDateToFilter(this.value)"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="ttabs">
        ${[
          { key: 'all', label: 'الكل', count: decisions.length },
          { key: 'pending', label: 'قيد التنفيذ', count: decisions.filter((d) => d.status === 'قيد التنفيذ').length },
          { key: 'executed', label: 'منفذة', count: decisions.filter((d) => d.status === 'منفذة').length },
          { key: 'appealed', label: 'مُتظلم عليها', count: decisions.filter((d) => d.hasAppeal).length },
        ].map((tab) => `<div class="ttab ${activeTab === tab.key ? 'act' : ''}" onclick="setTab('${tab.key}')">${tab.label} <span class="tc">${tab.count}</span></div>`).join('')}
      </div>
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead><tr><th>رقم القرار</th><th>رقم الطلب</th><th>نوع الطلب</th><th>المستفيد</th><th>نوع القرار</th><th>تاريخ القرار</th><th>الحالة</th><th>التظلمات</th><th></th></tr></thead>
            <tbody>
              ${filtered.length ? filtered.map((d) => `
                <tr>
                  <td style="font-family:monospace;font-weight:700;color:var(--primary)">${d.decisionId}</td>
                  <td style="font-family:monospace">${d.requestId}</td>
                  <td>${d.requestType}</td>
                  <td>${d.beneficiaryName}</td>
                  <td><span class="badge ${d.decisionType === 'موافقة' ? 'b-approved' : 'b-rejected'}">${d.decisionType}</span></td>
                  <td>${formatDate(d.decisionDate)}</td>
                  <td>${statusBadge(d.status)}</td>
                  <td>${d.hasAppeal ? `<button class="btn btn-warning btn-xs" onclick="viewCommitteeDecisionAppeals('${d.decisionId}')">${d.appealCount} تظلم</button>` : '—'}</td>
                  <td><div style="display:flex;gap:4px"><button class="ibtn" onclick="openCommitteeDecisionDetailsModal('${d.decisionId}')" title="تفاصيل">${ICONS.eye}</button>${d.status === 'قيد التنفيذ' ? `<button class="ibtn" onclick="markExecuted('${d.decisionId}')" title="تنفيذ">${ICONS.check}</button>` : ''}${d.status === 'منفذة' && !d.hasAppeal ? `<button class="ibtn" onclick="initiateAppealFromDecision('${d.decisionId}')" title="بدء تظلم">${ICONS.shield}</button>` : ''}</div></td>
                </tr>`).join('') : '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3)">لا توجد قرارات</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function filterDecisions(decisions) {
  let rows = decisions;
  if (activeTab === 'pending') rows = rows.filter((item) => item.status === 'قيد التنفيذ');
  if (activeTab === 'executed') rows = rows.filter((item) => item.status === 'منفذة');
  if (activeTab === 'appealed') rows = rows.filter((item) => item.hasAppeal);
  if (requestTypeFilter !== 'all') rows = rows.filter((item) => (item.requestType || '').includes(requestTypeFilter));
  if (decisionTypeFilter !== 'all') rows = rows.filter((item) => (item.decisionType || '').includes(decisionTypeFilter));
  if (dateFromFilter) rows = rows.filter((item) => (item.decisionDate || '') >= dateFromFilter);
  if (dateToFilter) rows = rows.filter((item) => (item.decisionDate || '') <= dateToFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter((item) => `${item.decisionId} ${item.requestId} ${item.beneficiaryName} ${item.requestType} ${item.committeeType}`.toLowerCase().includes(q));
  }
  return rows;
}

function markExecuted(decisionId) {
  const decision = getCommitteeDecisionsData().find((item) => item.decisionId === decisionId);
  if (!decision?.record?.committeeDecision) return;
  decision.record.committeeDecision.executionStatus = 'منفذة';
  decision.record.committeeDecision.executed = true;
  decision.record.status = 'تم تنفيذ قرار المؤسسة الصحية وإغلاق الإحالة';
  decision.record.timeline.push({
    action: 'تنفيذ القرار',
    actor: getCurrentUserData().name,
    role: 'موظف قسم اللجان الطبية',
    time: new Date().toISOString().slice(0,16).replace('T',' '),
    fromStatus: 'تم استلام قرار المؤسسة الصحية — بانتظار استكمال التنفيذ',
    toStatus: decision.record.status,
    note: 'تم اعتماد تنفيذ القرار من شاشة القرارات.',
    type: 'success',
    phone: getCurrentUserPhone()
  });
  showToast('تم تحديث حالة القرار إلى منفذة', 's');
  render();
}

function setTab(tab) { activeTab = tab; render(); }
function updateSearch(val) { searchQuery = val; render(); }
function setRequestTypeFilter(val) { requestTypeFilter = val; render(); }
function setDecisionTypeFilter(val) { decisionTypeFilter = val; render(); }
function setDateFromFilter(val) { dateFromFilter = val; render(); }
function setDateToFilter(val) { dateToFilter = val; render(); }
</script>
</body>
</html>
