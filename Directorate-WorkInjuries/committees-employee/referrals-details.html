<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل طلب العرض — موظف قسم اللجان الطبية</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data-referrals.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'committees-employee', activePage: 'referrals-list' });
const params = new URLSearchParams(window.location.search);
const directReq = WI_DATA.referrals.find(r => r.id === params.get('id'));
const req = directReq || WI_DATA.allowances.find(r => r.id === params.get('id')) || WI_DATA.allowances[0];
const isDirectReferral = Boolean(directReq);
currentRequestId = req ? req.id : '';
const me = WI_DATA.users.committees_employee.name;
const isCheckedOutByMe = req.checkedOutBy === me;
const statusPending1 = 'تم طلب العرض على المؤسسات الصحية المرخصة — بانتظار مراجعة موظف قسم اللجان الطبية';
const statusPending2 = 'بانتظار مراجعة موظف قسم اللجان الطبية';
setBreadcrumb([{ label: 'طلبات العرض', page: 'referrals-list' }, { label: `تفاصيل ${req.id}` }]);

document.addEventListener('DOMContentLoaded', () => {
  if (!req) {
    getContent().innerHTML = '<div class="card"><div class="pb"><div class="empty-st">الطلب غير موجود</div></div></div>';
    return;
  }
  if (isDirectReferral) {
    renderDirectReferralCommitteeEmployee();
    return;
  }
  const canAct = (req.status === statusPending1 || req.status === statusPending2 || req.status === 'قيد المراجعة — قسم اللجان الطبية') && isCheckedOutByMe;
  const isSamePerson = req.applicant?.civil && req.insured?.civil && req.applicant.civil === req.insured.civil;

  const isWork     = req.type === 'إصابة عمل';
  const isOD       = req.type === 'مرض مهني';
  const isDisab    = req.type === 'إعاقة';
  const isChronic  = req.type === 'أمراض مستديمة';
  const injury     = req.injury || {};
  const inv        = req.investigation || {};
  const chr        = req.chronic || {};
  const card       = req.card || null;
  const isExpired  = card && new Date(card.expiryDate) < new Date();
  const periods    = req.sickLeavePeriods || [];
  const atts       = req.attachments || [];
  const notes      = req.notes || [];
  const tl         = req.timeline || [];
  const totalDays  = periods.reduce((s, p) => s + (p.days || 0), 0);

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>تفاصيل طلب العرض على مؤسسة صحية مرخصة</h1>
        <p>رقم الطلب: <strong style="font-family:monospace;color:var(--primary)">${req.id}</strong></p>
      </div>
      <div class="pg-acts">
        ${!req.checkedOutBy
          ? `<button class="btn btn-primary" onclick="doCheckout()">${ICONS.lock} حجز الطلب</button>`
          : isCheckedOutByMe
            ? `<button class="btn btn-secondary" onclick="doCheckin()">${ICONS.unlock} تحرير الطلب</button>`
            : `<span style="font-size:12px;color:var(--warning);padding:8px 14px;border:1px solid var(--warning-l);border-radius:var(--rsm);background:var(--warning-l)">${ICONS.lock} محجوز: ${req.checkedOutBy}</span>`}
        <button class="btn btn-secondary" onclick="window.location.href='referrals-list.html'">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <!-- ملخص الطلب -->
    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div class="req-summary-grid">
          <div><div class="flbl" style="margin-bottom:4px">رقم الطلب</div><div style="font-size:15px;font-weight:800;color:var(--primary);font-family:monospace">${req.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">نوع الطلب</div><div style="font-size:13px;font-weight:600">${req.type}${req.subtype ? ` — ${req.subtype}` : ''}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">الحالة الحالية</div>${statusBadge(req.status)}</div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ الطلب</div><div style="font-size:12.5px">${formatDate(req.submitDate)}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">المسند إليه</div><div style="font-size:12.5px;font-weight:600">${normalizeDisplay(req.assignedTo)}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث</div><div style="font-size:12px;color:var(--text2)">${req.lastUpdate || '—'}</div></div>
        </div>
      </div>
    </div>

    <!-- بيانات مقدم الطلب والمؤمن عليه (مدمجة) -->
    ${renderInsuredSummaryCards(req.insured?.civil || req.applicant?.civil, req.id)}
    ${isSamePerson ? `
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب والمؤمن عليه <span style="font-size:10px;color:var(--text3)">(نفس الشخص)</span></h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.applicant.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.applicant.civil}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(req.insured.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${req.insured.gender || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${req.insured.nationality || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف الأساسي</label><div class="fro">${req.applicant.phone}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف 1</label><div class="fro">${req.applicant.phoneAlt1}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف 2</label><div class="fro">${req.applicant.phoneAlt2}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${req.applicant.email}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء البطاقة الشخصية</label><div class="fro">${formatDate(req.applicant.civilExpiry)}</div></div>
          <div class="fgrp"><label class="flbl">المحافظة / الولاية</label><div class="fro">${req.applicant.region} — ${req.applicant.wilayat}</div></div>
          <div class="fgrp"><label class="flbl">الدولة</label><div class="fro">${req.applicant.country}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${req.insured.insuranceStatus === 'نشط' ? 'b-approved' : 'b-rejected'}">${req.insured.insuranceStatus || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">رقم التأمين</label><div class="fro" style="font-family:monospace">${req.insured.insurance || '—'}</div></div>
          <div class="fgrp"><label class="flbl">نوع الاشتراك</label><div class="fro">${req.insured.subType || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">${formatDate(req.insured.regDate)}</div></div>
        </div>
      </div>
    </div>` : `
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.applicant.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.applicant.civil}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف الأساسي</label><div class="fro">${req.applicant.phone}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف 1</label><div class="fro">${req.applicant.phoneAlt1}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف 2</label><div class="fro">${req.applicant.phoneAlt2}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${req.applicant.email}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ انتهاء البطاقة الشخصية</label><div class="fro">${formatDate(req.applicant.civilExpiry)}</div></div>
          <div class="fgrp"><label class="flbl">المحافظة / الولاية</label><div class="fro">${req.applicant.region} — ${req.applicant.wilayat}</div></div>
          <div class="fgrp"><label class="flbl">الدولة</label><div class="fro">${req.applicant.country}</div></div>
        </div>
      </div>
    </div>

    <div class="card card-ro">
      <div class="ph"><h3><div class="pico gr">${ICONS.shield}</div>بيانات المؤمن عليه والتأمين</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-4">
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.insured.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.insured.civil}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(req.insured.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${req.insured.gender || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${req.insured.nationality || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${req.insured.insuranceStatus === 'نشط' ? 'b-approved' : 'b-rejected'}">${req.insured.insuranceStatus || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">رقم التأمين</label><div class="fro" style="font-family:monospace">${req.insured.insurance || '—'}</div></div>
          <div class="fgrp"><label class="flbl">نوع الاشتراك</label><div class="fro">${req.insured.subType || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل فى الصندوق</label><div class="fro">${formatDate(req.insured.regDate)}</div></div>
        </div>
      </div>
    </div>`}

    <!-- بيانات جهة العمل (إن وجدت) -->
    ${req.employer ? `
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico tl">${ICONS.building}</div>بيانات جهة العمل</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">اسم جهة العمل</label><div class="fro" style="font-weight:700">${req.employer.name}</div></div>
          <div class="fgrp"><label class="flbl">رقم السجل التجاري</label><div class="fro" style="font-family:monospace">${req.employer.cr || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم المنشأة</label><div class="fro" style="font-family:monospace">${req.employer.establishment || '—'}</div></div>
          <div class="fgrp"><label class="flbl">المسمى الوظيفي</label><div class="fro">${req.employer.jobTitle || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الالتحاق بالعمل</label><div class="fro">${formatDate(req.employer.joinDate)}</div></div>
          <div class="fgrp"><label class="flbl">موقع العمل / الفرع</label><div class="fro">${req.employer.location || '—'}</div></div>
        </div>
      </div>
    </div>` : ''}

    <!-- تفاصيل بطاقة الإعاقة -->
    ${isDisab && card ? `
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico pu">${ICONS.shield}</div>بيانات بطاقة الإعاقة <span style="font-size:10px;color:var(--text3)">(وزارة التنمية الاجتماعية + وزارة الصحة)</span></h3></div>
      <div class="pb">
        ${isExpired ? `<div class="alert alert-d" style="margin-bottom:12px">${ICONS.warn}<span>بطاقة الإعاقة منتهية الصلاحية</span></div>` : ''}
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">رقم البطاقة</label><div class="fro" style="font-family:monospace">${card.number || '—'}</div></div>
          <div class="fgrp"><label class="flbl">حالة البطاقة</label><div class="fro"><span class="badge ${card.status === 'سارية' ? 'b-card-valid' : card.status === 'منتهية' ? 'b-card-expired' : 'b-card-cancelled'}">${card.status}</span></div></div>
          <div class="fgrp"><label class="flbl">تاريخ التفعيل</label><div class="fro">${formatDate(card.activationDate)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الانتهاء</label><div class="fro" style="${isExpired ? 'color:var(--danger);font-weight:700' : ''}">${formatDate(card.expiryDate)}</div></div>
          <div class="fgrp"><label class="flbl">طبيعة الإعاقة (وزارة التنمية الاجتماعية)</label><div class="fro">${card.typeSD || '—'}</div></div>
          <div class="fgrp"><label class="flbl">طبيعة الإعاقة (وزارة الصحة)</label><div class="fro">${card.typeMOH || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ثبوت الإعاقة</label><div class="fro">${formatDate(card.provenDate)}</div></div>
          <div class="fgrp"><label class="flbl">آخر تحقق تلقائي</label><div class="fro" style="color:var(--text3)">${card.lastCheck || '—'}</div></div>
        </div>
      </div>
    </div>` : ''}

    <!-- بيانات المرض المستديم -->
    ${isChronic && chr.chronicDisease ? `
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>البيانات الطبية — المرض المستديم <span style="font-size:10px;color:var(--text3)">(واردة من وزارة الصحة)</span></h3><span style="font-size:11px;background:#ede9fe;color:#7c3aed;padding:1px 7px;border-radius:10px;font-weight:600">للمستخدمين الداخليين فقط</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">رقم الطلب الفريد (وزارة الصحة)</label><div class="fro" style="font-family:monospace">${normalizeDisplay(chr.uniqueRequestId)}</div></div>
          <div class="fgrp"><label class="flbl">المؤسسة الصحية المعالجة</label><div class="fro">${normalizeDisplay(chr.hospital)}</div></div>
          <div class="fgrp"><label class="flbl">الطبيب المعالج</label><div class="fro">${normalizeDisplay(chr.doctor)}</div></div>
          <div class="fgrp span-full"><label class="flbl">التشخيص الطبي (تقرير وصفي مثبت)</label><div class="fro medical-report">${normalizeDisplay(chr.permanentDiseaseReport)}</div></div>
          <div class="fgrp"><label class="flbl">المرض المستديم</label><div class="fro">${normalizeDisplay(chr.chronicDisease)}</div></div>
          <div class="fgrp"><label class="flbl">الجهاز المتأثر</label><div class="fro">${normalizeDisplay(chr.affectedSystem)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ ثبوت المرض</label><div class="fro">${formatDate(chr.provenDate)}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ شدة المرض</label><div class="fro">${formatDate(chr.severityDate)}</div></div>
          <div class="fgrp span-full"><label class="flbl">Medical Severity Index and Treatment Burden</label><div class="fro">${normalizeDisplay(chr.severityIndex)}</div></div>
        </div>
      </div>
    </div>` : ''}

    <!-- بيانات الإصابة / المرض المهني -->
    ${(isWork || isOD) ? `
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>بيانات ${isWork ? 'الإصابة' : 'المرض المهني'}</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">نوع الحالة</label><div class="fro">${normalizeDisplay(injury.caseType || (isWork ? 'إصابة عمل' : 'مرض مهني'))}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الواقعة / الاشتباه</label><div class="fro">${formatDate(injury.incidentDate || injury.firstSuspicion)}</div></div>
          ${isWork ? `
          <div class="fgrp"><label class="flbl">الجزء المصاب</label><div class="fro">${injury.bodyPart || '—'}</div></div>
          <div class="fgrp span-full"><label class="flbl">مكان الواقعة</label><div class="fro">${injury.location || '—'}</div></div>
          <div class="fgrp span-full"><label class="flbl">وصف تفصيلي للواقعة</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:10px">${injury.description || '—'}</div></div>
          ${injury.witnesses === 'نعم' ? `<div class="fgrp"><label class="flbl">الشهود</label><div class="fro">${injury.witnessNames || '—'}</div></div>` : ''}
          ` : `
          <div class="fgrp span-full"><label class="flbl">المواد / العوامل المسببة</label><div class="fro">${injury.chemicalAgents || '—'}</div></div>
          <div class="fgrp"><label class="flbl">مدة التعرض المهني</label><div class="fro">${injury.exposureDuration || '—'}</div></div>
          <div class="fgrp span-full"><label class="flbl">بيئة العمل</label><div class="fro">${injury.workEnvironment || '—'}</div></div>
          `}
        </div>
      </div>
    </div>` : ''}

    <!-- قرارات ومحاضر المراجعة السابقة -->
    ${req.investigation ? `
    <div class="card" style="border-right:4px solid var(--warning)">
      <div class="ph"><h3><div class="pico or">${ICONS.note}</div>قرارات ومحاضر المراجعة السابقة</h3></div>
      <div class="pb" style="display:flex;flex-direction:column;gap:14px">
        ${(isWork || isOD) && (inv.summary || inv.findings) ? `
        <div style="background:var(--bg2);border-radius:var(--rsm);padding:14px;display:flex;flex-direction:column;gap:10px">
          <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">ملخص التحقيق ونتائجه</div>
          ${inv.summary ? `<div class="fgrp" style="margin:0"><label class="flbl">ملخص التحقيق</label><div class="fro" style="min-height:50px;align-items:flex-start;padding-top:8px">${inv.summary}</div></div>` : ''}
          ${inv.findings ? `<div class="fgrp" style="margin:0"><label class="flbl">نتائج التحقق</label><div class="fro" style="min-height:50px;align-items:flex-start;padding-top:8px">${inv.findings}</div></div>` : ''}
        </div>` : ''}

        <div style="border:1px solid var(--primary-l);border-radius:var(--rsm);padding:14px">
          <div style="font-size:11px;font-weight:700;color:var(--primary);margin-bottom:10px">مرحلة مراجعة موظف القسم</div>
          <div class="fg fg-3" style="margin-bottom:10px">
            <div class="fgrp"><label class="flbl">الموظف المراجع</label><div class="fro">${normalizeDisplay(inv.employeeName || inv.employeeId)}</div></div>
            <div class="fgrp"><label class="flbl">توصية الموظف</label><div class="fro">${inv.employeeRecommendation ? `<span class="badge ${inv.employeeRecommendation === 'موافقة' ? 'b-approved' : inv.employeeRecommendation === 'رفض' ? 'b-rejected' : 'b-pending'}">${inv.employeeRecommendation}</span>` : '<span style="color:var(--text3)">—</span>'}</div></div>
            <div class="fgrp"><label class="flbl">تاريخ المراجعة</label><div class="fro">${normalizeDisplay(inv.employeeDate)}</div></div>
          </div>
          <div class="fgrp"><label class="flbl">ملاحظات الموظف</label><div class="fro" style="background:var(--bg2);border-radius:var(--rsm);padding:10px 14px;font-size:13px;line-height:1.7;min-height:44px">${normalizeDisplay(inv.employeeNotes || inv.record)}</div></div>
        </div>

        ${inv.headDecision ? `
        <div style="border:1px solid var(--accent-l,#bfdbfe);border-radius:var(--rsm);padding:14px">
          <div style="font-size:11px;font-weight:700;color:var(--accent,#2563eb);margin-bottom:10px">مرحلة اعتماد رئيس القسم</div>
          <div class="fg fg-3" style="margin-bottom:10px">
            <div class="fgrp"><label class="flbl">رئيس القسم</label><div class="fro">${normalizeDisplay(inv.headName)}</div></div>
            <div class="fgrp"><label class="flbl">قرار رئيس القسم</label><div class="fro"><span class="badge ${inv.headDecision.includes('اعتماد') || inv.headDecision.includes('موافقة') ? 'b-approved' : inv.headDecision.includes('رفض') ? 'b-rejected' : 'b-phead'}">${inv.headDecision}</span></div></div>
            <div class="fgrp"><label class="flbl">تاريخ القرار</label><div class="fro">${normalizeDisplay(inv.headDate)}</div></div>
          </div>

function doCheckout() {
  req.checkedOutBy = me;
  if (isDirectReferral && req.status === 'تم طلب العرض على المؤسسات الصحية المرخصة — بانتظار مراجعة موظف قسم اللجان الطبية') {
    req.status = 'قيد المراجعة — قسم اللجان الطبية';
  } else if (req.status === statusPending1 || req.status === statusPending2) {
    req.status = 'قيد المراجعة — قسم اللجان الطبية';
  }
  showToast('تم الحجز', 's');
  setTimeout(() => location.reload(), 800);
}
function doCheckin() {
  req.checkedOutBy = null;
  if (isDirectReferral && req.status === 'قيد المراجعة — قسم اللجان الطبية') {
    req.status = 'تم طلب العرض على المؤسسات الصحية المرخصة — بانتظار مراجعة موظف قسم اللجان الطبية';
  }
  showToast('تم التحرير', 'i');
  setTimeout(() => window.location.href = 'referrals-list.html', 800);
}
function committeesDecision(type) {
  if (isDirectReferral) {
    const note = document.getElementById('direct-committee-note')?.value?.trim() || '';
    const institution = document.getElementById('institution-sel')?.value || req.referral?.preferredInstitution || '';
    const now = new Date().toISOString().slice(0, 16).replace('T', ' ');
    const phone = getCurrentUserPhone();
    if (type === 'توجيه') {
      if (!institution) { showToast('يرجى اختيار المؤسسة الصحية أولاً', 'w'); return; }
      req.referral.preferredInstitution = institution;
      req.checkedOutBy = '';
      req.assignedTo = WI_DATA.users.committees_head.name;
      req.lastUpdate = now;
      req.lastUpdatedBy = me;
      req.status = 'تم طلب العرض على المؤسسات الصحية المرخصة — بانتظار مراجعة رئيس قسم اللجان الطبية';
      req.timeline.push({ action: 'توجيه إلى رئيس القسم', actor: me, role: 'موظف قسم اللجان الطبية', time: now, fromStatus: 'قيد المراجعة — قسم اللجان الطبية', toStatus: req.status, note: note || 'تمت التوصية بالموافقة على العرض على المؤسسات الصحية المرخصة', type: 'success', phone });
      showToast('تم توجيه الطلب لرئيس القسم', 's');
    } else if (type === 'استيفاء') {
      req.checkedOutBy = '';
      req.lastUpdate = now;
      req.lastUpdatedBy = me;
      req.status = 'تمت إعادة طلب العرض على المؤسسات الصحية المرخصة لاستيفاء البيانات';
      req.timeline.push({ action: 'إعادة للاستيفاء', actor: me, role: 'موظف قسم اللجان الطبية', time: now, fromStatus: 'قيد المراجعة — قسم اللجان الطبية', toStatus: req.status, note: note || 'يرجى استكمال البيانات والمرفقات', type: 'warning', phone });
      showToast('تمت إعادة الطلب للاستيفاء', 'w');
    } else {
      req.checkedOutBy = '';
      req.lastUpdate = now;
      req.lastUpdatedBy = me;
      req.status = 'تم رفض الطلب';
      req.timeline.push({ action: 'رفض طلب العرض', actor: me, role: 'موظف قسم اللجان الطبية', time: now, fromStatus: 'قيد المراجعة — قسم اللجان الطبية', toStatus: req.status, note: note || 'تمت التوصية برفض طلب العرض على المؤسسات الصحية المرخصة', type: 'danger', phone });
      showToast('تم رفض الإحالة', 'd');
    }
    setTimeout(() => window.location.href = 'referrals-list.html', 1200);
    return;
  }
  if (type === 'توجيه') {
    const sel = document.getElementById('institution-sel');
    if (!sel?.value) { showToast('يرجى اختيار المؤسسة الصحية أولاً', 'w'); return; }
    showToast('تم توجيه الطلب لرئيس القسم مع تأكيد المؤسسة', 's');
  } else {
    showToast(type === 'استيفاء' ? 'تم إعادة الطلب للاستيفاء' : 'تم رفض الإحالة', type === 'استيفاء' ? 'w' : 'd');
  }
  setTimeout(() => window.location.href = 'referrals-list.html', 1500);
}
</script>
</body>
</html>
