<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات العرض على المؤسسات الصحية المرخصة — رئيس قسم اللجان الطبية</title>
<link rel="stylesheet" href="../shared/style.css"></head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data-referrals.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'committees-head', activePage: 'referrals-list' });
setBreadcrumb([{ label: 'التنسيق مع المؤسسات الصحية' }, { label: 'طلبات العرض الواردة' }]);

// طلبات العرض: تلك التي وصلت لقسم اللجان الطبية من قسم الإجازات المرضية
const referralReqs = WI_DATA.allowances.filter(r =>
  r.status === 'تم طلب العرض على المؤسسات الصحية المرخصة — بانتظار مراجعة رئيس قسم اللجان الطبية' ||
  r.status === 'تم الموافقة على العرض على المؤسسات الصحية المرخصة — بانتظار إحالة المقرر' ||
  r.status === 'تم الإحالة إلى مقرر المؤسسة الصحية المرخصة — بانتظار جدولة جلسة' ||
  r.status === 'تم جدولة جلسة للعرض على المؤسسة الصحية المرخصة' ||
  r.status === 'تم اتخاذ القرار من المؤسسة الصحية المرخصة — بانتظار التنفيذ'
).concat(
  WI_DATA.referrals.filter(r =>
    r.status === 'تم اعتماد طلب العرض المباشر — بانتظار مراجعة رئيس قسم اللجان الطبية' ||
    r.status === 'تم اعتماد طلب العرض المباشر — بانتظار إحالة المقرر'
  )
);

let searchQuery = '';
let showAllStages = false;
let requestTypeFilter = 'all';

// Request type options for filtering
const requestTypeOptions = [
  { value: 'إصابة عمل', label: 'إصابة عمل' },
  { value: 'مرض مهني', label: 'مرض مهني' },
  { value: 'إعاقة', label: 'إعاقة' },
  { value: 'أمراض مستديمة', label: 'أمراض مستديمة' },
  { value: 'عرض مباشر', label: 'عرض مباشر' }
];

document.addEventListener('DOMContentLoaded', render);

function handleRequestTypeFilterChange(value) {
  requestTypeFilter = value;
  render();
}

function render() {
  const filtered = getFilteredData({
    role: 'committees-head',
    data: referralReqs,
    query: searchQuery,
    showAll: showAllStages,
    requestTypeFilter: requestTypeFilter
  });
  getContent().innerHTML = `
    <div class="pg-head">
      <div><h1>طلبات العرض على المؤسسات الصحية المرخصة</h1>
        <p>الطلبات التي تحتاج تنسيقاً مع المؤسسات الصحية المرخصة</p></div>
    </div>
    ${renderUnifiedFilterBar({
      onSearch: 'updateSearch',
      onToggleAll: 'toggleAll',
      isAllVisible: showAllStages,
      includeRequestTypeFilter: true,
      requestTypeOptions: requestTypeOptions
    })}
    <div class="filters" style="display:none">
      <div class="fgrid">
        <div class="fgrp"><label class="flbl">رقم الطلب</label><input type="text" class="fc" placeholder="WI-YYYY-XXXXXX"></div>
        <div class="fgrp"><label class="flbl">اسم المؤمن عليه</label><input type="text" class="fc"></div>
        <div class="fgrp"><label class="flbl">نوع الطلب</label><select class="fc"><option>الكل</option><option>إصابة عمل</option><option>مرض مهني</option><option>مرض مستديم</option></select></div>
        <div class="fgrp"><label class="flbl">الحالة</label><select class="fc"><option>الكل</option><option>بانتظار مراجعة الموظف</option><option>تمت الموافقة</option><option>تمت الإحالة</option><option>جلسة مجدولة</option></select></div>
      </div>
      <div class="facts"><button class="btn btn-primary btn-sm">${ICONS.search} بحث</button><button class="btn btn-secondary btn-sm">مسح</button></div>
    </div>
    <div class="card">
      <div class="pb-0">
        <div class="tbl-wrap">
          <table class="dtbl">
            <thead>
              <tr>
                <th>رقم الطلب</th>
                <th>مقدم الطلب</th>
                <th>المؤمن عليه</th>
                <th>نوع الطلب</th>
                <th>الحالة</th>
                <th>تاريخ التقديم</th>
                <th>الأيام المتبقية</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map(r=>`
              <tr>
                <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.id}</td>
                <td>${getSubmittedByName(r)}</td>
                <td>${r.insured?.name || r.applicant?.name || '—'}</td>
                <td>${r.requestType || r.type || '—'}</td>
                <td>${statusBadge(r.status)}</td>
                <td style="font-size:12px">${r.submitDate}</td>
                <td>${renderRemainingDaysBadge(r)}</td>
                <td>
                  <div style="display:flex;gap:4px">
                    <button class="ibtn" onclick="window.location.href='referrals-details.html?id=${r.id}'" title="عرض التفاصيل">${ICONS.eye}</button>
                    <button class="ibtn" onclick="openAddNoteModal('${r.id}')">${ICONS.note}</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  if (searchQuery) {
    const inp = document.getElementById('global-search-input');
    if (inp) { inp.value = searchQuery; inp.focus(); inp.setSelectionRange(searchQuery.length, searchQuery.length); }
  }
  // Restore request type filter selection
  if (requestTypeFilter && requestTypeFilter !== 'all') {
    const select = document.getElementById('request-type-filter');
    if (select) select.value = requestTypeFilter;
  }
}
function updateSearch(val) { searchQuery = val; render(); }
function toggleAll() { showAllStages = !showAllStages; render(); }

// Make the filter handler available globally
window.handleRequestTypeFilterChange = handleRequestTypeFilterChange;
</script></body></html>
