<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل طلب العرض — رئيس قسم اللجان الطبية</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<script src="../shared/config.js"></script>
<script src="../shared/data-users.js"></script>
<script src="../shared/data-allowances.js"></script>
<script src="../shared/data-disability.js"></script>
<script src="../shared/data-chronic.js"></script>
<script src="../shared/data-appeals.js"></script>
<script src="../shared/data-licensing.js"></script>
<script src="../shared/data-sessions.js"></script>
<script src="../shared/data-disability-retirement.js"></script>
<script src="../shared/data-referrals.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/workflow-stages.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/utils.js"></script>
<script>
initLayout({ role: 'committees-head', activePage: 'referrals-list' });
const params = new URLSearchParams(window.location.search);
const directReq = WI_DATA.referrals.find(r => r.id === params.get('id'));
const req = directReq || WI_DATA.allowances.find(r => r.id === params.get('id')) || WI_DATA.allowances[0];
const isDirectReferral = Boolean(directReq);
currentRequestId = req ? req.id : '';
setBreadcrumb([{ label: 'طلبات العرض', page: 'referrals-list' }, { label: `تفاصيل ${req.id}` }]);

document.addEventListener('DOMContentLoaded', () => {
  if (!req) {
    getContent().innerHTML = '<div class="card"><div class="pb"><div class="empty-st">الطلب غير موجود</div></div></div>';
    return;
  }
  if (isDirectReferral) {
    renderDirectReferralCommitteesHead();
    return;
  }
  const canAct = req.status === 'تم الموافقة على العرض على المؤسسات الصحية المرخصة — بانتظار إحالة المقرر'
    || req.status === 'تم طلب العرض على المؤسسات الصحية المرخصة — بانتظار مراجعة رئيس قسم اللجان الطبية';
  const isSamePerson = req.applicant?.civil && req.insured?.civil && req.applicant.civil === req.insured.civil;

  const injury  = req.injury || {};
  const isWork  = req.type === 'إصابة عمل';
  const periods = req.sickLeavePeriods || [];
  const atts    = req.attachments || [];
  const notes   = req.notes || [];
  const tl      = req.timeline || [];
  const totalDays = periods.reduce((s, p) => s + (p.days || 0), 0);

  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>تفاصيل طلب العرض على مؤسسة صحية مرخصة</h1>
        <p>رقم الطلب: <strong style="font-family:monospace;color:var(--primary)">${req.id}</strong></p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary" onclick="window.location.href='referrals-list.html'">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <!-- ملخص الطلب -->
    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div class="req-summary-grid">
          <div><div class="flbl" style="margin-bottom:4px">رقم الطلب</div><div style="font-size:15px;font-weight:800;color:var(--primary);font-family:monospace">${req.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">نوع الطلب</div><div style="font-size:13px;font-weight:600">${req.type}${req.subtype ? ` — ${req.subtype}` : ''}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">الحالة الحالية</div>${statusBadge(req.status)}</div>
          <div><div class="flbl" style="margin-bottom:4px">تاريخ التقديم</div><div style="font-size:12.5px">${formatDate(req.submitDate)}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">مقدم الطلب</div><div style="font-size:12.5px;font-weight:600">${req.applicant.name}</div><div style="font-size:11px;color:var(--text3)">${req.applicant.role}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث</div><div style="font-size:12px;color:var(--text2)">${req.lastUpdate || '—'}</div></div>
        </div>
      </div>
    </div>

    ${renderWorkflowPath(req, 'referrals')}
    <!-- بيانات مقدم الطلب والمؤمن عليه (مدمجة) -->
    ${renderInsuredSummaryCards(req.insured?.civil || req.applicant?.civil, req.id)}
    ${isSamePerson ? `
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب والمؤمن عليه <span style="font-size:10px;color:var(--text3)">(نفس الشخص)</span></h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.applicant.name}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.applicant.civil}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(req.insured.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${req.insured.gender || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${req.insured.nationality || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${normalizeDisplay(req.applicant.phone)}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${normalizeDisplay(req.applicant.email)}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${req.insured.insuranceStatus === 'نشط' ? 'b-approved' : 'b-rejected'}">${req.insured.insuranceStatus || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل</label><div class="fro">${formatDate(req.insured.regDate)}</div></div>
        </div>
      </div>
    </div>` : `
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">صفة مقدم الطلب</label><div class="fro">${req.applicant.role || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.applicant.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.applicant.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${normalizeDisplay(req.applicant.phone)}</div></div>
          <div class="fgrp"><label class="flbl">البريد الإلكتروني</label><div class="fro">${normalizeDisplay(req.applicant.email)}</div></div>
        </div>
      </div>
    </div>

    <div class="card card-ro">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات المؤمن عليه / المستفيد</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-4">
          <div class="fgrp"><label class="flbl">الاسم الكامل</label><div class="fro">${req.insured.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.insured.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الميلاد</label><div class="fro">${formatDate(req.insured.dob)}</div></div>
          <div class="fgrp"><label class="flbl">الجنس</label><div class="fro">${req.insured.gender || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الجنسية</label><div class="fro">${req.insured.nationality || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro"><span class="badge ${req.insured.insuranceStatus === 'نشط' ? 'b-approved' : 'b-rejected'}">${req.insured.insuranceStatus || '—'}</span></div></div>
          <div class="fgrp"><label class="flbl">تاريخ التسجيل</label><div class="fro">${formatDate(req.insured.regDate)}</div></div>
        </div>
      </div>
    </div>`}

    <!-- بيانات جهة العمل -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico tl">${ICONS.building}</div>بيانات جهة العمل</h3><span style="font-size:11px;color:var(--text3)">مجلوبة تلقائياً</span></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">اسم جهة العمل</label><div class="fro" style="font-weight:700">${req.employer.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم السجل التجاري</label><div class="fro" style="font-family:monospace">${req.employer.cr || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم المنشأة</label><div class="fro" style="font-family:monospace">${req.employer.establishment || '—'}</div></div>
          <div class="fgrp"><label class="flbl">المسمى الوظيفي</label><div class="fro">${req.employer.jobTitle || '—'}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الالتحاق بالعمل</label><div class="fro">${formatDate(req.employer.joinDate)}</div></div>
          <div class="fgrp"><label class="flbl">موقع العمل / الفرع</label><div class="fro">${req.employer.location || '—'}</div></div>
        </div>
      </div>
    </div>

    <!-- بيانات الإصابة / المرض -->
    <div class="card card-ro">
      <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>بيانات ${isWork ? 'الإصابة' : 'المرض المهني'}</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">نوع الحالة</label><div class="fro">${normalizeDisplay(isWork ? (injury.caseType || 'إصابة عمل') : (injury.caseType || injury.diagnosis || 'مرض مهني'))}</div></div>
          <div class="fgrp"><label class="flbl">تاريخ الواقعة / الاشتباه</label><div class="fro">${formatDate(injury.incidentDate || injury.firstSuspicion)}</div></div>
          ${isWork ? `
          <div class="fgrp"><label class="flbl">الجزء المصاب</label><div class="fro">${injury.bodyPart || '—'}</div></div>
          <div class="fgrp span-full"><label class="flbl">مكان الواقعة</label><div class="fro">${injury.location || '—'}</div></div>
          <div class="fgrp span-full"><label class="flbl">وصف تفصيلي للواقعة</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:10px">${injury.description || '—'}</div></div>
          ` : `
          <div class="fgrp span-full"><label class="flbl">المواد / العوامل المسببة</label><div class="fro">${injury.chemicalAgents || '—'}</div></div>
          <div class="fgrp"><label class="flbl">مدة التعرض المهني</label><div class="fro">${injury.exposureDuration || '—'}</div></div>
          `}
        </div>
      </div>
    </div>

    ${req.investigation ? `
    <!-- تقرير التحقيق -->
    <div class="card card-cum">
      <div class="ph"><h3><div class="pico pu">${ICONS.search}</div>تقرير التحقيق</h3><span class="stg-lbl">مرحلة التحقيق</span></div>
      <div class="pb">
        <div class="fg" style="gap:14px">
          <div class="fgrp"><label class="flbl">ملخص التحقيق</label><div class="fro" style="min-height:70px;align-items:flex-start;padding-top:10px">${req.investigation.summary || '—'}</div></div>
          <div class="fgrp"><label class="flbl">نتائج التحقق</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:10px">${req.investigation.findings || '—'}</div></div>
          <div class="fg fg-3">
            <div class="fgrp"><label class="flbl">توصية الموظف</label><div class="fro">${req.investigation.employeeRecommendation ? `<span class="badge ${req.investigation.employeeRecommendation === 'موافقة' ? 'b-approved' : 'b-rejected'}">${req.investigation.employeeRecommendation}</span>` : '—'}</div></div>
            <div class="fgrp span-2"><label class="flbl">ملاحظات الموظف</label><div class="fro">${req.investigation.employeeNotes || '—'}</div></div>
          </div>
        </div>
      </div>
    </div>` : ''}

    <!-- فترات الإجازات المرضية -->
    <div class="card card-cum">
      <div class="ph">
        <h3><div class="pico gr">${ICONS.calendar}</div>فترات الإجازات المرضية</h3>
        <span style="font-size:12px;color:var(--text3)">الإجمالي: <strong>${totalDays}</strong> يوم</span>
      </div>
      <div class="pb-0">
        <div class="tbl-wrap">
          ${periods.length === 0
            ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد فترات مسجلة</div>'
            : `<table class="dtbl">
              <thead><tr><th>#</th><th>من تاريخ</th><th>إلى تاريخ</th><th>عدد الأيام</th><th>الحالة</th><th>أضافها</th></tr></thead>
              <tbody>${periods.map((p, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td>${formatDate(p.from)}</td>
                  <td>${formatDate(p.to)}</td>
                  <td><strong>${p.days}</strong> يوم</td>
                  <td><span class="badge ${p.status === 'معتمدة' ? 'b-approved' : p.status === 'مرفوضة' ? 'b-rejected' : 'b-phead'}">${p.status}</span></td>
                  <td>${p.addedBy || '—'}</td>
                </tr>`).join('')}
              </tbody>
              <tfoot><tr><td colspan="3" style="font-weight:700;text-align:right;padding:8px 14px">الإجمالي</td><td colspan="3" style="font-weight:700;padding:8px 14px">${totalDays} يوم</td></tr></tfoot>
            </table>`}
        </div>
      </div>
    </div>

    <!-- استعلام التقارير الطبية -->
    <div class="card card-cum">
      <div class="ph">
        <h3><div class="pico bl">${ICONS.medical}</div>استعلام التقارير الطبية — وزارة الصحة <span style="font-size:10px;background:#ede9fe;color:#7c3aed;padding:1px 7px;border-radius:10px;font-weight:600">للمستخدمين الداخليين فقط</span></h3>
      </div>
      <div class="pb">
        <div class="alert alert-i" style="margin-bottom:14px">${ICONS.info}<span>هذا الاستعلام للاطلاع فقط ولا يُعدّ إجراءً على الطلب.</span></div>
        <div class="fg fg-3" style="margin-bottom:14px">
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.insured.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">من تاريخ</label><input type="date" class="fc" id="mq-from"></div>
          <div class="fgrp"><label class="flbl">إلى تاريخ</label><input type="date" class="fc" id="mq-to"></div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="runMedicalQuery('${req.insured.civil}')">${ICONS.search} استعلام</button>
        <div id="mq-results" style="margin-top:16px"></div>
      </div>
    </div>

    <!-- توصية موظف القسم -->
    <div class="card" style="border:1px solid var(--primary-l);background:var(--primary-l)">
      <div class="pb-c">
        <div class="flbl" style="margin-bottom:6px;color:var(--primary)">توصية موظف القسم</div>
        <div style="font-size:12.5px;margin-bottom:8px">المؤسسة المقترحة: مستشفى النور التخصصي — مسقط</div>
        <span class="badge b-approved">توصية بالموافقة والإحالة</span>
      </div>
    </div>

    ${canAct ? `
    <!-- اتخاذ القرار — رئيس قسم اللجان الطبية -->
    <div class="dp">
      <div class="ph"><h3><div class="pico bl">${ICONS.pen}</div>اتخاذ القرار — رئيس قسم اللجان الطبية</h3></div>
      <div class="dp-body">
        <div class="fgrp">
          <label class="flbl">تأكيد المؤسسة الصحية المرخصة <span class="req">*</span></label>
          <select class="fc" id="institution-final">
            <option>مستشفى النور التخصصي — مسقط (موصى به من الموظف)</option>
            <option>مستشفى الأمل التخصصي — السيب</option>
            <option>مركز الرعاية الصحية المتخصص — بوشر</option>
          </select>
        </div>
        <div class="fgrp">
          <label class="flbl">ملاحظات الرئيس</label>
          <textarea class="fc" rows="3" placeholder="أكتب ملاحظاتك..."></textarea>
        </div>
        <div class="fgrp">
          <label class="flbl">إرفاق ملف داعم <span style="font-weight:400;color:var(--text3)">(اختياري)</span></label>
          ${renderModernUploadComponent({ idPrefix: 'decision-att', subTitle: 'PDF, Word, صور — الحجم الأقصى 20 ميغابايت' })}
        </div>
        <div class="dp-acts">
          <button class="btn btn-accent" onclick="headReferralDecision('توجيه')">${ICONS.check} توجيه إلى مقرر المؤسسة الصحية المرخصة</button>
          <button class="btn btn-warning" onclick="headReferralDecision('إعادة')">إعادة لموظف القسم</button>
          <button class="btn btn-danger" onclick="headReferralDecision('رفض')">رفض الإحالة</button>
        </div>
      </div>
    </div>` : ''}

    <!-- المرفقات -->
    <div class="card">
      <div class="ph">
        <h3><div class="pico or">${ICONS.upload}</div>المرفقات <span style="font-size:11px;font-weight:400;color:var(--text3)">(${atts.length} مرفق)</span></h3>
      </div>
      <div class="pb">
        ${atts.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد مرفقات</div>' : atts.map(att => {
          const ext = att.name?.split('.').pop()?.toLowerCase() || 'oth';
          const icoMap = { pdf: 'file', doc: 'file', docx: 'file', jpg: 'img', jpeg: 'img', png: 'img' };
          return `<div class="att-row"><div class="att-ico ${icoMap[ext] || 'oth'}">${ICONS.file}</div><div class="att-info"><div class="att-name">${att.name}</div><div class="att-meta">${att.type} · رفعه: ${att.uploadedBy} (${att.role}) · ${att.uploadDate} · ${att.size || ''}</div></div><div class="att-acts"><button class="ibtn" title="تحميل" onclick="showToast('جارٍ تحميل الملف...','i')">${ICONS.download}</button></div></div>`;
        }).join('')}
      </div>
    </div>

    <!-- الملاحظات التشغيلية -->
    <div class="card op-notes-card collapsed" data-notes-init="0">
      <div class="ph op-notes-head" onclick="toggleOperationalNotes(this.closest('.op-notes-card'))">
        <h3><div class="pico gy">${ICONS.note}</div>الملاحظات التشغيلية <span style="font-size:11px;font-weight:400;color:var(--text3)">(لا تغيّر حالة الطلب)</span></h3>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="op-notes-chevron">${ICONS.arrow_left}</span>
          <button class="btn btn-secondary btn-xs" onclick="event.stopPropagation();openAddNoteModal(currentRequestId)">${ICONS.plus} إضافة ملاحظة</button>
        </div>
      </div>
      <div class="pb">
        ${notes.length === 0 ? '<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">لا توجد ملاحظات تشغيلية</div>' : notes.map(n => `<div class="note-item"><div class="note-av">${n.author?.charAt(0) || '؟'}</div><div class="note-c"><div class="note-hd"><span class="note-auth">${n.author}</span><span class="note-role">${n.role}</span><span class="note-time">${n.time}</span></div><div class="note-txt">${n.text}</div></div></div>`).join('')}
        <div style="margin-top:10px;display:flex;gap:8px">
          <textarea class="fc" id="quick-note-input" placeholder="أكتب ملاحظة سريعة..." rows="2" style="flex:1"></textarea>
          <button class="btn btn-secondary btn-sm" style="align-self:flex-end" onclick="quickAddNote()">حفظ</button>
        </div>
      </div>
    </div>

    <!-- السجل الزمني -->
    <div class="card">
      <div class="ph"><h3><div class="pico gy">${ICONS.clock}</div>السجل الزمني الكامل للطلب</h3></div>
      <div class="pb">${renderTimelineList(tl)}</div>
    </div>`;
});

function renderDirectReferralCommitteesHead() {
  const canAct = req.status === 'تم طلب العرض على المؤسسات الصحية المرخصة — بانتظار مراجعة رئيس قسم اللجان الطبية';
  const atts = req.attachments || [];
  const notes = req.notes || [];
  const timeline = req.timeline || [];
  getContent().innerHTML = `
    <div class="pg-head">
      <div>
        <h1>تفاصيل طلب العرض على المؤسسات الصحية المرخصة</h1>
        <p>رقم الطلب: <strong style="font-family:monospace;color:var(--primary)">${req.id}</strong></p>
      </div>
      <div class="pg-acts">
        <button class="btn btn-secondary" onclick="window.location.href='referrals-list.html'">${ICONS.arrow_left} رجوع</button>
      </div>
    </div>

    <div class="card" style="border-right:4px solid var(--primary)">
      <div class="pb-c">
        <div class="req-summary-grid">
          <div><div class="flbl" style="margin-bottom:4px">رقم الطلب</div><div style="font-size:15px;font-weight:800;color:var(--primary);font-family:monospace">${req.id}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">نوع الطلب</div><div style="font-size:13px;font-weight:600">${req.requestType}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">التصنيف</div><div style="font-size:13px;font-weight:600">${req.referral?.requestCategory || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">الحالة الحالية</div>${statusBadge(req.status)}</div>
          <div><div class="flbl" style="margin-bottom:4px">المؤسسة المقترحة</div><div style="font-size:12.5px;font-weight:600">${req.referral?.preferredInstitution || '—'}</div></div>
          <div><div class="flbl" style="margin-bottom:4px">آخر تحديث</div><div style="font-size:12px;color:var(--text2)">${req.lastUpdate || '—'}</div></div>
        </div>
      </div>
    </div>

    ${renderWorkflowPath(req, 'directReferral')}
    <div class="card">
      <div class="ph"><h3><div class="pico bl">${ICONS.user}</div>بيانات مقدم الطلب والمؤمن عليه</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">مقدم الطلب</label><div class="fro">${req.applicant?.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">صفة مقدم الطلب</label><div class="fro">${req.applicant?.role || '—'}</div></div>
          <div class="fgrp"><label class="flbl">رقم الهاتف</label><div class="fro">${req.applicant?.phone || req.insured?.phone || '—'}</div></div>
          <div class="fgrp"><label class="flbl">المؤمن عليه</label><div class="fro">${req.insured?.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الرقم المدني</label><div class="fro" style="font-family:monospace">${req.insured?.civil || '—'}</div></div>
          <div class="fgrp"><label class="flbl">الحالة التأمينية</label><div class="fro">${req.insured?.insuranceStatus || '—'}</div></div>
        </div>
      </div>
    </div>

    <div class="card card-ro">
      <div class="ph"><h3><div class="pico tl">${ICONS.building}</div>بيانات جهة العمل</h3></div>
      <div class="pb">
        <div class="fg fg-3">
          <div class="fgrp"><label class="flbl">اسم الجهة</label><div class="fro">${req.employer?.name || '—'}</div></div>
          <div class="fgrp"><label class="flbl">السجل التجاري</label><div class="fro" style="font-family:monospace">${req.employer?.cr || '—'}</div></div>
          <div class="fgrp"><label class="flbl">المسمى الوظيفي</label><div class="fro">${req.employer?.jobTitle || '—'}</div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="ph"><h3><div class="pico rd">${ICONS.medical}</div>بيانات طلب العرض على المؤسسات الصحية المرخصة</h3></div>
      <div class="pb">
        <div class="fg fg-2">
          <div class="fgrp"><label class="flbl">المؤسسة المقترحة</label><div class="fro">${req.referral?.preferredInstitution || '—'}</div></div>
          <div class="fgrp"><label class="flbl">نوع المؤسسة</label><div class="fro">${req.referral?.institutionType || '—'}</div></div>
          <div class="fgrp span-full"><label class="flbl">سبب الإحالة</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:10px">${req.referral?.reason || '—'}</div></div>
          <div class="fgrp span-full"><label class="flbl">ملاحظات الطلب</label><div class="fro" style="min-height:60px;align-items:flex-start;padding-top:10px">${req.referral?.notes || '—'}</div></div>
        </div>
      </div>
    </div>

    ${canAct ? `
    <div class="dp">
      <div class="ph"><h3><div class="pico bl">${ICONS.pen}</div>اتخاذ القرار — رئيس قسم اللجان الطبية</h3></div>
      <div class="dp-body">
        <div class="fgrp">
          <label class="flbl">تأكيد المؤسسة الصحية المرخصة</label>
          <select class="fc" id="institution-final">
            <option>${req.referral?.preferredInstitution || '— اختر المؤسسة —'}</option>
            <option>مستشفى النور التخصصي</option>
            <option>مستشفى ابن سينا</option>
            <option>مستشفى الأمل التخصصي</option>
          </select>
        </div>
        <div class="fgrp">
          <label class="flbl">ملاحظات الرئيس</label>
          <textarea class="fc" id="direct-head-note" rows="3" placeholder="أكتب ملاحظاتك..."></textarea>
        </div>
        <div class="dp-acts">
          <button class="btn btn-accent" onclick="headReferralDecision('توجيه')">${ICONS.check} اعتماد وإحالة للمقرر</button>
          <button class="btn btn-warning" onclick="headReferralDecision('إعادة')">إعادة لموظف القسم</button>
          <button class="btn btn-danger" onclick="headReferralDecision('رفض')">رفض الإحالة</button>
        </div>
      </div>
    </div>` : ''}

    <div class="card">
      <div class="ph"><h3><div class="pico or">${ICONS.upload}</div>المرفقات <span style="font-size:11px;font-weight:400;color:var(--text3)">(${atts.length} مرفق)</span></h3></div>
      <div class="pb">
        ${atts.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد مرفقات</div>' : atts.map(att => `<div class="att-row"><div class="att-ico file">${ICONS.file}</div><div class="att-info"><div class="att-name">${att.name}</div><div class="att-meta">${att.type} · رفعه: ${att.uploadedBy} (${att.role}) · ${att.uploadDate}</div></div><div class="att-acts"><button class="ibtn" title="تحميل" onclick="showToast('جارٍ تحميل الملف...','i')">${ICONS.download}</button></div></div>`).join('')}
      </div>
    </div>

    <div class="card op-notes-card collapsed" data-notes-init="0">
      <div class="ph op-notes-head" onclick="toggleOperationalNotes(this.closest('.op-notes-card'))">
        <h3><div class="pico gy">${ICONS.note}</div>الملاحظات التشغيلية</h3>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="op-notes-chevron">${ICONS.arrow_left}</span>
          <button class="btn btn-secondary btn-xs" onclick="event.stopPropagation();openAddNoteModal(currentRequestId)">${ICONS.plus} إضافة ملاحظة</button>
        </div>
      </div>
      <div class="pb">
        ${notes.length === 0 ? '<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">لا توجد ملاحظات تشغيلية</div>' : notes.map(n => `<div class="note-item"><div class="note-av">${n.author?.charAt(0) || '؟'}</div><div class="note-c"><div class="note-hd"><span class="note-auth">${n.author}</span><span class="note-role">${n.role}</span><span class="note-time">${n.time}</span></div><div class="note-txt">${n.text}</div></div></div>`).join('')}
      </div>
    </div>

    <div class="card">
      <div class="ph"><h3><div class="pico gy">${ICONS.clock}</div>السجل الزمني الكامل للطلب</h3></div>
      <div class="pb">${renderTimelineList(timeline)}</div>
    </div>`;
}

function headReferralDecision(type) {
  if (isDirectReferral) {
    const note = document.getElementById('direct-head-note')?.value?.trim() || '';
    const institution = document.getElementById('institution-final')?.value || req.referral?.preferredInstitution || '';
    const now = new Date().toISOString().slice(0, 16).replace('T', ' ');
    const actor = WI_DATA.users.committees_head.name;
    const phone = WI_DATA.users.committees_head.phone || getCurrentUserPhone();
    if (type === 'توجيه') {
      req.referral.preferredInstitution = institution;
      req.assignedTo = 'منسق الإحالات والتحويلات';
      req.lastUpdate = now;
      req.lastUpdatedBy = actor;
      req.status = 'تم الموافقة على العرض على المؤسسات الصحية المرخصة — بانتظار إحالة المقرر';
      req.timeline.push({ action: 'اعتماد وإحالة للمقرر', actor, role: 'رئيس قسم اللجان الطبية', time: now, fromStatus: 'تم طلب العرض على المؤسسات الصحية المرخصة — بانتظار مراجعة رئيس قسم اللجان الطبية', toStatus: req.status, note: note || 'تم اعتماد الطلب وتحويله للتنسيق مع المؤسسة الصحية المرخصة', type: 'success', phone });
      showToast('تم اعتماد الطلب وإحالته للمقرر', 's');
    } else if (type === 'إعادة') {
      req.lastUpdate = now;
      req.lastUpdatedBy = actor;
      req.status = 'تم طلب العرض على المؤسسات الصحية المرخصة — بانتظار مراجعة موظف قسم اللجان الطبية';
      req.timeline.push({ action: 'إعادة إلى موظف القسم', actor, role: 'رئيس قسم اللجان الطبية', time: now, fromStatus: 'تم طلب العرض على المؤسسات الصحية المرخصة — بانتظار مراجعة رئيس قسم اللجان الطبية', toStatus: req.status, note: note || 'يرجى استكمال المراجعة قبل الإحالة', type: 'warning', phone });
      showToast('تمت إعادة الطلب لموظف القسم', 'w');
    } else {
      req.lastUpdate = now;
      req.lastUpdatedBy = actor;
      req.status = 'تم رفض الطلب';
      req.timeline.push({ action: 'رفض طلب العرض', actor, role: 'رئيس قسم اللجان الطبية', time: now, fromStatus: 'تم طلب العرض على المؤسسات الصحية المرخصة — بانتظار مراجعة رئيس قسم اللجان الطبية', toStatus: req.status, note: note || 'تم رفض الطلب من رئيس القسم', type: 'danger', phone });
      showToast('تم رفض الإحالة', 'd');
    }
    setTimeout(() => window.location.href = 'referrals-list.html', 1200);
    return;
  }
  const msgs = { توجيه: 'تم توجيه الطلب لمقرر المؤسسة الصحية المرخصة', إعادة: 'تم إعادة الطلب لموظف القسم', رفض: 'تم رفض الإحالة' };
  const types = { توجيه: 's', إعادة: 'w', رفض: 'd' };
  showToast(msgs[type], types[type]);
  setTimeout(() => window.location.href = 'referrals-list.html', 1500);
}
</script>
</body>
</html>
